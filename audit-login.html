<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auditor Login</title>

<link rel="stylesheet" href="styles.css">

<style>
body{
    background:#111827;
    color:white;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-box{
    background:#1f2937;
    padding:30px;
    border-radius:10px;
    width:320px;
}

input{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:5px;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    background:#059669;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#047857;
}
</style>

</head>
<body>

<div class="login-box">
    <h2>Auditor</h2>

    <input type="text" id="auditorUser" placeholder="Usuário">

    <input type="password" id="auditorPass" placeholder="Senha">

    <button onclick="auditorLogin()">
        Entrar
    </button>

    <p id="msg"></p>
</div>

<script src="auth.js"></script>

</body>
</html>
