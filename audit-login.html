<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Auditor Login</title>

<style>

body{
    background:#111827;
    color:white;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    background:#1f2937;
    padding:40px;
    border-radius:10px;
    width:320px;
}

input{
    width:100%;
    padding:12px;
    margin-top:10px;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    background:#059669;
    border:none;
    color:white;
}

</style>

</head>

<body>

<div class="box">

<h2>Auditor Login</h2>

<input id="user" placeholder="Usuário">

<input
id="pass"
type="password"
placeholder="Senha"
>

<button onclick="login()">
Entrar
</button>

<script>

function login(){

const u =
document.getElementById("user").value;

const p =
document.getElementById("pass").value;

if(u==="auditor" && p==="123456"){

window.location.href =
"auditor-dashboard.html";

}else{

alert("Login inválido");

}

}

</script>

</div>

</body>
</html>
