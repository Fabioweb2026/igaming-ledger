<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login</title>

<link rel="stylesheet" href="styles.css">

<style>
body{
    background:#0f172a;
    color:white;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-box{
    background:#1e293b;
    padding:30px;
    border-radius:10px;
    width:320px;
}

input{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:5px;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}
</style>

</head>
<body>

<div class="login-box">
    <h2>Administrador</h2>

    <input type="text" id="adminUser" placeholder="Usuário">

    <input type="password" id="adminPass" placeholder="Senha">

    <button onclick="adminLogin()">
        Entrar
    </button>

    <p id="msg"></p>
</div>

<script src="auth.js"></script>

</body>
</html>
