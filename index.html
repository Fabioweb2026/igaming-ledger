<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sollene Group | Premium Logistics</title>
    <style>
        @import url('https://googleapis.com');
        
        *{ margin:0; padding:0; box-sizing:border-box; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #fdfaf6; /* CREME CLARO */
            color: #1a1a1a; 
            padding-bottom: 60px;
        }

        /* BANNER SUPERIOR COM A IMAGEM */
        .top-banner {
            width: 100%;
            height: 250px;
            background: linear-gradient(rgba(253, 250, 246, 0.2), rgba(253, 250, 246, 1)), 
                        url('image.png') no-repeat center center;
            background-size: cover;
            margin-bottom: 20px;
            border-bottom: 1px solid #e5e7eb;
        }

        .hero { text-align: center; margin-bottom: 40px; padding: 0 20px; }
        .hero h1 { font-size: 52px; font-weight: 800; color: #1a1a1a; letter-spacing: -2px; }
        .hero p { color: #64748b; font-size: 13px; text-transform: uppercase; letter-spacing: 2px; font-weight: 700; margin-top: 5px; }

        .container { 
            display: flex; 
            gap: 30px; 
            max-width: 1300px; 
            margin: 0 auto; 
            padding: 0 20px;
            align-items: flex-start; 
        }

        /* BARRA LATERAL DE REGISTRO */
        .sidebar { width: 340px; flex-shrink: 0; }

        .form-card { 
            background: #ffffff; 
            padding: 30px; 
            border-radius: 20px; 
            border: 1px solid #e5e7eb;
            box-shadow: 0 10px 30px rgba(0,0,0,0.04);
        }

        .form-card h3 { color: #b39359; font-size: 12px; text-transform: uppercase; margin-bottom: 25px; letter-spacing: 1px; border-bottom: 1px solid #f3f4f6; padding-bottom: 10px; }

        .field { margin-bottom: 18px; }
        label { display: block; font-size: 10px; color: #94a3b8; margin-bottom: 6px; text-transform: uppercase; font-weight: 700; }

        input, select { 
            width: 100%; padding: 13px; background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 10px; color: #1a1a1a; font-size: 14px; transition: 0.3s;
        }

        input:focus { border-color: #b39359; outline: none; background: #fff; }

        .qty-row { display: flex; gap: 8px; }
        .qty-row input { flex: 2; }
        .qty-row select { flex: 1.2; }

        #regBtn { 
            width: 100%; padding: 16px; background: #1a1a1a; color: #fff; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; margin-top: 10px; transition: 0.3s; text-transform: uppercase; font-size: 13px;
        }

        #regBtn:hover { background: #b39359; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(179, 147, 89, 0.3); }

        /* TABELA */
        .table-area { flex: 1; min-width: 0; }
        .table-area h2 { font-size: 22px; margin-bottom: 20px; color: #1a1a1a; font-weight: 700; }

        .data-container { 
            background: #ffffff; border-radius: 20px; border: 1px solid #e5e7eb; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.02);
        }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 18px; color: #94a3b8; font-size: 10px; text-transform: uppercase; border-bottom: 1px solid #f3f4f6; letter-spacing: 1px; font-weight: 700; }
        td { padding: 18px; border-bottom: 1px solid #f9fafb; font-size: 14px; color: #334155; }

        .price-text { color: #b39359; font-weight: 700; }
        .del-btn { color: #ef4444; cursor: pointer; font-weight: 700; border: none; background: none; font-size: 11px; }

        footer { text-align: center; margin-top: 60px; color: #94a3b8; font-size: 11px; letter-spacing: 1px; }

        @media(max-width: 1000px) { .container { flex-direction: column; } .sidebar { width: 100%; } .top-banner { height: 180px; } }
    </style>
</head>
<body>

    <!-- BANNER SUBIDO PARA O TOPO -->
    <div class="top-banner"></div>

    <header class="hero">
        <h1>Sollene Group</h1>
        <p>Supply Chain & Logistics Division</p>
    </header>

    <div class="container">
        <!-- BARRA LATERAL LIMPA -->
        <aside class="sidebar">
            <div class="form-card">
                <h3>Shipment Registration</h3>
                
                <div class="field">
                    <label>Commodity Name</label>
                    <input type="text" id="pName" placeholder="e.g. Arabica Coffee">
                </div>

                <div class="field">
                    <label>Destination Port</label>
                    <input type="text" id="pDest" placeholder="e.g. Rotterdam">
                </div>

                <div class="field">
                    <label>Currency</label>
                    <select id="pCurr">
                        <option value="USD">USD ($)</option>
                        <option value="EUR">EUR (€)</option>
                        <option value="BRL">BRL (R$)</option>
                    </select>
                </div>

                <div class="field">
                    <label>Unit Price</label>
                    <input type="number" id="pPrice" placeholder="0.00">
                </div>

                <div class="field">
                    <label>Volume & Unit</label>
                    <div class="qty-row">
                        <input type="number" id="pQty" placeholder="Val">
                        <select id="pUnit">
                            <option value="Units">Units</option>
                            <option value="KG">KG</option>
                            <option value="Tons">Tons</option>
                        </select>
                    </div>
                </div>

                <button id="regBtn">Register Cargo</button>
            </div>
        </aside>

        <!-- TABELA DE INVENTÁRIO -->
        <main class="table-area">
            <h2>Active Cargo Inventory</h2>
            <div class="data-container">
                <table>
                    <thead>
                        <tr>
                            <th>Product</th>
                            <th>Destination</th>
                            <th>Value</th>
                            <th>Quantity</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="inventoryList"></tbody>
                </table>
            </div>
        </main>
    </div>

    <footer>© 2026 SOLLENE GROUP — PREMIUM INTERNATIONAL LOGISTICS</footer>

    <script>
        const regBtn = document.getElementById('regBtn');
        const inventoryList = document.getElementById('inventoryList');

        regBtn.addEventListener('click', function() {
            const name = document.getElementById('pName').value;
            const dest = document.getElementById('pDest').value;
            const curr = document.getElementById('pCurr').value;
            const price = document.getElementById('pPrice').value;
            const qty = document.getElementById('pQty').value;
            const unit = document.getElementById('pUnit').value;

            if (!name || !price || !qty) {
                alert("Please fill all required fields.");
                return;
            }

            let symbol = curr === "USD" ? "$" : (curr === "EUR" ? "€" : "R$");

            const row = inventoryList.insertRow();
            row.innerHTML = `
                <td style="font-weight: 600;">${name}</td>
                <td style="color: #64748b;">${dest || 'Global'}</td>
                <td class="price-text">${symbol} ${parseFloat(price).toFixed(2)}</td>
                <td><strong>${qty} ${unit}</strong></td>
                <td><button class="del-btn" onclick="this.parentElement.parentElement.remove()">DELETE</button></td>
            `;

            document.getElementById('pName').value = "";
            document.getElementById('pDest').value = "";
            document.getElementById('pPrice').value = "";
            document.getElementById('pQty').value = "";
        });
    </script>
</body>
</html>
