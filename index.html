<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mediterranea Casino - Player Terminal</title>
    <!-- SUPABASE CLIENT CORE SDK -->
    <script src="https://jsdelivr.net"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: linear-gradient(135deg, #f4f1ea 0%, #e4ded0 100%);
            min-height: 100vh;
            color: #1a2a3a;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .app-container {
            background: #ffffff;
            border: 1px solid #d1c9bc;
            border-radius: 12px;
            padding: 30px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.06);
        }
        .header-block {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            border-bottom: 2px solid #e4ded0;
            padding-bottom: 15px;
        }
        .logo-img { height: 45px; border-radius: 4px; border: 1px solid #c5a059; }
        
        .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 15px; }
        .form-group label { font-size: 11px; font-weight: 700; text-transform: uppercase; color: #475569; }
        .form-group input { padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 14px; background: #fff; color: #1a2a3a; }
        
        .hud-display {
            background: #020617;
            border-radius: 8px;
            padding: 15px;
            font-family: monospace;
            color: #38bdf8;
            margin-bottom: 20px;
        }
        .hud-line { display: flex; justify-content: space-between; padding: 4px 0; }

        .lobby-channels { display: flex; flex-direction: column; gap: 10px; margin: 15px 0; }
        .game-btn {
            background: #f8fafc;
            border: 1px solid #cbd5e1;
            padding: 15px;
            border-radius: 8px;
            text-align: left;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #1a2a3a;
        }
        .game-btn:hover { border-color: #c5a059; background: #fffdf9; }

        .display-matrix {
            background: #1e293b;
            color: #ffffff;
            border-radius: 8px;
            padding: 40px 10px;
            text-align: center;
            font-size: 45px;
            font-weight: bold;
            margin-bottom: 20px;
            border: 1px solid #c5a059;
        }

        .btn-core {
            width: 100%; padding: 14px;
            background: linear-gradient(180deg, #d8b467 0%, #b38f43 100%);
            border: none; border-radius: 6px; color: #ffffff;
            font-size: 15px; font-weight: 700; text-transform: uppercase;
            cursor: pointer; letter-spacing: 1px;
        }
        .btn-link { display: block; text-align: center; margin-top: 15px; font-size: 12px; color: #475569; text-decoration: none; }
    </style>
</head>
<body>

    <div class="app-container" id="main-injector">
        <!-- O CONTEÚDO SERÁ INJETADO DINAMICAMENTE AQUI PARA EVITAR ERRO DE LAYOUT EMPILHADO -->
    </div>

    <script>
        // CONFIGURAÇÕES DE CONEXÃO COM O BANCO DE DADOS EM NUVEM
        const SUPABASE_URL = "YOUR_SUPABASE_PROJECT_URL";
        const SUPABASE_ANON_KEY = "YOUR_SUPABASE_ANON_KEY";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Estado Global da Sessão Ativa
        let playerSession = { 
            fullName: "",
            documentId: "",
            username: "", 
            balance: 0, 
            activeGame: "" 
        };

        // Template do Cabeçalho Global
        const headerHTML = `
            <div class="header-block">
                <img src="mediterranea.png.png" class="logo-img" alt="Casino Logo">
                <div>
                    <h1 style="font-size: 18px; color: #0b1a30; text-transform: uppercase;">Mediterranea Core</h1>
                    <p style="font-size: 11px; color: #64748b;">MGA Certified Player Environment</p>
                </div>
            </div>
        `;

        // 1. CARREGA A TELA DE CADASTRO REAL NA INICIALIZAÇÃO
        window.onload = function() {
            renderRegisterScreen();
        };

        function renderRegisterScreen() {
            const container = document.getElementById('main-injector');
            container.innerHTML = headerHTML + `
                <h2 style="font-size: 13px; text-transform: uppercase; margin-bottom: 15px; color: #0b1a30;">Reception & KYC Registration Terminal</h2>
                
                <div class="form-group">
                    <label>Full Legal Name</label>
                    <input type="text" id="reg-name" placeholder="John Doe">
                </div>

                <div class="form-group">
                    <label>Document Number (Passport / CPF / ID)</label>
                    <input type="text" id="reg-doc" placeholder="A1234567B / 123.456.789-00">
                </div>

                <div class="form-group">
                    <label>Create Player Account Username</label>
                    <input type="text" id="reg-user" placeholder="e.g. johndoe77">
                </div>

                <div class="form-group">
                    <label>Initial Wallet Ingestion Deposit (€)</label>
                    <input type="number" id="reg-deposit" value="1000">
                </div>

                <button class="btn-core" onclick="submitRegistration()">Register & Load System Lobby</button>
            `;
        }

        // 2. PROCESSA O CADASTRO E INJETA O LOBBY (LIMPA A TELA TOTALMENTE)
        function submitRegistration() {
            const name = document.getElementById('reg-name').value.trim();
            const doc = document.getElementById('reg-doc').value.trim();
            const user = document.getElementById('reg-user').value.trim();
            const deposit = parseFloat(document.getElementById('reg-deposit').value);

            if(!name || !doc || !user || isNaN(deposit) || deposit <= 0) {
                alert("Please fill all legal registration and compliance fields."); return;
            }

            // Salva as credenciais no estado contábil
            playerSession.fullName = name;
            playerSession.documentId = doc;
            playerSession.username = user;
            playerSession.balance = deposit;

            renderLobbyScreen();
        }

        function renderLobbyScreen() {
            const container = document.getElementById('main-injector');
            container.innerHTML = headerHTML + `
                <div class="hud-display">
                    <div class="hud-line"><span>Name:</span><span style="color:white;">${playerSession.fullName}</span></div>
                    <div class="hud-line"><span>Document Verified:</span><span style="color:white;">${playerSession.documentId}</span></div>
                    <div class="hud-line"><span>Username ID:</span><span style="color:white;">${playerSession.username}</span></div>
                    <div class="hud-line"><span>Certified Balance:</span><span style="color: #10b981; font-weight: bold;">€${playerSession.balance.toFixed(2)}</span></div>
                </div>

                <h2 style="font-size: 12px; text-transform: uppercase; color: #475569; margin-bottom: 10px;">Select Certified iGaming Engine:</h2>
                <div class="lobby-channels">
                    <div class="game-btn" onclick="launchGameEngine('SLOTS')">
                        <span>🎰 Azure Coast Slots</span>
                        <span style="font-size:11px; color:#64748b;">RTP 96.4% →</span>
                    </div>
                    <div class="game-btn" onclick="launchGameEngine('ROULETTE')">
                        <span>🎡 Valletta Premium Roulette</span>
                        <span style="font-size:11px; color:#64748b;">RTP 97.3% →</span>
                    </div>
                </div>
                
                <button class="btn-core" style="background: #475569;" onclick="renderRegisterScreen()">Disconnect Session</button>
            `;
        }

        // 3. ENTRA NA TELA DO JOGO ESCOLHIDO
        function launchGameEngine(gameType) {
            playerSession.activeGame = gameType;
            renderGameScreen();
        }

        function renderGameScreen() {
            const container = document.getElementById('main-injector');
            const defaultVisual = playerSession.activeGame === 'SLOTS' ? "🍋 🍒 💎" : "🟢 0";

            container.innerHTML = headerHTML + `
                <div class="hud-display">
                    <div class="hud-line"><span>Active Account:</span><span style="color:white;">${playerSession.username}</span></div>
                    <div class="hud-line"><span>Active Module:</span><span style="color:#38bdf8; font-weight:bold;">${playerSession.activeGame}</span></div>
                    <div class="hud-line"><span>Wallet Balance:</span><span style="color: #10b981; font-weight: bold;">€${playerSession.balance.toFixed(2)}</span></div>
                </div>

                <div class="form-group" style="margin-top: 15px;">
                    <label>Stake Amount (€)</label>
                    <input type="number" id="bet-stake" value="20" min="1">
                </div>

                <div class="display-matrix" id="display-output">${defaultVisual}</div>

                <button class="btn-core" onclick="commitCloudBet()">Place Verified Bet</button>
                <button onclick="placeBet()">
    Bet €25
</button>
