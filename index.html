<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Malta iGaming Wallet</title>
    <!-- 1. Tag de Estilo: Aponta para o styles.css correto que está na sua raiz -->
<link rel="stylesheet" href="styles.css">

<!-- 2. Botão do Projeto: Coloque este bloco na seção de projetos do seu portfólio -->
<div class="projeto-card" style="margin-top: 20px;">
    <a href="igaming-ledger.html" style="display: inline-block; padding: 12px 24px; background-color: #4ecca3; color: #0f0f1a; text-decoration: none; font-weight: bold; border-radius: 6px;">
        Ver Projeto iGaming
    </a>
</div>

</head>

<body>

    <div class="wallet-card">

        <h1>Player Wallet</h1>

        <p>
            Player:
            <span id="player-name"></span>
        </p>

        <p>
            Balance:
            <span id="wallet-balance"></span>
        </p>

        <p>
            Bonus:
            <span id="bonus-balance"></span>
        </p>

        <p>
            KYC:
            <span id="kyc-status"></span>
        </p>

        <p>
            VIP:
            <span id="vip-level"></span>
        </p>

        <button onclick="depositMoney()">
            Deposit €100
        </button>

        <button onclick="placeBet()">
            Bet €25
        </button>

    </div>

    <h2>Transaction History</h2>

    <table>

        <thead>

            <tr>
                <th>ID</th>
                <th>Type</th>
                <th>Amount</th>
                <th>Status</th>
            </tr>

        </thead>

        <tbody id="transactions-table">

        </tbody>

    </table>

    <script src="app.js"></script>

</body>
</html>
