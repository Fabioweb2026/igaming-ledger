<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sollene Group | Terminal</title>
    <style>
        @import url('https://googleapis.com');
        
        *{ margin:0; padding:0; box-sizing:border-box; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #fdfaf6; 
            color: #1a1a1a; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 1. HEADER COM LOGO AMPLO */
        .logo-container { 
            width: 100%; 
            max-width: 1200px; 
            padding: 40px 30px; 
            text-align: center;
        }
        .logo-img { 
            width: 100%; 
            max-width: 1000px; 
            height: auto; 
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.05));
            object-fit: contain;
        }

        /* 2. GRID DO SISTEMA */
        .main-grid {
            display: grid; 
            grid-template-columns: 360px 1fr; 
            gap: 30px;
            width: 95%; 
            max-width: 1200px; 
            margin-bottom: 80px;
        }

        /* 3. CARD LATERAL DARK (IGUAL À SUA FOTO) */
        .sidebar-card {
            background: #1a222e; /* Grafite Dark */
            padding: 35px;
            border-radius: 24px;
            color: #ffffff;
            border: 1px solid rgba(179, 147, 89, 0.2);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            height: fit-content;
        }

        .sidebar-card h3 { 
            font-size: 12px; 
            text-transform: uppercase; 
            color: #b39359; 
            margin-bottom: 30px; 
            letter-spacing: 3px; 
            text-align: center;
            border-bottom: 1px solid rgba(179, 147, 89, 0.2);
            padding-bottom: 15px;
        }

        label { 
            font-size: 10px; 
            text-transform: uppercase; 
            color: #94a3b8; 
            display: block; 
            margin-bottom: 8px; 
            font-weight: 700;
            letter-spacing: 1px;
        }

        input, select {
            width: 100%; 
            padding: 15px; 
            margin-bottom: 20px; 
            border: 1px solid #2d3748; 
            border-radius: 12px; 
            background: #0f172a; 
            color: #ffffff; 
            outline: none;
            font-size: 14px;
            transition: 0.3s;
        }

        input:focus { border-color: #b39359; }

        #regBtn {
            width: 100%; 
            padding: 20px; 
            background: #b39359; 
            color: #111827; 
            border: none; 
            border-radius: 12px; 
            font-weight: 800; 
            cursor: pointer; 
            text-transform: uppercase; 
            letter-spacing: 2px;
            transition: 0.4s;
            margin-top: 10px;
        }

        #regBtn:hover {
            background: #ffffff;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(179, 147, 89, 0.3);
        }

        /* 4. ÁREA DA TABELA */
        .inventory-area { 
            background: #ffffff; 
            border-radius: 24px; 
            border: 1px solid #e5e1da; 
            overflow: hidden; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.02); 
        }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 20px; background: #1f2937; color: #b39359; font-size: 10px; text-transform: uppercase; letter-spacing: 2px; }
        td { padding: 20px; border-bottom: 1px solid #f1f1f1; font-size: 14px; vertical-align: middle; }

        .badge { padding: 4px 10px; border-radius: 6px; font-size: 10px; font-weight: 800; text-transform: uppercase; }
        .badge-in { background: #dcfce7; color: #166534; }
        .badge-out { background: #fee2e2; color: #991b1b; }

        .btn-delete { background: #fee2e2; color: #991b1b; border: none; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-weight: 800; font-size: 10px; }
        .btn-delete:hover { background: #991b1b; color: #ffffff; }

        /* 5. RODAPÉ PREMIUM */
        .footer-premium { background: #000000; color: #ffffff; padding: 80px 20px; text-align: center; border-top: 4px solid #b39359; width: 100%; }
        .footer-premium h2 { font-size: 22px; color: #b39359; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 30px; }
        .social-links { display: flex; justify-content: center; gap: 20px; margin-bottom: 30px; flex-wrap: wrap; }
        .social-btn { text-decoration: none; color: #ffffff; font-size: 11px; padding: 12px 30px; border: 1px solid #b39359; border-radius: 50px; text-transform: uppercase; transition: 0.3s; }
        .social-btn:hover { background: #b39359; color: #000000; }

        @media(max-width: 900px) { .main-grid { grid-template-columns: 1fr; } .logo-img { max-width: 90%; } }
    </style>
</head>
<body>

    <div class="logo-container">
        <img src="Sollene-Group.png" alt="Sollene Group Logo" class="logo-img">
    </div>

    <div class="main-grid">
        <aside class="sidebar-card">
            <h3>Shipment Entry</h3>
            
            <label>Product Name</label>
            <input type="text" id="pName" placeholder="Ex: Premium Arabica">
            
            <label>Operation Type</label>
            <select id="pType">
                <option value="In">Entry (In)</option>
                <option value="Out">Exit (Out)</option>
            </select>

            <label>Currency & Price</label>
            <div style="display: flex; gap: 10px;">
                <select id="pCurr" style="flex: 1;">
                    <option value="USD">USD ($)</option>
                    <option value="EUR">EUR (€)</option>
                    <option value="BRL">BRL (R$)</option>
                </select>
                <input type="number" id="pPrice" placeholder="0.00" style="flex: 2;">
            </div>

            <label>Quantity</label>
            <input type="number" id="pQty" placeholder="Ex: 1000">

            <button id="regBtn">Process Trade</button>
        </aside>

        <main class="inventory-area">
            <table>
                <thead>
                    <tr>
                        <th>Status</th>
                        <th>Product</th>
                        <th>Value</th>
                        <th>Qty</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="list"></tbody>
            </table>
        </main>
    </div>

    <footer class="footer-premium">
        <h2>Global Connection</h2>
        <div class="social-links">
            <a href="#" class="social-btn">LinkedIn</a>
            <a href="https://github.com" class="social-btn">GitHub</a>
            <a href="#" class="social-btn">WhatsApp</a>
        </div>
        <p style="font-size: 10px; color: #b39359; letter-spacing: 2px; opacity: 0.7;">SOLLENE GROUP ENTERPRISE • VALLETTA, MALTA</p>
    </footer>

    <script>
        const inventoryList = document.getElementById('list');

        function saveData() {
            const items = [];
            document.querySelectorAll('#list tr').forEach(row => {
                items.push({
                    status: row.cells[0].innerText,
                    name: row.cells[1].innerText,
                    value: row.cells[2].innerText,
                    qty: row.cells[3].innerText
                });
            });
            localStorage.setItem('sollene_v_final', JSON.stringify(items));
        }

        function loadData() {
            const saved = localStorage.getItem('sollene_v_final');
            if (saved) {
                JSON.parse(saved).forEach(item => {
                    renderRow(item.status, item.name, item.value, item.qty);
                });
            }
        }

        function renderRow(status, name, value, qty) {
            const row = inventoryList.insertRow();
            const badgeClass = status === 'In' ? 'badge-in' : 'badge-out';
            row.innerHTML = `
                <td><span class="badge ${badgeClass}">${status}</span></td>
                <td><strong>${name}</strong></td>
                <td style="color:#b39359; font-weight:800">${value}</td>
                <td>${qty} units</td>
                <td><button class="btn-delete" onclick="this.closest('tr').remove(); saveData();">DELETE</button></td>
            `;
        }

        window.onload = loadData;

        document.getElementById('regBtn').addEventListener('click', function() {
            const name = document.getElementById('pName').value;
            const type = document.getElementById('pType').value;
            const curr = document.getElementById('pCurr').value;
            const price = document.getElementById('pPrice').value;
            const qty = document.getElementById('pQty').value;

            if(!name || !price || !qty) return alert("Fill all fields.");

            const symbol = curr === "USD" ? "$" : (curr === "EUR" ? "€" : "R$");
            const formattedValue = `${symbol} ${parseFloat(price).toFixed(2)}`;

            renderRow(type, name, formattedValue, qty);
            saveData();

            document.getElementById('pName').value = "";
            document.getElementById('pPrice').value = "";
            document.getElementById('pQty').value = "";
        });
    </script>
</body>
</html>
