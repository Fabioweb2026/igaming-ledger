<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sollene Group | Inventory System</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

html, body {
    margin: 0;
    padding: 0;
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: #f6f4ea;
}

/* BANNER */
.banner-header {
    width: 100%;
    height: 140px;
    margin-top: 20px;
    overflow: hidden;
    border-bottom: 3px solid #b39359;
}

.banner-header img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* LAYOUT */
.main-content {
    max-width: 1200px;
    margin: auto;
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: 25px;
    padding: 25px;
}

/* SIDEBAR */
.sidebar {
    background: #1a1a1a;
    color: #b39359;
    padding: 25px;
    border-radius: 18px;
}

.sidebar h2 {
    margin-bottom: 20px;
}

/* FORM */
.form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
}

input, select {
    width: 100%;
    height: 42px;
    border-radius: 10px;
    border: none;
    padding: 0 10px;
    box-sizing: border-box;
}

/* FULL WIDTH */
.full {
    grid-column: 1 / -1;
}

/* BOTÕES */
button {
    width: 100%;
    height: 45px;
    border-radius: 10px;
    border: none;
    font-weight: bold;
    cursor: pointer;
}

.add {
    background: #b39359;
    grid-column: 1 / -1;
}

.save {
    background: #27ae60;
    color: white;
    grid-column: 1 / -1;
}

/* TABLE */
.table-container {
    background: white;
    border-radius: 18px;
    overflow: hidden;
}

table {
    width: 100%;
    border-collapse: collapse;
}

thead {
    background: #1a1a1a;
    color: #b39359;
}

th, td {
    padding: 15px;
    text-align: center;
    border-bottom: 1px solid #eee;
}

.entry { color: green; font-weight: bold; }
.exit { color: red; font-weight: bold; }
.cash { color: #27ae60; font-weight: bold; }

footer {
    text-align: center;
    padding: 25px;
    background: #1a1a1a;
    color: #777;
    margin-top: 40px;
}

@media (max-width: 900px) {
    .main-content {
        grid-template-columns: 1fr;
    }
}

</style>
</head>

<body>

<header class="banner-header">
    <img src="sollene-group.jpg">
</header>

<div class="main-content">

<div class="sidebar">
    <h2>Register Product</h2>

    <div class="form-grid">

        <input id="name" class="full" placeholder="Product Name">

        <select id="unit">
            <option>Kg</option>
            <option>Ton</option>
            <option>Box</option>
        </select>

        <select id="currency">
            <option>USD</option>
            <option>EUR</option>
            <option>BRL</option>
        </select>

        <input id="entry" type="number" placeholder="Entry">
        <input id="exit" type="number" placeholder="Exit">

        <input id="price" class="full" type="number" placeholder="Price per unit">

        <button class="add" onclick="add()">Add Product</button>
        <button class="save" onclick="save()">Save Inventory</button>

    </div>
</div>

<div class="table-container">
<table>
<thead>
<tr>
<th>Product</th>
<th>Unit</th>
<th>Entry</th>
<th>Exit</th>
<th>Stock</th>
<th>Currency</th>
<th>Price</th>
<th>Revenue</th>
<th>Cash</th>
</tr>
</thead>

<tbody id="table"></tbody>
</table>
</div>

</div>

<footer>© 2026 SOLLENE GROUP</footer>

<script>

/* 🔥 CARREGA AUTOMATICAMENTE */
let inventory = JSON.parse(localStorage.getItem("inventory")) || [];

render();

/* ADD + AUTO SAVE */
function add(){

let item = {
name: document.getElementById('name').value,
unit: document.getElementById('unit').value,
entry: +document.getElementById('entry').value,
exit: +document.getElementById('exit').value,
currency: document.getElementById('currency').value,
price: +document.getElementById('price').value
};

inventory.push(item);

autoSave();   // 🔥 SALVA AUTOMATICAMENTE
render();

}

/* RENDER */
function render(){

let table=document.getElementById('table');
table.innerHTML="";

inventory.forEach(i=>{

let stock=i.entry-i.exit;
let revenue=i.exit*i.price;
let cash=revenue-(i.entry*i.price);

table.innerHTML+=`
<tr>
<td>${i.name}</td>
<td>${i.unit}</td>
<td class="entry">${i.entry}</td>
<td class="exit">${i.exit}</td>
<td>${stock}</td>
<td>${i.currency}</td>
<td>${i.price}</td>
<td>${revenue.toFixed(2)}</td>
<td class="cash">${cash.toFixed(2)}</td>
</tr>`;
});

}

/* 🔥 SALVAMENTO REAL */
function save(){
localStorage.setItem("inventory", JSON.stringify(inventory));
alert("Inventory saved successfully!");
}

/* AUTO SAVE (IMPORTANTE) */
function autoSave(){
localStorage.setItem("inventory", JSON.stringify(inventory));
}

</script>

</body>
</html>
