<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sollene Group | Terminal</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #fdfaf6; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }

        .back-link { 
            align-self: flex-start; 
            margin: 20px 0 0 40px; 
            text-decoration: none; 
            color: #b39359; 
            font-weight: 800; 
            font-size: 11px; 
            text-transform: uppercase; 
            background: rgba(31,41,55,0.05); 
            padding: 8px 15px; 
            border-radius: 50px; 
        }

        .hero-banner { 
            width: 95%; 
            max-width: 1200px; 
            height: 450px; 
            background-image: url('./image.jpg'); 
            background-size: cover; 
            background-position: center; 
            background-repeat: no-repeat; 
            border-radius: 28px; 
            margin-top: 20px; 
            border: 1px solid #e5e1da; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.1); 
        }

        .company-header {
            text-align: center;
            margin: 40px 0;
        }

        .company-header h1 {
            font-size: 56px;
            font-weight: 800;
            color: #1f2937;
            text-transform: uppercase;
        }

        .company-header p {
            color: #6b7280;
            margin-top: 10px;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 360px 1fr;
            gap: 30px;
            width: 100%;
            max-width: 1200px;
            padding: 0 20px 40px;
        }

        .sidebar-card {
            background: #1f2937;
            padding: 40px 30px;
            border-radius: 30px;
            color: #ffffff;
            border-top: 4px solid #b39359;
        }

        .sidebar-card h3 {
            margin-bottom: 25px;
            font-size: 20px;
        }

        input,
        select {
            width: 100%;
            padding: 16px;
            margin-bottom: 20px;
            border-radius: 14px;
            background: #111827;
            color: #fff;
            border: 1px solid #374151;
            font-size: 16px;
            outline: none;
        }

        select {
            cursor: pointer;
        }

        #regBtn {
            width: 100%;
            padding: 20px;
            background: #b39359;
            color: #111827;
            border: none;
            border-radius: 16px;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
        }

        #regBtn:hover {
            transform: translateY(-2px);
            opacity: 0.95;
        }

        .inventory-area {
            background-color: #f2ede4;
            border-radius: 30px;
            min-height: 500px;
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 24px 20px;
            background: #1f2937;
            color: #b39359;
            font-size: 12px;
            text-transform: uppercase;
        }

        td {
            padding: 24px 20px;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            font-weight: 600;
        }

        @media(max-width: 900px) {
            .main-grid {
                grid-template-columns: 1fr;
            }

            .company-header h1 {
                font-size: 40px;
            }

            .hero-banner {
                height: 250px;
            }
        }
    </style>
</head>

<body>

    <a href="index.html" class="back-link">← Voltar ao Portfólio</a>

    <div class="hero-banner"></div>

    <header class="company-header">
        <h1>Sollene Group</h1>
        <p>Premium Logistics & Global Trade</p>
    </header>

    <div class="main-grid">

        <aside class="sidebar-card">

            <h3>Registro de Carga</h3>

            <input type="text" id="pName" placeholder="Produto">

            <input type="text" id="pDest" placeholder="Destino">

            <input type="number" id="pPrice" placeholder="Preço">

            <input type="number" id="pQty" placeholder="Qtd">

            <!-- NOVO CAMPO -->
            <select id="pUnit">
                <option value="">Selecione a Unidade</option>
                <option value="Kg">Kg</option>
                <option value="Toneladas">Toneladas</option>
                <option value="Pacotes">Pacotes</option>
            </select>

            <button id="regBtn">Registrar</button>

        </aside>

        <main class="inventory-area">

            <table>

                <thead>
                    <tr>
                        <th>Produto</th>
                        <th>Destino</th>
                        <th>Valor</th>
                        <th>Volume</th>
                        <th>Unidade</th>
                    </tr>
                </thead>

                <tbody id="list"></tbody>

            </table>

        </main>

    </div>

    <script>

        const inventoryList = document.getElementById('list');

        document.getElementById('regBtn').addEventListener('click', function() {

            const n = document.getElementById('pName').value;
            const d = document.getElementById('pDest').value;
            const p = document.getElementById('pPrice').value;
            const q = document.getElementById('pQty').value;
            const u = document.getElementById('pUnit').value;

            if(!n || !d || !p || !q || !u) {
                return alert("Preencha todos os campos.");
            }

            const row = inventoryList.insertRow();

            row.innerHTML = `
                <td>${n}</td>
                <td>${d}</td>
                <td style="color:#b39359; font-weight:800">
                    $ ${parseFloat(p).toFixed(2)}
                </td>
                <td>${q}</td>
                <td>${u}</td>
            `;

            document.getElementById('pName').value = "";
            document.getElementById('pDest').value = "";
            document.getElementById('pPrice').value = "";
            document.getElementById('pQty').value = "";
            document.getElementById('pUnit').value = "";

        });

    </script>

</body>
</html>
