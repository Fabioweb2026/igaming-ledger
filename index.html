<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sollene Group | Inventory System</title>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #fdfcf0;
            color: #1a1a1a;
            overflow-x: hidden;
        }

        /* HERO / BANNER FULL SCREEN */
        .banner-header {
            width: 100%;
            height: 100vh; /* 👈 ocupa a tela toda */
            position: relative;
            overflow: hidden;
        }

        .banner-header img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* 👈 cobre tudo sem distorcer */
            object-position: center;
        }

        /* OVERLAY (opcional elegante) */
        .banner-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.35);
        }

        /* NAV */
        .nav-top {
            width: 100%;
            max-width: 1250px;
            margin: auto;
            padding: 25px 20px;
        }

        .btn-back {
            text-decoration: none;
            color: #b39359;
            border: 1px solid #b39359;
            padding: 10px 25px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 700;
            background: white;
        }

        .btn-back:hover {
            background: #b39359;
            color: white;
        }

        /* MAIN */
        .main-content {
            display: flex;
            max-width: 1250px;
            margin: auto;
            gap: 30px;
            padding: 40px 20px;
        }

        .sidebar {
            width: 340px;
            background: #1a1a1a;
            color: #b39359;
            padding: 30px;
            border-radius: 20px;
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 10px;
        }

        .btn-add {
            width: 100%;
            padding: 14px;
            background: #b39359;
            border: none;
            font-weight: bold;
        }

        .table-container {
            flex: 1;
            background: white;
            border-radius: 20px;
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: #1a1a1a;
            color: #b39359;
        }

        th, td {
            padding: 18px;
            text-align: center;
        }

        footer {
            text-align: center;
            padding: 30px;
            background: #1a1a1a;
            color: #777;
            margin-top: 40px;
        }

        @media (max-width: 900px) {
            .main-content { flex-direction: column; }
            .sidebar { width: 100%; }
        }
    </style>
</head>

<body>

<!-- HERO BANNER -->
<header class="banner-header">
    <img src="sollene-group.jpg" alt="Sollene Group">
    <div class="banner-overlay"></div>
</header>

<!-- NAV -->
<nav class="nav-top">
    <a href="index.html" class="btn-back">← Back</a>
</nav>

<!-- CONTENT -->
<main class="main-content">

    <section class="sidebar">
        <h2>Register Product</h2>
        <input type="text" placeholder="Product Name">
        <select>
            <option>Case</option>
            <option>Unit</option>
        </select>
        <input type="number" placeholder="Entry">
        <input type="number" placeholder="Exit">
        <select>
            <option>USD</option>
            <option>EUR</option>
        </select>
        <input type="number" placeholder="Price">
        <button class="btn-add">Add</button>
    </section>

    <section class="table-container">
        <table>
            <thead>
                <tr>
                    <th>PRODUCT</th>
                    <th>UNIT</th>
                    <th>ENTRY</th>
                    <th>EXIT</th>
                    <th>STOCK</th>
                    <th>CURRENCY</th>
                    <th>PRICE</th>
                    <th>TOTAL</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Example Product</td>
                    <td>Case</td>
                    <td>120</td>
                    <td>45</td>
                    <td>75</td>
                    <td>USD</td>
                    <td>$10</td>
                    <td>$750</td>
                </tr>
            </tbody>
        </table>
    </section>

</main>

<footer>
    © 2026 SOLLENE GROUP
</footer>

</body>
</html>
