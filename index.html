<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sollene Group | Logistics Terminal</title>
    <style>
        @import url('https://googleapis.com');
        
        *{ margin:0; padding:0; box-sizing:border-box; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #fdfaf6; 
            color: #1a1a1a; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* BANNER */
        .hero-banner {
            width: 100%;
            max-width: 1200px;
            height: 300px;
            background-color: #f7f4ed;
            background-image: url('image.jpg');
            background-repeat: no-repeat;
            background-position: center;
            background-size: contain;
            border-radius: 28px;
            margin-top: 20px;
            border: 1px solid #e5e1da;
        }

        .company-header { text-align: center; margin: 40px 0; }
        .company-header h1 { font-size: 56px; font-weight: 800; color: #1f2937; letter-spacing: -2px; text-transform: uppercase; }
        .company-header p { color: #b39359; font-size: 13px; text-transform: uppercase; letter-spacing: 4px; font-weight: 800; margin-top: 10px; }

        .main-grid {
            display: grid;
            grid-template-columns: 360px 1fr;
            gap: 30px;
            width: 100%;
            max-width: 1200px;
            padding: 0 20px;
            margin-bottom: 80px; /* Espaço para o rodapé */
        }

        /* CARD DE REGISTRO */
        .sidebar-card {
            background: #1f2937;
            padding: 40px 30px;
            border-radius: 30px;
            color: #ffffff;
            border-top: 4px solid #b39359;
            height: fit-content;
        }

        input, select {
            width: 100%; padding: 16px; margin-bottom: 20px; border: 1px solid #374151; border-radius: 14px; background: #111827; color: #ffffff; outline: none;
        }

        #regBtn {
            width: 100%; padding: 20px; background: #b39359; color: #111827; border: none; border-radius: 16px; font-weight: 800; cursor: pointer; text-transform: uppercase;
        }

        /* TABELA */
        .inventory-area {
            background-color: #f2ede4;
            background-image: radial-gradient(#d6cdc0 1.5px, transparent 1.5px);
            background-size: 30px 30px; 
            border-radius: 30px;
            border: 1px solid #e5e1da;
            min-height: 550px;
            overflow: hidden;
        }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 24px 20px; background: #1f2937; color: #b39359; font-size: 10px; text-transform: uppercase; }
        td { padding: 24px 20px; border-bottom: 1px solid rgba(212, 163, 115, 0.2); font-size: 15px; background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(4px); }

        /* RODAPÉ GLOBAL PREMIUM */
        .footer-premium {
            background: #000000;
            color: #ffffff;
            padding: 80px 20px;
            text-align: center;
            border-top: 4px solid #b39359;
            width: 100%;
        }

        .footer-container { max-width: 1200px; margin: 0 auto; }
        
        .footer-premium h2 { 
            font-size: 26px; 
            font-weight: 800; 
            margin-bottom: 30px; 
            letter-spacing: 3px; 
            color: #b39359; 
            text-transform: uppercase; 
        }
        
        .social-links { 
            display: flex; 
            justify-content: center; 
            gap: 25px; 
            flex-wrap: wrap; 
        }
        
        .social-btn { 
            text-decoration: none; 
            color: #ffffff; 
            font-size: 12px; 
            font-weight: 700; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            padding: 12px 30px; 
            border: 2px solid #b39359; 
            border-radius: 50px; 
            transition: 0.4s; 
        }
        
        .social-btn:hover { background: #b39359; color: #000000; }
        
        .footer-tag { 
            font-size: 11px; 
            color: #b39359; 
            letter-spacing: 2px; 
            margin-top: 40px; 
            opacity: 0.8;
            text-transform: uppercase;
        }

        @media(max-width: 900px) { .main-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="hero-banner"></div>

    <header class="company-header">
        <h1>Sollene Group</h1>
        <p>Premium Logistics & Global Trade</p>
    </header>

    <div class="main-grid">
        <aside class="sidebar-card">
            <h3>Shipment Entry</h3>
            <input type="text" id="pName" placeholder="Product Name">
            <input type="text" id="pDest" placeholder="Destination Port">
            <select id="pCurr"><option value="USD">USD ($)</option></select>
            <input type="number" id="pPrice" placeholder="Unit Price">
            <input type="number" id="pQty" placeholder="Quantity">
            <button id="regBtn">Register Cargo</button>
        </aside>

        <main class="inventory-area">
            <table>
                <thead>
                    <tr><th>Product</th><th>Destination</th><th>Value</th><th>Volume</th></tr>
                </thead>
                <tbody id="list"></tbody>
            </table>
        </main>
    </div>

    <!-- RODAPÉ GLOBAL NO FINAL -->
    <footer class="footer-premium">
        <div class="footer-container">
            <h2>Global Connection</h2>
            <div class="social-links">
                <a href="https://linkedin.com" target="_blank" class="social-btn">LinkedIn</a>
                <a href="https://github.com" target="_blank" class="social-btn">GitHub</a>
                <a href="https://wa.me" target="_blank" class="social-btn">WhatsApp</a>
            </div>
            <p class="footer-tag">SOLLENE GROUP ENTERPRISE • VALLETTA, MALTA</p>
        </div>
    </footer>

    <script>
        const inventoryList = document.getElementById('list');
        function saveData() {
            const rows = [];
            document.querySelectorAll('#list tr').forEach(row => { rows.push(row.innerHTML); });
            localStorage.setItem('solleneData', JSON.stringify(rows));
        }
        function loadData() {
            const saved = localStorage.getItem('solleneData');
            if (saved) { JSON.parse(saved).forEach(rowData => { const row = inventoryList.insertRow(); row.innerHTML = rowData; }); }
        }
        window.onload = loadData;

        document.getElementById('regBtn').addEventListener('click', function() {
            const n = document.getElementById('pName').value;
            const p = document.getElementById('pPrice').value;
            const q = document.getElementById('pQty').value;
            if(!n || !p || !q) return alert("Fill all fields.");
            const row = inventoryList.insertRow();
            row.innerHTML = `<td>${n}</td><td>${document.getElementById('pDest').value}</td><td style="color:#b39359; font-weight:800">$ ${parseFloat(p).toFixed(2)}</td><td>${q} units</td>`;
            saveData();
            document.querySelectorAll('input').forEach(i => i.value = "");
        });
    </script>

</body>
</html>
