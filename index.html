<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sollene Group | Logistics Terminal</title>
    <style>
        @import url('https://googleapis.com');
        
        *{ margin:0; padding:0; box-sizing:border-box; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #fdfaf6; /* Cor de fundo elegante */
            color: #1a1a1a; 
            padding-bottom: 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* BANNER COM COR LATERAL COMBINANDO */
        .hero-banner {
            width: 100%;
            max-width: 1200px;
            height: 350px;
            background-color: #f7f4ed; /* COR QUE PREENCHE OS LADOS COM ELEGÂNCIA */
            background-image: url('image.jpg');
            background-repeat: no-repeat;
            background-position: center;
            background-size: contain;
            border-radius: 24px;
            margin-top: 20px;
            border: 1px solid #e5e1da;
            box-shadow: 0 20px 40px rgba(0,0,0,0.04);
        }

        .company-header { text-align: center; margin: 40px 0; }
        .company-header h1 { font-size: 56px; font-weight: 800; color: #0f172a; letter-spacing: -2px; text-transform: uppercase; }
        .company-header p { color: #b39359; font-size: 13px; text-transform: uppercase; letter-spacing: 4px; font-weight: 800; margin-top: 10px; }

        /* GRID LAYOUT */
        .main-grid {
            display: grid;
            grid-template-columns: 360px 1fr;
            gap: 30px;
            width: 100%;
            max-width: 1200px;
            padding: 0 20px;
        }

        /* CARD DE ENTRADA MELHORADO */
        .card {
            background: #ffffff;
            padding: 35px;
            border-radius: 28px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 10px 25px rgba(0,0,0,0.02);
            height: fit-content;
        }

        .card h3 { font-size: 11px; text-transform: uppercase; color: #94a3b8; margin-bottom: 25px; letter-spacing: 2px; font-weight: 800; border-left: 3px solid #b39359; padding-left: 12px; }

        /* INPUTS COM CORES ELEGANTES */
        input, select {
            width: 100%;
            padding: 15px;
            margin-bottom: 18px;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            background: #f8fafc; /* Cinza azulado bem leve */
            font-size: 14px;
            color: #334155;
            outline: none;
            transition: 0.3s ease;
        }

        /* Efeito de foco em Dourado */
        input:focus, select:focus {
            border-color: #b39359;
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(179, 147, 89, 0.1);
        }

        .qty-group { display: flex; gap: 10px; margin-bottom: 18px; }
        .qty-group input { flex: 1.5; margin-bottom: 0; }
        .qty-group select { flex: 1; margin-bottom: 0; }

        /* BOTÃO PROFISSIONAL */
        #regBtn {
            width: 100%;
            padding: 20px;
            background: #1a202c; /* Navy Profundo */
            color: #ffffff;
            border: none;
            border-radius: 16px;
            font-weight: 800;
            cursor: pointer;
            transition: 0.4s;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 13px;
        }

        #regBtn:hover { 
            background: #b39359; /* Muda para dourado no hover */
            transform: translateY(-3px);
            box-shadow: 0 12px 20px rgba(179, 147, 89, 0.3);
        }

        /* TABELA ELEGANTE */
        .inventory-area {
            background: #ffffff;
            border-radius: 28px;
            border: 1px solid #e2e8f0;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.02);
        }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 22px; color: #94a3b8; font-size: 10px; text-transform: uppercase; border-bottom: 1px solid #f1f5f9; letter-spacing: 1px; font-weight: 800; }
        td { padding: 22px; border-bottom: 1px solid #f8fafc; font-size: 15px; color: #334155; }
        
        /* Efeito zebra na tabela */
        tbody tr:nth-child(even) { background-color: #fdfbf7; }

        .currency { color: #b39359; font-weight: 800; }
        .del-btn { color: #ef4444; cursor: pointer; border: none; background: none; font-weight: 800; font-size: 11px; transition: 0.2s; }
        .del-btn:hover { transform: scale(1.15); }

        @media(max-width: 900px) {
            .main-grid { grid-template-columns: 1fr; }
            .hero-banner { height: 220px; }
        }
    </style>
</head>
<body>

    <div class="hero-banner"></div>

    <header class="company-header">
        <h1>Sollene Group</h1>
        <p>Supply Chain & Logistics Terminal</p>
    </header>

    <div class="main-grid">
        <aside class="card">
            <h3>Shipment Entry</h3>
            <input type="text" id="pName" placeholder="Product Name">
            <input type="text" id="pDest" placeholder="Destination Port">
            <select id="pCurr">
                <option value="USD">USD ($)</option>
                <option value="EUR">EUR (€)</option>
                <option value="BRL">BRL (R$)</option>
            </select>
            <input type="number" id="pPrice" placeholder="Unit Price">
            <div class="qty-group">
                <input type="number" id="pQty" placeholder="Qty">
                <select id="pUnit">
                    <option value="Units">Units</option>
                    <option value="KG">KG</option>
                    <option value="Tons">Tons</option>
                    <option value="Packs">Packs</option>
                </select>
            </div>
            <button id="regBtn">Register Cargo</button>
        </aside>

        <main class="inventory-area">
            <table>
                <thead>
                    <tr>
                        <th>Product</th>
                        <th>Destination</th>
                        <th>Value</th>
                        <th>Volume</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="list"></tbody>
            </table>
        </main>
    </div>

    <script>
        document.getElementById('regBtn').addEventListener('click', function() {
            const name = document.getElementById('pName').value;
            const dest = document.getElementById('pDest').value;
            const curr = document.getElementById('pCurr').value;
            const price = document.getElementById('pPrice').value;
            const qty = document.getElementById('pQty').value;
            const unit = document.getElementById('pUnit').value;

            if(!name || !price || !qty) return alert("Required data missing.");

            let s = curr === "USD" ? "$" : (curr === "EUR" ? "€" : "R$");
            const row = document.getElementById('list').insertRow();
            row.innerHTML = `
                <td style="font-weight:700; color: #0f172a;">${name}</td>
                <td style="color:#64748b">${dest || 'Global'}</td>
                <td class="currency">${s} ${parseFloat(price).toFixed(2)}</td>
                <td><strong>${qty}</strong> <small>${unit}</small></td>
                <td><button class="del-btn" onclick="this.parentElement.parentElement.remove()">DELETE</button></td>
            `;
            document.querySelectorAll('input').forEach(i => i.value = "");
        });
    </script>
</body>
</html>
