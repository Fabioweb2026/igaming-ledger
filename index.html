<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sollene Group | Inventory</title>
    <style>
        @import url('https://googleapis.com');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f2ede4; display: flex; flex-direction: column; align-items: center; }

        /* Banner */
        .hero-banner { 
            width: 100%; height: 400px; 
            background: url('sollene-group.jpg') no-repeat center; 
            background-size: cover; border-bottom: 2px solid #b39359; 
        }

        .main-container { display: flex; gap: 40px; padding: 40px; max-width: 1400px; width: 100%; justify-content: center; }

        /* Formulário lateral */
        .register-card { 
            background: #111; padding: 30px; border-radius: 20px; width: 350px; 
            border: 2px solid #b39359; box-shadow: 0 20px 40px rgba(0,0,0,0.2); 
        }
        .register-card h2 { color: #f1c40f; text-transform: uppercase; font-size: 22px; margin-bottom: 25px; }
        
        input, select { 
            width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 10px; 
            background: #fff; border: 1px solid #ddd; outline: none; font-weight: 600; 
        }

        #addBtn { 
            width: 100%; padding: 20px; background: #f1c40f; color: #000; 
            border: none; border-radius: 15px; font-weight: 800; cursor: pointer; 
            text-transform: uppercase; transition: 0.3s;
        }
        #addBtn:hover { transform: scale(1.02); background: #d4ac0d; }

        /* Tabela */
        .table-area { flex: 1; background: #fff; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; }
        th { background: #000; color: #fff; padding: 20px; text-transform: uppercase; font-size: 13px; text-align: center; }
        td { padding: 18px; text-align: center; border-bottom: 1px solid #eee; font-size: 15px; color: #333; }
        tr:nth-child(even) { background: #fafafa; }
    </style>
</head>
<body>

    <div class="hero-banner"></div>

    <div class="main-container">
        <!-- LADO ESQUERDO: REGISTRO -->
        <aside class="register-card">
            <h2>Register Product</h2>
            <input type="text" id="pName" placeholder="Product Name">
            <select id="pUnit">
                <option value="Caixa">Caixa</option>
                <option value="Unidade">Unidade</option>
                <option value="KG">KG</option>
            </select>
            <input type="number" id="pEntry" placeholder="Entry">
            <input type="number" id="pExit" placeholder="Exit">
            <select id="pCurrency">
                <option value="USD">USD ($)</option>
                <option value="EUR">EUR (€)</option>
                <option value="BRL">BRL (R$)</option>
            </select>
            <input type="number" id="pPrice" placeholder="Price">
            
            <button id="addBtn">Add Product</button>
        </aside>

        <!-- LADO DIREITO: TABELA -->
        <main class="table-area">
            <table>
                <thead>
                    <tr>
                        <th>Product</th>
                        <th>Unit</th>
                        <th>Entry</th>
                        <th>Exit</th>
                        <th>Stock</th>
                        <th>Currency</th>
                        <th>Price</th>
                        <th>Total Value</th>
                    </tr>
                </thead>
                <tbody id="inventoryList"></tbody>
            </table>
        </main>
    </div>

    <script>
        // Função para carregar os dados salvos e atualizar a tabela
        let inventory = JSON.parse(localStorage.getItem('sollene_db')) || [];

        function renderTable() {
            const list = document.getElementById('inventoryList');
            list.innerHTML = "";

            inventory.forEach((item, index) => {
                const stock = item.entry - item.exit;
                const totalValue = (stock * item.price).toFixed(2);
                const symbol = item.currency === 'USD' ? '$' : (item.currency === 'EUR' ? '€' : 'R$');

                const row = list.insertRow();
                row.innerHTML = `
                    <td>${item.name}</td>
                    <td>${item.unit}</td>
                    <td style="color: green;">${item.entry}</td>
                    <td style="color: red;">${item.exit}</td>
                    <td style="font-weight: 800;">${stock}</td>
                    <td>${item.currency}</td>
                    <td>${symbol} ${item.price}</td>
                    <td style="font-weight: 800;">${symbol} ${totalValue}</td>
                `;
            });
        }

        // Adicionar novo produto e SALVAR automaticamente
        document.getElementById('addBtn').addEventListener('click', function() {
            const name = document.getElementById('pName').value;
            const unit = document.getElementById('pUnit').value;
            const entry = parseInt(document.getElementById('pEntry').value) || 0;
            const exit = parseInt(document.getElementById('pExit').value) || 0;
            const currency = document.getElementById('pCurrency').value;
            const price = parseFloat(document.getElementById('pPrice').value) || 0;

            if(!name || price <= 0) return alert("Please fill in the product name and price.");

            const newProduct = { name, unit, entry, exit, currency, price };
            
            inventory.push(newProduct);
            localStorage.setItem('sollene_db', JSON.stringify(inventory)); // SALVA NO NAVEGADOR
            
            renderTable();

            // Limpar campos após adicionar
            document.getElementById('pName').value = "";
            document.getElementById('pEntry').value = "";
            document.getElementById('pExit').value = "";
            document.getElementById('pPrice').value = "";
        });

        // Carregar a tabela ao abrir a página
        window.onload = renderTable;
    </script>
</body>
</html>
