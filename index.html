<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malta iGaming Platform - MGA Gateway</title>
    <style>
        /* CORPORATE DARK NEON DESIGN - GLOBAL COMPLIANCE */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #0d0d18; color: #e1e1e6; padding: 20px; }
        .container { max-width: 850px; margin: 0 auto; }
        .gaming-nav { background: #161626; padding: 15px; text-align: center; border-radius: 8px; margin-bottom: 25px; border: 1px solid #262642; }
        .gaming-nav a { color: #fff; margin: 0 15px; text-decoration: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .gaming-nav a:hover, .gaming-nav a.active { color: #4ecca3; }
        .card { background: #121222; border: 1px solid #262642; padding: 30px; border-radius: 12px; margin-bottom: 25px; }
        h1 { color: #fff; margin-bottom: 15px; border-bottom: 2px solid #4ecca3; padding-bottom: 8px; font-size: 24px; }
        label { display: block; margin-bottom: 8px; color: #4ecca3; font-weight: 600; }
        input, select { width: 100%; padding: 12px; background: #1a1a30; border: 1px solid #262642; color: #fff; border-radius: 6px; }
        button { width: 100%; padding: 14px; background: #4ecca3; color: #0d0d18; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .hidden { display: none !important; }
        .info-compliance { background: #1c1c3a; border-left: 4px solid #e2b659; padding: 12px; margin-bottom: 20px; color: #e2b659; }
    </style>
</head>
<body>
    <div class="container">
        <nav class="gaming-nav">
            <a id="tab-cadastro" onclick="changeSection('sec-cadastro')" class="active">🆔 Registration & Global KYC</a>
            <a id="tab-jogos" onclick="changeSection('sec-jogos')">🎰 Games Lobby</a>
        </nav>
        <div id="sec-cadastro" class="card">
            <h1>🆔 Operator Corporate Registration (MGA Gateway)</h1>
            <div class="form-group">
                <label>Jurisdiction / Country of Residence:</label>
                <select id="p-country" onchange="configurarFiltroKYC()">
                    <option value="Brazil" selected>Brazil</option>
                    <option value="United States">United States</option>
                    <option value="Malta">Malta</option>
                </select>
            </div>
            <div id="compliance-box" class="info-compliance"></div>
            <div class="form-group">
                <label id="lbl-doc-type">Required Legal Document Type:</label>
                <select id="p-doc-type"></select>
            </div>
            <button onclick="registrarUsuarioGlobal()">Authenticate</button>
        </div>
        <div id="sec-jogos" class="card hidden">
            <h1>🎰 Games Hub & API Connection</h1>
            <p id="player-status" style="color: #4ecca3;">Status: Account Unverified</p>
        </div>
    </div>
    <script>
        // Data Schema - All in English
        const regrasKYC = {
            "Brazil": { documentos: ["CPF", "Passport"], info: "Applied Rule: CPF verification via shared database." },
            "United States": { documentos: ["SSN", "Driver's License"], info: "Applied Rule: FinCEN database scanning (AML)." },
            "Malta": { documentos: ["Malta ID", "MGA License"], info: "Applied Rule: MGA database lookup." }
        };

        function configurarFiltroKYC() {
            const pais = document.getElementById('p-country').value;
            const selectDoc = document.getElementById('p-doc-type');
            const boxInfo = document.getElementById('compliance-box');
            const config = regrasKYC[pais];
            
            if (config) {
                selectDoc.innerHTML = "";
                config.documentos.forEach(doc => {
                    const opt = document.createElement('option');
                    opt.value = doc; opt.textContent = doc;
                    selectDoc.appendChild(opt);
                });
                boxInfo.innerText = config.info;
            }
        }

        function changeSection(sectionId) {
            document.querySelectorAll('.card').forEach(card => card.classList.add('hidden'));
            document.getElementById(sectionId).classList.remove('hidden');
        }

        function registrarUsuarioGlobal() {
            const pais = document.getElementById('p-country').value;
            const doc = document.getElementById('p-doc-type').value;
            document.getElementById('player-status').innerHTML = `🛡️ Verified | Jurisdiction: ${pais} | Doc: ${doc}`;
            changeSection('sec-jogos');
        }

        document.addEventListener("DOMContentLoaded", configurarFiltroKYC);
    </script>
</body>
</html>
