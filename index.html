<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Management | Fábio</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 40px; background: #f4f7f6; color: #333; }
        h1 { color: #2c3e50; margin-bottom: 20px; }
        
        #registration-form { 
            background: white; 
            padding: 25px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 40px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        input { 
            padding: 12px; 
            border: 1px solid #ddd; 
            border-radius: 6px; 
            flex: 1;
            min-width: 150px;
        }

        button { 
            padding: 12px 25px; 
            background: #2563eb; 
            color: white; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover { background: #1d4ed8; }

        table { 
            width: 100%; 
            border-collapse: collapse; 
            background: white; 
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        th, td { padding: 15px; border-bottom: 1px solid #eee; text-align: left; }
        th { background: #f8fafc; color: #64748b; text-transform: uppercase; font-size: 12px; letter-spacing: 1px; }
    </style>
</head>
<body>

    <h1>Product & Supplier Control</h1>

    <!-- Registration Section -->
    <div id="registration-form">
        <input type="text" id="productName" placeholder="Product Name">
        <input type="text" id="supplier" placeholder="Supplier">
        <input type="number" id="price" placeholder="Price (USD)">
        <input type="number" id="stock" placeholder="Stock Qty">
        <button id="saveBtn">Save Product</button>
    </div>

    <hr style="border: 0; height: 1px; background: #eee; margin-bottom: 30px;">

    <h2>Current Inventory</h2>
    <table>
        <thead>
            <tr>
                <th>Product</th>
                <th>Supplier</th>
                <th>Price</th>
                <th>Qty</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            <!-- Data will appear here via JavaScript -->
        </tbody>
    </table>

</body>
</html>
    <script>
        // 1. Selecionar o botão e a tabela
        const saveBtn = document.getElementById('saveBtn');
        const tableBody = document.getElementById('tableBody');

        // 2. Criar a função que roda quando clicamos no botão
        saveBtn.addEventListener('click', function() {
            
            // Pegar os valores dos campos
            const productName = document.getElementById('productName').value;
            const supplier = document.getElementById('supplier').value;
            const price = document.getElementById('price').value;
            const stock = document.getElementById('stock').value;

            // Validação simples: não deixar salvar se o nome estiver vazio
            if (productName === "") {
                alert("Please enter a product name!");
                return;
            }

            // 3. Criar uma nova linha (tr) na tabela
            const newRow = tableBody.insertRow();

            // 4. Inserir as células (td) com os dados
            newRow.innerHTML = `
                <td>${productName}</td>
                <td>${supplier}</td>
                <td>$ ${price}</td>
                <td>${stock}</td>
                <td><button onclick="this.parentElement.parentElement.remove()" style="background:red; padding:5px 10px; font-size:10px;">Delete</button></td>
            `;

            // 5. Limpar os campos após salvar
            document.getElementById('productName').value = "";
            document.getElementById('supplier').value = "";
            document.getElementById('price').value = "";
            document.getElementById('stock').value = "";
        });
    </script>
