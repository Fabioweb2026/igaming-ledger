<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Sollene Group | Terminal</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #fdfaf6;
            color: #1a1a1a;
            padding-bottom: 60px;
        }

        /* ===== BANNER LOGO AJUSTADO ===== */
        .header-container {
            width: 100%;
            height: 180px; /* altura equilibrada */
            background: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px 20px;
            border-bottom: 1px solid #eee;
        }

        .logo-main {
            max-width: 100%;
            max-height: 160px; /* evita cortar letras */
            width: auto;
            height: auto;
            object-fit: contain;
        }

        /* ===== LAYOUT ===== */
        .main-grid {
            display: grid;
            grid-template-columns: 360px 1fr;
            gap: 30px;
            width: 100%;
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        /* SIDEBAR */
        .sidebar-card {
            background: #1f2937;
            padding: 40px 30px;
            border-radius: 25px;
            color: #fff;
            border-top: 4px solid #b39359;
        }

        .sidebar-card h3 {
            text-align: center;
            margin-bottom: 25px;
            color: #b39359;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 2px;
        }

        input, select {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            border-radius: 10px;
            border: none;
            background: #111827;
            color: #fff;
            outline: none;
        }

        #regBtn {
            width: 100%;
            padding: 16px;
            background: #b39359;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            color: #111;
        }

        /* TABELA */
        .inventory-area {
            background: #f2ede4;
            border-radius: 25px;
            min-height: 500px;
            border: 1px solid #e5e1da;
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            padding: 20px;
            background: #1f2937;
            color: #b39359;
            font-size: 11px;
            text-transform: uppercase;
        }

        td {
            padding: 18px;
            border-bottom: 1px solid #ddd;
            background: rgba(255,255,255,0.5);
        }

        .currency-style {
            color: #b39359;
            font-weight: bold;
        }

        .del-btn {
            color: red;
            background: none;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        /* RESPONSIVO */
        @media(max-width: 900px) {
            .main-grid {
                grid-template-columns: 1fr;
            }

            .header-container {
                height: 140px;
            }

            .logo-main {
                max-height: 120px;
            }
        }
    </style>
</head>

<body>

    <!-- HEADER LOGO FULL WIDTH AJUSTADO -->
    <header class="header-container">
        <img src="Sollene-Group.png" alt="Sollene Group Logo" class="logo-main">
    </header>

    <!-- CONTEÚDO -->
    <div class="main-grid">

        <aside class="sidebar-card">
            <h3>Shipment Entry</h3>

            <input type="text" id="pName" placeholder="Product Name">
            <input type="text" id="pDest" placeholder="Destination Port">

            <select id="pCurr">
                <option value="USD">USD ($)</option>
                <option value="EUR">EUR (€)</option>
                <option value="BRL">BRL (R$)</option>
            </select>

            <input type="number" id="pPrice" placeholder="Price">
            <input type="number" id="pQty" placeholder="Quantity">

            <button id="regBtn">Process Trade</button>
        </aside>

        <main class="inventory-area">
            <table>
                <thead>
                    <tr>
                        <th>Product</th>
                        <th>Destination</th>
                        <th>Value</th>
                        <th>Qty</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="list"></tbody>
            </table>
        </main>

    </div>

    <script>
        const inventoryList = document.getElementById('list');

        function saveData() {
            const rows = [];
            document.querySelectorAll('#list tr').forEach(row => {
                rows.push(row.innerHTML);
            });
            localStorage.setItem('solleneData', JSON.stringify(rows));
        }

        function loadData() {
            const saved = localStorage.getItem('solleneData');
            if (saved) {
                JSON.parse(saved).forEach(rowData => {
                    const row = inventoryList.insertRow();
                    row.innerHTML = rowData;
                });
            }
        }

        window.onload = loadData;

        document.getElementById('regBtn').addEventListener('click', function () {
            const name = document.getElementById('pName').value;
            const dest = document.getElementById('pDest').value;
            const curr = document.getElementById('pCurr').value;
            const price = document.getElementById('pPrice').value;
            const qty = document.getElementById('pQty').value;

            if (!name || !price || !qty) {
                alert("Please complete all fields.");
                return;
            }

            let symbol = curr === "USD" ? "$" : curr === "EUR" ? "€" : "R$";

            const row = inventoryList.insertRow();
            row.innerHTML = `
                <td><b>${name}</b></td>
                <td>${dest || 'Global'}</td>
                <td class="currency-style">${symbol} ${parseFloat(price).toFixed(2)}</td>
                <td>${qty}</td>
                <td><button class="del-btn" onclick="this.parentElement.parentElement.remove(); saveData()">DELETE</button></td>
            `;

            saveData();
            document.querySelectorAll('input').forEach(i => i.value = "");
        });
    </script>

</body>
</html>
