<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sollene Group | Logistics Terminal</title>
    <style>
        @import url('https://googleapis.com');
        
        *{ margin:0; padding:0; box-sizing:border-box; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #fdfaf6; /* Creme de fundo */
            color: #1a1a1a; 
            padding-bottom: 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* BANNER */
        .hero-banner {
            width: 100%;
            max-width: 1200px;
            height: 320px;
            background-color: #f7f4ed;
            background-image: url('image.jpg');
            background-repeat: no-repeat;
            background-position: center;
            background-size: contain;
            border-radius: 28px;
            margin-top: 20px;
            border: 1px solid #e5e1da;
            box-shadow: 0 20px 40px rgba(0,0,0,0.04);
        }

        .company-header { text-align: center; margin: 40px 0; }
        .company-header h1 { font-size: 56px; font-weight: 800; color: #1f2937; letter-spacing: -2px; text-transform: uppercase; }
        .company-header p { color: #b39359; font-size: 13px; text-transform: uppercase; letter-spacing: 4px; font-weight: 800; margin-top: 10px; }

        .main-grid {
            display: grid;
            grid-template-columns: 360px 1fr;
            gap: 30px;
            width: 100%;
            max-width: 1200px;
            padding: 0 20px;
        }

        /* CARD DE REGISTRO GRAFITE */
        .sidebar-card {
            background: #1f2937;
            padding: 40px 30px;
            border-radius: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.2);
            height: fit-content;
            color: #ffffff;
            border-top: 4px solid #b39359;
        }

        .sidebar-card h3 { font-size: 11px; text-transform: uppercase; color: #b39359; margin-bottom: 30px; letter-spacing: 2px; font-weight: 800; text-align: center; }

        input, select {
            width: 100%;
            padding: 16px;
            margin-bottom: 20px;
            border: 1px solid #374151;
            border-radius: 14px;
            background: #111827;
            font-size: 14px;
            color: #ffffff;
            outline: none;
            transition: 0.3s ease;
        }

        input:focus { border-color: #b39359; box-shadow: 0 0 0 4px rgba(179, 147, 89, 0.15); }

        .qty-group { display: flex; gap: 10px; margin-bottom: 20px; }
        .qty-group input, .qty-group select { margin-bottom: 0; }

        #regBtn {
            width: 100%;
            padding: 20px;
            background: #b39359;
            color: #111827;
            border: none;
            border-radius: 16px;
            font-weight: 800;
            cursor: pointer;
            transition: 0.4s;
            text-transform: uppercase;
            font-size: 13px;
        }

        #regBtn:hover { background: #ffffff; transform: translateY(-3px); }

        /* ESPAÇO DO INVENTÁRIO (CINZA PREENCHIDO) */
        .inventory-area {
            background: #f1f5f9; /* AQUI O CINZA QUE VOCÊ PEDIU */
            border-radius: 30px;
            border: 1px solid #e2e8f0;
            min-height: 500px; /* Garante que o espaço cinza apareça mesmo vazio */
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.02);
            overflow: hidden;
        }

        table { width: 100%; border-collapse: collapse; }
        
        th { 
            text-align: left; 
            padding: 24px 20px; 
            background: #1f2937; /* Cabeçalho Graphite */
            color: #b39359; 
            font-size: 10px; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            font-weight: 800; 
        }

        td { 
            padding: 24px 20px; 
            border-bottom: 1px solid #e2e8f0; 
            font-size: 15px; 
            color: #334155; 
            background: rgba(255, 255, 255, 0.5); /* Linhas levemente mais claras */
        }
        
        /* Efeito Zebra para facilitar a leitura */
        tbody tr:nth-child(even) td { background-color: rgba(255, 255, 255, 0.2); }

        .currency-style { color: #b39359; font-weight: 800; }
        .del-btn { color: #ef4444; cursor: pointer; border: none; background: none; font-weight: 800; font-size: 11px; text-transform: uppercase; }

        @media(max-width: 900px) {
            .main-grid { grid-template-columns: 1fr; }
            .hero-banner { height: 220px; }
        }
    </style>
</head>
<body>

    <div class="hero-banner"></div>

    <header class="company-header">
        <h1>Sollene Group</h1>
        <p>Premium Logistics & Global Trade</p>
    </header>

    <div class="main-grid">
        <aside class="sidebar-card">
            <h3>Shipment Entry</h3>
            <input type="text" id="pName" placeholder="Product Name">
            <input type="text" id="pDest" placeholder="Destination Port">
            <select id="pCurr">
                <option value="USD">USD ($)</option>
                <option value="EUR">EUR (€)</option>
                <option value="BRL">BRL (R$)</option>
            </select>
            <input type="number" id="pPrice" placeholder="Unit Price">
            <div class="qty-group">
                <input type="number" id="pQty" placeholder="Qty">
                <select id="pUnit">
                    <option value="Units">Units</option>
                    <option value="KG">KG</option>
                    <option value="Tons">Tons</option>
                    <option value="Packs">Packs</option>
                </select>
            </div>
            <button id="regBtn">Register Cargo</button>
        </aside>

        <main class="inventory-area">
            <table>
                <thead>
                    <tr>
                        <th>Product</th>
                        <th>Destination</th>
                        <th>Value</th>
                        <th>Volume</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="list"></tbody>
            </table>
        </main>
    </div>

    <script>
        document.getElementById('regBtn').addEventListener('click', function() {
            const name = document.getElementById('pName').value;
            const dest = document.getElementById('pDest').value;
            const curr = document.getElementById('pCurr').value;
            const price = document.getElementById('pPrice').value;
            const qty = document.getElementById('pQty').value;
            const unit = document.getElementById('pUnit').value;

            if(!name || !price || !qty) return alert("Please fill all fields.");

            let s = curr === "USD" ? "$" : (curr === "EUR" ? "€" : "R$");
            const row = document.getElementById('list').insertRow();
            row.innerHTML = `
                <td style="font-weight:700; color: #1f2937;">${name}</td>
                <td style="color:#64748b">${dest || 'Global'}</td>
                <td class="currency-style">${s} ${parseFloat(price).toFixed(2)}</td>
                <td><strong>${qty}</strong> <small style="color:#b39359">${unit}</small></td>
                <td><button class="del-btn" onclick="this.parentElement.parentElement.remove()">DELETE</button></td>
            `;
            document.querySelectorAll('input').forEach(i => i.value = "");
        });
    </script>
</body>
</html>
