<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terra Global | Dark Premium Inventory</title>
    <style>
        @import url('https://googleapis.com');

        *{ margin:0; padding:0; box-sizing:border-box; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            padding: 60px 20px; 
            background: #020617; /* Fundo Black/Dark Profissional */
            color: #f8fafc; 
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            position: relative;
        }

        /* IMAGEM NO CANTO (Glow/Brilho para destacar no fundo preto) */
        .corner-image {
            position: absolute;
            top: 30px;
            right: 30px;
            width: 140px;
            height: 90px;
            border-radius: 12px;
            background: url('empresa.png') no-repeat center center;
            background-size: cover;
            border: 1px solid rgba(212, 163, 115, 0.3);
            box-shadow: 0 0 20px rgba(212, 163, 115, 0.15);
        }

        .company-branding { text-align: center; margin-bottom: 50px; }
        
        .company-branding h1 { 
            font-size: 48px; 
            font-weight: 800; 
            color: #ffffff; 
            text-transform: uppercase; 
            letter-spacing: -1px;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .company-info { 
            color: #d4a373; /* Dourado */
            font-size: 13px; 
            font-weight: 700; 
            background: rgba(212, 163, 115, 0.1); 
            padding: 8px 25px; 
            border-radius: 8px; 
            display: inline-block;
            border: 1px solid rgba(212, 163, 115, 0.2);
            letter-spacing: 1px;
        }

        .main-container { width: 100%; max-width: 1200px; }

        /* FORMULÁRIO DARK GLASS */
        #registration-form { 
            background: rgba(15, 23, 42, 0.6); 
            backdrop-filter: blur(12px);
            padding: 40px; 
            border-radius: 20px; 
            margin-bottom: 30px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        input, select { 
            padding: 15px; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 10px; 
            font-size: 14px;
            background: rgba(2, 6, 23, 0.5);
            color: white;
            outline: none;
        }

        input:focus, select:focus { border-color: #d4a373; }

        input { flex: 2; min-width: 180px; }
        select { flex: 1; min-width: 120px; cursor: pointer; }

        #saveBtn { 
            padding: 15px 35px; 
            background: #1b4332; /* Verde Esmeralda Escuro */
            color: white; 
            border: none; 
            border-radius: 10px; 
            cursor: pointer; 
            font-weight: 800;
            transition: 0.3s;
            box-shadow: 0 0 20px rgba(27, 67, 50, 0.3);
        }

        #saveBtn:hover { transform: translateY(-3px); background: #2d6a4f; box-shadow: 0 0 30px rgba(45, 106, 79, 0.4); }

        /* TABELA DARK */
        .inventory-section { 
            background: rgba(15, 23, 42, 0.4); 
            padding: 35px; 
            border-radius: 20px; 
            border: 1px solid rgba(255, 255, 255, 0.05); 
        }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 15px; color: #64748b; font-size: 11px; text-transform: uppercase; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        td { padding: 20px 15px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); font-size: 15px; }

        .price-col { font-weight: 700; color: #d4a373; }
        .del-btn { color: #ef4444; border: none; background: none; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .del-btn:hover { color: #f87171; transform: scale(1.1); }
    </style>
</head>
<body>

    <!-- AQUI A IMAGEM -->
    <div class="corner-image"></div>

    <div class="company-branding">
        <h1>Terra Global</h1>
        <div class="company-info">LOGISTICS & MULTI-CURRENCY TERMINAL</div>
    </div>

    <div class="main-container">
        <div id="registration-form">
            <input type="text" id="productName" placeholder="Product Name">
            <input type="text" id="origin" placeholder="Destination">
            
            <select id="currency">
                <option value="USD">USD ($)</option>
                <option value="EUR">EUR (€)</option>
                <option value="BRL">BRL (R$)</option>
            </select>

            <input type="number" id="price" placeholder="Unit Price">
            <input type="number" id="stock" placeholder="Qty">
            <button id="saveBtn">REGISTER</button>
        </div>

        <div class="inventory-section">
            <table>
                <thead>
                    <tr>
                        <th>Product</th>
                        <th>Destination</th>
                        <th>Price</th>
                        <th>Quantity</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        const saveBtn = document.getElementById('saveBtn');
        const tableBody = document.getElementById('tableBody');

        saveBtn.addEventListener('click', function() {
            const product = document.getElementById('productName').value;
            const origin = document.getElementById('origin').value;
            const currency = document.getElementById('currency').value;
            const price = document.getElementById('price').value;
            const stock = document.getElementById('stock').value;

            if (!product || !price || !stock) return alert("Fill all fields");

            let symbol = currency === "BRL" ? "R$" : (currency === "USD" ? "$" : "€");

            const newRow = tableBody.insertRow();
            newRow.innerHTML = `
                <td style="font-weight:700; color: #f1f5f9;">${product}</td>
                <td style="color:#94a3b8">${origin}</td>
                <td class="price-col">${symbol} ${parseFloat(price).toLocaleString('en-US', {minimumFractionDigits: 2})}</td>
                <td><strong style="color:#f1f5f9">${stock}</strong> units</td>
                <td><button class="del-btn" onclick="this.parentElement.parentElement.remove()">DELETE</button></td>
            `;

            document.querySelectorAll('input').forEach(i => i.value = "");
        });
    </script>
</body>
</html>
