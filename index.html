<div class="title-card">
    <h1>REGISTER PRODUCT</h1>
</div>

<div class="form-grid">

    <input type="text"
           id="pName"
           placeholder="Product Name">

    <select id="pUnit">

        <option value="">
            Unit
        </option>

        <option value="Caixa">
            Caixa
        </option>

        <option value="Kg">
            Kg
        </option>

        <option value="Toneladas">
            Toneladas
        </option>

        <option value="Pacotes">
            Pacotes
        </option>

    </select>

    <select id="pType">

        <option value="ENTRADA">
            Entry
        </option>

        <option value="SAÍDA">
            Exit
        </option>

    </select>

    <select id="currency">

        <option value="€">
            EUR
        </option>

        <option value="$">
            USD
        </option>

        <option value="R$">
            BRL
        </option>

    </select>

    <input type="number"
           id="pPrice"
           placeholder="Price">

</div>

<div class="buttons">

    <button class="add-btn"
            onclick="addProduct()">

        ADD PRODUCT

    </button>

</div>
