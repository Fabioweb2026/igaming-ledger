<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sollene Group | Premium Logistics</title>
    <style>
        @import url('https://googleapis.com');
        
        *{ margin:0; padding:0; box-sizing:border-box; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #fdfaf6; /* CREME CLARO SOFISTICADO */
            color: #1a1a1a; 
            padding: 40px 20px; 
        }

        .hero { text-align: center; margin-bottom: 60px; }
        .hero h1 { font-size: 52px; font-weight: 800; color: #1a1a1a; letter-spacing: -2px; }
        .hero p { color: #64748b; font-size: 14px; text-transform: uppercase; letter-spacing: 2px; font-weight: 600; }

        .container { display: flex; gap: 40px; max-width: 1400px; margin: 0 auto; align-items: flex-start; }

        /* BARRA LATERAL COM A IMAGEM */
        .sidebar { width: 340px; }

        .brand-image {
            width: 100%;
            height: 180px;
            background: url('image.png') no-repeat center center;
            background-size: cover;
            border-radius: 20px 20px 0 0;
            border: 1px solid #e5e7eb;
            border-bottom: none;
        }

        .form-card { 
            background: #ffffff; 
            padding: 30px; 
            border-radius: 0 0 20px 20px; 
            border: 1px solid #e5e7eb;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .form-card h3 { color: #b39359; font-size: 13px; text-transform: uppercase; margin-bottom: 25px; letter-spacing: 1px; }

        .field { margin-bottom: 18px; }
        label { display: block; font-size: 11px; color: #94a3b8; margin-bottom: 6px; text-transform: uppercase; font-weight: 700; }

        input, select { 
            width: 100%; padding: 14px; background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 12px; color: #1a1a1a; font-size: 14px; transition: 0.3s;
        }

        input:focus { border-color: #b39359; outline: none; background: #fff; }

        .qty-row { display: flex; gap: 10px; }
        .qty-row input { flex: 2; }
        .qty-row select { flex: 1.5; }

        #regBtn { 
            width: 100%; padding: 16px; background: #1a1a1a; color: #fff; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; margin-top: 10px; transition: 0.3s;
        }

        #regBtn:hover { background: #b39359; transform: translateY(-2px); }

        /* TABELA GRAFITE */
        .table-area { flex: 1; }
        .table-area h2 { font-size: 24px; margin-bottom: 25px; color: #1a1a1a; }

        .data-container { 
            background: #ffffff; border-radius: 20px; border: 1px solid #e5e7eb; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.03);
        }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 20px; color: #94a3b8; font-size: 11px; text-transform: uppercase; border-bottom: 1px solid #f3f4f6; letter-spacing: 1px; }
        td { padding: 20px; border-bottom: 1px solid #f9fafb; font-size: 15px; color: #334155; }

        .price-text { color: #b39359; font-weight: 700; }
        .del-btn { color: #ef4444; cursor: pointer; font-weight: 700; border: none; background: none; transition: 0.2s; }
        .del-btn:hover { transform: scale(1.1); }

        @media(max-width: 1000px) { .container { flex-direction: column; } .sidebar { width: 100%; } }
    </style>
</head>
<body>

    <header class="hero">
        <p>Supply Chain & Logistics Division</p>
        <h1>Sollene Group</h1>
    </header>

    <div class="container">
        <!-- BARRA LATERAL COM IMAGEM -->
        <aside class="sidebar">
            <div class="brand-image"></div>
            <div class="form-card">
                <h3>Shipment Registration</h3>
                
                <div class="field">
                    <label>Commodity Name</label>
                    <input type="text" id="pName" placeholder="e.g. Brazilian Coffee">
                </div>

                <div class="field">
                    <label>Destination</label>
                    <input type="text" id="pDest" placeholder="e.g. Rotterdam Port">
                </div>

                <div class="field">
                    <label>Currency</label>
                    <select id="pCurr">
                        <option value="USD">USD ($)</option>
                        <option value="EUR">EUR (€)</option>
                        <option value="BRL">BRL (R$)</option>
                    </select>
                </div>

                <div class="field">
                    <label>Unit Price</label>
                    <input type="number" id="pPrice" placeholder="0.00">
                </div>

                <div class="field">
                    <label>Volume & Unit</label>
                    <div class="qty-row">
                        <input type="number" id="pQty" placeholder="Value">
                        <select id="pUnit">
                            <option value="Units">Units</option>
                            <option value="KG">KG</option>
                            <option value="Tons">Tons</option>
                            <option value="Packs">Packs</option>
                        </select>
                    </div>
                </div>

                <button id="regBtn">REGISTER CARGO</button>
            </div>
        </aside>

        <!-- ÁREA DA TABELA -->
        <main class="table-area">
            <h2>Active Cargo Inventory</h2>
            <div class="data-container">
                <table>
                    <thead>
                        <tr>
                            <th>Product</th>
                            <th>Destination</th>
                            <th>Value</th>
                            <th>Quantity</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="inventoryList"></tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        const regBtn = document.getElementById('regBtn');
        const inventoryList = document.getElementById('inventoryList');

        regBtn.addEventListener('click', function() {
            const name = document.getElementById('pName').value;
            const dest = document.getElementById('pDest').value;
            const curr = document.getElementById('pCurr').value;
            const price = document.getElementById('pPrice').value;
            const qty = document.getElementById('pQty').value;
            const unit = document.getElementById('pUnit').value;

            if (!name || !price || !qty) {
                alert("Please fill all required fields.");
                return;
            }

            let symbol = curr === "USD" ? "$" : (curr === "EUR" ? "€" : "R$");

            const row = inventoryList.insertRow();
            row.innerHTML = `
                <td style="font-weight: 600;">${name}</td>
                <td style="color: #64748b;">${dest || 'Internal'}</td>
                <td class="price-text">${symbol} ${parseFloat(price).toFixed(2)}</td>
                <td><strong>${qty} ${unit}</strong></td>
                <td><button class="del-btn" onclick="this.parentElement.parentElement.remove()">DELETE</button></td>
            `;

            // Limpa os campos
            document.getElementById('pName').value = "";
            document.getElementById('pDest').value = "";
            document.getElementById('pPrice').value = "";
            document.getElementById('pQty').value = "";
        });
    </script>
</body>
</html>
