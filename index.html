<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sollene Group | Inventory System</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

html, body {
    margin: 0;
    padding: 0;
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: #f6f4ea;
    overflow-x: hidden;
}

/* =======================
   BANNER
======================= */
.banner-header {
    width: 100%;
    height: 140px;
    margin-top: 20px;
    overflow: hidden;
    border-bottom: 3px solid #b39359;
}

.banner-header img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* =======================
   LAYOUT
======================= */
.main-content {
    max-width: 1200px;
    margin: auto;
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: 25px;
    padding: 25px;
}

/* SIDEBAR */
.sidebar {
    background: #1a1a1a;
    color: #b39359;
    padding: 25px;
    border-radius: 18px;
}

.sidebar h2 {
    margin-bottom: 20px;
}

/* CAMPOS PADRONIZADOS */
.sidebar input,
.sidebar select {
    width: 100%;
    height: 44px;
    margin-bottom: 12px;
    border-radius: 10px;
    border: none;
    padding: 0 10px;
}

/* BOTÃO */
button {
    width: 100%;
    height: 46px;
    border-radius: 10px;
    border: none;
    background: #b39359;
    font-weight: bold;
    cursor: pointer;
}

/* TABLE */
.table-container {
    background: white;
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

table {
    width: 100%;
    border-collapse: collapse;
}

thead {
    background: #1a1a1a;
    color: #b39359;
}

th, td {
    padding: 15px;
    text-align: center;
    border-bottom: 1px solid #eee;
}

.entry { color: green; font-weight: bold; }
.exit { color: red; font-weight: bold; }
.total { color: #b39359; font-weight: bold; }

/* CASH COLUMN */
.cash {
    color: #27ae60;
    font-weight: bold;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 25px;
    background: #1a1a1a;
    color: #777;
    margin-top: 40px;
}

/* RESPONSIVO */
@media (max-width: 900px) {
    .main-content {
        grid-template-columns: 1fr;
    }
}

</style>
</head>

<body>

<!-- BANNER -->
<header class="banner-header">
    <img src="sollene-group.jpg">
</header>

<!-- MAIN -->
<div class="main-content">

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>Register Product</h2>

    <input id="name" placeholder="Product">

    <select id="unit">
        <option>Case</option>
        <option>Unit</option>
    </select>

    <input id="entry" type="number" placeholder="Entry">
    <input id="exit" type="number" placeholder="Exit">

    <select id="currency">
        <option>USD</option>
        <option>EUR</option>
        <option>BRL</option>
    </select>

    <input id="price" type="number" placeholder="Price per unit">

    <button onclick="add()">Add Product</button>
</div>

<!-- TABLE -->
<div class="table-container">
<table>

<thead>
<tr>
<th>Product</th>
<th>Unit</th>
<th>Entry</th>
<th>Exit</th>
<th>Stock</th>
<th>Currency</th>
<th>Price</th>
<th>Total Revenue</th>
<th>Cash (Profit)</th>
</tr>
</thead>

<tbody id="table"></tbody>

</table>
</div>

</div>

<footer>
© 2026 SOLLENE GROUP | INVENTORY SYSTEM
</footer>

<script>

function add(){

let name=document.getElementById('name').value;
let unit=document.getElementById('unit').value;
let entry=+document.getElementById('entry').value;
let exit=+document.getElementById('exit').value;
let currency=document.getElementById('currency').value;
let price=+document.getElementById('price').value;

/* ESTOQUE */
let stock = entry - exit;

/* RECEITA (vendas reais) */
let revenue = exit * price;

/* CUSTO (entrada total) */
let cost = entry * price;

/* LUCRO / CAIXA */
let cash = revenue - cost;

document.getElementById('table').innerHTML += `
<tr>
<td>${name}</td>
<td>${unit}</td>
<td class="entry">+${entry}</td>
<td class="exit">-${exit}</td>
<td>${stock}</td>
<td>${currency}</td>
<td>${price}</td>
<td>${revenue.toFixed(2)}</td>
<td class="cash">${cash.toFixed(2)}</td>
</tr>
`;

}

</script>

</body>
</html>
