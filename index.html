<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sollene Group | Stock & Finance Dashboard</title>
    <style>
        /* CONFIGURAÇÕES GLOBAIS DE LUXO SOLLENE */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: #f7f3eb; color: #1a1a1a; padding-bottom: 60px; }

        /* HEADER PREMIUM SOLLENE GROUP */
        .main-header {
            background: #f7f3eb; display: flex; align-items: center; justify-content: space-between;
            padding: 15px 5%; border-bottom: 1px solid rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 1000;
        }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .logo-circle { 
            width: 55px; height: 55px; border-radius: 50%; border: 1px solid #d4af37; 
            background: #fff url('Sollene-Group.png') no-repeat center center; background-size: cover; 
        }
        .brand-title { font-size: 24px; font-weight: 800; color: #7a5c33; letter-spacing: 3px; text-transform: uppercase; }

        nav ul { display: flex; list-style: none; gap: 20px; align-items: center; }
        .nav-item { position: relative; }
        .nav-link { text-decoration: none; color: #000; font-size: 11px; font-weight: 800; text-transform: uppercase; padding: 10px 20px; border: 2px solid #000; border-radius: 6px; background: transparent; }

        /* CARDS DE RESUMO FINANCEIRO E ESTOQUE */
        .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 25px; max-width: 1300px; margin: 40px auto 0 auto; padding: 0 5%; }
        .summary-card { background: #fff; border: 1px solid #e1dbcf; border-radius: 16px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.02); }
        .summary-card h3 { font-size: 10px; text-transform: uppercase; color: #7a5c33; letter-spacing: 1px; margin-bottom: 8px; font-weight: 800; }
        .summary-card p { font-size: 24px; font-weight: bold; }

        /* CORPO OPERACIONAL DO HUB */
        .dashboard-container { max-width: 1300px; margin: 40px auto; padding: 0 5%; display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 40px; }
        
        /* CARD DO FORMULÁRIO PRETO PREMIUM */
        .panel-card { background: #fff; border: 1px solid #e1dbcf; border-radius: 24px; padding: 35px; box-shadow: 0 10px 30px rgba(0,0,0,0.02); height: fit-content; }
        .panel-card h2 { font-size: 14px; text-transform: uppercase; letter-spacing: 2px; color: #7a5c33; margin-bottom: 25px; border-bottom: 2px solid #7a5c33; padding-bottom: 10px; font-weight: 800; }
        
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 10px; font-weight: 800; text-transform: uppercase; margin-bottom: 6px; color: #7a5c33; letter-spacing: 1px; }
        .form-control { width: 100%; padding: 12px; border: 1px solid #e1dbcf; border-radius: 8px; font-size: 13px; font-weight: 600; outline: none; background: #fdfaf6; color: #1a1a1a; }
        
        .btn-submit { width: 100%; padding: 16px; background: #000; color: #fff; border: none; border-radius: 12px; font-weight: 800; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-submit:hover { background: #7a5c33; }

        /* PAINEL DA TABELA DE HISTÓRICO */
        .table-panel { grid-column: span 2; }
        .table-container { width: 100%; overflow-x: auto; background: #fff; border-radius: 16px; border: 1px solid #eee; }
        
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 13px; }
        th { background: #fdfaf6; padding: 16px; font-weight: 800; text-transform: uppercase; font-size: 10px; color: #7a5c33; letter-spacing: 1px; border-bottom: 2px solid #7a5c33; }
        td { padding: 16px; border-bottom: 1px solid #f9f9f9; font-weight: 600; }
        tr:hover { background-color: #fdfcf9; }
        
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 9px; font-weight: 800; text-transform: uppercase; }
        .badge-entrada { background: #e6f4ea; color: #137333; }
        .badge-saida { background: #fce8e6; color: #c5221f; }

        .remove-btn { color: #ff4d4d; border: none; background: none; cursor: pointer; font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        @media(max-width: 992px) { .table-panel { grid-column: span 1; } .summary-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <!-- HEADER PREMIUM BRANDING -->
    <header class="main-header">
        <div class="header-left">
            <div class="logo-circle"></div>
            <h1 class="brand-title">SOLLENE GROUP</h1>
        </div>
        <nav>
            <ul>
                <li class="nav-item"><a href="github.io" class="nav-link btn-home-print">PORTFÓLIO</a></li>
            </ul>
        </nav>
    </header>

    <!-- CARDS DE CONTROLE FINANCEIRO E VALORES -->
    <section class="summary-grid">
        <div class="summary-card"><h3>Volume Total em Estoque</h3><p id="total-itens">0 un</p></div>
        <div class="summary-card"><h3>Faturamento de Entradas</h3><p id="valor-entradas" style="color: #137333;">€ 0.00</p></div>
        <div class="summary-card"><h3>Faturamento de Saídas</h3><p id="valor-saidas" style="color: #c5221f;">€ 0.00</p></div>
    </section>

    <!-- ÁREA OPERACIONAL -->
    <main class="dashboard-container">
        
        <!-- FORMULÁRIO DE ENTRADAS/SAÍDAS E VALORES -->
        <div class="panel-card">
            <h2>Lançar Movimentação</h2>
            <form id="stock-form" onsubmit="handleTransaction(event)">
                <div class="form-group">
                    <label>Fluxo da Operação</label>
                    <select id="type" class="form-control" style="cursor: pointer;">
                        <option value="Entrada">Entrada (Aporte de Estoque)</option>
                        <option value="Saída">Saída (Venda Realizada)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Nome do Produto / Peça</label>
                    <input type="text" id="product" class="form-control" placeholder="EX: CHRONOGRAPH WATCH" required>
                </div>
                <div class="form-group">
                    <label>Quantidade (Unidades)</label>
                    <input type="number" id="quantity" class="form-control" placeholder="EX: 10" min="1" required>
                </div>
                <div class="form-group">
                    <label>Valor Unitário do Produto (€)</label>
                    <input type="number" id="price" class="form-control" placeholder="EX: 380" min="1" required>
                </div>
                <div class="form-group">
                    <label>Fornecedor ou Cliente Destino</label>
                    <input type="text" id="partner" class="form-control" placeholder="EX: ACME LUXURY SUPPLIES" required>
                </div>
                <button type="submit" class="btn-submit">Registrar Operação</button>
            </form>
        </div>

        <!-- RELATÓRIO DO HISTÓRICO COM VALORES -->
        <div class="panel-card table-panel">
            <h2>Painel Geral de Entradas, Saídas e Valores</h2>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Fluxo</th>
                            <th>Produto</th>
                            <th>Qtd</th>
                            <th>Valor Total</th>
                            <th>Fornecedor / Cliente</th>
                            <th>Ação</th>
                        </tr>
                    </thead>
                    <tbody id="table-body"></tbody>
                </table>
            </div>
        </div>

    </main>

    <script>
        let stockData = [];

        // Recuperação dinâmica da partição exclusiva de estoque
        function loadStockSystem() {
            stockData = JSON.parse(window.localStorage.getItem('sollene_stock_finance_master')) || [];
            renderDashboard();
        }

        function handleTransaction(event) {
            event.preventDefault();

            const type = document.getElementById('type').value;
            const product = document.getElementById('product').value;
            const quantity = parseInt(document.getElementById('quantity').value);
            const price = parseInt(document.getElementById('price').value);
            const partner = document.getElementById('partner').value;

            // Calcula o valor total multiplicando a quantidade pelo valor unitário
            const totalValue = quantity * price;

            stockData.push({ type, product, quantity, price, totalValue, partner });
            window.localStorage.setItem('sollene_stock_finance_master', JSON.stringify(stockData));

            document.getElementById('stock-form').reset();
            renderDashboard();
        }

        function removeTransaction(index) {
            stockData.splice(index, 1);
            window.localStorage.setItem('sollene_stock_finance_master', JSON.stringify(stockData));
            renderDashboard();
        }

        function renderDashboard() {
            const tbody = document.getElementById('table-body');
            if (!tbody) return;

            if (stockData.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; color:#999; padding:30px; font-weight:600;">Nenhum registro de entrada ou saída encontrado.</td></tr>';
            } else {
                tbody.innerHTML = stockData.map((item, index) => `
                    <tr>
                        <td><span class="badge badge-${item.type === 'Entrada' ? 'entrada' : 'saida'}">${item.type}</span></td>
                        <td style="font-weight: 800; text-transform: uppercase;">${item.product}</td>
                        <td>${item.quantity} un</td>
                        <td style="color: #7a5c33; font-weight: bold;">€ ${item.totalValue}.00</td>
                        <td style="text-transform: uppercase;">${item.partner}</td>
                        <td><button class="remove-btn" onclick="removeTransaction(${index})">DELETE</button></td>
                    </tr>
                `).join('');
            }

            // Atualização dos Cards de cálculo matemático financeiro
            let totalUnidades = stockData.reduce((sum, i) => sum + i.quantity, 0);
            document.getElementById('total-itens').innerText = totalUnidades + " un";

            let faturamentoEntradas = stockData.filter(i => i.type === 'Entrada').reduce((sum, i) => sum + i.totalValue, 0);
            document.getElementById('valor-entradas').innerText = "€ " + faturamentoEntradas + ".00";

            let faturamentoSaidas = stockData.filter(i => i.type === 'Saída').reduce((sum, i) => sum + i.totalValue, 0);
            document.getElementById('valor-saidas').innerText = "€ " + faturamentoSaidas + ".00";
        }

        window.onload = loadStockSystem;
    </script>
</body>
</html>
