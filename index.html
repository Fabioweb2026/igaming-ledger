<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terra Global | Import & Export Management</title>
    <style>
        /* Importando a fonte corretamente */
        @import url('https://googleapis.com');

        *{ margin:0; padding:0; box-sizing:border-box; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            padding: 50px 20px; 
            /* AQUI ESTÁ A IMAGEM DE FUNDO */
            background: linear-gradient(rgba(213, 189, 175, 0.8), rgba(213, 189, 175, 0.9)), 
                        url('https://unsplash.com') no-repeat center center fixed;
            background-size: cover;
            color: #2f2e2e; 
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* HEADER ESTILO TRADING COMPANY */
        .company-branding {
            text-align: center;
            margin-bottom: 50px;
        }

        .logo-icon {
            font-size: 40px;
            background: #1b4332; /* Verde Floresta */
            width: 90px;
            height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            margin: 0 auto 20px;
            box-shadow: 0 10px 25px rgba(27, 67, 50, 0.4);
            color: #d4a373; /* Dourado */
            border: 3px solid #d4a373;
        }

        .company-branding h1 { 
            font-size: 42px; 
            font-weight: 800; 
            color: #1b4332;
            letter-spacing: -1.5px;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .company-info {
            color: #582f0e; 
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.5px;
            background: rgba(255, 255, 255, 0.2);
            padding: 5px 15px;
            border-radius: 20px;
            display: inline-block;
        }

        .main-container {
            width: 100%;
            max-width: 1150px;
        }

        /* FORMULÁRIO */
        #registration-form { 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(10px); /* Efeito de vidro */
            padding: 40px; 
            border-radius: 30px; 
            box-shadow: 0 30px 60px -12px rgba(88, 47, 14, 0.2);
            margin-bottom: 40px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            border: 2px solid #ffffff;
        }

        input { 
            padding: 16px; 
            border: 2px solid #edede9; 
            border-radius: 15px; 
            flex: 1;
            min-width: 220px;
            font-size: 15px;
            background: #fdfdfb;
            transition: 0.3s;
        }

        input:focus { border-color: #d4a373; outline: none; }

        #saveBtn { 
            padding: 16px 40px; 
            background: #1b4332; 
            color: #fefae0; 
            border: none; 
            border-radius: 15px; 
            cursor: pointer; 
            font-weight: 800;
            transition: 0.4s;
        }

        #saveBtn:hover { transform: translateY(-5px); background: #2d6a4f; }

        /* TABELA */
        .inventory-section {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 30px;
        }

        .inventory-section h2 { margin-bottom: 30px; color: #1b4332; }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 20px; color: #a3a3a3; font-size: 12px; text-transform: uppercase; border-bottom: 2px solid #f8f9fa; }
        td { padding: 22px 20px; border-bottom: 1px solid #f8f9fa; font-size: 16px; color: #333; }

        .category-tag { background: #fefae0; color: #bc6c25; padding: 5px 12px; border-radius: 10px; font-size: 12px; font-weight: 700; }

        .del-btn { background: #f8f9fa; color: #9d0208; border: 1px solid #ffccd5; padding: 10px 18px; border-radius: 12px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="company-branding">
        <div class="logo-icon">🌍</div>
        <h1>Terra Global</h1>
        <div class="company-info">
            <p>AGRICULTURAL COMMODITIES | BRAZILIAN EXPORTS | GLOBAL TRADING</p>
        </div>
    </div>

    <div class="main-container">
        <div id="registration-form">
            <input type="text" id="productName" placeholder="Product (e.g. Coffee, Tobacco)">
            <input type="text" id="origin" placeholder="Origin/Destination">
            <input type="number" id="price" placeholder="Price (USD)">
            <input type="number" id="stock" placeholder="Quantity">
            <button id="saveBtn">REGISTER SHIPMENT</button>
        </div>

        <div class="inventory-section">
            <h2>🚢 Global Shipment Tracking</h2>
            <table>
                <thead>
                    <tr>
                        <th>Commodity</th>
                        <th>Origin/Dest</th>
                        <th>Price/Unit</th>
                        <th>Quantity</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        const saveBtn = document.getElementById('saveBtn');
        const tableBody = document.getElementById('tableBody');

        saveBtn.addEventListener('click', function() {
            const product = document.getElementById('productName').value;
            const origin = document.getElementById('origin').value;
            const price = document.getElementById('price').value;
            const stock = document.getElementById('stock').value;

            if (!product || !price || !stock) {
                alert("Please fill in the details.");
                return;
            }

            const newRow = tableBody.insertRow();
            newRow.innerHTML = `
                <td style="font-weight: 700; color: #1b4332;">${product}</td>
                <td><span class="category-tag">${origin || 'Global'}</span></td>
                <td style="font-weight: 700; color: #bc6c25;">$${parseFloat(price).toFixed(2)}</td>
                <td><strong>${stock}</strong> units</td>
                <td><button class="del-btn" onclick="this.parentElement.parentElement.remove()">CANCEL</button></td>
            `;

            document.querySelectorAll('input').forEach(i => i.value = "");
        });
    </script>
</body>
</html>
