<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plataforma Malta iGaming - MGA Gateway</title>
    <style>
        /* Design escuro neon fixado com alta especificidade */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #0d0d18; color: #e1e1e6; padding: 20px; }
        .container { max-width: 850px; margin: 0 auto; }
        .gaming-nav { background: #161626; padding: 15px; text-align: center; border-radius: 8px; margin-bottom: 25px; border: 1px solid #262642; }
        .gaming-nav a { color: #fff; margin: 0 15px; text-decoration: none; font-weight: bold; cursor: pointer; }
        .gaming-nav a:hover, .gaming-nav a.active { color: #4ecca3; }
        .card { background: #121222; border: 1px solid #262642; padding: 30px; border-radius: 12px; margin-bottom: 25px; }
        h1 { color: #fff; margin-bottom: 15px; border-bottom: 2px solid #4ecca3; padding-bottom: 8px; }
        .form-group { margin-bottom: 20px; }
        input, select { width: 100%; padding: 12px; background: #1a1a30; border: 1px solid #262642; color: #fff; border-radius: 6px; }
        button { width: 100%; padding: 14px; background: #4ecca3; color: #0d0d18; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        button:hover { background: #3db892; }
        .hidden { display: none !important; } /* Correção crítica de exibição */
        .wallet-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 20px; }
        .wallet-stat { background: #161626; padding: 15px; border-radius: 8px; text-align: center; }
        .wallet-stat span { font-weight: bold; color: #fff; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: #161626; }
        th, td { padding: 14px; text-align: left; border-bottom: 1px solid #262642; }
        th { background: #1b1b32; color: #4ecca3; }
        .win { color: #4ecca3; } .loss { color: #ff4a4a; }
    </style>
</head>
<body>
    <div class="container">
        <nav class="gaming-nav">
            <a id="tab-cadastro" onclick="changeSection('sec-cadastro')" class="active">🆔 Registro</a>
            <a id="tab-jogos" onclick="changeSection('sec-jogos')">🎰 Lobby</a>
        </nav>

        <!-- ABA 1: REGISTRO (Corrigida para evitar travamento) -->
        <div id="sec-cadastro" class="card">
            <h1>Registro</h1>
            <div class="form-group"><input type="text" id="p-name" placeholder="Nome Completo"></div>
            <div class="form-group"><input type="text" id="p-doc-num" placeholder="Documento"></div>
            <button onclick="registrarUsuario()">Finalizar e Avançar</button>
        </div>

        <!-- ABA 2: JOGOS (Inicialmente oculta) -->
        <div id="sec-jogos" class="card hidden">
            <h1>Lobby de Jogos</h1>
            <p id="player-status" style="color: #4ecca3;">Status: Aguardando cadastro...</p>
            <button class="btn-bet" onclick="alert('Iniciando...')">Jogar</button>
        </div>
    </div>

    <script>
        // Lógica de navegação nativa e blindada
        function changeSection(sectionId) {
            // Esconde todas
            document.querySelectorAll('.card').forEach(c => c.classList.add('hidden'));
            document.querySelectorAll('.gaming-nav a').forEach(a => a.classList.remove('active'));
            
            // Mostra a selecionada
            document.getElementById(sectionId).classList.remove('hidden');
            
            // Atualiza aba ativa (melhorado para funcionar com id dinâmico)
            const tabId = 'tab-' + sectionId.split('-')[1];
            if(document.getElementById(tabId)) document.getElementById(tabId).classList.add('active');
        }

        // Função de cadastro com redirecionamento forçado
        function registrarUsuario() {
            const nome = document.getElementById('p-name').value;
            const docNum = document.getElementById('p-doc-num').value;

            if(!nome || !docNum) {
                alert("Preencha os campos!");
                return;
            }

            // Atualiza status e muda de seção
            const statusLabel = document.getElementById('player-status');
            statusLabel.innerText = `Status: Verificado (${nome})`;
            
            alert("Cadastro aprovado!");
            changeSection('sec-jogos'); // <--- CORREÇÃO: Força a navegação aqui
        }
    </script>
</body>
</html>
