<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sollene Group | ERP Stock</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial;
}

/* FUNDO CREME PREMIUM */
body {
    background: linear-gradient(135deg, #f7f1e1, #e9dcc2);
}

/* IMAGEM TOPO FULL WIDTH */
.top-banner img {
    width: 100%;
    height: 260px;
    object-fit: cover;
    border-bottom: 5px solid black;
}

/* HEADER EMPRESA */
header {
    text-align: center;
    padding: 15px;
}

header h1 {
    color: #8a6d2f;
    letter-spacing: 2px;
}

header p {
    color: #5c4a24;
    font-size: 12px;
}

/* LAYOUT */
.container {
    display: flex;
    height: 80vh;
}

/* FORMULÁRIO */
.form-box {
    width: 25%;
    background: rgba(255,255,255,0.7);
    padding: 20px;
    border-right: 3px solid black; /* BORDA PRETA ELEGANTE */
}

.form-box h2 {
    color: #8a6d2f;
    margin-bottom: 10px;
}

.form-box input {
    width: 100%;
    padding: 10px;
    margin: 6px 0;
    border: 1px solid black;
    background: white;
}

/* BOTÃO */
.form-box button {
    width: 100%;
    padding: 10px;
    background: black;
    color: white;
    border: none;
    cursor: pointer;
    margin-top: 10px;
}

/* TABELA */
.table-box {
    width: 75%;
    padding: 20px;
    overflow-y: auto;
}

table {
    width: 100%;
    border-collapse: collapse;
    background: white;
    border: 2px solid black;
}

th, td {
    padding: 10px;
    border: 1px solid black;
    text-align: center;
}

th {
    background: black;
    color: white;
}
</style>
</head>

<body>

<!-- IMAGEM TOPO -->
<div class="top-banner">
    <img src="sollene-group.jpg" alt="Sollene Group">
</div>

<header>
    <h1>SOLLENE GROUP</h1>
    <p>Av. Paulista, 1500 - São Paulo, SP - Brazil</p>
</header>

<div class="container">

<!-- FORMULÁRIO -->
<div class="form-box">
    <h2>Register Product</h2>

    <input type="text" id="name" placeholder="Product Name">

    <input type="text" id="rg" placeholder="RG Code">

    <input type="number" id="entry" placeholder="Entry">
    <input type="number" id="exit" placeholder="Exit">

    <input type="number" id="tons" placeholder="Toneladas">
    <input type="number" id="boxes" placeholder="Caixas">
    <input type="number" id="packages" placeholder="Pacotes">

    <input type="number" id="price" placeholder="Price">

    <button onclick="addProduct()">ADD PRODUCT</button>
</div>

<!-- TABELA -->
<div class="table-box">
    <h2>Stock Control</h2>

    <table>
        <thead>
            <tr>
                <th>Product</th>
                <th>RG</th>
                <th>Entry</th>
                <th>Exit</th>
                <th>Tons</th>
                <th>Boxes</th>
                <th>Packages</th>
                <th>Price</th>
                <th>Stock</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

</div>

<script>
function addProduct() {
    let name = document.getElementById("name").value;
    let rg = document.getElementById("rg").value;
    let entry = Number(document.getElementById("entry").value);
    let exit = Number(document.getElementById("exit").value);
    let tons = document.getElementById("tons").value;
    let boxes = document.getElementById("boxes").value;
    let packages = document.getElementById("packages").value;
    let price = Number(document.getElementById("price").value);

    let stock = entry - exit;

    document.getElementById("tableBody").innerHTML += `
        <tr>
            <td>${name}</td>
            <td>${rg}</td>
            <td>${entry}</td>
            <td>${exit}</td>
            <td>${tons}</td>
            <td>${boxes}</td>
            <td>${packages}</td>
            <td>R$ ${price.toFixed(2)}</td>
            <td>${stock}</td>
        </tr>
    `;
}
</script>

</body>
</html>
