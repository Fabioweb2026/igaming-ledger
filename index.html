<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sollene Group | Inventory System</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fdfcf0; color: #1a1a1a; display: flex; flex-direction: column; align-items: center; }
        .banner-header { width: 100%; height: 9.5cm; margin-top: 0.5cm; background-color: #fdfcf0; overflow: hidden; display: flex; justify-content: center; box-shadow: 0 10px 40px rgba(0,0,0,0.05); }
        .banner-header img { width: 100%; height: 100%; object-fit: contain; object-position: center; display: block; }
        .nav-top { width: 100%; max-width: 1400px; padding: 15px 20px; text-align: left; }
        .btn-back { text-decoration: none; color: #b39359; border: 1px solid #b39359; padding: 6px 15px; border-radius: 50px; font-size: 10px; font-weight: 700; text-transform: uppercase; transition: 0.3s; }
        .main-content { display: flex; width: 100%; max-width: 1400px; gap: 20px; padding: 0 20px 40px; flex: 1; }
        .sidebar { width: 320px; background-color: #1a1a1a; color: #b39359; padding: 25px; border-radius: 15px; box-shadow: 0 15px 30px rgba(0,0,0,0.3); height: fit-content; border: 1px solid rgba(179, 147, 89, 0.3); }
        .sidebar h2 { font-family: 'Playfair Display', serif; margin-bottom: 20px; text-align: center; font-size: 1.2rem; }
        label { font-size: 9px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; display: block; color: #888; }
        input, select { width: 100%; padding: 10px; margin-bottom: 12px; border-radius: 8px; border: 1px solid #333; background: #fff; color: #1a1a1a; font-size: 12px; }
        .btn-add { width: 100%; padding: 14px; background-color: #b39359; color: #1a1a1a; border: none; font-weight: 800; border-radius: 8px; cursor: pointer; text-transform: uppercase; font-size: 12px; transition: 0.3s; margin-bottom: 10px; }
        .btn-save-manual { width: 100%; padding: 10px; background-color: #27ae60; color: white; border: none; font-weight: 700; border-radius: 8px; cursor: pointer; text-transform: uppercase; font-size: 10px; transition: 0.3s; margin-bottom: 10px; }
        .btn-clear { width: 100%; padding: 8px; background-color: transparent; color: #e74c3c; border: 1px solid #e74c3c; font-weight: 700; border-radius: 8px; cursor: pointer; text-transform: uppercase; font-size: 9px; transition: 0.3s; }
        
        .table-container { flex: 1; background: white; border-radius: 15px; overflow-x: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid rgba(179, 147, 89, 0.2); }
        table { width: 100%; border-collapse: collapse; min-width: 950px; }
        thead { background-color: #000; color: #b39359; }
        th, td { padding: 12px; text-align: center; font-size: 11px; border-bottom: 1px solid #f2f2f2; }
        
        .revenue-val { color: #27ae60 !important; font-weight: 800; } 
        .profit-plus { color: #2ecc71 !important; font-weight: 800; } 
        .profit-minus { color: #e74c3c !important; font-weight: 800; } 
        .inv-val { color: #8e44ad !important; font-weight: bold; font-size: 11px; } 
        
        .btn-delete { color: #e74c3c; background: none; border: none; cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 10px; }
        .btn-delete:hover { text-decoration: underline; }

        footer { width: 100%; padding: 30px 20px; background-color: #1a1a1a; text-align: center; border-top: 3px solid #b39359; margin-top: auto; }
        .footer-address { color: #b39359; font-size: 10px; text-transform: uppercase; }
        @media (max-width: 1100px) { .main-content { flex-direction: column; } .sidebar { width: 100%; } }
    </style>
</head>
<body onload="loadInventory()">
    <header class="banner-header"><img src="imagem.Sollene Group.png" alt="Sollene Group Logo"></header>
    <nav class="nav-top"><a href="index.html" class="btn-back">← Back</a></nav>
    <main class="main-content">
        <section class="sidebar">
            <h2>Inventory Control</h2>
            <label>Product Name</label>
            <input type="text" id="pName" placeholder="Ex: Coffee">
            <label>Unit</label>
            <select id="pUnit"><option value="Caixas">Caixas</option><option value="Kg">Kg</option><option value="Toneladas">Tons</option></select>
            <label>In / Out</label>
            <div style="display: flex; gap: 8px;"><input type="number" id="pEntry" placeholder="In"><input type="number" id="pExit" placeholder="Out"></div>
            <label>Buy Curr & Cost</label>
            <div style="display: flex; gap: 8px;">
                <select id="pBuyCurr" style="width: 45%;"><option value="BRL">R$</option><option value="USD">$</option><option value="EUR">€</option></select>
                <input type="number" id="pBuyPrice" placeholder="Cost">
            </div>
            <label>Sell Curr & Price</label>
            <div style="display: flex; gap: 8px;">
                <select id="pSellCurr" style="width: 45%;"><option value="EUR">€</option><option value="USD">$</option><option value="BRL">R$</option></select>
                <input type="number" id="pSellPrice" placeholder="Price">
            </div>
            <button class="btn-add" onclick="addProduct()">Process Trade</button>
            <button class="btn-save-manual" onclick="manualSave()">💾 Save Inventory</button>
            <button class="btn-clear" onclick="clearAll()">Reset List</button>
        </section>
        <section class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>PRODUCT</th>
                        <th>UNIT</th>
                        <th>STOCK</th>
                        <th>COST (BUY)</th>
                        <th>SELL PRICE</th>
                        <th>REVENUE</th>
                        <th>PROFIT (SALES)</th>
                        <th>INV. VALUE (SELL CURR)</th>
                        <th>ACTION</th>
                    </tr>
                </thead>
                <tbody id="inventoryBody"></tbody>
            </table>
        </section>
    </main>
    <footer><div class="footer-address"><p>SOLLENE GROUP ENTERPRISE • VALLETTA, MALTA</p></div></footer>

    <script>
        function getSymbol(curr) {
            if(curr === "BRL") return "R$";
            if(curr === "USD") return "$";
            return "€";
        }
        function saveInventory() { const table = document.getElementById('inventoryBody'); localStorage.setItem("solleneInventoryHTML", table.innerHTML); }
        function manualSave() { saveInventory(); alert("Inventory saved successfully!"); }
        function loadInventory() { const savedHTML = localStorage.getItem("solleneInventoryHTML"); if (savedHTML) { document.getElementById('inventoryBody').innerHTML = savedHTML; } }
        
        function addProduct() {
            const name = document.getElementById('pName').value;
            const unit = document.getElementById('pUnit').value;
            const entry = Number(document.getElementById('pEntry').value) || 0;
            const exit = Number(document.getElementById('pExit').value) || 0;
            const buyCurr = document.getElementById('pBuyCurr').value;
            const buyPrice = Number(document.getElementById('pBuyPrice').value) || 0;
            const sellCurr = document.getElementById('pSellCurr').value;
            const sellPrice = Number(document.getElementById('pSellPrice').value) || 0;

            if (!name || buyPrice === 0) { alert("Please fill in the product name and cost."); return; }

            const stock = entry - exit;
            const revenue = exit * sellPrice; 
            const profit = (sellPrice - buyPrice) * exit;
            const inventoryValueInSellCurr = stock * sellPrice;

            const table = document.getElementById('inventoryBody');
            const row = table.insertRow();
            const sBuy = getSymbol(buyCurr);
            const sSell = getSymbol(sellCurr);

            row.innerHTML = `
                <td>${name}</td><td>${unit}</td><td style="font-weight:bold; color:#555;">${stock}</td>
                <td>${sBuy} ${buyPrice.toFixed(2)}</td><td>${sSell} ${sellPrice.toFixed(2)}</td>
                <td class="revenue-val">${sSell} ${revenue.toFixed(2)}</td>
                <td class="${profit >= 0 ? 'profit-plus' : 'profit-minus'}">${sSell} ${profit.toFixed(2)}</td>
                <td class="inv-val">${sSell} ${inventoryValueInSellCurr.toFixed(2)}</td>
                <td><button class="btn-delete" onclick="deleteRow(this)">Delete</button></td>
            `;
            saveInventory();
            document.getElementById('pName').value = ""; document.getElementById('pEntry').value = ""; document.getElementById('pExit').value = ""; document.getElementById('pBuyPrice').value = ""; document.getElementById('pSellPrice').value = "";
        }
        function deleteRow(btn) { btn.closest('tr').remove(); saveInventory(); }
       function clearAll() { if (confirm("Reset the entire list?")) { document.getElementById('inventoryBody').innerHTML = ""; localStorage.removeItem("solleneInventoryHTML"); } }
    <!-- INÍCIO DO RODAPÉ GLOBAL -->
<style>
    .footer-premium {
        background: #1f2937; /* Grafite para combinar com o cabeçalho do estoque */
        color: #ffffff;
        padding: 60px 20px;
        text-align: center;
        margin-top: 80px;
        border-top: 3px solid #b39359;
        width: 100%;
    }
    .footer-container { max-width: 800px; margin: 0 auto; }
    .footer-premium h2 { font-size: 20px; font-weight: 800; margin-bottom: 20px; letter-spacing: 2px; color: #b39359; text-transform: uppercase; }
    .social-links { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; margin-bottom: 30px; }
    .social-btn { 
        text-decoration: none; color: #ffffff; font-size: 11px; font-weight: 600; text-transform: uppercase; 
        letter-spacing: 2px; padding: 10px 25px; border: 1px solid rgba(179, 147, 89, 0.4); border-radius: 50px; transition: 0.4s; 
    }
    .social-btn:hover { background: #b39359; color: #1f2937; border-color: #b39359; transform: translateY(-5px); }
    .footer-tag { font-size: 10px; color: #94a3b8; letter-spacing: 4px; text-transform: uppercase; margin-top: 20px; }
</style>

<footer class="footer-premium">
    <div class="footer-container">
        <h2>Global Connection</h2>
        <div class="social-links">
            <a href="https://linkedin.com" target="_blank" class="social-btn">LinkedIn</a>
            <a href="https://github.com" target="_blank" class="social-btn">GitHub</a>
            <a href="https://wa.me" target="_blank" class="social-btn">WhatsApp</a>
        </div>
        <p class="footer-tag">© 2026 FÁBIO — PRESTIGE IN TECHNOLOGY</p>
    </div>
</footer>
<!-- FIM DO RODAPÉ GLOBAL -->
    </script>
    
</body>
</html>
