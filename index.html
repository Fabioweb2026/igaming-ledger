<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sollene Group | Inventory System</title>
    <link href="https://googleapis.com" rel="stylesheet">
    
    <style>
        /* RESET E ESTILO BASE */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #fdfcf0; /* Cor creme para harmonizar */
            color: #1a1a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 1. BANNER REDUZIDO E CENTRALIZADO */
        .banner-header {
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 30px 20px;
            background-color: #fdfcf0;
        }

        .banner-header img {
            width: 55%; /* Tamanho reduzido para não ocupar tudo */
            max-width: 750px;
            height: auto;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(179, 147, 89, 0.2);
            border: 4px solid white;
        }

        /* 2. BOTÃO VOLTAR */
        .nav-top {
            width: 100%;
            max-width: 1200px;
            padding: 0 20px;
            text-align: left;
        }

        .btn-back {
            text-decoration: none;
            color: #b39359;
            border: 1px solid #b39359;
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn-back:hover { background: #b39359; color: white; }

        /* 3. SISTEMA DE ESTOQUE (LAYOUT ORIGINAL) */
        .main-content {
            display: flex;
            width: 100%;
            max-width: 1200px;
            gap: 25px;
            padding: 20px 20px 60px;
        }

        /* Lado esquerdo: Registro */
        .sidebar {
            width: 320px;
            background-color: #1a1a1a;
            color: #b39359;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            height: fit-content;
        }

        .sidebar h2 { 
            font-family: 'Playfair Display', serif;
            font-size: 18px; 
            margin-bottom: 20px; 
            text-align: center;
            letter-spacing: 1px;
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid #333;
            font-size: 14px;
        }

        .btn-add {
            width: 100%;
            padding: 14px;
            background-color: #b39359;
            color: #000;
            border: none;
            font-weight: 800;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn-add:hover { background: #d4af37; transform: translateY(-2px); }

        .btn-save {
            width: 100%;
            margin-top: 15px;
            padding: 12px;
            background-color: #27ae60;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
        }

        /* Lado direito: Tabela */
        .table-container {
            flex: 1;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 1px solid rgba(179, 147, 89, 0.2);
        }

        table { width: 100%; border-collapse: collapse; }
        thead { background-color: #000; color: #b39359; }
        th { padding: 18px; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; }
        td { padding: 18px; text-align: center; font-size: 14px; border-bottom: 1px solid #f2f2f2; }
        
        .entry { color: #27ae60; font-weight: bold; }
        .exit { color: #e74c3c; font-weight: bold; }
        .total-val { color: #b39359; font-weight: bold; }

        /* Responsividade */
        @media (max-width: 900px) {
            .main-content { flex-direction: column; }
            .sidebar { width: 100%; }
            .banner-header img { width: 90%; }
        }
    </style>
</head>
<body>

    <!-- 1. BANNER CENTRALIZADO E REDUZIDO -->
    <header class="banner-header">
        <img src="sollene-group.jpg" alt="Sollene Group Premium">
    </header>

    <!-- 2. NAVEGAÇÃO -->
    <nav class="nav-top">
        <a href="index.html" class="btn-back">← Back to Portfolio</a>
    </nav>

    <!-- 3. SISTEMA DE ESTOQUE -->
    <main class="main-content">
        <!-- LADO ESQUERDO: REGISTRO -->
        <section class="sidebar">
            <h2>Register Product</h2>
            <input type="text" placeholder="Product Name">
            <select>
                <option>Caixa (Case)</option>
                <option>Unidade (Unit)</option>
            </select>
            <input type="number" placeholder="Entry (Entrada)">
            <input type="number" placeholder="Exit (Saída)">
            <select>
                <option>USD ($)</option>
                <option>EUR (€)</option>
            </select>
            <input type="number" placeholder="Unit Price">
            <button class="btn-add">Add Product</button>
            <button class="btn-save">💾 Save Inventory</button>
        </section>

        <!-- LADO DIREITO: TABELA -->
        <section class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>PRODUCT</th>
                        <th>UNIT</th>
                        <th>ENTRY</th>
                        <th>EXIT</th>
                        <th>STOCK</th>
                        <th>CURRENCY</th>
                        <th>PRICE</th>
                        <th>TOTAL VALUE</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Premium Coffee</td>
                        <td>Caixa</td>
                        <td class="entry">+ 100</td>
                        <td class="exit">- 23</td>
                        <td>77</td>
                        <td>USD</td>
                        <td>$ 6.67</td>
                        <td class="total-val">$ 513.59</td>
                    </tr>
                    <tr>
                        <td>Sollene Wine</td>
                        <td>Caixa</td>
                        <td class="entry">+ 300</td>
                        <td class="exit">- 123</td>
                        <td>177</td>
                        <td>EUR</td>
                        <td>€ 4.58</td>
                        <td class="total-val">€ 810.66</td>
                    </tr>
                </tbody>
            </table>
        </section>
    </main>

    <footer style="padding-bottom: 40px; color: #b39359; font-size: 10px; letter-spacing: 2px;">
        © 2026 SOLLENE GROUP ENTERPRISE
    </footer>

</body>
</html>
