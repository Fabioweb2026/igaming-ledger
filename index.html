<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sollene Group | Logistics Management</title>
    <style>
        @import url('https://googleapis.com');
        
        *{ margin:0; padding:0; box-sizing:border-box; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #fdfaf6; 
            color: #1a1a1a; 
            padding: 40px 20px;
        }

        /* HEADER COM LOGO AO LADO DO NOME */
        .header-brand {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px; /* Espaço entre a imagem e o nome */
            margin-bottom: 60px;
            max-width: 1100px;
            margin-left: auto;
            margin-right: auto;
        }

        .logo-box {
            width: 200px; /* Tamanho médio e nítido */
            height: 130px;
            background: url('image.png') no-repeat center center;
            background-size: cover;
            border-radius: 12px;
            border: 2px solid #d4a373; /* Moldura dourada */
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            flex-shrink: 0;
        }

        .brand-text { text-align: left; }
        .brand-text h1 { 
            font-size: 54px; 
            font-weight: 800; 
            color: #0f172a; 
            letter-spacing: -2px;
            line-height: 1;
        }
        .brand-text p { 
            color: #b39359; 
            font-size: 13px; 
            text-transform: uppercase; 
            letter-spacing: 3px; 
            font-weight: 800;
            margin-top: 5px;
        }

        /* LAYOUT PRINCIPAL */
        .container { 
            display: flex; 
            gap: 40px; 
            max-width: 1300px; 
            margin: 0 auto; 
            align-items: flex-start; 
        }

        .sidebar { width: 350px; flex-shrink: 0; }

        .form-card { 
            background: #ffffff; 
            padding: 35px; 
            border-radius: 24px; 
            border: 1px solid #e2e8f0;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05);
        }

        .form-card h3 { color: #0f172a; font-size: 11px; text-transform: uppercase; margin-bottom: 25px; letter-spacing: 1px; }

        .field { margin-bottom: 20px; }
        label { display: block; font-size: 10px; color: #94a3b8; margin-bottom: 8px; text-transform: uppercase; font-weight: 800; }

        input, select { 
            width: 100%; padding: 14px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; color: #1e293b; font-size: 15px; 
        }

        #regBtn { 
            width: 100%; padding: 18px; background: #0f172a; color: #fff; border: none; border-radius: 14px; font-weight: 800; cursor: pointer; transition: 0.3s; text-transform: uppercase; font-size: 12px;
        }

        #regBtn:hover { background: #b39359; transform: translateY(-3px); }

        /* TABELA */
        .table-area { flex: 1; min-width: 0; }
        .table-area h2 { font-size: 24px; margin-bottom: 25px; color: #0f172a; font-weight: 800; }

        .data-container { 
            background: #ffffff; border-radius: 24px; border: 1px solid #e2e8f0; overflow: hidden; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.04);
        }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 20px; color: #94a3b8; font-size: 10px; text-transform: uppercase; border-bottom: 2px solid #f1f5f9; font-weight: 800; }
        td { padding: 22px 20px; border-bottom: 1px solid #f8fafc; font-size: 15px; }

        @media(max-width: 900px) {
            .header-brand { flex-direction: column; text-align: center; }
            .brand-text { text-align: center; }
            .container { flex-direction: column; }
            .sidebar { width: 100%; }
        }
    </style>
</head>
<body>

    <!-- HEADER COM IMAGEM AO LADO DO NOME -->
    <header class="header-brand">
        <div class="logo-box"></div>
        <div class="brand-text">
            <h1>Sollene Group</h1>
            <p>Supply Chain & Logistics Division</p>
        </div>
    </header>

    <div class="container">
        <aside class="sidebar">
            <div class="form-card">
                <h3>Shipment Registration</h3>
                <div class="field">
                    <label>Commodity Name</label>
                    <input type="text" id="pName" placeholder="e.g. Premium Coffee">
                </div>
                <div class="field">
                    <label>Destination Port</label>
                    <input type="text" id="pDest" placeholder="e.g. Rotterdam">
                </div>
                <div class="field">
                    <label>Currency</label>
                    <select id="pCurr">
                        <option value="USD">USD ($)</option>
                        <option value="EUR">EUR (€)</option>
                        <option value="BRL">BRL (R$)</option>
                    </select>
                </div>
                <div class="field">
                    <label>Unit Price</label>
                    <input type="number" id="pPrice" placeholder="0.00">
                </div>
                <div class="field">
                    <label>Quantity</label>
                    <input type="number" id="pQty" placeholder="Value">
                </div>
                <button id="regBtn">Register Cargo</button>
            </div>
        </aside>

        <main class="table-area">
            <h2>Active Cargo Inventory</h2>
            <div class="data-container">
                <table>
                    <thead>
                        <tr>
                            <th>Product</th>
                            <th>Destination</th>
                            <th>Value</th>
                            <th>Quantity</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="inventoryList"></tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        const regBtn = document.getElementById('regBtn');
        const inventoryList = document.getElementById('inventoryList');

        regBtn.addEventListener('click', function() {
            const name = document.getElementById('pName').value;
            const dest = document.getElementById('pDest').value;
            const curr = document.getElementById('pCurr').value;
            const price = document.getElementById('pPrice').value;
            const qty = document.getElementById('pQty').value;

            if (!name || !price || !qty) {
                alert("Please fill all fields.");
                return;
            }

            let symbol = curr === "USD" ? "$" : (curr === "EUR" ? "€" : "R$");

            const row = inventoryList.insertRow();
            row.innerHTML = `
                <td style="font-weight: 700;">${name}</td>
                <td style="color: #64748b;">${dest}</td>
                <td style="color: #b39359; font-weight: 800;">${symbol} ${parseFloat(price).toFixed(2)}</td>
                <td><strong>${qty}</strong> units</td>
                <td><button onclick="this.parentElement.parentElement.remove()" style="color:red; border:none; background:none; cursor:pointer; font-weight:bold;">DEL</button></td>
            `;

            document.getElementById('pName').value = "";
            document.getElementById('pDest').value = "";
            document.getElementById('pPrice').value = "";
            document.getElementById('pQty').value = "";
        });
    </script>
</body>
</html>
