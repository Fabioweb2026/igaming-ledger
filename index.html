<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sollene Group | Premium Logistics</title>
    <style>
        @import url('https://googleapis.com');
        
        *{ margin:0; padding:0; box-sizing:border-box; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #fdfaf6; 
            color: #1a1a1a; 
            padding-bottom: 60px;
        }

        /* BANNER COM CONTRASTE MELHORADO */
        .top-banner {
            width: 100%;
            height: 320px; /* Aumentei a altura */
            /* A mágica acontece aqui: uma película escura (0.3) sobre a foto */
            background: linear-gradient(rgba(0, 0, 0, 0.3), rgba(253, 250, 246, 1)), 
                        url('image.png') no-repeat center center;
            background-size: cover;
            margin-bottom: 20px;
            border-bottom: 2px solid #e5e7eb;
        }

        .hero { text-align: center; margin-bottom: 40px; padding: 0 20px; }
        
        .hero h1 { 
            font-size: 60px; 
            font-weight: 800; 
            color: #0f172a; 
            letter-spacing: -2px;
            /* Sombra suave para o título não sumir */
            text-shadow: 0 4px 10px rgba(0,0,0,0.1); 
        }

        .hero p { 
            color: #b39359; /* Dourado para destacar a divisão */
            font-size: 12px; 
            text-transform: uppercase; 
            letter-spacing: 3px; 
            font-weight: 800; 
            margin-top: 10px; 
        }

        .container { 
            display: flex; 
            gap: 40px; 
            max-width: 1300px; 
            margin: 0 auto; 
            padding: 0 20px;
            align-items: flex-start; 
        }

        /* CARD DE REGISTRO */
        .sidebar { width: 350px; flex-shrink: 0; }

        .form-card { 
            background: #ffffff; 
            padding: 35px; 
            border-radius: 24px; 
            border: 1px solid #e2e8f0;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05);
        }

        .form-card h3 { 
            color: #0f172a; 
            font-size: 11px; 
            text-transform: uppercase; 
            margin-bottom: 25px; 
            letter-spacing: 1.5px; 
            border-left: 4px solid #b39359; 
            padding-left: 10px;
        }

        .field { margin-bottom: 20px; }
        label { display: block; font-size: 10px; color: #94a3b8; margin-bottom: 8px; text-transform: uppercase; font-weight: 800; }

        input, select { 
            width: 100%; padding: 14px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; color: #1e293b; font-size: 15px; transition: 0.3s;
        }

        input:focus { border-color: #b39359; outline: none; background: #fff; box-shadow: 0 0 0 4px rgba(179, 147, 89, 0.1); }

        .qty-row { display: flex; gap: 10px; }
        .qty-row input { flex: 2; }
        .qty-row select { flex: 1.5; }

        #regBtn { 
            width: 100%; padding: 18px; background: #0f172a; color: #fff; border: none; border-radius: 14px; font-weight: 800; cursor: pointer; margin-top: 10px; transition: 0.3s; text-transform: uppercase; font-size: 12px; letter-spacing: 1px;
        }

        #regBtn:hover { background: #b39359; transform: translateY(-3px); box-shadow: 0 10px 20px rgba(179, 147, 89, 0.3); }

        /* TABELA */
        .table-area { flex: 1; min-width: 0; }
        .table-area h2 { font-size: 24px; margin-bottom: 25px; color: #0f172a; font-weight: 800; letter-spacing: -0.5px; }

        .data-container { 
            background: #ffffff; border-radius: 24px; border: 1px solid #e2e8f0; overflow: hidden; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.04);
        }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 20px; color: #94a3b8; font-size: 10px; text-transform: uppercase; border-bottom: 2px solid #f1f5f9; letter-spacing: 1px; font-weight: 800; }
        td { padding: 22px 20px; border-bottom: 1px solid #f8fafc; font-size: 15px; color: #334155; }

        .price-text { color: #b39359; font-weight: 800; }
        .del-btn { color: #ef4444; cursor: pointer; font-weight: 800; border: none; background: none; font-size: 11px; text-transform: uppercase; }

        @media(max-width: 1000px) { .container { flex-direction: column; } .sidebar { width: 100%; } .top-banner { height: 200px; } }
    </style>
</head>
<body>

    <div class="top-banner"></div>

    <header class="hero">
        <h1>Sollene Group</h1>
        <p>Supply Chain & Logistics Division</p>
    </header>

    <div class="container">
        <aside class="sidebar">
            <div class="form-card">
                <h3>Shipment Registration</h3>
                
                <div class="field">
                    <label>Commodity Name</label>
                    <input type="text" id="pName" placeholder="e.g. Premium Rum">
                </div>

                <div class="field">
                    <label>Destination Port</label>
                    <input type="text" id="pDest" placeholder="e.g. Hamburg">
                </div>

                <div class="field">
                    <label>Currency</label>
                    <select id="pCurr">
                        <option value="USD">USD ($)</option>
                        <option value="EUR">EUR (€)</option>
                        <option value="BRL">BRL (R$)</option>
                    </select>
                </div>

                <div class="field">
                    <label>Unit Price</label>
                    <input type="number" id="pPrice" placeholder="0.00">
                </div>

                <div class="field">
                    <label>Volume & Unit</label>
                    <div class="qty-row">
                        <input type="number" id="pQty" placeholder="Val">
                        <select id="pUnit">
                            <option value="Units">Units</option>
                            <option value="KG">KG</option>
                            <option value="Tons">Tons</option>
                        </select>
                    </div>
                </div>

                <button id="regBtn">Register Cargo</button>
            </div>
        </aside>

        <main class="table-area">
            <h2>Active Cargo Inventory</h2>
            <div class="data-container">
                <table>
                    <thead>
                        <tr>
                            <th>Product</th>
                            <th>Destination</th>
                            <th>Value</th>
                            <th>Quantity</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="inventoryList"></tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        const regBtn = document.getElementById('regBtn');
        const inventoryList = document.getElementById('inventoryList');

        regBtn.addEventListener('click', function() {
            const name = document.getElementById('pName').value;
            const dest = document.getElementById('pDest').value;
            const curr = document.getElementById('pCurr').value;
            const price = document.getElementById('pPrice').value;
            const qty = document.getElementById('pQty').value;
            const unit = document.getElementById('pUnit').value;

            if (!name || !price || !qty) {
                alert("Please fill all required fields.");
                return;
            }

            let symbol = curr === "USD" ? "$" : (curr === "EUR" ? "€" : "R$");

            const row = inventoryList.insertRow();
            row.innerHTML = `
                <td style="font-weight: 700; color: #0f172a;">${name}</td>
                <td style="color: #64748b;">${dest || 'Global'}</td>
                <td class="price-text">${symbol} ${parseFloat(price).toFixed(2)}</td>
                <td><strong>${qty} ${unit}</strong></td>
                <td><button class="del-btn" onclick="this.parentElement.parentElement.remove()">DELETE</button></td>
            `;

            document.getElementById('pName').value = "";
            document.getElementById('pDest').value = "";
            document.getElementById('pPrice').value = "";
            document.getElementById('pQty').value = "";
        });
    </script>
</body>
</html>
