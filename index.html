<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iGaming Ledger Portal</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Estilos de alta conversão inspirados no mercado de Malta */
        body {
            background: linear-gradient(135deg, #090d16 0%, #111827 100%);
            color: #f8fafc;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Banner Dinâmico Superior */
        .hero-container {
            text-align: center;
            width: 100%;
            max-width: 800px;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Imagem Ampliada com Efeito Sutil de Brilho */
        .logo-img {
            width: 100%;
            max-width: 480px; /* Imagem ampliada e imersiva */
            height: auto;
            margin-bottom: 10px;
            filter: drop-shadow(0 0 20px rgba(56, 189, 248, 0.2));
            transition: transform 0.3s ease;
        }
        .logo-img:hover {
            transform: scale(1.02);
        }

        h1 {
            font-size: 28px;
            font-weight: 800;
            color: #ffffff;
            margin: 10px 0;
            letter-spacing: 2px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .subtitle {
            color: #38bdf8;
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 35px;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        /* Grid de Painéis Operacionais (Disposição Lado a Lado no Desktop) */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 750px;
            padding: 0 20px;
            box-sizing: border-box;
        }

        /* Cartões de Ação Estilo Glassmorphism */
        .panel-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 25px 20px;
            text-align: center;
            text-decoration: none;
            color: white;
            transition: all 0.25s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .panel-card:hover {
            transform: translateY(-5px);
            border-color: rgba(56, 189, 248, 0.4);
            box-shadow: 0 15px 35px rgba(56, 189, 248, 0.15);
        }

        .panel-icon {
            font-size: 32px;
            margin-bottom: 15px;
            display: block;
        }

        .panel-title {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .panel-desc {
            color: #94a3b8;
            font-size: 12px;
            line-height: 1.4;
        }

        /* Cores Temáticas Neon nos Ícones */
        .card-lobby .panel-icon { color: #3b82f6; text-shadow: 0 0 15px rgba(59,130,246,0.4); }
        .card-plataforma .panel-icon { color: #10b981; text-shadow: 0 0 15px rgba(16,185,129,0.4); }
        .card-wallet .panel-icon { color: #f97316; text-shadow: 0 0 15px rgba(249,115,22,0.4); }

        /* Barra Inferior Discreta de Governança / Tech Zone */
        .compliance-bar {
            margin-top: 50px;
            background: rgba(15, 23, 42, 0.8);
            border-top: 1px solid #1e293b;
            width: 100%;
            padding: 20px 0;
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        .comp-link {
            color: #64748b;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            transition: color 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .comp-link:hover {
            color: #94a3b8;
        }
    </style>
</head>
<body>

    <div class="hero-container">
        <!-- Imagem centralizada e significativamente ampliada -->
        <img src="mediterranea.png.png" alt="iGaming Logo" class="logo-img" onerror="this.style.display='none';">
        <h1>IGAMING LEDGER</h1>
        <div class="subtitle">Malta Gaming Authority Compliant</div>
    </div>

    <!-- Interface em Blocos: Atrativo de Verdade para o Usuário/Jogador -->
    <div class="grid-container">
        <a href="lobby.html" class="panel-card card-lobby">
            <span class="panel-icon">🕹️</span>
            <div class="panel-title">Game Lobby</div>
            <div class="panel-desc">Explore as salas e lobbies disponíveis.</div>
        </a>

        <a href="plataforma.html" class="panel-card card-plataforma">
            <span class="panel-icon">🖥️</span>
            <div class="panel-title">Plataforma</div>
            <div class="panel-desc">Acesse os jogos e módulos ativos.</div>
        </a>

        <a href="wallet.html" class="panel-card card-wallet">
            <span class="panel-icon">💳</span>
            <div class="panel-title">Minha Carteira</div>
            <div class="panel-desc">Gerencie depósitos e saldos de jogos.</div>
        </a>
    </div>

    <!-- Links de Governança realocados para o rodapé técnico institucional -->
    <footer class="compliance-bar">
        <a href="admin.html" class="comp-link">🛡️ Admin System</a>
        <a href="igaming-ledger.html" class="comp-link">📊 System Audit Trail (MGA)</a>
    </footer>

    <script src="script.js"></script>
</body>
</html>
