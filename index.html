<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sollene Group | Logistics Terminal</title>
    <style>
        @import url('https://googleapis.com');
        
        *{ margin:0; padding:0; box-sizing:border-box; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #fdfaf6; 
            color: #1a1a1a; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 1. BANNER SUPERIOR (Conforme sua imagem 1) */
        .hero-banner {
            width: 95%;
            max-width: 1200px;
            height: 320px;
            background: #f4f1ea url('https://githubusercontent.com') no-repeat center center;
            background-size: contain;
            border-radius: 24px;
            margin-top: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .company-header { text-align: center; margin: 40px 0; }
        .company-header h1 { font-size: 56px; font-weight: 800; color: #1f2937; text-transform: uppercase; letter-spacing: -2px; }
        .company-header p { color: #b39359; font-size: 13px; text-transform: uppercase; letter-spacing: 4px; font-weight: 800; }

        /* 2. SISTEMA DE GESTÃO (Conforme sua imagem 3) */
        .main-grid {
            display: grid;
            grid-template-columns: 360px 1fr;
            gap: 20px;
            width: 95%;
            max-width: 1200px;
            margin-bottom: 60px;
        }

        .sidebar-card {
            background: #1f2937;
            padding: 35px;
            border-radius: 24px;
            color: #ffffff;
            border-top: 4px solid #b39359;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        .sidebar-card h3 { font-size: 22px; margin-bottom: 25px; font-weight: 800; }

        input, select {
            width: 100%; padding: 16px; margin-bottom: 15px; border: 1px solid #374151; border-radius: 12px; background: #111827; color: #ffffff; outline: none;
        }

        #regBtn {
            width: 100%; padding: 18px; background: #b39359; color: #111827; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; text-transform: uppercase; transition: 0.3s;
        }
        #regBtn:hover { background: #ffffff; transform: translateY(-2px); }

        .inventory-area {
            background: #f2ede4 url('https://transparenttextures.com');
            border-radius: 24px;
            border: 1px solid #e5e1da;
            overflow: hidden;
        }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 20px; background: #1f2937; color: #b39359; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
        td { padding: 20px; border-bottom: 1px solid rgba(212, 163, 115, 0.2); font-size: 15px; background: rgba(255,255,255,0.3); }

        /* 3. RODAPÉ GLOBAL (Conforme sua imagem 2) */
        .footer-premium {
            background: #000000;
            color: #ffffff;
            padding: 80px 20px;
            text-align: center;
            border-top: 3px solid #b39359;
            width: 100%;
        }

        .footer-premium h2 { font-size: 24px; color: #b39359; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 30px; }
        
        .social-links { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; margin-bottom: 30px; }
        
        .social-btn { 
            text-decoration: none; color: #ffffff; font-size: 12px; font-weight: 700; text-transform: uppercase; 
            letter-spacing: 2px; padding: 12px 30px; border: 2px solid #b39359; border-radius: 50px; transition: 0.4s; 
        }
        .social-btn:hover { background: #b39359; color: #000000; }

        .footer-tag { font-size: 10px; color: #b39359; letter-spacing: 2px; opacity: 0.7; }

        @media(max-width: 900px) { .main-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="hero-banner"></div>

    <header class="company-header">
        <h1>Sollene Group</h1>
        <p>PREMIUM LOGISTICS & GLOBAL TRADE</p>
    </header>

    <div class="main-grid">
        <aside class="sidebar-card">
            <h3>Shipment Entry</h3>
            <input type="text" id="pName" placeholder="Product Name">
            <input type="text" id="pDest" placeholder="Destination Port">
            <select id="pCurr"><option value="USD">USD ($)</option></select>
            <input type="number" id="pPrice" placeholder="Unit Price">
            <input type="number" id="pQty" placeholder="Quantity">
            <button id="regBtn">Register Cargo</button>
        </aside>

        <main class="inventory-area">
            <table>
                <thead>
                    <tr><th>Product</th><th>Destination</th><th>Value</th><th>Volume</th></tr>
                </thead>
                <tbody id="list"></tbody>
            </table>
        </main>
    </div>

    <footer class="footer-premium">
        <h2>Global Connection</h2>
        <div class="social-links">
            <a href="https://linkedin.com" target="_blank" class="social-btn">LinkedIn</a>
            <a href="https://github.com" target="_blank" class="social-btn">GitHub</a>
            <a href="https://wa.me" target="_blank" class="social-btn">WhatsApp</a>
        </div>
        <p class="footer-tag">SOLLENE GROUP ENTERPRISE • VALLETTA, MALTA</p>
    </footer>

    <script>
        const inventoryList = document.getElementById('list');
        function saveData() {
            const rows = [];
            document.querySelectorAll('#list tr').forEach(row => { rows.push(row.innerHTML); });
            localStorage.setItem('solleneData', JSON.stringify(rows));
        }
        function loadData() {
            const saved = localStorage.getItem('solleneData');
            if (saved) { JSON.parse(saved).forEach(rowData => { const row = inventoryList.insertRow(); row.innerHTML = rowData; }); }
        }
        window.onload = loadData;

        document.getElementById('regBtn').addEventListener('click', function() {
            const n = document.getElementById('pName').value;
            const p = document.getElementById('pPrice').value;
            const q = document.getElementById('pQty').value;
            if(!n || !p || !q) return alert("Fill all fields.");
            const row = inventoryList.insertRow();
            row.innerHTML = `<td>${n}</td><td>${document.getElementById('pDest').value}</td><td style="color:#b39359; font-weight:800">$ ${parseFloat(p).toFixed(2)}</td><td>${q} units</td>`;
            saveData();
            document.querySelectorAll('input').forEach(i => i.value = "");
        });
    </script>
</body>
</html>
