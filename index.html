<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sollene Group | Inventory USD System</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

html, body {
    margin: 0;
    padding: 0;
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: #f6f4ea;
}

/* BANNER */
.banner-header {
    width: 100%;
    height: 140px;
    margin-top: 20px;
    overflow: hidden;
    border-bottom: 3px solid #b39359;
}

.banner-header img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* LAYOUT */
.main-content {
    max-width: 1200px;
    margin: auto;
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: 25px;
    padding: 25px;
}

/* SIDEBAR */
.sidebar {
    background: #1a1a1a;
    color: #b39359;
    padding: 25px;
    border-radius: 18px;
}

.sidebar h2 {
    margin-bottom: 20px;
}

/* CAMPOS */
input {
    width: 100%;
    height: 45px;
    margin-bottom: 12px;
    border-radius: 10px;
    border: none;
    padding: 0 10px;
    box-sizing: border-box;
}

/* BOTÃO */
button {
    width: 100%;
    height: 45px;
    border-radius: 10px;
    border: none;
    background: #b39359;
    font-weight: bold;
    cursor: pointer;
}

/* TABLE */
.table-container {
    background: white;
    border-radius: 18px;
    overflow: hidden;
}

table {
    width: 100%;
    border-collapse: collapse;
}

thead {
    background: #1a1a1a;
    color: #b39359;
}

th, td {
    padding: 15px;
    text-align: center;
    border-bottom: 1px solid #eee;
}

.cash {
    color: #27ae60;
    font-weight: bold;
}

</style>
</head>

<body>

<header class="banner-header">
    <img src="sollene-group.jpg">
</header>

<div class="main-content">

<div class="sidebar">
    <h2>Register Product</h2>

    <input id="name" placeholder="Product Name">
    <input id="cost" type="number" placeholder="Cost (USD)">
    <input id="sell" type="number" placeholder="Sell Price (USD)">
    <input id="qty" type="number" placeholder="Quantity">

    <button onclick="add()">Add Product</button>
</div>

<div class="table-container">
<table>

<thead>
<tr>
<th>Product</th>
<th>Cost</th>
<th>Sell</th>
<th>Qty</th>
<th>Cost Total</th>
<th>Revenue</th>
<th>Cash</th>
</tr>
</thead>

<tbody id="table"></tbody>

</table>
</div>

</div>

<script>

let inventory = [];

function add(){

let name = document.getElementById('name').value;
let cost = +document.getElementById('cost').value;
let sell = +document.getElementById('sell').value;
let qty = +document.getElementById('qty').value;

/* cálculos simples */
let costTotal = cost * qty;
let revenue = sell * qty;
let cash = revenue - costTotal;

inventory.push({
name,
cost,
sell,
qty,
costTotal,
revenue,
cash
});

render();

}

function render(){

let table=document.getElementById('table');
table.innerHTML="";

inventory.forEach(i=>{
table.innerHTML+=`
<tr>
<td>${i.name}</td>
<td>${i.cost}</td>
<td>${i.sell}</td>
<td>${i.qty}</td>
<td>${i.costTotal.toFixed(2)}</td>
<td>${i.revenue.toFixed(2)}</td>
<td class="cash">${i.cash.toFixed(2)}</td>
</tr>`;
});

}

</script>

</body>
</html>
