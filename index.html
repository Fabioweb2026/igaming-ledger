<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fábio | Tech Portfolio & Systems</title>
    <style>
        @import url('https://googleapis.com');
        
        *{ margin:0; padding:0; box-sizing:border-box; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #f4f1ea; 
            color: #1a1a1a; 
        }

        /* HEADER COM FOTO ESFUMAÇADA */
        .hero {
            width: 100%;
            height: 80vh;
            background: linear-gradient(to bottom, rgba(244, 241, 234, 0) 50%, #f4f1ea 100%), 
                        url('foto.fabio1.jpg') no-repeat center 20%;
            background-size: cover;
            display: flex; flex-direction: column; align-items: center; justify-content: flex-end; text-align: center; padding-bottom: 40px;
        }
        .hero h1 { font-size: 80px; font-weight: 800; letter-spacing: -4px; line-height: 0.8; }
        .hero p { font-size: 13px; text-transform: uppercase; letter-spacing: 5px; color: #b39359; font-weight: 800; margin-top: 20px; }

        /* CONTAINER DO PORTAL (IFRAME) */
        .portal-section {
            max-width: 1200px;
            margin: 60px auto;
            padding: 0 20px;
        }

        .portal-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .portal-header h2 { font-size: 28px; font-weight: 800; text-transform: uppercase; letter-spacing: 3px; }
        
        /* A JANELA DO SISTEMA */
        .system-frame {
            width: 100%;
            height: 900px; /* Altura para o estoque aparecer inteiro */
            border: 2px solid #b39359;
            border-radius: 30px;
            box-shadow: 0 40px 80px rgba(0,0,0,0.15);
            background: #ffffff;
            overflow: hidden;
        }

        .footer-global {
            background: #000000;
            color: #ffffff;
            padding: 60px 20px;
            text-align: center;
            margin-top: 100px;
            border-top: 4px solid #b39359;
        }
    </style>
</head>
<body>

    <header class="hero">
        <h1>Fábio</h1>
        <p>EXPERT SOLUTIONS & GLOBAL SYSTEMS</p>
    </header>

    <section class="portal-section">
        <div class="portal-header">
            <h2>Live System Demo</h2>
            <p style="color: #b39359; font-weight: 700; font-size: 11px; letter-spacing: 2px; margin-top: 10px;">
                TESTE O TERMINAL SOLLENE GROUP ABAIXO
            </p>
        </div>

        <!-- AQUI ABRE O ESTOQUE DENTRO DO PORTFÓLIO -->
        <iframe src="estoque.html" class="system-frame" frameborder="0"></iframe>
    </section>

    <footer class="footer-global">
        <p style="color: #b39359; font-weight: 800; letter-spacing: 3px;">GLOBAL CONNECTION</p>
        <p style="font-size: 10px; margin-top: 20px; opacity: 0.6;">© 2026 FÁBIO — ENGINEERED FOR EXCELLENCE</p>
    </footer>

</body>
</html>
