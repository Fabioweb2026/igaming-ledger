<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sollene Group | Inventory Terminal</title>
    <style>
        @import url('https://googleapis.com');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #fdfaf6; 
            color: #1a1a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 50px;
        }

        /* AJUSTE DA IMAGEM LOGO (Para não comer palavras) */
        .hero-banner { 
            width: 100%; 
            height: 450px; 
            background: #000 url('sollene-group.jpg') no-repeat center center; 
            background-size: contain; /* Ajusta a imagem para caber inteira sem cortar */
            border-bottom: 4px solid #b39359;
            margin-bottom: 30px;
        }

        .main-container { 
            display: grid; 
            grid-template-columns: 350px 1fr; 
            gap: 30px; 
            width: 95%; 
            max-width: 1400px; 
        }

        /* Barra Lateral de Registro */
        .sidebar { 
            background: #111; 
            padding: 35px 25px; 
            border-radius: 24px; 
            border: 1px solid #b39359;
            height: fit-content;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .sidebar h2 { 
            color: #b39359; 
            font-size: 20px; 
            text-transform: uppercase; 
            margin-bottom: 25px; 
            letter-spacing: 1px;
        }

        input, select { 
            width: 100%; 
            padding: 15px; 
            margin-bottom: 12px; 
            border-radius: 12px; 
            border: 1px solid #333; 
            background: #fff; 
            font-weight: 600;
            outline: none;
        }

        .btn-add { 
            width: 100%; 
            padding: 18px; 
            background: #b39359; 
            color: #111; 
            border: none; 
            border-radius: 12px; 
            font-weight: 800; 
            cursor: pointer; 
            text-transform: uppercase;
            margin-bottom: 15px;
            transition: 0.3s;
        }

        /* BOTÃO SALVAR */
        .btn-save { 
            width: 100%; 
            padding: 15px; 
            background: #27ae60; 
            color: #fff; 
            border: none; 
            border-radius: 12px; 
            font-weight: 800; 
            cursor: pointer; 
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        /* Área da Tabela */
        .table-area { 
            background: #fff; 
            border-radius: 24px; 
            overflow: hidden; 
            border: 1px solid #e5e1da;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        table { width: 100%; border-collapse: collapse; }
        th { background: #111; color: #b39359; padding: 20px; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
        td { padding: 18px; text-align: center; border-bottom: 1px solid #f0f0f0; font-size: 14px; }
        tr:nth-child(even) { background: #fafafa; }
        .stock-val { font-weight: 800; color: #111; }
        .total-val { font-weight: 800; color: #b39359; }
    </style>
</head>
<body>

    <!-- Banner Ajustado -->
    <div class="hero-banner"></div>

    <div class="main-container">
        <!-- Registro -->
        <aside class="sidebar">
            <h2>Register Product</h2>
            <input type="text" id="pName" placeholder="Product Name">
            <select id="pUnit">
                <option value="Caixa">Caixa</option>
                <option value="Unidade">Unidade</option>
                <option value="KG">KG</option>
                <option value="Tonelada">Tonelada</option>
            </select>
            <input type="number" id="pEntry" placeholder="Entry (Entrada)">
            <input type="number" id="pExit" placeholder="Exit (Saída)">
            
            <select id="pCurrency">
                <option value="USD">USD ($)</option>
                <option value="EUR">EUR (€)</option>
                <option value="BRL">BRL (R$)</option>
            </select>
            <input type="number" id="pPrice" placeholder="Price (Preço Unit.)">
            
            <button class="btn-add" onclick="addProduct()">Add Product</button>
            <button class="btn-save" onclick="saveData()">💾 Save Inventory</button>
        </aside>

        <!-- Tabela -->
        <main class="table-area">
            <table>
                <thead>
                    <tr>
                        <th>Product</th>
                        <th>Unit</th>
                        <th>Entry</th>
                        <th>Exit</th>
                        <th>Stock</th>
                        <th>Currency</th>
                        <th>Price</th>
                        <th>Total Value</th>
                    </tr>
                </thead>
                <tbody id="inventoryBody"></tbody>
            </table>
        </main>
    </div>

    <script>
        // Carrega dados salvos do navegador
        let inventory = JSON.parse(localStorage.getItem('sollene_storage')) || [];

        function renderTable() {
            const body = document.getElementById('inventoryBody');
            body.innerHTML = "";

            inventory.forEach((item, index) => {
                const stock = item.entry - item.exit;
                const total = (stock * item.price).toFixed(2);
                const symbol = item.currency === 'USD' ? '$' : (item.currency === 'EUR' ? '€' : 'R$');

                const row = body.insertRow();
                row.innerHTML = `
                    <td>${item.name}</td>
                    <td>${item.unit}</td>
                    <td style="color: #27ae60; font-weight: 800;">+ ${item.entry}</td>
                    <td style="color: #e74c3c; font-weight: 800;">- ${item.exit}</td>
                    <td class="stock-val">${stock}</td>
                    <td>${item.currency}</td>
                    <td>${symbol} ${item.price}</td>
                    <td class="total-val">${symbol} ${total}</td>
                `;
            });
        }

        function addProduct() {
            const name = document.getElementById('pName').value;
            const unit = document.getElementById('pUnit').value;
            const entry = parseInt(document.getElementById('pEntry').value) || 0;
            const exit = parseInt(document.getElementById('pExit').value) || 0;
            const currency = document.getElementById('pCurrency').value;
            const price = parseFloat(document.getElementById('pPrice').value) || 0;

            if(!name || price <= 0) return alert("Por favor, insira o nome e o preço.");

            inventory.push({ name, unit, entry, exit, currency, price });
            saveData(); // Salva automaticamente
            renderTable();

            // Limpa os campos
            document.getElementById('pName').value = "";
            document.getElementById('pEntry').value = "";
            document.getElementById('pExit').value = "";
            document.getElementById('pPrice').value = "";
        }

        function saveData() {
            localStorage.setItem('sollene_storage', JSON.stringify(inventory));
            alert("Inventory Saved Successfully!");
        }

        // Inicia a tabela ao abrir
        window.onload = renderTable;
    </script>
</body>
</html>
