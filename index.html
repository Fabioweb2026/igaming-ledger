<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sollene Group | Global Inventory</title>
    <style>
        @import url('https://googleapis.com');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #fdfaf6; 
            color: #1a1a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 50px;
        }

        /* BANNER SUPERIOR */
        .hero-banner { 
            width: 100%; 
            height: 480px; 
            background: #000 url('sollene-group.jpg') no-repeat center center; 
            background-size: cover;
            border-bottom: 4px solid #b39359;
            position: relative;
            display: flex;
            align-items: flex-end;
            justify-content: center;
        }

        .contact-bar {
            background: rgba(0, 0, 0, 0.7);
            color: #b39359;
            width: 100%;
            padding: 15px;
            text-align: center;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            backdrop-filter: blur(5px);
            line-height: 1.6;
        }

        .contact-bar a { color: #b39359; text-decoration: none; transition: 0.3s; }
        .contact-bar a:hover { color: #fff; }

        .main-container { 
            display: grid; 
            grid-template-columns: 350px 1fr; 
            gap: 30px; 
            width: 95%; 
            max-width: 1400px; 
            margin-top: 30px;
        }

        /* PAINEL DE REGISTRO */
        .sidebar { 
            background: #111; 
            padding: 35px 25px; 
            border-radius: 24px; 
            border: 1px solid #b39359;
            height: fit-content;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .sidebar h2 { color: #b39359; font-size: 20px; text-transform: uppercase; margin-bottom: 25px; }

        input, select { 
            width: 100%; padding: 15px; margin-bottom: 12px; border-radius: 12px; 
            background: #fff; color: #333; border: 1px solid #333; outline: none; font-weight: 600;
        }

        .btn-add { 
            width: 100%; padding: 18px; background: #b39359; color: #111; 
            border: none; border-radius: 12px; font-weight: 800; cursor: pointer; 
            text-transform: uppercase; margin-bottom: 10px;
        }

        /* BOTÃO DE SALVAR CORRIGIDO */
        .btn-save { 
            width: 100%; padding: 15px; background: #27ae60; color: #fff; 
            border: 2px solid #fff; border-radius: 12px; font-weight: 800; cursor: pointer; 
            text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 10px;
            transition: 0.3s;
        }
        .btn-save:hover { background: #1e8449; transform: scale(1.02); }

        /* ÁREA DA TABELA */
        .table-area { 
            background: #fff; 
            border-radius: 24px; 
            overflow: hidden; 
            border: 1px solid #e5e1da;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        table { width: 100%; border-collapse: collapse; }
        th { background: #111; color: #b39359; padding: 20px; font-size: 11px; text-transform: uppercase; }
        td { padding: 18px; text-align: center; border-bottom: 1px solid #f0f0f0; font-size: 14px; }
        tr:nth-child(even) { background: #fafafa; }
    </style>
</head>
<body>

    <div class="hero-banner">
        <div class="contact-bar">
            Sollene Group Enterprise • Marina Business Avenue, Valletta, Malta<br>
            <a href="tel:+35621345678">Tel: +356 2134 5678</a> • <a href="mailto:contact@sollene-group.mt">Email: contact@sollene-group.mt</a>
        </div>
    </div>

    <div class="main-container">
        <aside class="sidebar">
            <h2>Register Product</h2>
            <input type="text" id="pName" placeholder="Product Name">
            <select id="pUnit">
                <option value="Caixa">Caixa</option>
                <option value="Unidade">Unidade</option>
                <option value="KG">KG</option>
                <option value="Tonelada">Tonelada</option>
            </select>
            <input type="number" id="pEntry" placeholder="Entry (Entrada)">
            <input type="number" id="pExit" placeholder="Exit (Saída)">
            
            <select id="pCurrency">
                <option value="USD">USD ($)</option>
                <option value="EUR">EUR (€)</option>
                <option value="BRL">BRL (R$)</option>
            </select>
            <input type="number" id="pPrice" placeholder="Price (Preço Unit.)">
            
            <button class="btn-add" onclick="addProduct()">Add Product</button>
            
            <!-- CHAMANDO A FUNÇÃO DE SALVAMENTO CORRETAMENTE -->
            <button class="btn-save" onclick="saveData()">💾 SAVE INVENTORY</button>
        </aside>

        <main class="table-area">
            <table>
                <thead>
                    <tr>
                        <th>Product</th>
                        <th>Unit</th>
                        <th>Entry</th>
                        <th>Exit</th>
                        <th>Stock</th>
                        <th>Currency</th>
                        <th>Price</th>
                        <th>Total Value</th>
                    </tr>
                </thead>
                <tbody id="inventoryBody"></tbody>
            </table>
        </main>
    </div>

    <script>
        // Carrega dados existentes
        let inventory = JSON.parse(localStorage.getItem('sollene_final_v5')) || [];

        function renderTable() {
            const body = document.getElementById('inventoryBody');
            body.innerHTML = "";

            inventory.forEach((item) => {
                const stock = item.entry - item.exit;
                const total = (stock * item.price).toFixed(2);
                const symbol = item.currency === 'USD' ? '$' : (item.currency === 'EUR' ? '€' : 'R$');

                const row = body.insertRow();
                row.innerHTML = `
                    <td>${item.name}</td>
                    <td>${item.unit}</td>
                    <td style="color: #27ae60; font-weight: 800;">+ ${item.entry}</td>
                    <td style="color: #e74c3c; font-weight: 800;">- ${item.exit}</td>
                    <td style="font-weight: 800;">${stock}</td>
                    <td>${item.currency}</td>
                    <td>${symbol} ${item.price}</td>
                    <td style="font-weight: 800; color: #b39359;">${symbol} ${total}</td>
                `;
            });
        }

        function addProduct() {
            const name = document.getElementById('pName').value;
            const unit = document.getElementById('pUnit').value;
            const entry = parseInt(document.getElementById('pEntry').value) || 0;
            const exit = parseInt(document.getElementById('pExit').value) || 0;
            const currency = document.getElementById('pCurrency').value;
            const price = parseFloat(document.getElementById('pPrice').value) || 0;

            if(!name || isNaN(price)) return alert("Please enter Product Name and Price.");

            inventory.push({ name, unit, entry, exit, currency, price });
            renderTable();

            // Limpa formulário
            document.getElementById('pName').value = "";
            document.getElementById('pEntry').value = "";
            document.getElementById('pExit').value = "";
            document.getElementById('pPrice').value = "";
        }

        // FUNÇÃO DE SALVAR NO NAVEGADOR
        function saveData() {
            localStorage.setItem('sollene_final_v5', JSON.stringify(inventory));
            alert("Inventory Saved Successfully!");
        }

        window.onload = renderTable;
    </script>
</body>
</html>
