<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sollene Group ERP</title>

<style>

/* ================= BASE ================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:linear-gradient(135deg,#f7f1e1,#e9dcc2);
    color:#222;
}

/* ================= HERO ================= */

.hero{
    position:relative;
    height:240px;
    overflow:hidden;
    border-bottom:2px solid black;
}

/* HERO IMAGE */

.hero img{
    width:100%;
    height:100%;
    object-fit:cover;
    object-position:center 38%;
    filter:brightness(0.50) contrast(1.05);
}

/* OVERLAY */

.hero-overlay{
    position:absolute;
    inset:0;

    background:linear-gradient(
        135deg,
        rgba(0,0,0,0.30),
        rgba(0,0,0,0.72)
    );
}

/* HERO CONTENT */

.hero-content{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
    color:white;
    width:90%;
}

/* BADGE */

.badge{
    display:inline-block;
    padding:5px 10px;
    border:1px solid #d4af37;
    color:#d4af37;
    border-radius:20px;
    font-size:10px;
    letter-spacing:2px;
    margin-bottom:8px;
    background:rgba(212,175,55,0.08);
}

/* TITLE */

.hero-content h1{
    font-size:32px;
    letter-spacing:4px;
    margin-bottom:3px;
    text-shadow:0 4px 10px rgba(0,0,0,0.5);
}

/* SUBTITLE */

.hero-content p{
    opacity:0.80;
    font-size:11px;
    letter-spacing:2px;
}

/* ================= LOGIN ================= */

.login-box{
    position:absolute;
    top:15px;
    right:20px;

    width:210px;

    background:rgba(0,0,0,0.58);

    border:1px solid rgba(212,175,55,0.28);

    padding:10px;

    border-radius:12px;

    backdrop-filter:blur(10px);

    box-shadow:
    0 6px 20px rgba(0,0,0,0.25);

    z-index:10;
}

.login-box h3{
    font-size:13px;
    margin-bottom:6px;
    color:#d4af37;
    letter-spacing:1px;
}

.login-box input{
    width:100%;
    padding:7px 9px;
    margin:4px 0;
    border:none;
    border-radius:5px;
    font-size:11px;
    background:#f5f5f5;
}

.login-box button{
    width:100%;
    padding:7px;
    margin-top:4px;
    background:#d4af37;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-size:11px;
    font-weight:bold;
    transition:0.3s;
}

.login-box button:hover{
    opacity:0.9;
    transform:translateY(-1px);
}

.login-box p{
    font-size:9px;
    opacity:0.6;
    margin-top:5px;
}

/* ================= DASHBOARD ================= */

.hero-stats{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-top:14px;
    flex-wrap:wrap;
}

/* STAT BOX */

.stat-box{
    background:rgba(0,0,0,0.38);
    border:1px solid rgba(212,175,55,0.25);
    padding:8px 12px;
    border-radius:10px;
    min-width:90px;
    backdrop-filter:blur(5px);
}

.stat-box h3{
    color:#d4af37;
    font-size:16px;
}

.stat-box span{
    font-size:10px;
    opacity:0.8;
}

/* ================= CONTAINER ================= */

.container{
    display:flex;
    gap:15px;
    padding:20px;
    align-items:flex-start;
}

/* ================= FORM ================= */

.form-box{
    width:30%;
}

.card{
    background:rgba(0,0,0,0.92);
    border:2px solid #d4af37;
    border-radius:14px;
    padding:18px;
    color:white;
    box-shadow:0 10px 25px rgba(0,0,0,0.20);
}

.card h3{
    margin-bottom:12px;
    letter-spacing:1px;
}

.card input,
.card select{
    width:100%;
    padding:10px;
    margin:6px 0;
    border:none;
    border-radius:6px;
    outline:none;
}

.card button{
    width:100%;
    padding:11px;
    background:#d4af37;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
    margin-top:5px;
}

/* ================= TABLE ================= */

.table-box{
    width:70%;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 5px 20px rgba(0,0,0,0.15);
}

th,td{
    border:1px solid #ddd;
    padding:10px;
    text-align:center;
    font-size:14px;
}

th{
    background:black;
    color:white;
}

/* ================= FOOTER ================= */

footer{
    background:black;
    color:white;
    text-align:center;
    padding:18px;
    margin-top:20px;
    font-size:12px;
}

/* ================= MESSAGE ================= */

.system-message{

    position:fixed;

    top:20px;

    right:20px;

    background:black;

    color:#d4af37;

    border:1px solid #d4af37;

    padding:12px 18px;

    border-radius:10px;

    z-index:9999;

    font-size:12px;

    box-shadow:0 8px 20px rgba(0,0,0,0.25);

    transition:0.3s;
}

/* ================= RESPONSIVE ================= */

@media(max-width:900px){

.container{
    flex-direction:column;
}

.form-box,
.table-box{
    width:100%;
}

.login-box{
    position:relative;
    top:auto;
    right:auto;
    margin:10px auto;
}

.hero{
    height:320px;
}

}

</style>
</head>

<body>

<!-- ================= HERO ================= -->

<div class="hero">

<img src="sollene-group.jpg" alt="Sollene Group">

<div class="hero-overlay"></div>

<!-- LOGIN -->

<div class="login-box">

<h3>ERP LOGIN</h3>

<input type="text" id="user" placeholder="User">

<input type="password" id="pass" placeholder="Password">

<button onclick="login()">LOGIN</button>

<button onclick="registerUser()">REGISTER</button>

<p>Create employee access</p>

</div>

<!-- HERO CONTENT -->

<div class="hero-content">

<div class="badge">ENTERPRISE SYSTEM</div>

<h1>SOLLENE GROUP</h1>

<p>Stock Management Dashboard</p>

<!-- DASHBOARD -->

<div class="hero-stats">

<div class="stat-box">
<h3 id="totalProducts">0</h3>
<span>Products</span>
</div>

<div class="stat-box">
<h3 id="totalStock">0</h3>
<span>Stock</span>
</div>

<div class="stat-box">
<h3 id="totalValue">R$ 0</h3>
<span>Total Value</span>
</div>

</div>

</div>

</div>

<!-- ================= SYSTEM ================= -->

<div class="container">

<!-- FORM -->

<div class="form-box">

<div class="card">

<h3>REGISTER PRODUCT</h3>

<input type="text" id="name" placeholder="Product Name">

<input type="number" id="entry" placeholder="Entry">

<input type="number" id="exit" placeholder="Exit">

<select id="currency">
<option value="BRL">BRL</option>
<option value="USD">USD</option>
<option value="EUR">EUR</option>
</select>

<input type="number" id="price" placeholder="Price">

<button id="addBtn" onclick="addProduct()" disabled>
LOGIN TO ADD
</button>

</div>

</div>

<!-- TABLE -->

<div class="table-box">

<table>

<thead>
<tr>
<th>Product</th>
<th>Entry</th>
<th>Exit</th>
<th>Stock</th>
<th>BRL</th>
<th>USD</th>
<th>EUR</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

</div>

</div>

<!-- ================= FOOTER ================= -->

<footer>
Sollene Group Enterprise • Malta Business Center • contact@sollene-group.com
</footer>

<script>

/* ================= PRODUCTS ================= */

let products = [];

const USD = 5.15;
const EUR = 5.78;

/* ================= MESSAGE ================= */

function showMessage(text){

const old = document.querySelector(".system-message");

if(old){
    old.remove();
}

const msg = document.createElement("div");

msg.className = "system-message";

msg.innerText = text;

document.body.appendChild(msg);

setTimeout(()=>{

    msg.style.opacity = "0";

    setTimeout(()=>{
        msg.remove();
    },300);

},2500);

}

/* ================= REGISTER ================= */

function registerUser(){

let user = document.getElementById("user").value.trim();

let pass = document.getElementById("pass").value.trim();

if(user === "" || pass === ""){

showMessage("Fill all fields");

return;
}

/* save employee */

localStorage.setItem("erp_user_" + user, pass);

showMessage("Employee registered successfully");

}

/* ================= LOGIN ================= */

function login(){

let user = document.getElementById("user").value.trim();

let pass = document.getElementById("pass").value.trim();

let saved = localStorage.getItem("erp_user_" + user);

if(saved && saved === pass){

unlockSystem();

showMessage("Login successful");

}else{

showMessage("Invalid login");

}

}

/* ================= UNLOCK ================= */

function unlockSystem(){

document.getElementById("addBtn").disabled = false;

document.getElementById("addBtn").innerText = "ADD PRODUCT";

}

/* ================= ADD PRODUCT ================= */

function addProduct(){

let name = document.getElementById("name").value;

let entry = Number(document.getElementById("entry").value);

let exit = Number(document.getElementById("exit").value);

let price = Number(document.getElementById("price").value);

let currency = document.getElementById("currency").value;

let stock = entry - exit;

let priceBRL;

if(currency === "USD"){

priceBRL = price * USD;

}
else if(currency === "EUR"){

priceBRL = price * EUR;

}
else{

priceBRL = price;
}

products.push({

name,
entry,
exit,
stock,
priceBRL

});

updateDashboard();

updateTable();

clearFields();

showMessage("Product added successfully");

}

/* ================= DASHBOARD ================= */

function updateDashboard(){

let totalProducts = products.length;

let totalStock = 0;

let totalValue = 0;

products.forEach(p => {

totalStock += p.stock;

totalValue += p.stock * p.priceBRL;

});

document.getElementById("totalProducts").innerText = totalProducts;

document.getElementById("totalStock").innerText = totalStock;

document.getElementById("totalValue").innerText =
"R$ " + totalValue.toFixed(2);

}

/* ================= TABLE ================= */

function updateTable(){

let html = "";

products.forEach(p => {

let usd = (p.priceBRL / USD).toFixed(2);

let eur = (p.priceBRL / EUR).toFixed(2);

html += `
<tr>

<td>${p.name}</td>

<td>${p.entry}</td>

<td>${p.exit}</td>

<td>${p.stock}</td>

<td>R$ ${p.priceBRL.toFixed(2)}</td>

<td>$ ${usd}</td>

<td>€ ${eur}</td>

</tr>
`;

});

document.getElementById("tableBody").innerHTML = html;

}

/* ================= CLEAR ================= */

function clearFields(){

document.getElementById("name").value = "";

document.getElementById("entry").value = "";

document.getElementById("exit").value = "";

document.getElementById("price").value = "";

}

</script>

</body>
</html>
