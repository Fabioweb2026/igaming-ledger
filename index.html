<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sollene Group | International Trade & Inventory Ledger</title>
    <style>
        /* DESIGN MINIMALISTA LUXO COM TÍTULOS EM BLACK ELEGANTE */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: #fbf9f6; color: #1a1a1a; padding-bottom: 60px; }

        /* HEADER PREMIUM SOLLENE */
        .main-header {
            background: #fbf9f6; display: flex; align-items: center; justify-content: space-between;
            padding: 15px 5%; border-bottom: 1px solid rgba(0,0,0,0.06); position: sticky; top: 0; z-index: 1000;
        }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .logo-circle { 
            width: 55px; height: 55px; border-radius: 50%; border: 1px solid #7a5c33; 
            background: #fff url('Sollene-Group.png') no-repeat center center; background-size: cover; 
        }
        .brand-title { font-size: 24px; font-weight: 800; color: #1a1a1a; letter-spacing: 3px; text-transform: uppercase; }

        /* PAINEL OPERACIONAL COM LARGURA DO CARD COMPACTADA */
        .dashboard-container { 
            max-width: 1750px; 
            margin: 30px auto; 
            padding: 0 2%; 
            display: grid; 
            grid-template-columns: 340px 1fr 260px; /* REDUZIDO: Card na esquerda com exatos 340px */
            gap: 20px; 
            align-items: start;
        }
        
        /* CARD COM BORDAS BRONZE ULTRA COMPACTO */
        .panel-card { 
            background: #ffffff; 
            border: 2px solid #7a5c33; 
            border-radius: 14px; 
            padding: 14px; /* Reduzido espaçamento interno */
            box-shadow: 0 10px 25px rgba(122,92,51,0.05); 
            color: #1a1a1a; 
            overflow: hidden;
        }

        /* TÍTULOS EM BLACK ELEGANTE */
        .panel-card h2 { 
            font-size: 11px; text-transform: uppercase; letter-spacing: 2px; 
            color: #d4af37; background: #000000; padding: 10px; margin: -14px -14px 12px -14px;
            font-weight: 800; text-align: center; border-bottom: 2px solid #7a5c33;
        }
        
        .form-group { margin-bottom: 6px; } 
        .form-group label { display: block; font-size: 8.5px; font-weight: 800; text-transform: uppercase; margin-bottom: 3px; color: #7a5c33; letter-spacing: 0.5px; white-space: nowrap; }
        .form-control { width: 100%; padding: 6px 8px; border: 1px solid #e1dbcf; border-radius: 6px; font-size: 12px; font-weight: 600; outline: none; background: #fdfaf6; color: #1a1a1a; height: 34px; }
        
        /* DISTRIBUIÇÃO FOCADA PARA LARGURA REDUZIDA */
        .form-row { display: flex; gap: 6px; align-items: flex-end; width: 100%; }
        .col-qty { flex: 0.9; min-width: 50px; }
        .col-price { flex: 1.1; min-width: 75px; }
        .col-curr { flex: 1.4; min-width: 100px; }

        .trade-section-title { font-size: 8.5px; font-weight: 800; text-transform: uppercase; color: #7a5c33; margin: 10px 0 6px 0; padding-top: 4px; border-top: 1px dashed #e1dbcf; display: flex; align-items: center; gap: 4px; }
        .btn-submit { width: 100%; padding: 10px; background: #000; color: #fff; border: none; border-radius: 8px; font-weight: 800; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; margin-top: 10px; height: 38px; }
        .btn-submit:hover { background: #7a5c33; }

        /* TABELA DE MANIFESTO RECONFIGURADA */
        .table-container { width: 100%; overflow-x: auto; background: #ffffff; border-radius: 16px; border: 2px solid #7a5c33; padding: 14px; box-shadow: 0 10px 25px rgba(122,92,51,0.05); overflow: hidden; }
        .table-container h2 {
            font-size: 11px; text-transform: uppercase; letter-spacing: 2px; 
            color: #d4af37; background: #000000; padding: 10px; margin: -14px -14px 12px -14px;
            font-weight: 800; text-align: center; border-bottom: 2px solid #7a5c33;
        }

        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 12px; color: #1a1a1a; }
        th { background: #fdfaf6; padding: 12px 10px; font-weight: 800; text-transform: uppercase; font-size: 10px; color: #7a5c33; border-bottom: 2px solid #7a5c33; letter-spacing: 1px; }
        td { padding: 10px; border-bottom: 1px solid #f4f0e8; font-weight: 600; }
        tr:hover { background-color: #fdfbf9; }
        
        /* CARD LATERAL DE ESTOQUE ATUAL */
        .stock-item-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid #f4f0e8; font-size: 12px; font-weight: 700; }
        .stock-qty-badge { background: #7a5c33; color: #fff; padding: 2px 6px; border-radius: 4px; font-size: 10px; }

        .badge { padding: 4px 8px; border-radius: 4px; font-size: 9px; font-weight: 800; text-transform: uppercase; }
        .badge-profit { background: #e6f4ea; color: #137333; }
        .badge-loss { background: #fce8e6; color: #c5221f; }
        .remove-btn { color: #ff4d4d; border: none; background: none; cursor: pointer; font-size: 10px; font-weight: 800; text-transform: uppercase; }

        @media(max-width: 1200px) { .dashboard-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <header class="main-header">
        <div class="header-left"><div class="logo-circle"></div><h1 class="brand-title">SOLLENE GROUP</h1></div>
    </header>

    <main class="dashboard-container">
        
        <!-- FORMULÁRIO ESQUERDO ULTRA COMPACTO (340PX) -->
        <div class="panel-card">
            <h2>LAUNCH MOVEMENT</h2>
            <form id="trade-form" onsubmit="registerTrade(event)">
                
                <div class="form-group">
                    <label>Product / Item Description</label>
                    <input type="text" id="product" class="form-control" value="amendoim" required>
                </div>

                <div class="form-group">
                    <label>Unit of Measure</label>
                    <select id="unit" class="form-control">
                        <option value="Boxes">Boxes (BOX)</option>
                        <option value="Units">Units (UN)</option>
                        <option value="KG">Kilograms (KG)</option>
                        <option value="Tons">Metric Tons (TON)</option>
                    </select>
                </div>

                <!-- CONFIGURAÇÃO DE ENTRADA HARMÔNICA -->
                <div class="trade-section-title">📥 Inbound Config (Cost Basis)</div>
                <div class="form-row">
                    <div class="form-group col-qty">
                        <label>Qty Buy</label>
                        <input type="number" id="buyQty" class="form-control" value="19" min="1" required>
                    </div>
                    <div class="form-group col-price">
                        <label>Buy Price</label>
                        <input type="text" id="buyPrice" class="form-control" value="4,54" required>
                    </div>
                    <div class="form-group col-curr">
                        <label>Buy Curr</label>
                        <select id="buyCurrency" class="form-control">
                            <option value="BRL">Real (R$)</option>
                            <option value="EUR">Euro (€)</option>
                            <option value="USD">Dollar ($)</option>
                        </select>
                    </div>
                </div>

                <!-- CONFIGURAÇÃO DE SAÍDA HARMÔNICA -->
                <div class="trade-section-title">📤 Outbound Config (Revenue Basis)</div>
                <div class="form-row">
                    <div class="form-group col-qty">
                        <label>Qty Sold</label>
                        <input type="number" id="sellQty" class="form-control" value="5" min="0" required>
                    </div>
                    <div class="form-group col-price">
                        <label>Sell Price</label>
                        <input type="text" id="sellPrice" class="form-control" value="12,50" required>
                    </div>
                    <div class="form-group col-curr">
                        <label>Sell Curr</label>
                        <select id="sellCurrency" class="form-control">
                            <option value="EUR">Euro (€)</option>
                            <option value="USD">Dollar ($)</option>
                            <option value="BRL">Real (R$)</option>
                        </select>
                    </div>
                </div>

                <div class="form-group" style="margin-top: 6px;">
                    <label>Commercial Partner</label>
                    <input type="text" id="partner" class="form-control" value="ACME Supplies Europe" required>
                </div>

                <button type="submit" class="btn-submit">REGISTER MANIFEST</button>
            </form>
        </div>

        <!-- TABELA CENTRAL -->
        <div class="table-container">
            <h2>Global Cargo Manifesto Ledger</h2>
            <table>
                <thead>
                    <tr>
                        <th>Item Description</th>
                        <th>In / Out Volume</th>
                        <th>Buy Unit</th>
                        <th>Sell Unit</th>
                        <th>Total Cost</th>
                        <th>Total Revenue</th>
                        <th>Net Balance (€)</th>
                        <th>Partner</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>

        <!-- CARD DIREITO DE ESTOQUE RESTANTE -->
        <div class="panel-card">
            <h2>CURRENT STOCK LEVELS</h2>
            <div id="stock-levels-list" style="margin-top: 10px;"></div>
        </div>

    </main>

    <script>
        let trades = [];
        
        const exchangeRates = {
            EUR: 1.0,
            BRL: 0.16, 
            USD: 0.92  
        };

        const currencySymbols = { EUR: '€', BRL: 'R$', USD: '$' };

        // Alterada chave de salvamento para limpar o cache antigo da largura larga
        function loadTrades() {
            trades = JSON.parse(window.localStorage.getItem('sollene_adv_trades_v11')) || [];
            renderUI();
        }

        function parsePrice(value) {
            let cleanValue = value.replace(',', '.');
            return parseFloat(cleanValue) || 0;
        }

        function registerTrade(event) {
            event.preventDefault(); 

            const product = document.getElementById('product').value;
            const buyQty = parseInt(document.getElementById('buyQty').value);
            const sellQty = parseInt(document.getElementById('sellQty').value);
            const unit = document.getElementById('unit').value;
            
            const buyPrice = parsePrice(document.getElementById('buyPrice').value);
            const buyCurrency = document.getElementById('buyCurrency').value;
            const sellPrice = parsePrice(document.getElementById('sellPrice').value);
            const sellCurrency = document.getElementById('sellCurrency').value;
            
            const partner = document.getElementById('partner').value;

            if (sellQty > buyQty) {
                alert("Operation Denied! Quantity sold cannot exceed quantity purchased.");
                return;
            }

            const remainingStock = buyQty - sellQty;

            const origTotalCost = buyQty * buyPrice;
            const origTotalRevenue = sellQty * sellPrice;

            const totalCostInEuro = origTotalCost * exchangeRates[buyCurrency];
            const totalRevenueInEuro = origTotalRevenue * exchangeRates[sellCurrency];
            const netProfitInEuro = totalRevenueInEuro - totalCostInEuro;

            trades.push({ 
                product, buyQty, sellQty, unit, remainingStock,
                buyPrice, buyCurrency, sellPrice, sellCurrency,
                origTotalCost, origTotalRevenue,
                totalCostInEuro, totalRevenueInEuro, netProfitInEuro, partner 
            });
            
            window.localStorage.setItem('sollene_adv_trades_v11', JSON.stringify(trades));
            renderUI();
        }

        function deleteTrade(index) {
            trades.splice(index, 1);
            window.localStorage.setItem('sollene_adv_trades_v11', JSON.stringify(trades));
            renderUI();
        }

        function renderUI() {
            const tbody = document.getElementById('table-body');
            const stockList = document.getElementById('stock-levels-list');
            if (!tbody || !stockList) return;

            if (trades.length === 0) {
                tbody.innerHTML = '<tr><td colspan="9" style="text-align:center; color:#999; padding:30px;">No international operations recorded in the ledger.</td></tr>';
                stockList.innerHTML = '<p style="color:#999; text-align:center; font-size:12px; padding:10px 0;">Warehouse is empty.</p>';
            } else {
                tbody.innerHTML = trades.map((item, index) => `
                    <tr>
                        <td style="font-weight: 800; text-transform: uppercase;">${item.product}</td>
                        <td style="color:#7a5c33; font-weight:800;">📥 ${item.buyQty} / 📤 ${item.sellQty}</td>
                        <td>${currencySymbols[item.buyCurrency]} ${item.buyPrice.toFixed(2)}</td>
                        <td>${currencySymbols[item.sellCurrency]} ${item.sellPrice.toFixed(2)}</td>
                        <td style="color:#c5221f; font-weight: bold;">${currencySymbols[item.buyCurrency]} ${item.origTotalCost.toFixed(2)}</td>
                        <td style="color:#137333; font-weight: bold;">${currencySymbols[item.sellCurrency]} ${item.origTotalRevenue.toFixed(2)}</td>
                        <td>
                            <span class="badge badge-${item.netProfitInEuro >= 0 ? 'profit' : 'loss'}">
                                € ${item.netProfitInEuro.toFixed(2)}
                            </span>
                        </td>
                        <td style="text-transform: uppercase; font-size: 11px; color:#666;">${item.partner}</td>
                        <td><button class="remove-btn" onclick="deleteTrade(${index})">DELETE</button></td>
                    </tr>
                `).join('');

                let stockMap = {};
                trades.forEach(item => {
                    let prodName = item.product.toUpperCase();
                    if (!stockMap[prodName]) {
                        stockMap[prodName] = { qty: 0, unit: item.unit };
                    }
                    stockMap[prodName].qty += item.remainingStock;
                });

                stockList.innerHTML = Object.keys(stockMap).map(key => `
                    <div class="stock-item-row">
                        <span style="text-transform: uppercase; font-size: 11px;">${key}</span>
                        <span class="stock-qty-badge">${stockMap[key].qty} ${stockMap[key].unit}</span>
                    </div>
                `).join('');
            }
        }

        window.onload = loadTrades;
    </script>
</body>
</html>
