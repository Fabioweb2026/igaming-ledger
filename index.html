<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sollene Group ERP System</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial;
}

/* FUNDO */
body {
    background: linear-gradient(135deg, #f7f1e1, #e9dcc2);
}

/* ================= HERO ================= */
.hero {
    position: relative;
    width: 100%;
    height: 320px;
    overflow: hidden;
    border-bottom: 4px solid black;
    background: linear-gradient(135deg, #f7f1e1, #e9dcc2);
}

.hero img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 35%;
}

.hero-overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    top: 0;
    left: 0;
    background: rgba(0,0,0,0.2);
}

.hero-text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: white;
    text-align: center;
}

.hero-text h1 {
    font-size: 40px;
    letter-spacing: 4px;
}

.hero-text p {
    font-size: 14px;
}

/* CONTACT */
.contact {
    text-align: center;
    padding: 10px;
    font-size: 12px;
    background: rgba(255,255,255,0.5);
    color: #3d2f14;
}

/* ================= LAYOUT ================= */
.container {
    display: flex;
    height: 75vh;
}

/* ================= FORM ================= */
.form-box {
    width: 28%;
    padding: 15px;
}

.card {
    background: rgba(0,0,0,0.92);
    border: 2px solid #d4af37;
    border-radius: 12px;
    padding: 15px;
    color: white;
}

.card h2 {
    text-align: center;
    color: #d4af37;
    margin-bottom: 10px;
}

.card input, .card select {
    width: 100%;
    padding: 8px;
    margin: 5px 0;
    background: #111;
    border: 1px solid #333;
    color: white;
    border-radius: 5px;
}

/* STOCK BOX */
.group-box {
    border: 1px solid #d4af37;
    padding: 10px;
    margin-top: 10px;
    border-radius: 8px;
}

.group-box h3 {
    text-align: center;
    font-size: 12px;
    color: #d4af37;
}

/* BUTTON */
.card button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    background: #d4af37;
    border: none;
    color: black;
    font-weight: bold;
    cursor: pointer;
    border-radius: 6px;
}

/* ================= TABLE ================= */
.table-box {
    width: 72%;
    padding: 15px;
    overflow-y: auto;
}

table {
    width: 100%;
    border-collapse: collapse;
    background: white;
    border: 2px solid black;
}

th, td {
    border: 1px solid black;
    padding: 8px;
    text-align: center;
}

th {
    background: black;
    color: white;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
    <img src="sollene-group.jpg" alt="Sollene Group">
    <div class="hero-overlay"></div>

    <div class="hero-text">
        <h1>SOLLENE GROUP</h1>
        <p>Corporate Stock Management System</p>
    </div>
</div>

<!-- CONTACT -->
<div class="contact">
    📞 +55 11 99999-8888 | 📍 Av. Paulista, 1500 - São Paulo | ✉ contact@sollenegroup.com
</div>

<div class="container">

<!-- FORM -->
<div class="form-box">
    <div class="card">
        <h2>REGISTER PRODUCT</h2>

        <input type="text" id="name" placeholder="Product Name">
        <input type="text" id="rg" placeholder="RG Code">

        <!-- STOCK UNITS (SEM DUPLICAÇÃO) -->
        <div class="group-box">
            <h3>STOCK UNITS</h3>

            <select id="unitType">
                <option value="Kg">Kg</option>
                <option value="Toneladas">Toneladas</option>
                <option value="Caixas">Caixas</option>
                <option value="Pacotes">Pacotes</option>
            </select>

            <input type="number" id="entry" placeholder="Entry Quantity">
            <input type="number" id="exit" placeholder="Exit Quantity">
        </div>

        <input type="number" id="price" placeholder="Price">

        <button onclick="addProduct()">ADD PRODUCT</button>
    </div>
</div>

<!-- TABLE -->
<div class="table-box">
    <h2>STOCK CONTROL</h2>

    <table>
        <thead>
            <tr>
                <th>Product</th>
                <th>RG</th>
                <th>Entry</th>
                <th>Exit</th>
                <th>Price</th>
                <th>Stock</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

</div>

<script>
function addProduct() {
    let name = document.getElementById("name").value;
    let rg = document.getElementById("rg").value;
    let unitType = document.getElementById("unitType").value;

    let entry = Number(document.getElementById("entry").value);
    let exit = Number(document.getElementById("exit").value);
    let price = Number(document.getElementById("price").value);

    let stock = entry - exit;

    if (!name || isNaN(entry) || isNaN(exit)) {
        alert("Please fill required fields");
        return;
    }

    document.getElementById("tableBody").innerHTML += `
        <tr>
            <td>${name}</td>
            <td>${rg}</td>
            <td>${entry} ${unitType}</td>
            <td>${exit} ${unitType}</td>
            <td>R$ ${price.toFixed(2)}</td>
            <td>${stock} ${unitType}</td>
        </tr>
    `;
}
</script>

</body>
</html>
