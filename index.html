<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Stock System</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    display: flex;
    background: #f4f4f4;
}

/* LADO FORMULÁRIO */
.form-box {
    width: 30%;
    padding: 20px;
    background: #1e1e2f;
    color: white;
    height: 100vh;
}

.form-box input {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
}

.form-box button {
    width: 100%;
    padding: 10px;
    background: #00c896;
    border: none;
    color: white;
    cursor: pointer;
}

/* TABELA */
.table-box {
    width: 70%;
    padding: 20px;
}

table {
    width: 100%;
    border-collapse: collapse;
    background: white;
}

th, td {
    padding: 12px;
    border: 1px solid #ddd;
    text-align: center;
}

th {
    background: #333;
    color: white;
}
</style>
</head>

<body>

<!-- FORMULÁRIO LATERAL -->
<div class="form-box">
    <h2>Register Product</h2>

    <input type="text" id="name" placeholder="Product Name">
    <input type="number" id="entry" placeholder="Entry">
    <input type="number" id="exit" placeholder="Exit">
    <input type="number" id="price" placeholder="Price">

    <button onclick="addProduct()">Add Product</button>
</div>

<!-- TABELA -->
<div class="table-box">
    <h2>Stock Table</h2>

    <table>
        <thead>
            <tr>
                <th>Product</th>
                <th>Entry</th>
                <th>Exit</th>
                <th>Price</th>
                <th>Stock</th>
            </tr>
        </thead>

        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
function addProduct() {
    let name = document.getElementById("name").value;
    let entry = Number(document.getElementById("entry").value);
    let exit = Number(document.getElementById("exit").value);
    let price = Number(document.getElementById("price").value);

    let stock = entry - exit;

    let table = document.getElementById("tableBody");

    let row = `
        <tr>
            <td>${name}</td>
            <td>${entry}</td>
            <td>${exit}</td>
            <td>$${price.toFixed(2)}</td>
            <td>${stock}</td>
        </tr>
    `;

    table.innerHTML += row;

    // limpar inputs
    document.getElementById("name").value = "";
    document.getElementById("entry").value = "";
    document.getElementById("exit").value = "";
    document.getElementById("price").value = "";
}
</script>

</body>
</html>
