<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terra Global | Professional Logistics Dashboard</title>
    <style>
        @import url('https://googleapis.com');

        *{ margin:0; padding:0; box-sizing:border-box; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f1f5f9; /* Fundo cinza claro limpo */
            color: #1e293b; 
            display: flex;
            min-height: 100vh;
        }

        /* BANNER LATERAL DISCRETO */
        .side-banner {
            width: 350px;
            background: linear-gradient(rgba(27, 67, 50, 0.8), rgba(27, 67, 50, 0.9)), 
                        url('background-terra.jpg') no-repeat center center;
            background-size: cover;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 40px;
            color: white;
            border-right: 4px solid #d4a373;
        }

        .side-banner h1 { font-size: 32px; font-weight: 800; letter-spacing: -1px; margin-bottom: 10px; }
        .side-banner p { font-size: 12px; text-transform: uppercase; letter-spacing: 2px; opacity: 0.8; line-height: 1.6; }

        /* ÁREA PRINCIPAL DO SISTEMA */
        .main-content {
            flex: 1;
            padding: 60px;
            overflow-y: auto;
        }

        .section-header { margin-bottom: 40px; }
        .section-header h2 { font-size: 24px; color: #0f172a; font-weight: 700; }
        .section-header p { color: #64748b; font-size: 14px; }

        /* CARDS DO SISTEMA */
        .glass-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            margin-bottom: 30px;
            border: 1px solid #e2e8f0;
        }

        /* FORMULÁRIO ALINHADO */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .input-group label { display: block; font-size: 12px; font-weight: 700; color: #475569; margin-bottom: 8px; text-transform: uppercase; }
        
        input { 
            width: 100%;
            padding: 14px; 
            border: 1px solid #cbd5e1; 
            border-radius: 10px; 
            font-size: 14px;
            transition: 0.3s;
            background-color: #f8fafc;
        }

        input:focus { outline: none; border-color: #1b4332; background-color: white; box-shadow: 0 0 0 4px rgba(27, 67, 50, 0.1); }

        #saveBtn { 
            padding: 16px 32px; 
            background-color: #1b4332; 
            color: white; 
            border: none; 
            border-radius: 10px; 
            cursor: pointer; 
            font-weight: 700; 
            transition: 0.3s;
            font-size: 14px;
        }

        #saveBtn:hover { background-color: #2d6a4f; transform: translateY(-2px); }

        /* TABELA LIMPA */
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 15px; color: #64748b; font-size: 11px; text-transform: uppercase; border-bottom: 2px solid #f1f5f9; letter-spacing: 1px; }
        td { padding: 18px 15px; border-bottom: 1px solid #f1f5f9; font-size: 14px; }
        
        .badge-qty { background: #f1f5f9; padding: 4px 10px; border-radius: 6px; font-weight: 600; color: #475569; }
        .price-text { font-weight: 700; color: #1b4332; }

        .del-btn { color: #ef4444; border: none; background: none; font-weight: 700; cursor: pointer; font-size: 12px; }

        @media(max-width: 1024px) {
            body { flex-direction: column; }
            .side-banner { width: 100%; height: 200px; border-right: none; border-bottom: 4px solid #d4a373; }
            .main-content { padding: 30px; }
        }
    </style>
</head>
<body>

    <!-- BANNER LATERAL -->
    <aside class="side-banner">
        <h1>Terra Global</h1>
        <p>Agricultural Commodities<br>Brazilian Exports<br>Global Logistics Tracking</p>
    </aside>

    <!-- CONTEÚDO PRINCIPAL -->
    <main class="main-content">
        
        <header class="section-header">
            <h2>Shipment Management</h2>
            <p>Register and track new commodity exports in real-time.</p>
        </header>

        <!-- FORMULÁRIO -->
        <div class="glass-card">
            <div class="form-grid">
                <div class="input-group">
                    <label>Commodity</label>
                    <input type="text" id="productName" placeholder="e.g. Coffee">
                </div>
                <div class="input-group">
                    <label>Destination</label>
                    <input type="text" id="origin" placeholder="Port of Rotterdam">
                </div>
                <div class="input-group">
                    <label>Unit Price (USD)</label>
                    <input type="number" id="price" placeholder="0.00">
                </div>
                <div class="input-group">
                    <label>Quantity</label>
                    <input type="number" id="stock" placeholder="Tons">
                </div>
            </div>
            <button id="saveBtn">REGISTER SHIPMENT</button>
        </div>

        <!-- TABELA -->
        <div class="glass-card">
            <table>
                <thead>
                    <tr>
                        <th>Product</th>
                        <th>Origin/Dest</th>
                        <th>Price</th>
                        <th>Qty</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>

    </main>

    <script>
        const saveBtn = document.getElementById('saveBtn');
        const tableBody = document.getElementById('tableBody');

        saveBtn.addEventListener('click', function() {
            const product = document.getElementById('productName').value;
            const origin = document.getElementById('origin').value;
            const price = document.getElementById('price').value;
            const stock = document.getElementById('stock').value;

            if (!product || !price || !stock) {
                alert("Please fill all required fields.");
                return;
            }

            const newRow = tableBody.insertRow();
            newRow.innerHTML = `
                <td style="font-weight: 700;">${product}</td>
                <td style="color: #64748b;">${origin || 'Global'}</td>
                <td class="price-text">$${parseFloat(price).toFixed(2)}</td>
                <td><span class="badge-qty">${stock} Units</span></td>
                <td><button class="del-btn" onclick="this.parentElement.parentElement.remove()">DELETE</button></td>
            `;

            document.querySelectorAll('input').forEach(i => i.value = "");
        });
    </script>
</body>
</html>
