<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sollene Group | Inventory System</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

/* RESET */
html, body {
    margin: 0;
    padding: 0;
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: #f6f4ea;
    overflow-x: hidden;
}

/* =======================
   BANNER
======================= */
.banner-header {
    width: 100%;
    height: 140px;
    margin-top: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    background: #fff;
    border-bottom: 3px solid #b39359;
}

.banner-header img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* NAV */
.nav-top {
    max-width: 1200px;
    margin: auto;
    padding: 15px 20px;
}

.btn-back {
    text-decoration: none;
    padding: 10px 20px;
    border-radius: 30px;
    border: 1px solid #b39359;
    color: #b39359;
    font-weight: 600;
    background: white;
}

/* =======================
   LAYOUT PRINCIPAL (FIX)
======================= */
.main-content {
    max-width: 1200px;
    margin: auto;
    display: grid;
    grid-template-columns: 320px 1fr; /* 🔥 ALINHAMENTO PERFEITO */
    gap: 25px;
    padding: 25px;
}

/* SIDEBAR */
.sidebar {
    background: #1a1a1a;
    color: #b39359;
    padding: 25px;
    border-radius: 18px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

.sidebar h2 {
    margin-bottom: 20px;
}

input, select {
    width: 100%;
    padding: 10px;
    margin-bottom: 10px;
    border-radius: 8px;
    border: none;
}

/* BOTÃO */
button {
    width: 100%;
    padding: 12px;
    background: #b39359;
    border: none;
    font-weight: bold;
    border-radius: 10px;
    cursor: pointer;
}

/* TABLE */
.table-container {
    background: white;
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

table {
    width: 100%;
    border-collapse: collapse;
}

thead {
    background: #1a1a1a;
    color: #b39359;
}

th, td {
    padding: 15px;
    text-align: center;
    border-bottom: 1px solid #eee;
}

.entry { color: green; font-weight: bold; }
.exit { color: red; font-weight: bold; }
.total { color: #b39359; font-weight: bold; }

/* FOOTER */
footer {
    text-align: center;
    padding: 25px;
    background: #1a1a1a;
    color: #777;
    margin-top: 40px;
}

/* RESPONSIVO */
@media (max-width: 900px) {
    .main-content {
        grid-template-columns: 1fr; /* empilha correto */
    }

    .banner-header {
        height: 110px;
    }
}

</style>
</head>

<body>

<!-- BANNER -->
<header class="banner-header">
    <img src="sollene-group.jpg">
</header>

<!-- NAV -->
<nav class="nav-top">
    <a href="index.html" class="btn-back">← Back</a>
</nav>

<!-- MAIN -->
<div class="main-content">

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>Register Product</h2>

    <input id="name" placeholder="Product">
    <select id="unit">
        <option>Case</option>
        <option>Unit</option>
    </select>

    <input id="entry" type="number" placeholder="Entry">
    <input id="exit" type="number" placeholder="Exit">

    <select id="currency">
        <option>USD</option>
        <option>EUR</option>
        <option>BRL</option>
    </select>

    <input id="price" type="number" placeholder="Price">

    <button onclick="add()">Add Product</button>
</div>

<!-- TABLE -->
<div class="table-container">
<table>
<thead>
<tr>
<th>Product</th>
<th>Unit</th>
<th>Entry</th>
<th>Exit</th>
<th>Stock</th>
<th>Currency</th>
<th>Price</th>
<th>Total</th>
</tr>
</thead>

<tbody id="table">
<tr>
<td>Example</td>
<td>Case</td>
<td class="entry">120</td>
<td class="exit">45</td>
<td>75</td>
<td>USD</td>
<td>10</td>
<td class="total">750</td>
</tr>
</tbody>

</table>
</div>

</div>

<footer>
© 2026 SOLLENE GROUP
</footer>

<script>
function add(){
let name=document.getElementById('name').value;
let unit=document.getElementById('unit').value;
let entry=+document.getElementById('entry').value;
let exit=+document.getElementById('exit').value;
let currency=document.getElementById('currency').value;
let price=+document.getElementById('price').value;

let stock=entry-exit;
let total=stock*price;

document.getElementById('table').innerHTML+=`
<tr>
<td>${name}</td>
<td>${unit}</td>
<td class="entry">+${entry}</td>
<td class="exit">-${exit}</td>
<td>${stock}</td>
<td>${currency}</td>
<td>${price}</td>
<td class="total">${total}</td>
</tr>`;
}
</script>

</body>
</html>
