<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sollene Group | Premium Logistics</title>
    <style>
        @import url('https://googleapis.com');
        
        *{ margin:0; padding:0; box-sizing:border-box; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #fdfaf6; 
            color: #1a1a1a; 
            padding-bottom: 60px;
        }

        /* HEADER DIVIDIDO: IMAGEM LIMPA À ESQUERDA ENCONTRANDO O NOME */
        .split-header {
            display: flex;
            align-items: center;
            width: 100%;
            height: 220px;
            background: #ffffff;
            margin-bottom: 40px;
            border-bottom: 3px solid #d4a373;
            overflow: hidden;
        }

        .header-visual {
            width: 50%; /* Ocupa metade da tela à esquerda */
            height: 100%;
            /* Vamos usar uma imagem de logística limpa que combina com o creme/dourado */
            background: linear-gradient(rgba(212, 163, 115, 0.2), rgba(212, 163, 115, 0.2)),
                        url('https://unsplash.com') no-repeat center center;
            background-size: cover;
            border-right: 5px solid #d4a373;
        }

        .header-brand {
            flex: 1;
            padding-left: 50px;
        }

        .header-brand h1 { 
            font-size: 62px; 
            font-weight: 800; 
            color: #0f172a; 
            letter-spacing: -3px;
            line-height: 0.9;
            text-transform: uppercase;
        }

        .header-brand p { 
            color: #b39359; 
            font-size: 13px; 
            text-transform: uppercase; 
            letter-spacing: 4px; 
            font-weight: 800;
            margin-top: 10px;
        }

        /* CONTEÚDO */
        .container { 
            display: flex; 
            gap: 40px; 
            max-width: 1350px; 
            margin: 0 auto; 
            padding: 0 20px;
            align-items: flex-start; 
        }

        .sidebar { width: 350px; flex-shrink: 0; }

        .form-card { 
            background: #ffffff; 
            padding: 35px; 
            border-radius: 24px; 
            border: 1px solid #e2e8f0;
            box-shadow: 0 10px 25px rgba(0,0,0,0.03);
        }

        .form-card h3 { color: #0f172a; font-size: 11px; text-transform: uppercase; margin-bottom: 25px; border-left: 4px solid #b39359; padding-left: 12px;}

        input, select { 
            width: 100%; padding: 14px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; margin-bottom: 15px;
        }

        #regBtn { 
            width: 100%; padding: 18px; background: #0f172a; color: #fff; border: none; border-radius: 14px; font-weight: 800; cursor: pointer; transition: 0.3s; text-transform: uppercase;
        }

        #regBtn:hover { background: #b39359; transform: translateY(-3px); }

        /* TABELA */
        .table-area { flex: 1; min-width: 0; }
        .data-container { background: #ffffff; border-radius: 24px; border: 1px solid #e2e8f0; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 20px; color: #94a3b8; font-size: 10px; text-transform: uppercase; border-bottom: 2px solid #f1f5f9; }
        td { padding: 20px; border-bottom: 1px solid #f8fafc; font-size: 15px; }
    </style>
</head>
<body>

    <header class="split-header">
        <!-- A imagem nasce na esquerda e vai até o meio, onde encontra o nome -->
        <div class="header-visual"></div>
        <div class="header-brand">
            <h1>Sollene<br>Group</h1>
            <p>Supply Chain & Logistics Division</p>
        </div>
    </header>

    <div class="container">
        <aside class="sidebar">
            <div class="form-card">
                <h3>Shipment Registration</h3>
                <input type="text" id="pName" placeholder="Product Name">
                <input type="text" id="pDest" placeholder="Destination Port">
                <select id="pCurr">
                    <option value="USD">USD ($)</option>
                    <option value="EUR">EUR (€)</option>
                    <option value="BRL">BRL (R$)</option>
                </select>
                <input type="number" id="pPrice" placeholder="Price">
                <input type="number" id="pQty" placeholder="Quantity">
                <button id="regBtn">Register Cargo</button>
            </div>
        </aside>

        <main class="table-area">
            <h2 style="margin-bottom: 20px;">Active Inventory</h2>
            <div class="data-container">
                <table>
                    <thead>
                        <tr>
                            <th>Product</th>
                            <th>Destination</th>
                            <th>Value</th>
                            <th>Quantity</th>
                        </tr>
                    </thead>
                    <tbody id="inventoryList"></tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        document.getElementById('regBtn').addEventListener('click', function() {
            const name = document.getElementById('pName').value;
            const dest = document.getElementById('pDest').value;
            const curr = document.getElementById('pCurr').value;
            const price = document.getElementById('pPrice').value;
            const qty = document.getElementById('pQty').value;

            if (!name || !price || !qty) return alert("Fill all fields.");

            let symbol = curr === "USD" ? "$" : (curr === "EUR" ? "€" : "R$");

            const row = document.getElementById('inventoryList').insertRow();
            row.innerHTML = `
                <td style="font-weight: 700;">${name}</td>
                <td style="color: #64748b;">${dest}</td>
                <td style="color: #b39359; font-weight: 800;">${symbol} ${parseFloat(price).toFixed(2)}</td>
                <td><strong>${qty}</strong> units</td>
            `;
        });
    </script>
</body>
</html>
