<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock Management System</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#0f172a;
    color:white;
    padding:15px;
}

.container{
    width:100%;
    max-width:1500px;
    margin:auto;
}

h1{
    text-align:center;
    margin-bottom:20px;
    color:#38bdf8;
    font-size:30px;
}

/* MAIN LAYOUT */

.main-layout{
    display:flex;
    gap:15px;
    align-items:flex-start;
}

/* LEFT FORM */

.form-box{
    width:260px;
    min-width:260px;
    background:#1e293b;
    padding:16px;
    border-radius:12px;
    position:sticky;
    top:15px;
}

/* FORM FIELDS */

.form-grid{
    display:flex;
    flex-direction:column;
    gap:10px;
}

.form-grid input,
.form-grid select{
    width:100%;
    padding:9px;
    border:none;
    border-radius:7px;
    background:#334155;
    color:white;
    outline:none;
    font-size:13px;
}

input::placeholder{
    color:#cbd5e1;
}

/* BUTTONS */

.buttons{
    margin-top:15px;
    display:flex;
    flex-direction:column;
    gap:8px;
}

button{
    border:none;
    border-radius:7px;
    padding:10px;
    color:white;
    cursor:pointer;
    font-weight:bold;
    transition:0.3s;
    font-size:13px;
}

button:hover{
    transform:scale(1.02);
}

.add-btn{
    background:#16a34a;
}

.update-btn{
    background:#f59e0b;
}

.delete-btn{
    background:#dc2626;
}

/* CONTENT */

.content-area{
    flex:1;
}

/* TABLE */

.table-container{
    width:100%;
    overflow-x:auto;
    border-radius:12px;
}

table{
    width:100%;
    min-width:980px;
    border-collapse:collapse;
    background:#1e293b;
}

th{
    background:#0284c7;
    padding:10px 6px;
    font-size:12px;
    white-space:nowrap;
}

td{
    padding:10px 6px;
    border-bottom:1px solid #334155;
    text-align:center;
    font-size:12px;
    white-space:nowrap;
}

tr:hover{
    background:#334155;
}

/* ACTION BUTTONS */

.action-btn{
    border:none;
    border-radius:5px;
    padding:5px 8px;
    color:white;
    cursor:pointer;
    margin:2px;
    font-size:11px;
}

.edit{
    background:#f59e0b;
}

.remove{
    background:#dc2626;
}

/* SUMMARY */

.summary{
    margin-top:20px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:12px;
}

.card{
    background:#1e293b;
    border-radius:10px;
    padding:18px;
    text-align:center;
}

.card h2{
    color:#38bdf8;
    margin-bottom:8px;
    font-size:16px;
}

.card p{
    font-size:22px;
    font-weight:bold;
}

/* MOBILE */

@media(max-width:900px){

    .main-layout{
        flex-direction:column;
    }

    .form-box{
        width:100%;
        min-width:100%;
        position:relative;
    }

    table{
        min-width:900px;
    }

}

</style>
</head>

<body>

<div class="container">

<h1>STOCK MANAGEMENT SYSTEM</h1>

<div class="main-layout">

<!-- LEFT SIDE -->

<div class="form-box">

<div class="form-grid">

<input type="text" id="productName" placeholder="Product Name">

<select id="unit">
<option value="Kg">Kg</option>
<option value="Ton">Ton</option>
<option value="Package">Package</option>
<option value="Box">Box</option>
</select>

<input type="number" id="entry" placeholder="Entry">

<input type="number" id="exit" placeholder="Exit">

<input type="number" id="price" placeholder="Buy Price">

<select id="currency">
<option value="EUR">EUR</option>
<option value="USD">USD</option>
<option value="BRL">BRL</option>
</select>

<input type="number" id="sellPrice" placeholder="Sell Price">

</div>

<div class="buttons">

<button class="add-btn" onclick="addProduct()">
ADD PRODUCT
</button>

<button class="update-btn" onclick="updateProduct()">
UPDATE PRODUCT
</button>

<button class="delete-btn" onclick="deleteSelected()">
DELETE PRODUCT
</button>

</div>

</div>

<!-- RIGHT SIDE -->

<div class="content-area">

<div class="table-container">

<table>

<thead>

<tr>
<th>Select</th>
<th>Product</th>
<th>Unit</th>
<th>Entry</th>
<th>Exit</th>
<th>Stock</th>
<th>Buy Price</th>
<th>Currency</th>
<th>Sell Price</th>
<th>Profit</th>
<th>Total Value</th>
<th>Actions</th>
</tr>

</thead>

<tbody id="tableBody"></tbody>

</table>

</div>

<div class="summary">

<div class="card">
<h2>Total Products</h2>
<p id="totalProducts">0</p>
</div>

<div class="card">
<h2>Total Stock</h2>
<p id="totalStock">0</p>
</div>

<div class="card">
<h2>Total Inventory Value</h2>
<p id="totalValue">0</p>
</div>

</div>

</div>

</div>

</div>

<script>

let products = [];
let editIndex = -1;

function addProduct(){

const productName = document.getElementById("productName").value;
const unit = document.getElementById("unit").value;
const entry = Number(document.getElementById("entry").value);
const exit = Number(document.getElementById("exit").value);
const price = Number(document.getElementById("price").value);
const currency = document.getElementById("currency").value;
const sellPrice = Number(document.getElementById("sellPrice").value);

if(productName === ""){
alert("Enter product name");
return;
}

const stock = entry - exit;
const profit = (sellPrice - price) * stock;
const totalValue = stock * price;

products.push({
productName,
unit,
entry,
exit,
stock,
price,
currency,
sellPrice,
profit,
totalValue
});

renderTable();
clearInputs();
}

function renderTable(){

const tableBody = document.getElementById("tableBody");
tableBody.innerHTML = "";

let totalStock = 0;
let totalValue = 0;

products.forEach((product,index)=>{

totalStock += product.stock;
totalValue += product.totalValue;

tableBody.innerHTML += `

<tr>

<td>
<input type="checkbox" class="select-product" data-index="${index}">
</td>

<td>${product.productName}</td>
<td>${product.unit}</td>
<td>${product.entry}</td>
<td>${product.exit}</td>
<td>${product.stock}</td>
<td>${product.currency} ${product.price.toFixed(2)}</td>
<td>${product.currency}</td>
<td>${product.currency} ${product.sellPrice.toFixed(2)}</td>
<td>${product.currency} ${product.profit.toFixed(2)}</td>
<td>${product.currency} ${product.totalValue.toFixed(2)}</td>

<td>

<button class="action-btn edit"
onclick="editProduct(${index})">
Edit
</button>

<button class="action-btn remove"
onclick="removeProduct(${index})">
Delete
</button>

</td>

</tr>

`;

});

document.getElementById("totalProducts").innerText = products.length;
document.getElementById("totalStock").innerText = totalStock;
document.getElementById("totalValue").innerText = totalValue.toFixed(2);

}

function clearInputs(){

document.getElementById("productName").value = "";
document.getElementById("entry").value = "";
document.getElementById("exit").value = "";
document.getElementById("price").value = "";
document.getElementById("sellPrice").value = "";

}

function removeProduct(index){

products.splice(index,1);
renderTable();

}

function editProduct(index){

const product = products[index];

document.getElementById("productName").value = product.productName;
document.getElementById("unit").value = product.unit;
document.getElementById("entry").value = product.entry;
document.getElementById("exit").value = product.exit;
document.getElementById("price").value = product.price;
document.getElementById("currency").value = product.currency;
document.getElementById("sellPrice").value = product.sellPrice;

editIndex = index;

}

function updateProduct(){

if(editIndex === -1){
alert("Select a product to edit");
return;
}

const productName = document.getElementById("productName").value;
const unit = document.getElementById("unit").value;
const entry = Number(document.getElementById("entry").value);
const exit = Number(document.getElementById("exit").value);
const price = Number(document.getElementById("price").value);
const currency = document.getElementById("currency").value;
const sellPrice = Number(document.getElementById("sellPrice").value);

const stock = entry - exit;
const profit = (sellPrice - price) * stock;
const totalValue = stock * price;

products[editIndex] = {
productName,
unit,
entry,
exit,
stock,
price,
currency,
sellPrice,
profit,
totalValue
};

renderTable();
clearInputs();

editIndex = -1;

}

function deleteSelected(){

const checkboxes = document.querySelectorAll(".select-product");

const selectedIndexes = [];

checkboxes.forEach((checkbox)=>{

if(checkbox.checked){
selectedIndexes.push(Number(checkbox.dataset.index));
}

});

products = products.filter((_,index)=>
!selectedIndexes.includes(index)
);

renderTable();

}

</script>

</body>
</html>
