<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mediterranea Casino - Player Terminal</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: linear-gradient(135deg, #f4f1ea 0%, #e4ded0 100%);
            min-height: 100vh;
            color: #1a2a3a;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .player-card {
            background: #ffffff;
            border: 1px solid #d1c9bc;
            border-radius: 12px;
            padding: 25px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.05);
        }
        .brand-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            border-bottom: 2px solid #e4ded0;
            padding-bottom: 15px;
        }
        .logo { height: 45px; border-radius: 4px; border: 1px solid #c5a059; }
        .hud-screen {
            background: #020617;
            border-radius: 8px;
            padding: 15px;
            font-family: monospace;
            color: #38bdf8;
            margin-bottom: 20px;
        }
        .hud-line { display: flex; justify-content: space-between; padding: 4px 0; }
        .engine-box {
            background: #1e293b;
            color: #ffffff;
            border-radius: 8px;
            padding: 40px 10px;
            text-align: center;
            font-size: 45px;
            font-weight: bold;
            margin-bottom: 20px;
            border: 1px solid #c5a059;
        }
        .input-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 15px; }
        .input-group label { font-size: 11px; font-weight: 700; text-transform: uppercase; color: #475569; }
        .input-group select, .input-group input { padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; }
        .btn-bet {
            width: 100%; padding: 15px;
            background: linear-gradient(180deg, #d8b467 0%, #b38f43 100%);
            border: none; border-radius: 6px; color: #ffffff;
            font-size: 16px; font-weight: 700; text-transform: uppercase;
            cursor: pointer; letter-spacing: 1px;
        }
        .nav-link { display: block; text-align: center; margin-top: 15px; font-size: 12px; color: #b38f43; text-decoration: none; }
    </style>
</head>
<body>

    <div class="player-card">
        <div class="brand-header">
            <img src="mediterranea.png.png" class="logo" alt="Casino Logo">
            <div>
                <h1 style="font-size: 18px; color: #0b1a30; text-transform: uppercase;">Mediterranea Terminal</h1>
                <p style="font-size: 11px; color: #64748b;">MGA Certified Client Environment</p>
            </div>
        </div>

        <div class="input-group">
            <label>Choose Game</label>
            <select id="game-select" onchange="updateHUD()">
                <option value="SLOTS">🎰 Azure Coast Slots (RTP 96.4%)</option>
                <option value="ROULETTE">🎡 Valletta Roulette (RTP 97.3%)</option>
                <option value="BLACKJACK">🃏 Gozo Blackjack (RTP 99.5%)</option>
            </select>
        </div>

        <div class="input-group">
            <label>Stake Amount (€)</label>
            <input type="number" id="bet-amount" value="10" min="1">
        </div>

        <div class="hud-screen">
            <div class="hud-line"><span>User ID:</span><span>PLY_MALTA_9921</span></div>
            <div class="hud-line"><span>Active Core:</span><span id="hud-game">SLOTS</span></div>
            <div class="hud-line"><span>Your Wallet:</span><span id="hud-balance" style="color: #10b981; font-weight: bold;">€1,000.00</span></div>
        </div>

        <div class="engine-box" id="display">🍋 🍒 💎</div>

        <button class="btn-bet" onclick="playWager()">Place Secure Bet</button>
        
        <a href="igaming-ledger.html" class="nav-link" target="_blank">⚠️ Switch to Administrator & Auditor Dashboard →</a>
    </div>

    <script>
        let balance = parseFloat(localStorage.getItem('p_balance')) || 1000.00;

        function updateHUD() {
            document.getElementById('hud-game').innerText = document.getElementById('game-select').value;
            document.getElementById('hud-balance').innerText = `€${balance.toFixed(2)}`;
            localStorage.setItem('p_balance', balance);
        }

        function playWager() {
            const bet = parseFloat(document.getElementById('bet-amount').value);
            const game = document.getElementById('game-select').value;

            if (isNaN(bet) || bet <= 0 || bet > balance) {
                alert("Invalid funds."); return;
            }

            balance -= bet;
            let isWin = Math.random() > 0.65;
            let payout = isWin ? (game === "SLOTS" ? bet * 5 : bet * 2) : 0;
            balance += payout;
            updateHUD();

            if(game === "SLOTS") {
                const items = ['🍒', '🍋', '💎'];
                document.getElementById('display').innerText = `${items[Math.floor(Math.random()*3)]} ${items[Math.floor(Math.random()*3)]} ${items[Math.floor(Math.random()*3)]}`;
            } else {
                document.getElementById('display').innerText = isWin ? "🎉 WINNER" : "❌ LOSE";
            }

            // Grava a transação no "Banco de Dados centralizado" compartilhado via LocalStorage
            let ledger = JSON.parse(localStorage.getItem('mga_db_ledger')) || [];
            ledger.unshift({
                timestamp: new Date().toLocaleTimeString(),
                tx_id: crypto.randomUUID(),
                game: game,
                bet: bet,
                payout: payout,
                hash: 'sha256-' + Math.random().toString(16).substring(2, 10)
            });
            localStorage.setItem('mga_db_ledger', JSON.stringify(ledger));
        }
        window.onload = updateHUD;
    </script>
</body>
</html>
