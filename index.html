<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sollene Group | Inventory System</title>
    <link href="https://googleapis.com" rel="stylesheet">
    
    <style>
        /* RESET & BASE STYLE */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #fdfcf0; /* Cor creme para harmonizar com o fundo da imagem */
            color: #1a1a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            animation: fadeInPage 1.5s ease-out forwards;
            overflow-x: hidden;
        }

        @keyframes fadeInPage {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 1. BANNER FULL WIDTH (MODELO SOLENNE) */
        .banner-header {
            width: 100%;
            background-color: #fdfcf0;
            line-height: 0;
            border-bottom: 5px solid #b39359; /* Linha dourada de acabamento */
        }

        .banner-header img {
            width: 100%;
            height: auto;
            display: block;
            /* Garante que o topo (letras) e a base (contatos) da imagem apareçam */
            object-fit: contain; 
        }

        /* 2. NAVEGAÇÃO */
        .nav-top {
            width: 100%;
            max-width: 1250px;
            padding: 30px 20px 10px;
            text-align: left;
        }

        .btn-back {
            text-decoration: none;
            color: #b39359;
            border: 1px solid #b39359;
            padding: 10px 25px;
            border-radius: 50px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            transition: 0.3s;
            background: white;
        }

        .btn-back:hover { 
            background: #b39359; 
            color: white;
            box-shadow: 0 5px 15px rgba(179, 147, 89, 0.3);
        }

        /* 3. SISTEMA DE GESTÃO (LAYOUT HARMONIZADO) */
        .main-content {
            display: flex;
            width: 100%;
            max-width: 1250px;
            gap: 30px;
            padding: 20px 20px 80px;
            flex: 1;
        }

        /* Sidebar de Registro */
        .sidebar {
            width: 340px;
            background-color: #1a1a1a;
            color: #b39359;
            padding: 35px 25px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            height: fit-content;
        }

        .sidebar h2 { 
            font-family: 'Playfair Display', serif;
            font-size: 22px; 
            margin-bottom: 30px; 
            text-align: center;
            letter-spacing: 1px;
        }

        input, select {
            width: 100%;
            padding: 14px;
            margin-bottom: 18px;
            border-radius: 12px;
            border: 1px solid #333;
            background: #fff;
            font-size: 14px;
            outline: none;
        }

        .btn-add {
            width: 100%;
            padding: 16px;
            background-color: #b39359;
            color: #000;
            border: none;
            font-weight: 800;
            border-radius: 12px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .btn-add:hover { 
            background: #d4af37; 
            transform: scale(1.02);
        }

        /* Tabela de Produtos */
        .table-container {
            flex: 1;
            background: white;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(179, 147, 89, 0.1);
            border: 1px solid rgba(179, 147, 89, 0.2);
        }

        table { width: 100%; border-collapse: collapse; }
        thead { background-color: #1a1a1a; color: #b39359; }
        th { 
            padding: 20px; 
            font-size: 12px; 
            text-transform: uppercase; 
            letter-spacing: 1.5px;
            text-align: center;
        }
        td { 
            padding: 20px; 
            text-align: center; 
            font-size: 15px; 
            border-bottom: 1px solid #f2f2f2;
            color: #444;
        }
        
        .entry { color: #27ae60; font-weight: 700; }
        .exit { color: #e74c3c; font-weight: 700; }
        .total-val { color: #b39359; font-weight: 800; }

        /* 4. FOOTER COMPLEMENTAR */
        footer {
            width: 100%;
            padding: 40px 20px;
            background-color: #1a1a1a;
            text-align: center;
            color: #555;
            font-size: 11px;
            letter-spacing: 2px;
        }

        /* RESPONSIVIDADE */
        @media (max-width: 1024px) {
            .main-content { flex-direction: column; align-items: center; }
            .sidebar { width: 100%; max-width: 500px; }
        }
    </style>
</head>
<body>

    <!-- BANNER CONFORME O MODELO ENVIADO -->
    <header class="banner-header">
        <img src="sollene-group.jpg" alt="Sollene Group Global Trade">
    </header>

    <nav class="nav-top">
        <a href="index.html" class="btn-back">← Back to Portfolio</a>
    </nav>

    <main class="main-content">
        <!-- REGISTRATION SIDEBAR -->
        <section class="sidebar">
            <h2>Register Product</h2>
            <input type="text" placeholder="Product Name">
            <select>
                <option>Case (Caixa)</option>
                <option>Unit (Unidade)</option>
            </select>
            <input type="number" placeholder="Entry (Entrada)">
            <input type="number" placeholder="Exit (Saída)">
            <select>
                <option>USD ($)</option>
                <option>EUR (€)</option>
            </select>
            <input type="number" placeholder="Unit Price">
            <button class="btn-add">Add to Inventory</button>
        </section>

        <!-- INVENTORY TABLE -->
        <section class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>PRODUCT</th>
                        <th>UNIT</th>
                        <th>ENTRY</th>
                        <th>EXIT</th>
                        <th>STOCK</th>
                        <th>CURRENCY</th>
                        <th>PRICE</th>
                        <th>TOTAL VALUE</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Sollene Reserve Coffee</td>
                        <td>Case</td>
                        <td class="entry">+ 120</td>
                        <td class="exit">- 45</td>
                        <td>75</td>
                        <td>USD</td>
                        <td>$ 8.50</td>
                        <td class="total-val">$ 637.50</td>
                    </tr>
                    <tr>
                        <td>Premium Red Wine</td>
                        <td>Case</td>
                        <td class="entry">+ 200</td>
                        <td class="exit">- 80</td>
                        <td>120</td>
                        <td>EUR</td>
                        <td>€ 12.00</td>
                        <td class="total-val">€ 1,440.00</td>
                    </tr>
                </tbody>
            </table>
        </section>
    </main>

    <footer>
        © 2026 SOLLENE GROUP ENTERPRISE | PRESTIGE IN TECHNOLOGY & TRADE
    </footer>

</body>
</html>
