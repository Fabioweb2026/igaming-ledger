<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sollene Group | Terminal</title>
    <style>
        @import url('https://googleapis.com');
        *{ margin:0; padding:0; box-sizing:border-box; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #fdfaf6; 
            display: flex; flex-direction: column; align-items: center;
        }

        .logo-container { width: 100%; max-width: 1200px; padding: 40px 30px; text-align: center; }
        .logo-img { width: 100%; max-width: 1000px; height: auto; object-fit: contain; }

        .main-grid {
            display: grid; grid-template-columns: 360px 1fr; gap: 30px;
            width: 95%; max-width: 1200px; margin-bottom: 80px;
        }

        /* CARD DARK DO SEU PRINT */
        .sidebar-card {
            background: #1a222e; padding: 35px; border-radius: 24px;
            color: #ffffff; border: 1px solid rgba(179, 147, 89, 0.2);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .sidebar-card h3 { 
            font-size: 12px; text-transform: uppercase; color: #b39359; 
            margin-bottom: 30px; letter-spacing: 3px; text-align: center;
            border-bottom: 1px solid rgba(179, 147, 89, 0.2); padding-bottom: 15px;
        }

        label { font-size: 10px; text-transform: uppercase; color: #94a3b8; display: block; margin-bottom: 8px; font-weight: 700; letter-spacing: 1px; }

        input, select {
            width: 100%; padding: 15px; margin-bottom: 20px; border: 1px solid #2d3748; 
            border-radius: 12px; background: #0f172a; color: #ffffff; outline: none; font-size: 14px;
        }

        .row-group { display: flex; gap: 10px; }

        /* BOTÃO PROCESS TRADE - O SALVADOR */
        #regBtn {
            width: 100%; padding: 20px; background: #b39359; color: #111827; border: none; 
            border-radius: 12px; font-weight: 800; cursor: pointer; text-transform: uppercase; 
            letter-spacing: 2px; transition: 0.4s; margin-top: 10px;
        }
        #regBtn:hover { background: #ffffff; transform: translateY(-3px); }

        /* TABELA */
        .inventory-area { background: #ffffff; border-radius: 24px; border: 1px solid #e5e1da; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 20px; background: #1f2937; color: #b39359; font-size: 10px; text-transform: uppercase; }
        td { padding: 20px; border-bottom: 1px solid #f1f1f1; font-size: 14px; }
        
        .badge { padding: 4px 10px; border-radius: 6px; font-size: 10px; font-weight: 800; text-transform: uppercase; }
        .badge-in { background: #dcfce7; color: #166534; }
        .badge-out { background: #fee2e2; color: #991b1b; }
        
        .btn-delete { background: #fee2e2; color: #991b1b; border: none; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-weight: 800; font-size: 10px; }
    </style>
</head>
<body>

    <div class="logo-container">
        <img src="Sollene-Group.png" alt="Sollene Group Logo" class="logo-img">
    </div>

    <div class="main-grid">
        <aside class="sidebar-card">
            <h3>Shipment Entry</h3>
            
            <label>Product Name</label>
            <input type="text" id="pName" placeholder="Ex: Premium Arabica">
            
            <label>Operation Type</label>
            <select id="pType">
                <option value="In">Import (Entry)</option>
                <option value="Out">Export (Exit)</option>
            </select>

            <label>Purchase Price (Cost)</label>
            <div class="row-group">
                <select id="pCurrBuy" style="flex: 1;">
                    <option value="R$">R$</option>
                    <option value="$">$</option>
                    <option value="€">€</option>
                </select>
                <input type="number" id="pCost" placeholder="0.00" style="flex: 2;">
            </div>

            <label>Sale Price (Revenue)</label>
            <div class="row-group">
                <select id="pCurrSale" style="flex: 1;">
                    <option value="€">€</option>
                    <option value="$">$</option>
                    <option value="R$">R$</option>
                </select>
                <input type="number" id="pSale" placeholder="0.00" style="flex: 2;">
            </div>

            <label>Quantity & Unit</label>
            <div class="row-group">
                <input type="number" id="pQty" placeholder="0" style="flex: 1;">
                <select id="pUnit" style="flex: 1;">
                    <option value="KG">KG</option>
                    <option value="Tons">Tons</option>
                    <option value="Boxes">Boxes</option>
                </select>
            </div>

            <button id="regBtn">Process Trade & Save</button>
        </aside>

        <main class="inventory-area">
            <table>
                <thead>
                    <tr>
                        <th>Status</th>
                        <th>Product</th>
                        <th>Purchase</th>
                        <th>Sale</th>
                        <th>Volume</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="list"></tbody>
            </table>
        </main>
    </div>

    <script>
        const inventoryList = document.getElementById('list');

        // FUNÇÃO PARA SALVAR TUDO NA MEMÓRIA
        function saveData() {
            const items = [];
            document.querySelectorAll('#list tr').forEach(row => {
                items.push({
                    status: row.cells[0].innerText,
                    name: row.cells[1].innerText,
                    purchase: row.cells[2].innerText,
                    sale: row.cells[3].innerText,
                    volume: row.cells[4].innerText
                });
            });
            localStorage.setItem('sollene_database_v1', JSON.stringify(items));
        }

        // CARREGAR DADOS AO ABRIR O SITE
        function loadData() {
            const saved = localStorage.getItem('sollene_database_v1');
            if (saved) {
                JSON.parse(saved).forEach(item => {
                    renderRow(item.status, item.name, item.purchase, item.sale, item.volume);
                });
            }
        }

        function renderRow(status, name, purchase, sale, volume) {
            const row = inventoryList.insertRow();
            const badgeClass = status === 'In' ? 'badge-in' : 'badge-out';
            row.innerHTML = `
                <td><span class="badge ${badgeClass}">${status}</span></td>
                <td><strong>${name}</strong></td>
                <td style="color:#64748b">${purchase}</td>
                <td style="color:#b39359; font-weight:800">${sale}</td>
                <td>${volume}</td>
                <td><button class="btn-delete" onclick="this.closest('tr').remove(); saveData();">DELETE</button></td>
            `;
        }

        window.onload = loadData;

        document.getElementById('regBtn').addEventListener('click', function() {
            const name = document.getElementById('pName').value;
            const type = document.getElementById('pType').value;
            const symBuy = document.getElementById('pCurrBuy').value;
            const cost = document.getElementById('pCost').value;
            const symSale = document.getElementById('pCurrSale').value;
            const sale = document.getElementById('pSale').value;
            const qty = document.getElementById('pQty').value;
            const unit = document.getElementById('pUnit').value;

            if(!name || !cost || !sale || !qty) return alert("Fill all fields.");

            const purchaseVal = `${symBuy} ${parseFloat(cost).toFixed(2)}`;
            const saleVal = `${symSale} ${parseFloat(sale).toFixed(2)}`;
            const volumeVal = `${qty} ${unit}`;

            renderRow(type, name, purchaseVal, saleVal, volumeVal);
            saveData(); // SALVA AUTOMATICAMENTE NO CLIQUE

            // Limpa os campos
            document.getElementById('pName').value = "";
            document.getElementById('pCost').value = "";
            document.getElementById('pSale').value = "";
            document.getElementById('pQty').value = "";
        });
    </script>
</body>
</html>
