<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Stock System</title>

<style>
body{
    font-family: Arial;
    background:#f4f6f9;
    margin:0;
    padding:0;
}

header{
    background:#0b2a4a;
    color:white;
    text-align:center;
    padding:15px;
    font-size:20px;
    font-weight:bold;
}

/* FORM */
.form-container{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    padding:20px;
    justify-content:center;
}

input{
    padding:10px;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    padding:10px 15px;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

.add-btn{
    background:green;
    color:white;
}

/* CARDS */
.container{
    display:flex;
    flex-wrap:wrap;
    gap:15px;
    justify-content:center;
    padding:20px;
}

.card{
    background:white;
    padding:15px;
    width:220px;
    border-radius:10px;
    box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.card h3{
    margin:0;
}

.actions{
    margin-top:10px;
    display:flex;
    justify-content:space-between;
}

.edit{
    background:#f0ad4e;
    color:white;
}

.delete{
    background:#d9534f;
    color:white;
}
</style>
</head>

<body>

<header>STOCK MANAGEMENT SYSTEM</header>

<div class="form-container">
    <input id="name" placeholder="Product Name">
    <input id="unit" placeholder="Unit">
    <input id="entry" placeholder="Entry">
    <input id="exit" placeholder="Exit">
    <input id="price" placeholder="Buy Price">
    <button class="add-btn" onclick="addProduct()">Add Product</button>
</div>

<div class="container" id="list"></div>

<script>
let products = [];

function addProduct(){
    let product = {
        name:document.getElementById("name").value,
        unit:document.getElementById("unit").value,
        entry:Number(document.getElementById("entry").value),
        exit:Number(document.getElementById("exit").value),
        price:Number(document.getElementById("price").value)
    };

    product.stock = product.entry - product.exit;

    products.push(product);
    render();
}

function render(){
    let list = document.getElementById("list");
    list.innerHTML = "";

    products.forEach((p,index)=>{
        list.innerHTML += `
        <div class="card">
            <h3>${p.name}</h3>
            <p>Unit: ${p.unit}</p>
            <p>Entry: ${p.entry}</p>
            <p>Exit: ${p.exit}</p>
            <p><b>Stock: ${p.stock}</b></p>
            <p>Price: ${p.price}</p>

            <div class="actions">
                <button class="edit" onclick="editProduct(${index})">Update</button>
                <button class="delete" onclick="deleteProduct(${index})">Delete</button>
            </div>
        </div>
        `;
    });
}

function deleteProduct(index){
    products.splice(index,1);
    render();
}

function editProduct(index){
    let p = products[index];

    document.getElementById("name").value = p.name;
    document.getElementById("unit").value = p.unit;
    document.getElementById("entry").value = p.entry;
    document.getElementById("exit").value = p.exit;
    document.getElementById("price").value = p.price;

    products.splice(index,1);
    render();
}
</script>

</body>
</html>
