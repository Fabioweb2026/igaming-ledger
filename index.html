
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Solutions | Corporate Inventory</title>
    <style>
        @import url('https://googleapis.com');

        *{ margin:0; padding:0; box-sizing:border-box; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            padding: 50px 20px; 
            background: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%); /* Fundo com degradê suave */
            color: #102a43; 
            display: flex;
            flex-direction: column;
            align-items: center; /* Centraliza tudo horizontalmente */
        }

        /* HEADER DA EMPRESA CENTRALIZADO */
        .company-branding {
            text-align: center;
            margin-bottom: 50px;
        }

        .logo-icon {
            font-size: 50px;
            background: #2563eb;
            width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 20px;
            margin: 0 auto 15px;
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.3);
            color: white;
        }

        .company-branding h1 { 
            font-size: 36px; 
            font-weight: 800; 
            color: #102a43;
            letter-spacing: -1px;
            margin-bottom: 5px;
        }

        .company-info {
            color: #627d98;
            font-size: 14px;
            line-height: 1.6;
        }

        /* FORMULÁRIO ESTILIZADO */
        .main-container {
            width: 100%;
            max-width: 1100px;
        }

        #registration-form { 
            background: white; 
            padding: 35px; 
            border-radius: 24px; 
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            margin-bottom: 40px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            border: 1px solid rgba(255,255,255,0.8);
        }

        input { 
            padding: 15px; 
            border: 2px solid #f0f4f8; 
            border-radius: 12px; 
            flex: 1;
            min-width: 200px;
            font-size: 15px;
            background: #f8fafc;
            transition: 0.3s;
        }

        input:focus { 
            border-color: #2563eb; 
            background: white;
            outline: none;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        #saveBtn { 
            padding: 15px 35px; 
            background: #2563eb; 
            color: white; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            font-weight: 700;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #saveBtn:hover { 
            background: #1d4ed8; 
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2);
        }

        /* TABELA */
        .inventory-section {
            background: white;
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
        }

        .inventory-section h2 {
            margin-bottom: 25px;
            font-size: 22px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        table { width: 100%; border-collapse: collapse; }

        th { 
            text-align: left; 
            padding: 15px; 
            color: #486581; 
            font-size: 12px; 
            text-transform: uppercase; 
            border-bottom: 2px solid #f0f4f8;
        }

        td { padding: 20px 15px; border-bottom: 1px solid #f0f4f8; font-size: 15px; }

        .del-btn {
            background: #ffebf0;
            color: #d64545;
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
        }

        .del-btn:hover { background: #d64545; color: white; }

    </style>
</head>
<body>

    <div class="company-branding">
        <div class="logo-icon">▲</div> <!-- Símbolo da Empresa -->
        <h1>Apex Solutions</h1>
        <div class="company-info">
            <p>123 Corporate Blvd, Suite 500 — Silicon Valley, CA</p>
            <p>support@apexsolutions.com | +1 (555) 0123-4567</p>
        </div>
    </div>

    <div class="main-container">
        <!-- Form Section -->
        <div id="registration-form">
            <input type="text" id="productName" placeholder="Product Name">
            <input type="text" id="supplier" placeholder="Supplier">
            <input type="number" id="price" placeholder="Price (USD)">
            <input type="number" id="stock" placeholder="Stock Qty">
            <button id="saveBtn">Save Product</button>
        </div>

        <!-- Table Section -->
        <div class="inventory-section">
            <h2>📦 Current Inventory Status</h2>
            <table>
                <thead>
                    <tr>
                        <th>Product</th>
                        <th>Supplier</th>
                        <th>Price</th>
                        <th>Stock Qty</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <!-- Data entries -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const saveBtn = document.getElementById('saveBtn');
        const tableBody = document.getElementById('tableBody');

        saveBtn.addEventListener('click', function() {
            const productName = document.getElementById('productName').value;
            const supplier = document.getElementById('supplier').value;
            const price = document.getElementById('price').value;
            const stock = document.getElementById('stock').value;

            if (!productName || !price || !stock) {
                alert("Please fill in the required fields.");
                return;
            }

            const newRow = tableBody.insertRow();
            newRow.innerHTML = `
                <td style="font-weight: 600; color: #243b53;">${productName}</td>
                <td>${supplier || 'N/A'}</td>
                <td style="color: #2563eb; font-weight: 600;">$${parseFloat(price).toFixed(2)}</td>
                <td><span style="background: #e1f5fe; padding: 4px 10px; border-radius: 20px; font-size: 13px;">${stock} units</span></td>
                <td><button class="del-btn" onclick="this.parentElement.parentElement.remove()">DELETE</button></td>
            `;

            document.querySelectorAll('input').forEach(i => i.value = "");
        });
    </script>

</body>
</html>
