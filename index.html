<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terra Global | Import & Export Management</title>
    <style>
        @import url('https://googleapis.com');

        *{ margin:0; padding:0; box-sizing:border-box; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            padding: 50px 20px; 
            /* Fundo com cor de terra/areia e um degradê sofisticado */
            background: linear-gradient(135deg, #e3d5ca 0%, #d5bdaf 100%);
            color: #2f2e2e; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* HEADER ESTILO TRADING COMPANY */
        .company-branding {
            text-align: center;
            margin-bottom: 50px;
        }

        .logo-icon {
            font-size: 40px;
            background: #1b4332; /* Verde Floresta Profundo */
            width: 90px;
            height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            margin: 0 auto 20px;
            box-shadow: 0 10px 25px rgba(27, 67, 50, 0.4);
            color: #d4a373; /* Dourado/Bronze */
            border: 3px solid #d4a373;
        }

        .company-branding h1 { 
            font-size: 42px; 
            font-weight: 800; 
            color: #1b4332;
            letter-spacing: -1.5px;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .company-info {
            color: #582f0e; /* Tom de café */
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .main-container {
            width: 100%;
            max-width: 1150px;
        }

        /* FORMULÁRIO COM CORES DE LUXO */
        #registration-form { 
            background: rgba(255, 255, 255, 0.95); 
            padding: 40px; 
            border-radius: 30px; 
            box-shadow: 0 30px 60px -12px rgba(88, 47, 14, 0.2);
            margin-bottom: 40px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            border: 2px solid #ffffff;
        }

        input { 
            padding: 16px; 
            border: 2px solid #edede9; 
            border-radius: 15px; 
            flex: 1;
            min-width: 220px;
            font-size: 15px;
            background: #fdfdfb;
            transition: 0.3s;
        }

        input:focus { 
            border-color: #d4a373; 
            outline: none;
            box-shadow: 0 0 0 4px rgba(212, 163, 115, 0.2);
        }

        #saveBtn { 
            padding: 16px 40px; 
            background: #1b4332; 
            color: #fefae0; 
            border: none; 
            border-radius: 15px; 
            cursor: pointer; 
            font-weight: 800;
            transition: 0.4s;
            letter-spacing: 1px;
        }

        #saveBtn:hover { 
            background: #2d6a4f; 
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(27, 67, 50, 0.3);
        }

        /* TABELA DE INVENTÁRIO GLOBAL */
        .inventory-section {
            background: #ffffff;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
        }

        .inventory-section h2 {
            margin-bottom: 30px;
            font-size: 24px;
            color: #1b4332;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        table { width: 100%; border-collapse: collapse; }

        th { 
            text-align: left; 
            padding: 20px; 
            color: #a3a3a3; 
            font-size: 12px; 
            text-transform: uppercase; 
            border-bottom: 2px solid #f8f9fa;
        }

        td { padding: 22px 20px; border-bottom: 1px solid #f8f9fa; font-size: 16px; color: #333; }

        /* Estilo para categorias (Alimentos, Bebidas, etc) */
        .category-tag {
            background: #fefae0;
            color: #bc6c25;
            padding: 5px 12px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .del-btn {
            background: #f8f9fa;
            color: #9d0208;
            border: 1px solid #ffccd5;
            padding: 10px 18px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        .del-btn:hover { background: #9d0208; color: white; }

    </style>
</head>
<body>

    <div class="company-branding">
        <div class="logo-icon">🌍</div>
        <h1>Terra Global</h1>
        <div class="company-info">
            <p>AGRICULTURAL COMMODITIES | BRAZILIAN EXPORTS | GLOBAL TRADING</p>
            <p>Port of Santos Office — Brazil | Rotterdam Hub — Netherlands</p>
        </div>
    </div>

    <div class="main-container">
        <!-- Dashboard Form -->
        <div id="registration-form">
            <input type="text" id="productName" placeholder="Product (e.g. Coffee, Tobacco, Wine)">
            <input type="text" id="origin" placeholder="Origin/Destination">
            <input type="number" id="price" placeholder="Unit Price (USD)">
            <input type="number" id="stock" placeholder="Tons/Quantity">
            <button id="saveBtn">REGISTER SHIPMENT</button>
        </div>

        <!-- Inventory List -->
        <div class="inventory-section">
            <h2>🚢 Global Shipment Tracking</h2>
            <table>
                <thead>
                    <tr>
                        <th>Commodity</th>
                        <th>Origin/Dest</th>
                        <th>Price/Unit</th>
                        <th>Quantity</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <!-- Dynamic Rows -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const saveBtn = document.getElementById('saveBtn');
        const tableBody = document.getElementById('tableBody');

        saveBtn.addEventListener('click', function() {
            const product = document.getElementById('productName').value;
            const origin = document.getElementById('origin').value;
            const price = document.getElementById('price').value;
            const stock = document.getElementById('stock').value;

            if (!product || !price || !stock) {
                alert("Please fill in the shipment details.");
                return;
            }

            const newRow = tableBody.insertRow();
            newRow.innerHTML = `
                <td style="font-weight: 700; color: #1b4332;">${product}</td>
                <td><span class="category-tag">${origin || 'Global'}</span></td>
                <td style="font-weight: 700; color: #bc6c25;">$${parseFloat(price).toFixed(2)}</td>
                <td><strong>${stock}</strong> <small>units</small></td>
                <td><button class="del-btn" onclick="this.parentElement.parentElement.remove()">CANCEL</button></td>
            `;

            document.querySelectorAll('input').forEach(i => i.value = "");
        });
    </script>

</body>
</html>
