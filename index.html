<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sollene Group ERP</title>

<style>

/* ================= BASE ================= */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:linear-gradient(135deg,#f7f1e1,#e9dcc2);
}

/* ================= HERO ================= */

.hero{
position:relative;
height:360px;
overflow:hidden;
border-bottom:4px solid black;
}

.hero img{
width:100%;
height:100%;
object-fit:cover;
object-position:center 30%;
filter:brightness(0.6);
}

.hero-overlay{
position:absolute;
inset:0;
background:linear-gradient(
135deg,
rgba(0,0,0,0.35),
rgba(0,0,0,0.75)
);
}

.hero-content{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
color:white;
width:90%;
}

.badge{
display:inline-block;
padding:6px 12px;
border:1px solid #d4af37;
color:#d4af37;
border-radius:20px;
font-size:11px;
margin-bottom:10px;
}

.hero-content h1{
font-size:46px;
letter-spacing:5px;
}

.hero-content p{
opacity:0.85;
margin-top:5px;
}

/* ================= LOGIN ================= */

.login-box{
margin:20px auto 0;
width:320px;
background:rgba(0,0,0,0.75);
border:1px solid rgba(212,175,55,0.5);
padding:20px;
border-radius:12px;
backdrop-filter:blur(8px);
}

.login-box h3{
color:#d4af37;
margin-bottom:10px;
}

.login-box input{
width:100%;
padding:10px;
margin:5px 0;
border:none;
border-radius:5px;
}

.login-box button{
width:100%;
padding:10px;
margin-top:5px;
background:#d4af37;
border:none;
cursor:pointer;
font-weight:bold;
}

/* ================= DASHBOARD ================= */

.hero-stats{
display:flex;
justify-content:center;
gap:15px;
margin-top:20px;
flex-wrap:wrap;
}

.stat-box{
background:rgba(0,0,0,0.45);
border:1px solid rgba(212,175,55,0.4);
padding:12px 16px;
border-radius:10px;
min-width:120px;
}

.stat-box h3{
color:#d4af37;
}

/* ================= CONTAINER ================= */

.container{
display:flex;
padding:15px;
gap:15px;
}

/* ================= FORM ================= */

.form-box{
width:30%;
}

.card{
background:rgba(0,0,0,0.92);
border:2px solid #d4af37;
border-radius:12px;
padding:15px;
color:white;
}

.card h3{
margin-bottom:10px;
}

.card input,
.card select{
width:100%;
padding:10px;
margin:6px 0;
border:none;
border-radius:5px;
}

.card button{
width:100%;
padding:10px;
background:#d4af37;
border:none;
cursor:pointer;
font-weight:bold;
}

/* ================= TABLE ================= */

.table-box{
width:70%;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
border:1px solid black;
padding:10px;
text-align:center;
}

th{
background:black;
color:white;
}

</style>
</head>

<body>

<!-- ================= HERO ================= -->

<div class="hero">

<img src="sollene-group.jpg" alt="Sollene Group">

<div class="hero-overlay"></div>

<div class="hero-content">

<div class="badge">ENTERPRISE SYSTEM</div>

<h1>SOLLENE GROUP</h1>

<p>Stock Management Dashboard</p>

<!-- DASHBOARD -->

<div class="hero-stats">

<div class="stat-box">
<h3 id="totalProducts">0</h3>
<span>Products</span>
</div>

<div class="stat-box">
<h3 id="totalStock">0</h3>
<span>Stock</span>
</div>

<div class="stat-box">
<h3 id="totalValue">R$ 0</h3>
<span>Total Value</span>
</div>

</div>

<!-- LOGIN -->

<div class="login-box">

<h3>ERP LOGIN</h3>

<input type="text" id="user" placeholder="User">

<input type="password" id="pass" placeholder="Password">

<button onclick="login()">LOGIN</button>

<button onclick="registerUser()">REGISTER</button>

<p style="font-size:11px;margin-top:8px;opacity:0.7;">
admin / 1234
</p>

</div>

</div>
</div>

<!-- ================= SYSTEM ================= -->

<div class="container">

<!-- FORM -->

<div class="form-box">

<div class="card">

<h3>REGISTER PRODUCT</h3>

<input type="text" id="name" placeholder="Product Name">

<input type="number" id="entry" placeholder="Entry">

<input type="number" id="exit" placeholder="Exit">

<select id="currency">
<option value="BRL">BRL</option>
<option value="USD">USD</option>
<option value="EUR">EUR</option>
</select>

<input type="number" id="price" placeholder="Price">

<button id="addBtn" onclick="addProduct()" disabled>
LOGIN TO ADD
</button>

</div>

</div>

<!-- TABLE -->

<div class="table-box">

<table>

<thead>

<tr>
<th>Product</th>
<th>Entry</th>
<th>Exit</th>
<th>Stock</th>
<th>BRL</th>
<th>USD</th>
<th>EUR</th>
</tr>

</thead>

<tbody id="tableBody"></tbody>

</table>

</div>

</div>

<script>

/* ================= PRODUCTS ================= */

let products = [];

const USD = 5.15;
const EUR = 5.78;

/* ================= LOGIN ================= */

function registerUser(){

let user = document.getElementById("user").value;
let pass = document.getElementById("pass").value;

if(!user || !pass){
alert("Fill all fields");
return;
}

localStorage.setItem("erp_user_" + user, pass);

alert("User created successfully");

}

function login(){

let user = document.getElementById("user").value;
let pass = document.getElementById("pass").value;

if(user === "admin" && pass === "1234"){

unlockSystem();

return;

}

let saved = localStorage.getItem("erp_user_" + user);

if(saved && saved === pass){

unlockSystem();

}else{

alert("Invalid login");

}

}

function unlockSystem(){

document.getElementById("addBtn").disabled = false;

document.getElementById("addBtn").innerText = "ADD PRODUCT";

}

/* ================= ADD PRODUCT ================= */

function addProduct(){

let name = document.getElementById("name").value;

let entry = Number(document.getElementById("entry").value);

let exit = Number(document.getElementById("exit").value);

let price = Number(document.getElementById("price").value);

let currency = document.getElementById("currency").value;

let stock = entry - exit;

let priceBRL;

if(currency === "USD"){
priceBRL = price * USD;
}
else if(currency === "EUR"){
priceBRL = price * EUR;
}
else{
priceBRL = price;
}

products.push({
name,
entry,
exit,
stock,
priceBRL
});

updateDashboard();

updateTable();

}

/* ================= DASHBOARD ================= */

function updateDashboard(){

let totalProducts = products.length;

let totalStock = 0;

let totalValue = 0;

products.forEach(p=>{

totalStock += p.stock;

totalValue += p.stock * p.priceBRL;

});

document.getElementById("totalProducts").innerText = totalProducts;

document.getElementById("totalStock").innerText = totalStock;

document.getElementById("totalValue").innerText =
"R$ " + totalValue.toFixed(2);

}

/* ================= TABLE ================= */

function updateTable(){

let html = "";

products.forEach(p=>{

let usd = (p.priceBRL / USD).toFixed(2);

let eur = (p.priceBRL / EUR).toFixed(2);

html += `
<tr>

<td>${p.name}</td>

<td>${p.entry}</td>

<td>${p.exit}</td>

<td>${p.stock}</td>

<td>R$ ${p.priceBRL.toFixed(2)}</td>

<td>$ ${usd}</td>

<td>€ ${eur}</td>

</tr>
`;

});

document.getElementById("tableBody").innerHTML = html;

}

</script>

</body>
</html>
