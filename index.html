<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sollene Group | Terminal</title>
    <style>
        @import url('https://googleapis.com');
        *{ margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #fdfaf6; color: #1a1a1a; padding-bottom: 60px; display: flex; flex-direction: column; align-items: center; }
        
        .back-link { align-self: flex-start; margin: 20px 0 0 40px; text-decoration: none; color: #b39359; font-weight: 800; font-size: 11px; text-transform: uppercase; background: rgba(31,41,55,0.05); padding: 8px 15px; border-radius: 50px; }

        .hero-banner {
            width: 100%; max-width: 1200px; height: 320px; background-color: #f7f4ed;
            background-image: url('image.jpg');
            background-repeat: no-repeat; background-position: center; background-size: contain; border-radius: 28px; margin-top: 10px; border: 1px solid #e5e1da; box-shadow: 0 20px 40px rgba(0,0,0,0.04);
        }
        .hero-banner {
  .hero-banner {
    width: 100%;
    max-width: 1200px;
    height: 320px;
    background-color: #f7f4ed;
    /* Caminho relativo direto, já que a imagem está na mesma pasta */
    background-image: url('image.jpg'); 
    background-repeat: no-repeat;
    background-position: center;
    background-size: cover;
    margin: 0 auto;
    border-radius: 20px; /* Opcional: para combinar com o portfólio */
}
       .company-header { text-align: center; margin: 40px 0; }
        .company-header h1 { font-size: 56px; font-weight: 800; color: #1f2937; text-transform: uppercase; }
        
        .main-grid { display: grid; grid-template-columns: 360px 1fr; gap: 30px; width: 100%; max-width: 1200px; padding: 0 20px; }
        .sidebar-card { background: #1f2937; padding: 40px 30px; border-radius: 30px; color: #ffffff; border-top: 4px solid #b39359; }
        
        input, select { width: 100%; padding: 16px; margin-bottom: 20px; border: 1px solid #374151; border-radius: 14px; background: #111827; color: #ffffff; outline: none; }
        #regBtn { width: 100%; padding: 20px; background: #b39359; color: #111827; border: none; border-radius: 16px; font-weight: 800; cursor: pointer; text-transform: uppercase; }
        
        .inventory-area { background-color: #f2ede4; background-image: radial-gradient(#d6cdc0 1.5px, transparent 1.5px); background-size: 30px 30px; border-radius: 30px; min-height: 550px; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 24px 20px; background: #1f2937; color: #b39359; font-size: 10px; text-transform: uppercase; }
        td { padding: 24px 20px; border-bottom: 1px solid rgba(212, 163, 115, 0.2); font-size: 15px; background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(4px); }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">← Voltar ao Portfólio</a>
    <div class="hero-banner"></div>
    <header class="company-header">
        <h1>Sollene Group</h1>
        <p>Premium Logistics & Global Trade</p>
    </header>
    <div class="main-grid">
        <aside class="sidebar-card">
            <h3>Registro de Carga</h3>
            <input type="text" id="pName" placeholder="Produto">
            <input type="text" id="pDest" placeholder="Destino">
            <select id="pCurr"><option value="USD">USD ($)</option></select>
            <input type="number" id="pPrice" placeholder="Preço">
            <input type="number" id="pQty" placeholder="Qtd">
            <button id="regBtn">Registrar</button>
        </aside>
        <main class="inventory-area">
            <table>
                <thead><tr><th>Produto</th><th>Destino</th><th>Valor</th><th>Volume</th></tr></thead>
                <tbody id="list"></tbody>
            </table>
        </main>
    </div>
    <script>
        const inventoryList = document.getElementById('list');
        function saveData() {
            const rows = [];
            document.querySelectorAll('#list tr').forEach(row => { rows.push(row.innerHTML); });
            localStorage.setItem('solleneData', JSON.stringify(rows));
        }
        function loadData() {
            const saved = localStorage.getItem('solleneData');
            if (saved) { JSON.parse(saved).forEach(rowData => { const row = inventoryList.insertRow(); row.innerHTML = rowData; }); }
        }
        window.onload = loadData;
        document.getElementById('regBtn').addEventListener('click', function() {
            const n = document.getElementById('pName').value;
            const p = document.getElementById('pPrice').value;
            const q = document.getElementById('pQty').value;
            if(!n || !p || !q) return alert("Preencha tudo.");
            const row = inventoryList.insertRow();
            row.innerHTML = `<td>${n}</td><td>${document.getElementById('pDest').value}</td><td style="color:#b39359; font-weight:800">$ ${parseFloat(p).toFixed(2)}</td><td>${q} unidades</td>`;
            saveData();
            document.querySelectorAll('input').forEach(i => i.value = "");
        });
    </script>
</body>
</html>
