<script>

/* ===================================
   CLEAR OLD STORAGE
=================================== */

localStorage.removeItem("inventory");

/* ===================================
   NEW INVENTORY
=================================== */

let inventory = [];

/* ===================================
   TABLE
=================================== */

const tableBody =
document.getElementById("table-body");

/* ===================================
   RENDER TABLE
=================================== */

function renderTable(){

    tableBody.innerHTML = "";

    inventory.forEach(function(item){

        tableBody.innerHTML += `
        <tr>
            <td>${item.product}</td>
            <td>${item.unit}</td>
            <td>${item.currency}</td>
            <td class="entry">+${item.entry}</td>
            <td class="exit">-${item.exit}</td>
            <td>${item.stock}</td>
            <td>${item.price}</td>
            <td>${item.total}</td>
            <td class="cash">${item.cash}</td>
        </tr>
        `;

    });

}

/* ===================================
   ADD PRODUCT
=================================== */

document
.getElementById("addButton")
.addEventListener("click", function(){

    const product =
    document.getElementById("product")
    .value
    .trim();

    const unit =
    document.getElementById("unit")
    .value;

    const currency =
    document.getElementById("currency")
    .value;

    const entry =
    parseFloat(
        document.getElementById("entry").value
    ) || 0;

    const exit =
    parseFloat(
        document.getElementById("exit").value
    ) || 0;

    const price =
    parseFloat(
        document.getElementById("price").value
    ) || 0;

    /* VALIDATION */

    if(product === ""){

        alert("Enter product name");

        return;
    }

    if(price <= 0){

        alert("Enter valid price");

        return;
    }

    /* CALCULATIONS */

    const stock = entry - exit;

    const total =
    (stock * price).toFixed(2);

    const cash =
    (exit * price).toFixed(2);

    /* OBJECT */

    const item = {

        product: product,
        unit: unit,
        currency: currency,
        entry: entry,
        exit: exit,
        stock: stock,
        price: price.toFixed(2),
        total: total,
        cash: cash

    };

    /* PUSH */

    inventory.push(item);

    /* UPDATE TABLE */

    renderTable();

    /* CLEAR FORM */

    document.getElementById("product").value = "";
    document.getElementById("entry").value = "0";
    document.getElementById("exit").value = "0";
    document.getElementById("price").value = "0";

});

/* ===================================
   SAVE BUTTON
=================================== */

document
.getElementById("saveButton")
.addEventListener("click", function(){

    localStorage.setItem(
        "inventory",
        JSON.stringify(inventory)
    );

    alert("Inventory saved successfully!");

});

/* ===================================
   INITIAL
=================================== */

renderTable();

</script>
