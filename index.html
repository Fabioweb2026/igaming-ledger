<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sollene Group | Executive Dashboard</title>
    <style>
        @import url('https://googleapis.com');
        
        *{ margin:0; padding:0; box-sizing:border-box; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #fdfaf6; 
            color: #1a1a1a; 
            display: flex; flex-direction: column; align-items: center;
        }

        /* HEADER POLIDO */
        .logo-container { width: 100%; max-width: 1200px; padding: 40px 30px; text-align: center; }
        .logo-img { width: 100%; max-width: 900px; height: auto; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.08)); object-fit: contain; }

        /* GRID PRINCIPAL */
        .main-grid {
            display: grid; grid-template-columns: 350px 1fr; gap: 30px;
            width: 95%; max-width: 1200px; margin-bottom: 80px;
        }

        /* CARD DARK POLIDO */
        .sidebar-card {
            background: #111827; padding: 30px; border-radius: 24px;
            color: #ffffff; border: 1px solid rgba(179, 147, 89, 0.2);
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.4); height: fit-content;
        }

        .sidebar-card h3 { font-size: 18px; font-weight: 800; color: #ffffff; margin-bottom: 25px; border-left: 4px solid #b39359; padding-left: 15px; }

        label { font-size: 9px; text-transform: uppercase; color: #b39359; display: block; margin-bottom: 8px; font-weight: 800; letter-spacing: 2px; }

        input, select {
            width: 100%; padding: 14px; margin-bottom: 18px; border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 12px; background: rgba(255, 255, 255, 0.03); color: #ffffff; outline: none; font-size: 14px; transition: 0.3s;
        }
        select option { background-color: #ffffff; color: #111827; }
        input:focus, select:focus { border-color: #b39359; background: rgba(255, 255, 255, 0.07); }

        .row-group { display: flex; gap: 10px; }

        /* BOTÃO COM EFEITO DE BRILHO */
        #regBtn {
            width: 100%; padding: 20px; background: #b39359; color: #111827; border: none; 
            border-radius: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; 
            cursor: pointer; transition: 0.4s; box-shadow: 0 4px 15px rgba(179, 147, 89, 0.3);
        }
        #regBtn:hover { background: #ffffff; transform: translateY(-3px); box-shadow: 0 10px 25px rgba(179, 147, 89, 0.4); }

        /* TABELA DE ALTA PERFORMANCE */
        .inventory-area { background: #ffffff; border-radius: 24px; border: 1px solid #e5e1da; overflow: hidden; box-shadow: 0 15px 35px rgba(0,0,0,0.03); }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 20px 15px; background: #1f2937; color: #b39359; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; }
        td { padding: 20px 15px; border-bottom: 1px solid #f1f1f1; font-size: 14px; }
        tr:hover { background: #fafafa; }

        .badge { padding: 5px 12px; border-radius: 6px; font-size: 9px; font-weight: 800; }
        .badge-in { background: #ecfdf5; color: #059669; }
        .badge-out { background: #fef2f2; color: #dc2626; }

        /* DESTAQUE FINANCEIRO */
        .profit-pos { color: #059669; font-weight: 800; background: #f0fdf4; padding: 5px 10px; border-radius: 8px; }
        .profit-neg { color: #dc2626; font-weight: 800; background: #fef2f2; padding: 5px 10px; border-radius: 8px; }

        .btn-delete { background: #fee2e2; color: #991b1b; border: none; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-weight: 800; font-size: 9px; transition: 0.3s; }
        .btn-delete:hover { background: #991b1b; color: #ffffff; }

        /* RODAPÉ PREMIUM */
        .footer-premium { background: #000000; color: #ffffff; padding: 80px 20px; text-align: center; border-top: 4px solid #b39359; width: 100%; }
        .social-btn { text-decoration: none; color: #ffffff; font-size: 11px; padding: 12px 30px; border: 1px solid rgba(179, 147, 89, 0.4); border-radius: 50px; text-transform: uppercase; margin: 0 10px; display: inline-block; transition: 0.4s; }
        .social-btn:hover { background: #b39359; color: #000000; border-color: #b39359; }

        @media(max-width: 900px) { .main-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="logo-container">
        <img src="Sollene-Group.png" alt="Sollene Group Logo" class="logo-img">
    </div>

    <div class="main-grid">
        <aside class="sidebar-card">
            <h3>Trade Entry</h3>
            
            <label>Identification</label>
            <input type="text" id="pName" placeholder="Ex: Premium Coffee Beans">
            
            <label>Market Flow</label>
            <select id="pType">
                <option value="In">Import (Entry)</option>
                <option value="Out">Export (Exit)</option>
            </select>

            <label>Acquisition (BRL)</label>
            <div class="row-group">
                <select id="pCurrBuy" style="flex: 1;">
                    <option value="R$">R$</option>
                    <option value="$">$</option>
                    <option value="€">€</option>
                </select>
                <input type="number" id="pCost" placeholder="0.00" style="flex: 2;">
            </div>

            <label>Market Sale (EUR)</label>
            <div class="row-group">
                <select id="pCurrSale" style="flex: 1;">
                    <option value="€">€</option>
                    <option value="$">$</option>
                    <option value="R$">R$</option>
                </select>
                <input type="number" id="pSale" placeholder="0.00" style="flex: 2;">
            </div>

            <label>Volume Control</label>
            <div class="row-group">
                <input type="number" id="pQty" placeholder="Qty" style="flex: 1;">
                <select id="pUnit" style="flex: 1;">
                    <option value="Boxes">Boxes</option>
                    <option value="Tons">Tons</option>
                    <option value="KG">KG</option>
                </select>
            </div>

            <button id="regBtn">Process Trade & Save</button>
        </aside>

        <main class="inventory-area">
            <table>
                <thead>
                    <tr>
                        <th>Status</th>
                        <th>Product</th>
                        <th>Purchase</th>
                        <th>Target Sale</th>
                        <th>Volume</th>
                        <th>Net Profit</th>
                        <th>Admin</th>
                    </tr>
                </thead>
                <tbody id="list"></tbody>
            </table>
        </main>
    </div>

    <footer class="footer-premium">
        <div style="margin-bottom: 30px;">
            <a href="https://linkedin.com" target="_blank" class="social-btn">LinkedIn Profile</a>
            <a href="https://github.com" target="_blank" class="social-btn">GitHub Repo</a>
            <a href="https://wa.me" target="_blank" class="social-btn">WhatsApp</a>
        </div>
        <p style="font-size: 10px; color: #b39359; letter-spacing: 3px; opacity: 0.8;">SOLLENE GROUP ENTERPRISE • MARINA BUSINESS AVENUE • VALLETTA, MALTA</p>
    </footer>

    <script>
        const inventoryList = document.getElementById('list');

        function saveData() {
            const items = [];
            document.querySelectorAll('#list tr').forEach(row => {
                items.push({
                    statusHtml: row.cells[0].innerHTML,
                    name: row.cells[1].innerText,
                    purchase: row.cells[2].innerText,
                    sale: row.cells[3].innerText,
                    volume: row.cells[4].innerText,
                    profit: row.cells[5].innerText,
                    profitClass: row.cells[5].className
                });
            });
            localStorage.setItem('sollene_luxury_db', JSON.stringify(items));
        }

        function loadData() {
            const saved = localStorage.getItem('sollene_luxury_db');
            if (saved) {
                JSON.parse(saved).forEach(item => {
                    renderRow(item.statusHtml, item.name, item.purchase, item.sale, item.volume, item.profit, item.profitClass);
                });
            }
        }

        function renderRow(statusHtml, name, purchase, sale, volume, profit, profitClass) {
            const row = inventoryList.insertRow();
            row.innerHTML = `
                <td>${statusHtml}</td>
                <td><strong>${name}</strong></td>
                <td style="color:#64748b">${purchase}</td>
                <td style="color:#b39359; font-weight:800">${sale}</td>
                <td>${volume}</td>
                <td><span class="${profitClass}">${profit}</span></td>
                <td><button class="btn-delete" onclick="this.closest('tr').remove(); saveData();">DELETE</button></td>
            `;
        }

        window.onload = loadData;

        document.getElementById('regBtn').addEventListener('click', function() {
            const name = document.getElementById('pName').value;
            const type = document.getElementById('pType').value;
            const cost = parseFloat(document.getElementById('pCost').value);
            const sale = parseFloat(document.getElementById('pSale').value);
            const qty = parseFloat(document.getElementById('pQty').value);
            const unit = document.getElementById('pUnit').value;
            const symBuy = document.getElementById('pCurrBuy').value;
            const symSale = document.getElementById('pCurrSale').value;

            if(!name || isNaN(cost) || isNaN(sale) || isNaN(qty)) return alert("Preencha todos os campos obrigatórios.");

            const totalProfit = (sale - cost) * qty;
            const profitClass = totalProfit >= 0 ? 'profit-pos' : 'profit-neg';
            const formattedProfit = `${symSale} ${totalProfit.toLocaleString('en-US', {minimumFractionDigits: 2})}`;
            
            const purchaseVal = `${symBuy} ${cost.toLocaleString('en-US', {minimumFractionDigits: 2})}`;
            const saleVal = `${symSale} ${sale.toLocaleString('en-US', {minimumFractionDigits: 2})}`;
            const volumeVal = `${qty} ${unit}`;
            const statusHtml = `<span class="badge ${type === 'In' ? 'badge-in' : 'badge-out'}">${type}</span>`;

            renderRow(statusHtml, name, purchaseVal, saleVal, volumeVal, formattedProfit, profitClass);
            saveData();

            // Limpeza suave dos campos
            document.getElementById('pName').value = "";
            document.getElementById('pCost').value = "";
            document.getElementById('pSale').value = "";
            document.getElementById('pQty').value = "";
        });
    </script>
</body>
</html>
