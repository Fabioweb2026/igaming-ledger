
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terra Global | Import & Export Management</title>
    <style>
        /* Importando a fonte corretamente */
        @import url('https://googleapis.com');

        *{ margin:0; padding:0; box-sizing:border-box; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            padding: 50px 20px; 
            
            /* CORREÇÃO DO FUNDO: Apontando para o seu arquivo empresa.png */
            /* O linear-gradient serve como uma película escura para você conseguir ler o texto */
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.6)), 
                        url('empresa.png') no-repeat center center fixed;
            background-size: cover;
            
            color: #ffffff; /* Texto branco para contrastar com a foto escura */
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* HEADER */
        .company-branding {
            text-align: center;
            margin-bottom: 50px;
        }

        .logo-icon {
            font-size: 40px;
            background: #1b4332; 
            width: 90px;
            height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            margin: 0 auto 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            color: #d4a373; 
            border: 3px solid #d4a373;
        }

        .company-branding h1 { 
            font-size: 48px; 
            font-weight: 800; 
            color: #ffffff;
            letter-spacing: -1.5px;
            margin-bottom: 5px;
            text-transform: uppercase;
            text-shadow: 2px 2px 15px rgba(0,0,0,0.7);
        }

        .company-info {
            color: #ffffff; 
            font-size: 14px;
            font-weight: 700;
            background: rgba(27, 67, 50, 0.8);
            padding: 8px 20px;
            border-radius: 50px;
            display: inline-block;
            backdrop-filter: blur(5px);
        }

        .main-container {
            width: 100%;
            max-width: 1150px;
        }

        /* FORMULÁRIO COM EFEITO VIDRO (GLASSMORPHISM) */
        #registration-form { 
            background: rgba(255, 255, 255, 0.92); 
            backdrop-filter: blur(10px);
            padding: 40px; 
            border-radius: 30px; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
            margin-bottom: 40px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            border: 1px solid rgba(255,255,255,0.3);
        }

        input { 
            padding: 16px; 
            border: 2px solid #edede9; 
            border-radius: 15px; 
            flex: 1;
            min-width: 200px;
            font-size: 15px;
            background: #ffffff;
            transition: 0.3s;
            color: #333;
        }

        input:focus { border-color: #d4a373; outline: none; box-shadow: 0 0 10px rgba(212, 163, 115, 0.3); }

        #saveBtn { 
            padding: 16px 40px; 
            background: #1b4332; 
            color: #ffffff; 
            border: none; 
            border-radius: 15px; 
            cursor: pointer; 
            font-weight: 800;
            transition: 0.4s;
            letter-spacing: 1px;
        }

        #saveBtn:hover { transform: translateY(-5px); background: #2d6a4f; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }

        /* TABELA */
        .inventory-section {
            background: rgba(255, 255, 255, 0.98);
            padding: 40px;
            border-radius: 30px;
            color: #333;
        }

        .inventory-section h2 { margin-bottom: 30px; color: #1b4332; font-weight: 800; }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 20px; color: #64748b; font-size: 12px; text-transform: uppercase; border-bottom: 2px solid #f1f5f9; }
        td { padding: 22px 20px; border-bottom: 1px solid #f1f5f9; font-size: 16px; font-weight: 500; }

        .category-tag { background: #fefae0; color: #bc6c25; padding: 5px 12px; border-radius: 10px; font-size: 12px; font-weight: 700; }

        .del-btn { background: #fee2e2; color: #dc2626; border: none; padding: 10px 18px; border-radius: 12px; cursor: pointer; font-weight: 700; transition: 0.3s; }
        .del-btn:hover { background: #dc2626; color: white; }
    </style>
</head>
<body>

    <div class="company-branding">
        <div class="logo-icon">🌍</div>
        <h1>Terra Global</h1>
        <div class="company-info">
            <p>AGRICULTURAL COMMODITIES | BRAZILIAN EXPORTS | GLOBAL TRADING</p>
        </div>
    </div>

    <div class="main-container">
        <div id="registration-form">
            <input type="text" id="productName" placeholder="Product (e.g. Coffee, Tobacco)">
            <input type="text" id="origin" placeholder="Origin/Destination">
            <input type="number" id="price" placeholder="Price (USD)">
            <input type="number" id="stock" placeholder="Quantity">
            <button id="saveBtn">REGISTER SHIPMENT</button>
        </div>

        <div class="inventory-section">
            <h2>🚢 Global Shipment Tracking</h2>
            <table>
                <thead>
                    <tr>
                        <th>Commodity</th>
                        <th>Origin/Dest</th>
                        <th>Price/Unit</th>
                        <th>Quantity</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        const saveBtn = document.getElementById('saveBtn');
        const tableBody = document.getElementById('tableBody');

        saveBtn.addEventListener('click', function() {
            const product = document.getElementById('productName').value;
            const origin = document.getElementById('origin').value;
            const price = document.getElementById('price').value;
            const stock = document.getElementById('stock').value;

            if (!product || !price || !stock) {
                alert("Please fill in the details.");
                return;
            }

            const newRow = tableBody.insertRow();
            newRow.innerHTML = `
                <td style="font-weight: 800; color: #1b4332;">${product}</td>
                <td><span class="category-tag">${origin || 'Global'}</span></td>
                <td style="font-weight: 800; color: #bc6c25;">$${parseFloat(price).toFixed(2)}</td>
                <td><strong>${stock}</strong> units</td>
                <td><button class="del-btn" onclick="this.parentElement.parentElement.remove()">CANCEL</button></td>
            `;

            document.querySelectorAll('input').forEach(i => i.value = "");
        });
    </script>
</body>
</html>
