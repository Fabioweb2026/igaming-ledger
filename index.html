<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sollene Group | Inventory System</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

/* =========================
   RESET
========================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Plus Jakarta Sans',sans-serif;
    background:#f6f4ea;
    overflow-x:hidden;
}

/* =========================
   BANNER
========================= */

.banner-header{
    width:100%;
    height:140px;
    margin-top:20px;
    overflow:hidden;
    border-bottom:3px solid #b39359;
}

.banner-header img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* =========================
   MAIN LAYOUT
========================= */

.main-content{
    max-width:1250px;
    margin:auto;
    display:grid;
    grid-template-columns:340px 1fr;
    gap:25px;
    padding:25px;
}

/* =========================
   SIDEBAR
========================= */

.sidebar{
    background:#1a1a1a;
    padding:25px;
    border-radius:18px;
    color:#b39359;
}

.sidebar h2{
    margin-bottom:20px;
    font-size:22px;
}

/* =========================
   FORM GRID
========================= */

.form-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
}

/* =========================
   INPUTS
========================= */

.form-grid input,
.form-grid select{
    width:100%;
    height:45px;
    border:none;
    border-radius:10px;
    padding:0 12px;
    outline:none;
    font-size:14px;
    font-family:'Plus Jakarta Sans',sans-serif;
}

/* FULL WIDTH */

.full{
    grid-column:1 / -1;
}

/* =========================
   BUTTONS
========================= */

button{
    width:100%;
    height:45px;
    border:none;
    border-radius:10px;
    font-weight:700;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.02);
}

.add-btn{
    background:#b39359;
    color:#000;
}

.save-btn{
    background:#27ae60;
    color:#fff;
}

/* =========================
   TABLE
========================= */

.table-container{
    background:#fff;
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

table{
    width:100%;
    border-collapse:collapse;
}

thead{
    background:#1a1a1a;
    color:#b39359;
}

th,
td{
    padding:15px;
    text-align:center;
    border-bottom:1px solid #eee;
    font-size:14px;
}

.entry{
    color:#27ae60;
    font-weight:700;
}

.exit{
    color:#e74c3c;
    font-weight:700;
}

.cash{
    color:#b39359;
    font-weight:700;
}

/* =========================
   FOOTER
========================= */

footer{
    margin-top:40px;
    background:#1a1a1a;
    color:#777;
    text-align:center;
    padding:25px;
}

/* =========================
   RESPONSIVE
========================= */

@media(max-width:900px){

.main-content{
    grid-template-columns:1fr;
}

.form-grid{
    grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<!-- =========================
     BANNER
========================= -->

<header class="banner-header">
    <img src="sollene-group.jpg" alt="Sollene Group">
</header>

<!-- =========================
     MAIN CONTENT
========================= -->

<div class="main-content">

    <!-- SIDEBAR -->

    <div class="sidebar">

        <h2>Register Product</h2>

        <div class="form-grid">

            <!-- PRODUCT -->

            <input
                type="text"
                id="product"
                class="full"
                placeholder="Product Name"
            >

            <!-- UNIT -->

            <select id="unit">
                <option>Kg</option>
                <option>Ton</option>
                <option>Box</option>
            </select>

            <!-- CURRENCY -->

            <select id="currency">
                <option>USD</option>
                <option>EUR</option>
                <option>BRL</option>
            </select>

            <!-- ENTRY -->

            <input
                type="number"
                id="entry"
                placeholder="Entry"
            >

            <!-- EXIT -->

            <input
                type="number"
                id="exit"
                placeholder="Exit"
            >

            <!-- PRICE -->

            <input
                type="number"
                id="price"
                class="full"
                placeholder="Price"
            >

            <!-- BUTTON ADD -->

            <button
                type="button"
                class="add-btn full"
                onclick="addProduct()"
            >
                Add Product
            </button>

            <!-- BUTTON SAVE -->

            <button
                type="button"
                class="save-btn full"
                onclick="saveInventory()"
            >
                Save Inventory
            </button>

        </div>

    </div>

    <!-- TABLE -->

    <div class="table-container">

        <table>

            <thead>
                <tr>
                    <th>Product</th>
                    <th>Unit</th>
                    <th>Currency</th>
                    <th>Entry</th>
                    <th>Exit</th>
                    <th>Stock</th>
                    <th>Price</th>
                    <th>Total</th>
                    <th>Cash</th>
                </tr>
            </thead>

            <tbody id="table-body"></tbody>

        </table>

    </div>

</div>

<!-- FOOTER -->

<footer>
© 2026 SOLLENE GROUP | INVENTORY SYSTEM
</footer>

<!-- =========================
     JAVASCRIPT
========================= -->

<script>

document.addEventListener("DOMContentLoaded", () => {

/* =========================
   STORAGE
========================= */

let inventory =
JSON.parse(localStorage.getItem("inventory")) || [];

/* =========================
   ADD PRODUCT
========================= */

window.addProduct = function(){

    let productField =
    document.getElementById("product");

    let unitField =
    document.getElementById("unit");

    let currencyField =
    document.getElementById("currency");

    let entryField =
    document.getElementById("entry");

    let exitField =
    document.getElementById("exit");

    let priceField =
    document.getElementById("price");

    /* VALUES */

    let product =
    productField.value.trim();

    let unit =
    unitField.value;

    let currency =
    currencyField.value;

    let entry =
    Number(entryField.value) || 0;

    let exit =
    Number(exitField.value) || 0;

    let price =
    Number(priceField.value) || 0;

    /* VALIDATION */

    if(product === ""){
        alert("Enter product name");
        return;
    }

    if(price <= 0){
        alert("Enter valid price");
        return;
    }

    /* CALCULATIONS */

    let stock = entry - exit;

    let total = stock * price;

    let cash = exit * price;

    /* OBJECT */

    let item = {
        product,
        unit,
        currency,
        entry,
        exit,
        stock,
        price,
        total,
        cash
    };

    /* ADD */

    inventory.push(item);

    /* SAVE */

    localStorage.setItem(
        "inventory",
        JSON.stringify(inventory)
    );

    /* RENDER */

    renderTable();

    /* CLEAR FORM */

    productField.value = "";
    entryField.value = "";
    exitField.value = "";
    priceField.value = "";

}

/* =========================
   TABLE
========================= */

function renderTable(){

    let table =
    document.getElementById("table-body");

    table.innerHTML = "";

    inventory.forEach(item => {

        table.innerHTML += `
        <tr>
            <td>${item.product}</td>
            <td>${item.unit}</td>
            <td>${item.currency}</td>
            <td class="entry">+${item.entry}</td>
            <td class="exit">-${item.exit}</td>
            <td>${item.stock}</td>
            <td>${item.price.toFixed(2)}</td>
            <td>${item.total.toFixed(2)}</td>
            <td class="cash">${item.cash.toFixed(2)}</td>
        </tr>
        `;

    });

}

/* =========================
   SAVE BUTTON
========================= */

window.saveInventory = function(){

    localStorage.setItem(
        "inventory",
        JSON.stringify(inventory)
    );

    alert("Inventory saved successfully!");

}

/* =========================
   LOAD TABLE
========================= */

renderTable();

});

</script>

</body>
</html>
