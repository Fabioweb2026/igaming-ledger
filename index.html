<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NeoStock Enterprise</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial;
}

body {
    background: #0a0a0a;
    color: white;
}

/* HEADER EMPRESA */
header {
    text-align: center;
    padding: 20px;
    border-bottom: 1px solid #222;
}

header h1 {
    font-size: 28px;
    color: #00ffcc;
    letter-spacing: 2px;
}

header p {
    font-size: 12px;
    color: #aaa;
}

/* LAYOUT */
.container {
    display: flex;
    height: 90vh;
}

/* FORMULÁRIO */
.form-box {
    width: 25%;
    background: #111;
    padding: 20px;
    border-right: 1px solid #222;
}

.form-box h2 {
    margin-bottom: 15px;
    color: #00ffcc;
}

.form-box input {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    background: #000;
    border: 1px solid #333;
    color: white;
}

.form-box button {
    width: 100%;
    padding: 10px;
    background: #00ffcc;
    border: none;
    cursor: pointer;
    font-weight: bold;
}

/* CENTRO IMAGEM */
.center {
    width: 30%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    border-right: 1px solid #222;
}

.center img {
    width: 220px;
    height: 220px;
    object-fit: cover;
    border-radius: 50%;
    border: 3px solid #00ffcc;
}

.center h2 {
    margin-top: 15px;
    color: #00ffcc;
    letter-spacing: 2px;
}

.center p {
    font-size: 12px;
    color: #aaa;
    text-align: center;
    margin-top: 10px;
    padding: 0 20px;
}

/* TABELA */
.table-box {
    width: 45%;
    padding: 20px;
    overflow-y: auto;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    padding: 10px;
    border: 1px solid #222;
    text-align: center;
}

th {
    background: #00ffcc;
    color: #000;
}
</style>
</head>

<body>

<header>
    <h1>NEOSTOCK ENTERPRISE</h1>
    <p>Rua das Tecnologias, 1024 - São Paulo, SP - Brazil</p>
</header>

<div class="container">

<!-- FORM -->
<div class="form-box">
    <h2>Register</h2>

    <input type="text" id="name" placeholder="Product Name">
    <input type="number" id="entry" placeholder="Entry">
    <input type="number" id="exit" placeholder="Exit">
    <input type="number" id="price" placeholder="Price">

    <button onclick="addProduct()">ADD PRODUCT</button>
</div>

<!-- CENTRO EMPRESA -->
<div class="center">
    <img src="https://images.unsplash.com/photo-1520607162513-77705c0f0d4a" alt="Company">
    <h2>NEOSTOCK</h2>
    <p>
        Enterprise Stock Management System<br>
        Secure • Fast • Intelligent Inventory Control
    </p>
</div>

<!-- TABELA -->
<div class="table-box">
    <h2>Stock Register</h2>

    <table>
        <thead>
            <tr>
                <th>Product</th>
                <th>Entry</th>
                <th>Exit</th>
                <th>Price</th>
                <th>Stock</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

</div>

<script>
function addProduct() {
    let name = document.getElementById("name").value;
    let entry = Number(document.getElementById("entry").value);
    let exit = Number(document.getElementById("exit").value);
    let price = Number(document.getElementById("price").value);

    let stock = entry - exit;

    let table = document.getElementById("tableBody");

    table.innerHTML += `
        <tr>
            <td>${name}</td>
            <td>${entry}</td>
            <td>${exit}</td>
            <td>$${price.toFixed(2)}</td>
            <td>${stock}</td>
        </tr>
    `;
}
</script>

</body>
</html>
