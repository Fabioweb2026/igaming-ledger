<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sollene Group | Terminal</title>
    <style>
        @import url('https://googleapis.com');

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #fdfaf6; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding-bottom: 60px; 
        }

        .back-link { 
            align-self: flex-start; 
            margin: 20px 0 0 40px; 
            text-decoration: none; 
            color: #b39359; 
            font-weight: 800; 
            font-size: 11px; 
            text-transform: uppercase; 
            background: rgba(31,41,55,0.05); 
            padding: 8px 15px; 
            border-radius: 50px; 
        }

        /* BANNER RESTAURADO */
        .hero-banner { 
            width: 95%; 
            max-width: 1200px; 
            height: 480px; 
            background-image: url('https://github.io'); 
            background-size: cover; 
            background-position: center; 
            border-radius: 28px; 
            margin-top: 20px; 
            border: 1px solid #e5e1da; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.06); 
        }

        .company-header { text-align: center; margin: 40px 0; }
        .company-header h1 { font-size: 56px; font-weight: 800; color: #1f2937; text-transform: uppercase; }

        /* GRID E ESTRUTURA */
        .main-grid { 
            display: grid; 
            grid-template-columns: 360px 1fr; 
            gap: 30px; 
            width: 100%; 
            max-width: 1200px; 
            padding: 0 20px; 
        }

        .sidebar-card { 
            background: #1f2937; 
            padding: 40px 30px; 
            border-radius: 30px; 
            color: #ffffff; 
            border-top: 4px solid #b39359; 
            height: fit-content; 
        }

        .sidebar-card h3 { margin-bottom: 25px; font-size: 22px; }
        
        input, select { 
            width: 100%; 
            padding: 16px; 
            margin-bottom: 15px; 
            border: 1px solid #374151; 
            border-radius: 14px; 
            background: #111827; 
            color: #ffffff; 
            outline: none; 
        }

        #regBtn { 
            width: 100%; 
            padding: 20px; 
            background: #b39359; 
            color: #111827; 
            border: none; 
            border-radius: 16px; 
            font-weight: 800; 
            cursor: pointer; 
            text-transform: uppercase; 
        }

        /* ÁREA DA TABELA */
        .inventory-area { 
            background-color: #f2ede4; 
            border-radius: 30px; 
            min-height: 550px; 
            overflow: hidden; 
            border: 1px solid #e5e1da; 
        }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 24px 20px; background: #1f2937; color: #b39359; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; }
        td { padding: 24px 20px; border-bottom: 1px solid rgba(212, 163, 115, 0.15); font-size: 14px; background: rgba(255, 255, 255, 0.3); }

    </style>
</head>
<body>

    <a href="index.html" class="back-link">← Voltar ao Portfólio</a>
    
    <div class="hero-banner"></div>

    <header class="company-header">
        <h1>Sollene Group</h1>
        <p>Premium Logistics & Global Trade</p>
    </header>

    <div class="main-grid">
        <aside class="sidebar-card">
            <h3>Registro de Carga</h3>
            <input type="text" id="pName" placeholder="Produto">
            <input type="text" id="pDest" placeholder="Destino">
            <input type="number" id="pPrice" placeholder="Valor">
            <input type="number" id="pQty" placeholder="Quantidade">
            
            <select id="pUnit">
                <option value="Pacotes">Pacotes</option>
                <option value="Unidades">Unidades</option>
                <option value="Caixas">Caixas</option>
                <option value="Kg">Kg</option>
            </select>

            <select id="pType">
                <option value="ENTRADA">ENTRADA</option>
                <option value="SAÍDA">SAÍDA</option>
            </select>

            <button id="regBtn">Registrar</button>
        </aside>

        <main class="inventory-area">
            <table>
                <thead>
                    <tr>
                        <th>PRODUTO</th>
                        <th>DESTINO</th>
                        <th>TIPO</th>
                        <th>VALOR</th>
                        <th>QUANTIDADE</th>
                        <th>UNIDADE</th>
                        <th>SALDO</th>
                    </tr>
                </thead>
                <tbody id="list"></tbody>
            </table>
        </main>
    </div>

    <script>
        // Sistema de Saldo e Persistência
        let saldos = JSON.parse(localStorage.getItem('solleneSaldos')) || {};
        const inventoryList = document.getElementById('list');

        function salvarTudo() {
            localStorage.setItem('solleneTableHTML', JSON.stringify(inventoryList.innerHTML));
            localStorage.setItem('solleneSaldos', JSON.stringify(saldos));
        }

        window.onload = () => {
            const tabelaSalva = localStorage.getItem('solleneTableHTML');
            if (tabelaSalva) inventoryList.innerHTML = JSON.parse(tabelaSalva);
        };

        document.getElementById('regBtn').addEventListener('click', function() {
            const nome = document.getElementById('pName').value.trim();
            const dest = document.getElementById('pDest').value.trim();
            const valor = document.getElementById('pPrice').value;
            const qtd = parseInt(document.getElementById('pQty').value) || 0;
            const unidade = document.getElementById('pUnit').value;
            const tipo = document.getElementById('pType').value;

            if(!nome || !qtd) return alert("Por favor, preencha o nome do produto e a quantidade.");

            // Lógica de cálculo do Saldo
            if(!saldos[nome]) saldos[nome] = 0;
            if(tipo === "ENTRADA") {
                saldos[nome] += qtd;
            } else {
                saldos[nome] -= qtd;
            }

            // Criar a nova linha
            const row = inventoryList.insertRow(0); // Insere no topo
            const corTipo = tipo === "ENTRADA" ? "#27ae60" : "#e74c3c";
            
            row.innerHTML = `
                <td>${nome}</td>
                <td>${dest}</td>
                <td style="color: ${corTipo}; font-weight:800">${tipo}</td>
                <td style="color: #b39359; font-weight:800">$ ${parseFloat(valor).toFixed(2)}</td>
                <td>${qtd}</td>
                <td>${unidade}</td>
                <td style="font-weight: 800; background: rgba(179, 147, 89, 0.05);">${saldos[nome]} ${unidade}</td>
            `;

            salvarTudo();

            // Limpar campos
            document.getElementById('pName').value = "";
            document.getElementById('pQty').value = "";
            document.getElementById('pPrice').value = "";
        });
    </script>
</body>
</html>
