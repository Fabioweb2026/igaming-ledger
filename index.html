
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sollene Group | Multi Currency Inventory</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

html, body {
    margin: 0;
    padding: 0;
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: #f6f4ea;
}

/* BANNER */
.banner-header {
    width: 100%;
    height: 140px;
    margin-top: 20px;
    overflow: hidden;
    border-bottom: 3px solid #b39359;
}

.banner-header img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* LAYOUT */
.main-content {
    max-width: 1200px;
    margin: auto;
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: 25px;
    padding: 25px;
}

/* SIDEBAR */
.sidebar {
    background: #1a1a1a;
    color: #b39359;
    padding: 25px;
    border-radius: 18px;
}

.sidebar h2 {
    margin-bottom: 20px;
}

/* CAMPOS */
input, select {
    width: 100%;
    height: 42px;
    margin-bottom: 10px;
    border-radius: 10px;
    border: none;
    padding: 0 10px;
    box-sizing: border-box;
}

/* BOTÃO */
button {
    width: 100%;
    height: 45px;
    border-radius: 10px;
    border: none;
    background: #b39359;
    font-weight: bold;
    cursor: pointer;
}

/* TABLE */
.table-container {
    background: white;
    border-radius: 18px;
    overflow: hidden;
}

table {
    width: 100%;
    border-collapse: collapse;
}

thead {
    background: #1a1a1a;
    color: #b39359;
}

th, td {
    padding: 15px;
    text-align: center;
    border-bottom: 1px solid #eee;
}

.cash {
    color: #27ae60;
    font-weight: bold;
}

</style>
</head>

<body>

<header class="banner-header">
    <img src="sollene-group.jpg">
</header>

<div class="main-content">

<div class="sidebar">
    <h2>Register Product</h2>

    <input id="name" placeholder="Product">

    <select id="buyCurrency">
        <option value="EUR">Buy EUR</option>
        <option value="USD">Buy USD</option>
        <option value="BRL">Buy BRL</option>
    </select>

    <input id="cost" type="number" placeholder="Cost (buy)">

    <select id="sellCurrency">
        <option value="EUR">Sell EUR</option>
        <option value="USD">Sell USD</option>
        <option value="BRL">Sell BRL</option>
    </select>

    <input id="sell" type="number" placeholder="Sell value">

    <input id="qty" type="number" placeholder="Quantity">

    <button onclick="add()">Add Product</button>
</div>

<div class="table-container">
<table>

<thead>
<tr>
<th>Product</th>
<th>Buy</th>
<th>Sell</th>
<th>Qty</th>
<th>Cost USD</th>
<th>Revenue USD</th>
<th>Cash</th>
</tr>
</thead>

<tbody id="table"></tbody>

</table>
</div>

</div>

<script>

/* taxa fixa (pode depois vir API real) */
const rates = {
EUR: 1.08,
USD: 1,
BRL: 0.20
};

let inventory = [];

function convert(value, currency){
return value * rates[currency];
}

function add(){

let name=document.getElementById('name').value;

let buyCur=document.getElementById('buyCurrency').value;
let cost=+document.getElementById('cost').value;

let sellCur=document.getElementById('sellCurrency').value;
let sell=+document.getElementById('sell').value;

let qty=+document.getElementById('qty').value;

/* CONVERSÃO */
let costUSD = convert(cost, buyCur) * qty;
let revenueUSD = convert(sell, sellCur) * qty;

/* LUCRO */
let cash = revenueUSD - costUSD;

inventory.push({
name,
buyCur,
sellCur,
qty,
costUSD,
revenueUSD,
cash
});

render();

}

function render(){

let table=document.getElementById('table');
table.innerHTML="";

inventory.forEach(i=>{

table.innerHTML+=`
<tr>
<td>${i.name}</td>
<td>${i.buyCur}</td>
<td>${i.sellCur}</td>
<td>${i.qty}</td>
<td>${i.costUSD.toFixed(2)}</td>
<td>${i.revenueUSD.toFixed(2)}</td>
<td class="cash">${i.cash.toFixed(2)}</td>
</tr>
`;

});

}

</script>

</body>
</html>
