<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mediterranea Platform - Player Gateway</title>
    <script src="https://jsdelivr.net"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: linear-gradient(135deg, #f4f1ea 0%, #e4ded0 100%);
            min-height: 100vh;
            color: #1a2a3a;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .app-container {
            background: #ffffff;
            border: 1px solid #d1c9bc;
            border-radius: 14px;
            padding: 30px;
            width: 100%;
            max-width: 550px;
            box-shadow: 0 12px 32px rgba(0,0,0,0.06);
        }
        .header-block {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
            border-bottom: 2px solid #e4ded0;
            padding-bottom: 15px;
        }
        .logo-img { height: 45px; border-radius: 4px; border: 1px solid #c5a059; }
        
        .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
        .form-group label { font-size: 11px; font-weight: 700; text-transform: uppercase; color: #475569; }
        .form-group input, .form-group select { padding: 12px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 14px; background: #fff; color: #1a2a3a; }
        
        .player-hud {
            background: #020617;
            border-radius: 8px;
            padding: 15px;
            font-family: monospace;
            color: #38bdf8;
            margin-bottom: 20px;
        }
        .hud-line { display: flex; justify-content: space-between; padding: 4px 0; }

        .lobby-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; margin-bottom: 15px; }
        .game-tile {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .game-tile:hover { border-color: #c5a059; background: #fffdf9; transform: translateY(-2px); }

        .visual-matrix {
            background: #1e293b;
            color: #ffffff;
            border-radius: 8px;
            padding: 40px 10px;
            text-align: center;
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 20px;
            border: 1px solid #c5a059;
            letter-spacing: 4px;
        }

        .btn-prime {
            width: 100%; padding: 14px;
            background: linear-gradient(180deg, #d8b467 0%, #b38f43 100%);
            border: none; border-radius: 6px; color: #ffffff;
            font-size: 15px; font-weight: 700; text-transform: uppercase;
            cursor: pointer; letter-spacing: 1px;
        }
        .btn-sec { background: #475569; margin-top: 10px; width: 100%; padding: 10px; border: none; color: white; border-radius: 6px; cursor: pointer; font-size: 12px; }
        .alert-bar { padding: 10px; background: #fee2e2; color: #991b1b; border-radius: 6px; font-size: 12px; margin-bottom: 15px; display: none; }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- GLOBAL PLATFORM HEADER -->
        <div class="header-block">
            <img src="mediterranea.png.png" class="logo-img" alt="Casino Brand">
            <div>
                <h1 style="font-size: 18px; color: #0b1a30; text-transform: uppercase; letter-spacing: 0.5px;">BlackSea Platform</h1>
                <p style="font-size: 11px; color: #64748b;">MGA Regulated Player Environment Node</p>
            </div>
        </div>

        <div id="error-alert" class="alert-bar"></div>

        <!-- STAGE 1: REGISTRATION (VISIBLE BY DEFAULT) -->
        <section id="screen-auth" class="view-section" style="display: block;">
            <h2 style="font-size: 14px; margin-bottom: 15px; text-transform: uppercase; color: #0b1a30;">Player Identity Registration</h2>
            <div class="form-group">
                <label>Desired Player ID (Compliance Registry)</label>
                <input type="text" id="reg-player-id" placeholder="e.g. PLY_MALTA_77" value="PLY_MALTA_9921">
            </div>
            <div class="form-group">
                <label>KYC Residence Country</label>
                <select id="reg-country">
                    <option value="Malta">Malta (MGA Domestic)</option>
                    <option value="Italy">Italy (EU Cross-Border)</option>
                    <option value="Germany">Germany (EU Cross-Border)</option>
                </select>
            </div>
            <div class="form-group">
                <label>Initial Wallet Deposit Ingestion (€)</label>
                <input type="number" id="reg-deposit" value="1000" min="10">
            </div>
            <button class="btn-prime" onclick="registerPlayerSession()">Initialize Account & Wallet</button>
        </section>

        <!-- STAGE 2: CASINO LOBBY (HIDDEN BY DEFAULT WITH INLINE STYLE) -->
        <section id="screen-lobby" class="view-section" style="display: none;">
            <div class="player-hud">
                <div class="hud-line"><span>Identity Reference:</span><span id="lobby-hud-id" style="color:white;">-</span></div>
                <div class="hud-line"><span>Ingested Wallet Balance:</span><span id="lobby-hud-wallet" style="color:#10b981; font-weight:bold;">€0.00</span></div>
            </div>
            <h2 style="font-size: 13px; text-transform: uppercase; color: #475569; margin-bottom: 10px;">Select Certified iGaming Matrix</h2>
            <div class="lobby-grid">
                <div class="game-tile" onclick="launchEngine('SLOTS')">
                    <div style="font-size:28px;">🎰</div>
                    <div style="font-weight:700; font-size:13px; margin-top:5px;">Azure Coast Slots</div>
                    <div style="font-size:10px; color:#64748b;">RTP 96.4%</div>
                </div>
                <div class="game-tile" onclick="launchEngine('ROULETTE')">
                    <div style="font-size:28px;">🎡</div>
                    <div style="font-weight:700; font-size:13px; margin-top:5px;">Valletta Roulette</div>
                    <div style="font-size:10px; color:#64748b;">RTP 97.3%</div>
                </div>
            </div>
            <button class="btn-sec" onclick="logoutPlayer()">Disconnect Session</button>
        </section>

        <!-- STAGE 3: ACTIVE GAMEPLAY TERMINAL (HIDDEN BY DEFAULT WITH INLINE STYLE) -->
        <section id="screen-game" class="view-section" style="display: none;">
            <div class="player-hud">
                <div class="hud-line"><span>Account:</span><span id="game-hud-id" style="color:white;">-</span></div>
                <div class="hud-line"><span>Active Core Engine:</span><span id="game-hud-core" style="color:#38bdf8; font-weight:bold;">-</span></div>
                <div class="hud-line"><span>Available Cash:</span><span id="game-hud-wallet" style="color:#10b981; font-weight:bold;">€0.00</span></div>
            </div>

            <div class="form-group" style="margin-top: 15px;">
                <label>Bet Stake Value (€)</label>
                <input type="number" id="wager-amount" value="20" min="1">
            </div>

            <div class="visual-matrix" id="matrix-display">---</div>

            <button class="btn-prime" onclick="executeCloudWager()">Commit Verified Bet</button>
            <button class="btn-sec" onclick="returnToLobby()">← Return to Platform Lobby</button>
        </section>
    </div>

    <script>
        // CLIENT ENVIRONMENT CONFIGURATION
        const SUPABASE_URL = "YOUR_SUPABASE_PROJECT_URL";
        const SUPABASE_ANON_KEY = "YOUR_SUPABASE_ANON_KEY";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let sessionActive = { playerId: "", balance: 0, country: "", activeGame: "" };

        function showAlert(msg) {
            const el = document.getElementById('error-alert');
            el.innerText = msg; el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 4000);
        }

        // FORCE HARD INTERFACE STYLE SWITCHING TO PREVENT STACKING OVERLAYS
        function switchView(targetId) {
            document.getElementById('screen-auth').style.display = 'none';
            document.getElementById('screen-lobby').style.display = 'none';
            document.getElementById('screen-game').style.display = 'none';
            
            document.getElementById(targetId).style.display = 'block';
        }

        function registerPlayerSession() {
            const idInput = document.getElementById('reg-player-id').value.trim();
            const depositInput = parseFloat(document.getElementById('reg-deposit').value);
            const countrySelect = document.getElementById('reg-country').value;

            if(!idInput || isNaN(depositInput) || depositInput <= 0) {
                showAlert("Validation Failed: Check structural registration fields."); return;
            }

            sessionActive.playerId = idInput;
            sessionActive.balance = depositInput;
            sessionActive.country = countrySelect;

            document.getElementById('lobby-hud-id').innerText = sessionActive.playerId;
            document.getElementById('lobby-hud-wallet').innerText = `€${sessionActive.balance.toFixed(2)}`;
            
            switchView('screen-lobby');
        }

        function launchEngine(gameType) {
            sessionActive.activeGame = gameType;
