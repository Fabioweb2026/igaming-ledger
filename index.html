<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>iGaming Ledger</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet" href="styles.css">

<style>

body{
    background:#070a13;
    color:#f8fafc;
    font-family:'Inter','Segoe UI',system-ui,sans-serif;
    margin:0;
    min-height:100vh;
}

.hero-banner{
    width:100%;
    background:#090d16;
    overflow:hidden;
}

.logo-img{
    width:100%;
    max-height:380px;
    object-fit:cover;
}

.brand-container{
    text-align:center;
    padding:25px;
}

h1{
    font-size:38px;
    font-weight:900;
    letter-spacing:3px;
}

.subtitle{
    color:#38bdf8;
    font-size:12px;
    letter-spacing:3px;
    margin-top:8px;
}

.grid-container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    max-width:1000px;
    margin:40px auto;
    padding:20px;
}

.panel-card{
    background:#111827;
    border-radius:16px;
    padding:30px;
    text-align:center;
    text-decoration:none;
    color:white;
    transition:0.3s;
    border:1px solid transparent;
}

.panel-card:hover{
    transform:translateY(-5px);
    border-color:#38bdf8;
}

.panel-icon{
    font-size:42px;
    margin-bottom:15px;
}

.panel-title{
    font-size:18px;
    font-weight:800;
    margin-bottom:10px;
}

.panel-desc{
    color:#94a3b8;
    font-size:14px;
}

.compliance-bar{
    background:#04060c;
    padding:24px;
    display:flex;
    justify-content:center;
    gap:30px;
    margin-top:50px;
}

.comp-link{
    color:#94a3b8;
    text-decoration:none;
    font-size:13px;
}

</style>
</head>

<body>

<!-- BANNER -->
<div class="hero-banner">

    <!-- CONFIRA O NOME REAL DA IMAGEM -->
    <img src="mediterranea.png.png" alt="Banner" class="logo-img">

</div>

<!-- LOGO / TITULO -->
<div class="brand-container">

    <h1>IGAMING LEDGER</h1>

    <div class="subtitle">
        Malta Gaming Authority Compliant
    </div>

</div>

<!-- CARDS PRINCIPAIS -->
<div class="grid-container">

    <!-- USER REGISTER -->
    <a href="cadastro.html" class="panel-card">

        <div class="panel-icon">
            👤
        </div>

        <div class="panel-title">
            USER REGISTER
        </div>

        <div class="panel-desc">
            Create and verify a new player account.
        </div>

    </a>

    <!-- ADMIN LOGIN -->
   <a href="login-admin.html" class="panel-card">

        <div class="panel-icon">
            🛡️
        </div>

        <div class="panel-title">
            ADMIN LOGIN
        </div>

        <div class="panel-desc">
            Administrative management access panel.
        </div>

    </a>

    <!-- AUDIT ACCESS -->
    <a href="audit.html" class="panel-card">

        <div class="panel-icon">
            📊
        </div>

        <div class="panel-title">
            AUDIT ACCESS
        </div>

        <div class="panel-desc">
            Compliance and transaction audit monitoring.
        </div>

    </a>

</div>

<!-- FOOTER -->
<footer class="compliance-bar">

    <a href="admin.html" class="comp-link">
        CONTROL PANEL
    </a>

    <a href="audit.html" class="comp-link">
        COMPLIANCE AUDIT
    </a>

</footer>

<script src="script.js"></script>

</body>
</html>
