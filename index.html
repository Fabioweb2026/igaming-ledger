
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sollene Group ERP</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial;
}

/* FUNDO PREMIUM */
body {
    background: linear-gradient(135deg, #f7f1e1, #e9dcc2);
}

/* ===== TOP LOGO PROFISSIONAL ===== */
.top {
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 15px;
    background: #000;
}

.top img {
    height: 70px;
    object-fit: contain;
}

.top h1 {
    color: #d4af37;
    margin-left: 15px;
    font-size: 22px;
    letter-spacing: 2px;
}

/* SUB HEADER */
.sub {
    text-align: center;
    padding: 10px;
    font-size: 12px;
    color: #5c4a24;
}

/* LAYOUT */
.container {
    display: flex;
    height: 80vh;
}

/* ===== CARD REGISTER (SOFISTICADO) ===== */
.form-box {
    width: 28%;
    padding: 20px;
}

/* CARD PRINCIPAL */
.card {
    background: rgba(0,0,0,0.85);
    border: 2px solid #d4af37;
    border-radius: 12px;
    padding: 15px;
    color: white;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

.card h2 {
    color: #d4af37;
    margin-bottom: 10px;
    text-align: center;
}

/* INPUTS */
.card input {
    width: 100%;
    padding: 10px;
    margin: 6px 0;
    border: 1px solid #333;
    background: #111;
    color: white;
    border-radius: 6px;
}

/* BOTÃO */
.card button {
    width: 100%;
    padding: 10px;
    background: #d4af37;
    border: none;
    color: black;
    font-weight: bold;
    cursor: pointer;
    border-radius: 6px;
    margin-top: 10px;
}

/* TABELA */
.table-box {
    width: 72%;
    padding: 20px;
}

table {
    width: 100%;
    border-collapse: collapse;
    background: white;
    border: 2px solid black;
}

th, td {
    padding: 10px;
    border: 1px solid black;
    text-align: center;
}

th {
    background: black;
    color: white;
}
</style>
</head>

<body>

<!-- LOGO SUPERIOR PROFISSIONAL -->
<div class="top">
    <img src="sollene-group.jpg" alt="Logo">
    <h1>SOLLENE GROUP</h1>
</div>

<div class="sub">
    Av. Paulista, 1500 - São Paulo, SP - Brazil | Corporate Stock System
</div>

<div class="container">

<!-- FORMULÁRIO CARD -->
<div class="form-box">
    <div class="card">
        <h2>REGISTER PRODUCT</h2>

        <input type="text" id="name" placeholder="Product Name">
        <input type="text" id="rg" placeholder="RG Code">

        <input type="number" id="entry" placeholder="Entry (kg)">
        <input type="number" id="exit" placeholder="Exit (kg)">

        <input type="number" id="tons" placeholder="Toneladas">
        <input type="number" id="boxes" placeholder="Caixas">
        <input type="number" id="packages" placeholder="Pacotes">

        <input type="number" id="price" placeholder="Price">

        <button onclick="addProduct()">ADD PRODUCT</button>
    </div>
</div>

<!-- TABELA -->
<div class="table-box">
    <h2>STOCK CONTROL</h2>

    <table>
        <thead>
            <tr>
                <th>Product</th>
                <th>RG</th>
                <th>Kg Entry</th>
                <th>Kg Exit</th>
                <th>Tons</th>
                <th>Boxes</th>
                <th>Packages</th>
                <th>Price</th>
                <th>Stock</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

</div>

<script>
function addProduct() {
    let name = document.getElementById("name").value;
    let rg = document.getElementById("rg").value;
    let entry = Number(document.getElementById("entry").value);
    let exit = Number(document.getElementById("exit").value);
    let tons = document.getElementById("tons").value;
    let boxes = document.getElementById("boxes").value;
    let packages = document.getElementById("packages").value;
    let price = Number(document.getElementById("price").value);

    let stock = entry - exit;

    document.getElementById("tableBody").innerHTML += `
        <tr>
            <td>${name}</td>
            <td>${rg}</td>
            <td>${entry}</td>
            <td>${exit}</td>
            <td>${tons}</td>
            <td>${boxes}</td>
            <td>${packages}</td>
            <td>R$ ${price.toFixed(2)}</td>
            <td>${stock}</td>
        </tr>
    `;
}
</script>

</body>
</html>
