<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sollene Group | Terminal</title>
    <style>
        @import url('https://googleapis.com');
        
        *{ margin:0; padding:0; box-sizing:border-box; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #fdfaf6; 
            color: #1a1a1a; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ÁREA DO LOGO - CENTRALIZADA E LIMPA */
        .logo-container {
            width: 100%;
            max-width: 1200px;
            padding: 40px 20px;
            text-align: center;
        }

        .logo-img {
            max-width: 400px; /* Ajuste o tamanho conforme o seu logo */
            height: auto;
        }

        .company-tagline {
            color: #b39359;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 5px;
            font-weight: 800;
            margin-top: 15px;
        }

        /* GRID DO SISTEMA */
        .main-grid {
            display: grid;
            grid-template-columns: 360px 1fr;
            gap: 25px;
            width: 95%;
            max-width: 1200px;
            margin-bottom: 80px;
        }

        .sidebar-card {
            background: #1f2937;
            padding: 40px 30px;
            border-radius: 24px;
            color: #ffffff;
            border-top: 4px solid #b39359;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        .sidebar-card h3 { font-size: 11px; text-transform: uppercase; color: #b39359; margin-bottom: 30px; letter-spacing: 2px; }

        input, select {
            width: 100%; padding: 16px; margin-bottom: 20px; border: 1px solid #374151; border-radius: 14px; background: #111827; color: #ffffff; outline: none;
        }

        #regBtn {
            width: 100%; padding: 20px; background: #b39359; color: #111827; border: none; border-radius: 16px; font-weight: 800; cursor: pointer; text-transform: uppercase; transition: 0.3s;
        }
        #regBtn:hover { background: #ffffff; transform: translateY(-2px); }

        /* ÁREA DA TABELA */
        .inventory-area {
            background: #ffffff;
            border-radius: 24px;
            border: 1px solid #e5e1da;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.02);
        }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 20px; background: #1f2937; color: #b39359; font-size: 10px; text-transform: uppercase; letter-spacing: 2px; }
        td { padding: 20px; border-bottom: 1px solid #f1f1f1; font-size: 14px; }

        /* RODAPÉ BLACK QUE VOCÊ GOSTOU */
        .footer-premium {
            background: #000000;
            color: #ffffff;
            padding: 80px 20px;
            text-align: center;
            border-top: 4px solid #b39359;
            width: 100%;
        }

        .footer-premium h2 { font-size: 22px; color: #b39359; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 30px; }
        .social-links { display: flex; justify-content: center; gap: 20px; margin-bottom: 30px; }
        .social-btn { 
            text-decoration: none; color: #ffffff; font-size: 11px; font-weight: 700; text-transform: uppercase; 
            letter-spacing: 2px; padding: 12px 30px; border: 2px solid #b39359; border-radius: 50px; transition: 0.4s; 
        }
        .social-btn:hover { background: #b39359; color: #000000; }
        .footer-tag { font-size: 10px; color: #b39359; letter-spacing: 2px; opacity: 0.7; }

        @media(max-width: 900px) { .main-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="logo-container">
        <!-- CHAMANDO SEU NOVO LOGO -->
        <img src="Sollene Group.png" alt="Sollene Group Logo" class="logo-img">
        <p class="company-tagline">Premium Logistics & Global Trade</p>
    </div>

    <div class="main-grid">
        <aside class="sidebar-card">
            <h3>Shipment Entry</h3>
            <input type="text" id="pName" placeholder="Product Name">
            <input type="text" id="pDest" placeholder="Destination Port">
            <select id="pCurr"><option value="USD">USD ($)</option></select>
            <input type="number" id="pPrice" placeholder="Unit Price">
            <input type="number" id="pQty" placeholder="Quantity">
            <button id="regBtn">Register Cargo</button>
        </aside>

        <main class="inventory-area">
            <table>
                <thead>
                    <tr><th>Product</th><th>Destination</th><th>Value</th><th>Volume</th></tr>
                </thead>
                <tbody id="list"></tbody>
            </table>
        </main>
    </div>

    <footer class="footer-premium">
        <h2>Global Connection</h2>
        <div class="social-links">
            <a href="https://linkedin.com" target="_blank" class="social-btn">LinkedIn</a>
            <a href="https://github.com" target="_blank" class="social-btn">GitHub</a>
            <a href="https://wa.me" target="_blank" class="social-btn">WhatsApp</a>
        </div>
        <p class="footer-tag">SOLLENE GROUP ENTERPRISE • VALLETTA, MALTA</p>
    </footer>

    <script>
        const inventoryList = document.getElementById('list');
        function saveData() {
            const rows = [];
            document.querySelectorAll('#list tr').forEach(row => { rows.push(row.innerHTML); });
            localStorage.setItem('solleneData', JSON.stringify(rows));
        }
        function loadData() {
            const saved = localStorage.getItem('solleneData');
            if (saved) { JSON.parse(saved).forEach(rowData => { const row = inventoryList.insertRow(); row.innerHTML = rowData; }); }
        }
        window.onload = loadData;

        document.getElementById('regBtn').addEventListener('click', function() {
            const n = document.getElementById('pName').value;
            const p = document.getElementById('pPrice').value;
            const q = document.getElementById('pQty').value;
            if(!n || !p || !q) return alert("Preencha todos os campos.");
            const row = inventoryList.insertRow();
            row.innerHTML = `<td>${n}</td><td>${document.getElementById('pDest').value}</td><td style="color:#b39359; font-weight:800">$ ${parseFloat(p).toFixed(2)}</td><td>${q} units</td>`;
            saveData();
            document.querySelectorAll('input').forEach(i => i.value = "");
        });
    </script>

</body>
</html>
