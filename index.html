
 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Sollene Group | Terminal</title>

    <style>
        @import url('https://googleapis.com');

        *{ margin:0; padding:0; box-sizing:border-box; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #fdfaf6;
            color: #1a1a1a; 
            padding-bottom: 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header-container {
            width: 100%;
            max-width: 1200px;
            padding: 50px 20px;
            text-align: center;
        }

        .logo-main {
            max-width: 320px;
            height: auto;
            display: block;
            margin: 0 auto;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.08));
        }

        .main-grid {
            display: grid;
            grid-template-columns: 360px 1fr;
            gap: 30px;
            width: 100%;
            max-width: 1200px;
            padding: 0 20px;
        }

        .sidebar-card {
            background: #1f2937;
            padding: 40px 30px;
            border-radius: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.2);
            color: #fff;
            border-top: 4px solid #b39359;
        }

        .sidebar-card h3 { 
            font-size: 11px;
            text-transform: uppercase;
            color: #b39359;
            margin-bottom: 30px;
            text-align: center;
            letter-spacing: 2px;
            font-weight: 800;
        }

        input, select {
            width: 100%;
            padding: 16px;
            margin-bottom: 20px;
            border: 1px solid #374151;
            border-radius: 14px;
            background: #111827;
            color: #fff;
        }

        #regBtn {
            width: 100%;
            padding: 20px;
            background: #b39359;
            color: #111827;
            border: none;
            border-radius: 16px;
            font-weight: 800;
            cursor: pointer;
        }

        .inventory-area {
            background-color: #f2ede4;
            border-radius: 30px;
            border: 1px solid #e5e1da;
            min-height: 550px;
        }

        table { width: 100%; border-collapse: collapse; }

        th {
            padding: 24px 20px;
            background: #1f2937;
            color: #b39359;
            font-size: 10px;
            text-transform: uppercase;
        }

        td {
            padding: 24px 20px;
            border-bottom: 1px solid #ddd;
            background: rgba(255,255,255,0.4);
        }

        .currency-style { color: #b39359; font-weight: 800; }

        .del-btn {
            color: red;
            background: none;
            border: none;
            cursor: pointer;
            font-weight: 800;
        }

        @media(max-width: 900px) {
            .main-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>

<body>

    <header class="header-container">
        <!-- LOGO CORRIGIDO -->
        <img src="sollene-group.png" alt="Sollene Group" class="logo-main">
    </header>

    <div class="main-grid">

        <aside class="sidebar-card">
            <h3>Shipment Entry</h3>

            <input type="text" id="pName" placeholder="Product Name">
            <input type="text" id="pDest" placeholder="Destination Port">

            <select id="pCurr">
                <option value="USD">USD ($)</option>
                <option value="EUR">EUR (€)</option>
                <option value="BRL">BRL (R$)</option>
            </select>

            <input type="number" id="pPrice" placeholder="Price">
            <input type="number" id="pQty" placeholder="Quantity">

            <button id="regBtn">Process Trade</button>
        </aside>

        <main class="inventory-area">
            <table>
                <thead>
                    <tr>
                        <th>Product</th>
                        <th>Destination</th>
                        <th>Value</th>
                        <th>Qty</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="list"></tbody>
            </table>
        </main>

    </div>

    <script>
        const inventoryList = document.getElementById('list');

        function saveData() {
            const rows = [];
            document.querySelectorAll('#list tr').forEach(row => {
                rows.push(row.innerHTML);
            });
            localStorage.setItem('solleneData', JSON.stringify(rows));
        }

        function loadData() {
            const saved = localStorage.getItem('solleneData');
            if (saved) {
                JSON.parse(saved).forEach(rowData => {
                    const row = inventoryList.insertRow();
                    row.innerHTML = rowData;
                });
            }
        }

        window.onload = loadData;

        document.getElementById('regBtn').addEventListener('click', function() {
            const name = document.getElementById('pName').value;
            const dest = document.getElementById('pDest').value;
            const curr = document.getElementById('pCurr').value;
            const price = document.getElementById('pPrice').value;
            const qty = document.getElementById('pQty').value;

            if(!name || !price || !qty) return alert("Please complete the fields.");

            let s = curr === "USD" ? "$" : (curr === "EUR" ? "€" : "R$");

            const row = inventoryList.insertRow();
            row.innerHTML = `
                <td><b>${name}</b></td>
                <td>${dest || 'Global'}</td>
                <td class="currency-style">${s} ${parseFloat(price).toFixed(2)}</td>
                <td>${qty}</td>
                <td><button class="del-btn" onclick="this.parentElement.parentElement.remove(); saveData()">DELETE</button></td>
            `;

            saveData();
            document.querySelectorAll('input').forEach(i => i.value = "");
        });
    </script>

</body>
</html>
