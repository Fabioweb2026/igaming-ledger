<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terra Global | Terminal de Carga</title>
    <style>
        @import url('https://googleapis.com');

        *{ margin:0; padding:0; box-sizing:border-box; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            padding: 60px 20px; 
            /* FUNDO AZUL MARINHO PROFISSIONAL */
            background: linear-gradient(135deg, #0f172a 0%, #020617 100%);
            color: #ffffff; 
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            position: relative;
        }

        /* IMAGEM NO CANTO COM DESTAQUE (GLOW) */
        .corner-image {
            position: absolute;
            top: 25px;
            right: 25px;
            width: 160px;
            height: 100px;
            border-radius: 12px;
            background: url('empresa.png') no-repeat center center;
            background-size: cover;
            border: 2px solid #d4a373; /* Borda Dourada */
            /* Esse brilho faz a imagem não sumir no fundo escuro */
            box-shadow: 0 0 20px rgba(212, 163, 115, 0.4); 
        }

        .company-branding { text-align: center; margin-bottom: 50px; }
        
        .company-branding h1 { 
            font-size: 52px; 
            font-weight: 800; 
            color: #ffffff; 
            text-transform: uppercase; 
            letter-spacing: -1px;
            text-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .company-info { 
            color: #d4a373; 
            font-size: 14px; 
            font-weight: 700; 
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 10px;
        }

        .main-container { width: 100%; max-width: 1200px; }

        /* FORMULÁRIO DE ALTO CONTRASTE */
        #registration-form { 
            background: rgba(30, 41, 59, 0.5); 
            backdrop-filter: blur(15px);
            padding: 40px; 
            border-radius: 20px; 
            margin-bottom: 30px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        input, select { 
            padding: 16px; 
            border: 1px solid rgba(255, 255, 255, 0.2); 
            border-radius: 12px; 
            font-size: 15px;
            background: #020617;
            color: #ffffff; /* Letras Brancas */
            outline: none;
            transition: 0.3s;
        }

        /* Destaque ao clicar no campo */
        input:focus { border-color: #d4a373; box-shadow: 0 0 10px rgba(212, 163, 115, 0.3); }

        input { flex: 2; min-width: 200px; }
        select { flex: 1; min-width: 130px; cursor: pointer; }

        #saveBtn { 
            padding: 16px 40px; 
            background: #10b981; /* Verde esmeralda vivo para o botão */
            color: #020617; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            font-weight: 800;
            font-size: 16px;
            transition: 0.3s;
        }

        #saveBtn:hover { transform: translateY(-3px); background: #34d399; box-shadow: 0 10px 20px rgba(16, 185, 129, 0.3); }

        /* TABELA */
        .inventory-section { 
            background: rgba(15, 23, 42, 0.8); 
            padding: 40px; 
            border-radius: 20px; 
            border: 1px solid rgba(255, 255, 255, 0.05); 
        }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 15px; color: #94a3b8; font-size: 12px; text-transform: uppercase; border-bottom: 2px solid rgba(255, 255, 255, 0.1); }
        td { padding: 20px 15px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); font-size: 16px; }

        .price-col { font-weight: 700; color: #d4a373; }
        .del-btn { color: #f87171; border: none; background: none; font-weight: 700; cursor: pointer; }

        @media(max-width: 768px) {
            .corner-image { position: static; width: 100%; margin-bottom: 20px; }
            h1 { font-size: 32px; }
        }
    </style>
</head>
<body>

    <!-- IMAGEM COM BRILHO DOURADO -->
    <div class="corner-image"></div>

    <div class="company-branding">
        <h1>Terra Global</h1>
        <div class="company-info">Logistics & Multi-Currency Terminal</div>
    </div>

    <div class="main-container">
        <div id="registration-form">
            <input type="text" id="productName" placeholder="Product Name">
            <input type="text" id="origin" placeholder="Destination Port">
            
            <select id="currency">
                <option value="USD">USD ($)</option>
                <option value="EUR">EUR (€)</option>
                <option value="BRL">R$ (BRL)</option>
            </select>

            <input type="number" id="price" placeholder="Unit Price">
            <input type="number" id="stock" placeholder="Quantity">
            <button id="saveBtn">REGISTER</button>
        </div>

        <div class="inventory-section">
            <table>
                <thead>
                    <tr>
                        <th>Product</th>
                        <th>Destination</th>
                        <th>Price</th>
                        <th>Quantity</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        const saveBtn = document.getElementById('saveBtn');
        const tableBody = document.getElementById('tableBody');

        saveBtn.addEventListener('click', function() {
            const product = document.getElementById('productName').value;
            const origin = document.getElementById('origin').value;
            const currency = document.getElementById('currency').value;
            const price = document.getElementById('price').value;
            const stock = document.getElementById('stock').value;

            if (!product || !price || !stock) return alert("Fill all fields");

            let symbol = currency === "BRL" ? "R$" : (currency === "USD" ? "$" : "€");

            const newRow = tableBody.insertRow();
            newRow.innerHTML = `
                <td style="font-weight:700; color: #ffffff;">${product}</td>
                <td style="color:#94a3b8">${origin}</td>
                <td class="price-col">${symbol} ${parseFloat(price).toLocaleString('en-US', {minimumFractionDigits: 2})}</td>
                <td><strong>${stock}</strong> units</td>
                <td><button class="del-btn" onclick="this.parentElement.parentElement.remove()">DELETE</button></td>
            `;

            document.querySelectorAll('input').forEach(i => i.value = "");
        });
    </script>
</body>
</html>
