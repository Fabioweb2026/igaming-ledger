<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sollene Group | Estoque</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    background: #f4f6fb;
    color: #111827;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-bottom: 40px;
}

/* HERO */
.hero-banner {
    width: 95%;
    max-width: 1200px;
    height: 300px;
    background-image: url('sollene-group.jpg');
    background-size: cover;
    background-position: center;
    border-radius: 20px;
    margin-top: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.15);
}

/* TITLE */
h1 {
    margin-top: 20px;
}

/* GRID */
.main-grid {
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: 20px;
    width: 95%;
    max-width: 1200px;
    margin-top: 20px;
}

/* PANEL */
.sidebar {
    background: #1f2937;
    padding: 20px;
    border-radius: 16px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.08);
}

.sidebar h3 {
    color: #f5c542;
    margin-bottom: 15px;
}

/* INPUTS */
input, select {
    width: 100%;
    padding: 12px;
    margin-bottom: 10px;
    border-radius: 8px;
    border: 1px solid #334155;
    background: #111827;
    color: #fff;
    outline: none;
}

input::placeholder {
    color: #9ca3af;
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    background: #b39359;
    border: none;
    font-weight: bold;
    cursor: pointer;
    border-radius: 8px;
    color: #111827;
}

button:hover {
    background: #d4af37;
}

/* TABLE */
table {
    width: 100%;
    border-collapse: collapse;
    background: white;
    border-radius: 10px;
    overflow: hidden;
}

th {
    background: #1f2937;
    color: #b39359;
    padding: 12px;
    font-size: 12px;
    text-transform: uppercase;
}

td {
    padding: 12px;
    border-bottom: 1px solid #eee;
}
</style>

</head>

<body>

<div class="hero-banner"></div>

<h1>Sollene Group - Sistema de Estoque</h1>

<div class="main-grid">

<!-- REGISTRO -->
<div class="sidebar">

<h3>Registro de Produto</h3>

<input type="text" id="nome" placeholder="Nome do Produto">

<!-- MOEDA -->
<select id="moeda">
    <option value="R$">Real (BRL)</option>
    <option value="$">Dólar (USD)</option>
    <option value="€">Euro (EUR)</option>
</select>

<input type="number" id="valor" placeholder="Valor Unitário">

<input type="number" id="entrada" placeholder="Entrada">
<input type="number" id="saida" placeholder="Saída">

<select id="unidade">
    <option value="Unidades">Unidades</option>
    <option value="KG">KG</option>
    <option value="Toneladas">Toneladas</option>
    <option value="Pacotes">Pacotes</option>
    <option value="Caixas">Caixas</option>
</select>

<button onclick="adicionar()">Registrar</button>

</div>

<!-- TABELA -->
<div>
<table>
<thead>
<tr>
<th>Produto</th>
<th>Valor</th>
<th>Entrada</th>
<th>Saída</th>
<th>Saldo</th>
<th>Unidade</th>
</tr>
</thead>

<tbody id="tabela"></tbody>
</table>
</div>

</div>

<script>
let estoque = JSON.parse(localStorage.getItem("sollene_estoque")) || {};

function adicionar() {

    let nome = document.getElementById("nome").value;
    let moeda = document.getElementById("moeda").value;
    let valor = document.getElementById("valor").value;
    let entrada = parseFloat(document.getElementById("entrada").value) || 0;
    let saida = parseFloat(document.getElementById("saida").value) || 0;
    let unidade = document.getElementById("unidade").value;

    if(!nome || !valor) {
        alert("Preencha nome e valor!");
        return;
    }

    if(!estoque[nome]) {
        estoque[nome] = {
            moeda: moeda,
            valor: valor,
            entrada: 0,
            saida: 0,
            unidade: unidade
        };
    }

    estoque[nome].entrada += entrada;
    estoque[nome].saida += saida;
    estoque[nome].moeda = moeda;
    estoque[nome].valor = valor;
    estoque[nome].unidade = unidade;

    localStorage.setItem("sollene_estoque", JSON.stringify(estoque));

    render();
}

function render() {
    let tabela = document.getElementById("tabela");
    tabela.innerHTML = "";

    for(let item in estoque) {

        let p = estoque[item];
        let saldo = p.entrada - p.saida;

        tabela.innerHTML += `
        <tr>
            <td>${item}</td>
            <td>${p.moeda} ${p.valor}</td>
            <td style="color:#22c55e;">${p.entrada}</td>
            <td style="color:#ef4444;">${p.saida}</td>
            <td style="font-weight:bold;">${saldo}</td>
            <td>${p.unidade}</td>
        </tr>
        `;
    }
}

render();
</script>

</body>
</html>
