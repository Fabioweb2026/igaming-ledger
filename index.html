<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sollene Group | Inventory System</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fdfcf0; color: #1a1a1a; display: flex; flex-direction: column; align-items: center; }
        .banner-header { width: 100%; height: 9.5cm; margin-top: 0.5cm; background-color: #fdfcf0; overflow: hidden; display: flex; justify-content: center; box-shadow: 0 10px 40px rgba(0,0,0,0.05); }
        .banner-header img { width: 100%; height: 100%; object-fit: contain; object-position: center; display: block; }
        .nav-top { width: 100%; max-width: 1200px; padding: 30px 20px 20px; text-align: left; }
        .btn-back { text-decoration: none; color: #b39359; border: 1px solid #b39359; padding: 8px 20px; border-radius: 50px; font-size: 11px; font-weight: 700; text-transform: uppercase; transition: 0.3s; }
        .btn-back:hover { background: #b39359; color: white; }
        .main-content { display: flex; width: 100%; max-width: 1400px; gap: 25px; padding: 0 20px 60px; flex: 1; }
        .sidebar { width: 340px; background-color: #1a1a1a; color: #b39359; padding: 30px; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.3); height: fit-content; border: 1px solid rgba(179, 147, 89, 0.3); }
        .sidebar h2 { font-family: 'Playfair Display', serif; margin-bottom: 20px; text-align: center; font-size: 1.2rem; }
        label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; display: block; color: #888; }
        input, select { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #333; background: #fff; color: #1a1a1a; font-size: 13px; }
        .btn-add { width: 100%; padding: 16px; background-color: #b39359; color: #1a1a1a; border: none; font-weight: 800; border-radius: 10px; cursor: pointer; text-transform: uppercase; transition: 0.3s; margin-bottom: 10px; }
        .btn-add:hover { background-color: #cbb07c; transform: translateY(-2px); }
        .btn-clear { width: 100%; padding: 10px; background-color: transparent; color: #e74c3c; border: 1px solid #e74c3c; font-weight: 700; border-radius: 10px; cursor: pointer; text-transform: uppercase; font-size: 10px; transition: 0.3s; }
        .btn-clear:hover { background-color: #e74c3c; color: #fff; }
        .table-container { flex: 1; background: white; border-radius: 20px; overflow-x: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid rgba(179, 147, 89, 0.2); }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        thead { background-color: #000; color: #b39359; }
        th, td { padding: 14px; text-align: center; font-size: 12px; border-bottom: 1px solid #f2f2f2; }
        .total-val { color: #b39359; font-weight: bold; }
        footer { width: 100%; padding: 40px 20px; background-color: #1a1a1a; text-align: center; border-top: 3px solid #b39359; margin-top: auto; }
        .footer-address { color: #b39359; font-size: 11px; text-transform: uppercase; }
        @media (max-width: 1100px) { .main-content { flex-direction: column; } .sidebar { width: 100%; } }
    </style>
</head>
<body>

    <header class="banner-header">
        <img src="imagem.Sollene Group.png" alt="Sollene Group Logo">
    </header>

    <nav class="nav-top">
        <a href="index.html" class="btn-back">← BACK TO PORTFOLIO</a>
    </nav>

    <main class="main-content">
        <section class="sidebar">
            <h2>Inventory Control</h2>
            
            <label>Product Name</label>
            <input type="text" id="pName" placeholder="Ex: Premium Coffee">
            
            <label>Measure Unit</label>
            <select id="pUnit">
                <option value="Caixas">Caixas (Boxes)</option>
                <option value="Kg">Quilos (Kg)</option>
                <option value="Toneladas">Toneladas (Tons)</option>
                <option value="Unidade">Unidade (Unit)</option>
            </select>
            
            <label>Entry & Exit</label>
            <div style="display: flex; gap: 10px;">
                <input type="number" id="pEntry" placeholder="In">
                <input type="number" id="pExit" placeholder="Out">
            </div>

            <label>Buy Currency & Price (Cost)</label>
            <div style="display: flex; gap: 10px;">
                <select id="pBuyCurr" style="width: 40%;">
                    <option value="BRL">R$</option>
                    <option value="USD">$</option>
                    <option value="EUR">€</option>
                </select>
                <input type="number" id="pBuyPrice" placeholder="Unit Cost">
            </div>

            <label>Sell Currency & Price</label>
            <div style="display: flex; gap: 10px;">
                <select id="pSellCurr" style="width: 40%;">
                    <option value="USD">$</option>
                    <option value="EUR">€</option>
                    <option value="BRL">R$</option>
                </select>
                <input type="number" id="pSellPrice" placeholder="Sell Price">
            </div>

            <label>Exchange Rate (1 Buy Currency = ? Sell Currency)</label>
            <input type="number" id="pExchange" step="0.01" placeholder="Ex: 0.18 (BRL to USD)">
            
            <button class="btn-add" onclick="addProduct()">Process Trade</button>
            <button class="btn-clear" onclick="clearAll()">🗑️ Reset List</button>
        </section>

        <section class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>PRODUCT</th>
                        <th>UNIT</th>
                        <th>STOCK</th>
                        <th>COST (BUY)</th>
                        <th>SELL PRICE</th>
                        <th>REVENUE (SELL)</th>
                        <th>PROFIT (SELL CURR)</th>
                        <th>ACTION</th>
                    </tr>
                </thead>
                <tbody id="inventoryBody"></tbody>
            </table>
        </section>
    </main>

    <footer><div class="footer-address"><p>SOLLENE GROUP ENTERPRISE • VALLETTA, MALTA</p></div></footer>

    <script>
        function getSymbol(curr) {
            if(curr === "BRL") return "R$";
            if(curr === "USD") return "$";
            return "€";
        }

        function addProduct() {
            const name = document.getElementById('pName').value;
            const unit = document.getElementById('pUnit').value;
            const entry = Number(document.getElementById('pEntry').value);
            const exit = Number(document.getElementById('pExit').value);
            const buyCurr = document.getElementById('pBuyCurr').value;
            const buyPrice = Number(document.getElementById('pBuyPrice').value);
            const sellCurr = document.getElementById('pSellCurr').value;
            const sellPrice = Number(document.getElementById('pSellPrice').value);
            const exchange = Number(document.getElementById('pExchange').value) || 1;

            if (!name || entry < 0 || buyPrice <= 0 || sellPrice <= 0) {
                alert("Please fill in all prices and product name.");
                return;
            }

            const stock = entry - exit;
            
            // Cálculos
            const totalCostBuyCurr = entry * buyPrice;
            const totalCostInSellCurr = totalCostBuyCurr * exchange; // Converte o custo total para a moeda de venda
            const revenue = exit * sellPrice;
            const profit = revenue - totalCostInSellCurr;

            const table = document.getElementById('inventoryBody');
            const row = table.insertRow();

            row.innerHTML = `
                <td>${name}</td>
                <td>${unit}</td>
                <td>${stock}</td>
                <td>${getSymbol(buyCurr)} ${buyPrice.toFixed(2)}</td>
                <td>${getSymbol(sellCurr)} ${sellPrice.toFixed(2)}</td>
                <td style="color: #27ae60; font-weight: bold;">${getSymbol(sellCurr)} ${revenue.toFixed(2)}</td>
                <td class="total-val" style="color: ${profit >= 0 ? '#b39359' : '#e74c3c'}">
                    ${getSymbol(sellCurr)} ${profit.toFixed(2)}
                </td>
                <td><button style="color: red; border: none; background: none; cursor: pointer; font-size: 10px;" onclick="this.parentElement.parentElement.remove()">Delete</button></td>
            `;

            // Reset campos
            document.getElementById('pName').value = "";
            document.getElementById('pEntry').value = "";
            document.getElementById('pExit').value = "";
            document.getElementById('pBuyPrice').value = "";
            document.getElementById('pSellPrice').value = "";
        }

        function clearAll() {
            if (confirm("Clear entire inventory?")) document.getElementById('inventoryBody').innerHTML = "";
        }
    </script>
</body>
</html>
