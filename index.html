<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sollene Group ERP System</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial;
}

body {
    background: linear-gradient(135deg, #f7f1e1, #e9dcc2);
}

/* ================= HERO ================= */
.hero {
    width: 100%;
    height: 320px;
    position: relative;
    overflow: hidden;
    border-bottom: 4px solid black;
}

.hero img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 35%;
}

.hero-overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.2);
}

.hero-text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: white;
    text-align: center;
}

/* CONTACT */
.contact {
    text-align: center;
    padding: 10px;
    font-size: 12px;
    background: rgba(255,255,255,0.5);
}

/* LAYOUT */
.container {
    display: flex;
}

/* FORM */
.form-box {
    width: 28%;
    padding: 15px;
}

.card {
    background: rgba(0,0,0,0.92);
    border: 2px solid #d4af37;
    border-radius: 12px;
    padding: 15px;
    color: white;
}

.card input, .card select {
    width: 100%;
    padding: 8px;
    margin: 5px 0;
    background: #111;
    color: white;
    border: 1px solid #333;
    border-radius: 5px;
}

.group-box {
    border: 1px solid #d4af37;
    padding: 10px;
    margin-top: 10px;
    border-radius: 8px;
}

.group-box h3 {
    text-align: center;
    color: #d4af37;
}

button {
    width: 100%;
    padding: 10px;
    background: #d4af37;
    border: none;
    cursor: pointer;
    font-weight: bold;
}

/* TABLE */
.table-box {
    width: 72%;
    padding: 15px;
}

table {
    width: 100%;
    border-collapse: collapse;
    background: white;
}

th, td {
    border: 1px solid black;
    padding: 8px;
    text-align: center;
}

th {
    background: black;
    color: white;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
    <img src="sollene-group.jpg">
    <div class="hero-overlay"></div>
    <div class="hero-text">
        <h1>SOLLENE GROUP</h1>
        <p>ERP Stock System</p>
    </div>
</div>

<div class="contact">
📞 +55 11 99999-8888 | 📍 São Paulo | ✉ contact@sollene.com
</div>

<div class="container">

<!-- FORM -->
<div class="form-box">
<div class="card">

<h2>REGISTER PRODUCT</h2>

<input type="text" id="name" placeholder="Product Name">
<input type="text" id="rg" placeholder="RG Code">

<div class="group-box">
<h3>STOCK UNITS</h3>

<select id="unitType">
<option value="Kg">Kg</option>
<option value="Toneladas">Ton</option>
<option value="Caixas">Caixas</option>
<option value="Pacotes">Pacotes</option>
</select>

<input type="number" id="entry" placeholder="Entry">
<input type="number" id="exit" placeholder="Exit">
</div>

<input type="number" id="price" placeholder="Price (BRL)">

<button onclick="addProduct()">ADD PRODUCT</button>

</div>
</div>

<!-- TABLE -->
<div class="table-box">
<h2>STOCK CONTROL</h2>

<table>
<thead>
<tr>
<th>Product</th>
<th>RG</th>
<th>Entry</th>
<th>Exit</th>
<th>BRL</th>
<th>USD</th>
<th>EUR</th>
<th>Stock</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>
</table>
</div>

</div>

<script>

// TAXAS FIXAS (pode depois puxar API)
const USD_RATE = 5.15;
const EUR_RATE = 5.78;

function addProduct() {

let name = document.getElementById("name").value;
let rg = document.getElementById("rg").value;
let unit = document.getElementById("unitType").value;

let entry = Number(document.getElementById("entry").value);
let exit = Number(document.getElementById("exit").value);

let priceBRL = Number(document.getElementById("price").value);

let stock = entry - exit;

// conversões
let priceUSD = (priceBRL / USD_RATE).toFixed(2);
let priceEUR = (priceBRL / EUR_RATE).toFixed(2);

document.getElementById("tableBody").innerHTML += `
<tr>
<td>${name}</td>
<td>${rg}</td>
<td>${entry} ${unit}</td>
<td>${exit} ${unit}</td>
<td>R$ ${priceBRL.toFixed(2)}</td>
<td>$ ${priceUSD}</td>
<td>€ ${priceEUR}</td>
<td>${stock} ${unit}</td>
</tr>
`;

}

</script>

</body>
</html>
