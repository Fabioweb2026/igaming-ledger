<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sollene Group | Premium Logistics</title>
    <style>
        @import url('https://googleapis.com');
        
        *{ margin:0; padding:0; box-sizing:border-box; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #fdfaf6; 
            color: #1a1a1a; 
            padding-bottom: 60px;
        }

        /* HEADER: IMAGEM À ESQUERDA ENCONTRANDO O NOME */
        .header-container {
            display: flex;
            align-items: center;
            width: 100%;
            height: 160px; /* Altura elegante e compacta */
            background: #ffffff;
            margin-bottom: 40px;
            border-bottom: 2px solid #d4a373;
        }

        .brand-visual {
            width: 400px; /* Largura fixa para a imagem */
            height: 100%;
            background: url('image.png') no-repeat left center;
            background-size: contain; /* Mantém a imagem inteira e nítida */
            flex-shrink: 0;
        }

        .brand-name {
            padding-left: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .brand-name h1 { 
            font-size: 56px; 
            font-weight: 800; 
            color: #0f172a; 
            letter-spacing: -2px;
            line-height: 1;
        }

        .brand-name p { 
            color: #b39359; 
            font-size: 11px; 
            text-transform: uppercase; 
            letter-spacing: 3px; 
            font-weight: 800;
            margin-top: 5px;
        }

        /* CONTEÚDO PRINCIPAL */
        .container { 
            display: flex; 
            gap: 40px; 
            max-width: 1350px; 
            margin: 0 auto; 
            padding: 0 20px;
            align-items: flex-start; 
        }

        .sidebar { width: 340px; flex-shrink: 0; }

        .form-card { 
            background: #ffffff; 
            padding: 30px; 
            border-radius: 20px; 
            border: 1px solid #e2e8f0;
            box-shadow: 0 10px 25px rgba(0,0,0,0.03);
        }

        .form-card h3 { color: #0f172a; font-size: 11px; text-transform: uppercase; margin-bottom: 20px; letter-spacing: 1px; border-left: 3px solid #b39359; padding-left: 10px;}

        .field { margin-bottom: 15px; }
        label { display: block; font-size: 10px; color: #94a3b8; margin-bottom: 5px; text-transform: uppercase; font-weight: 800; }

        input, select { 
            width: 100%; padding: 12px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px; font-size: 14px; 
        }

        #regBtn { 
            width: 100%; padding: 16px; background: #0f172a; color: #fff; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; transition: 0.3s; text-transform: uppercase; font-size: 12px;
        }

        #regBtn:hover { background: #b39359; transform: translateY(-2px); }

        /* TABELA */
        .table-area { flex: 1; min-width: 0; }
        .table-area h2 { font-size: 22px; margin-bottom: 20px; color: #0f172a; font-weight: 800; }

        .data-container { 
            background: #ffffff; border-radius: 20px; border: 1px solid #e2e8f0; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 15px; color: #94a3b8; font-size: 10px; text-transform: uppercase; border-bottom: 1px solid #f1f5f9; font-weight: 800; }
        td { padding: 18px 15px; border-bottom: 1px solid #f8fafc; font-size: 14px; }

        @media(max-width: 1000px) {
            .header-container { flex-direction: column; height: auto; padding: 20px; }
            .brand-visual { width: 100%; height: 120px; }
            .brand-name { padding: 20px 0; text-align: center; }
            .container { flex-direction: column; }
        }
    </style>
</head>
<body>

    <header class="header-container">
        <!-- A imagem agora "nasce" na esquerda e termina no nome -->
        <div class="brand-visual"></div>
        <div class="brand-name">
            <h1>Sollene Group</h1>
            <p>Supply Chain & Logistics Division</p>
        </div>
    </header>

    <div class="container">
        <aside class="sidebar">
            <div class="form-card">
                <h3>Shipment Registration</h3>
                <div class="field">
                    <label>Commodity Name</label>
                    <input type="text" id="pName" placeholder="e.g. Arabica Coffee">
                </div>
                <div class="field">
                    <label>Destination Port</label>
                    <input type="text" id="pDest" placeholder="e.g. Rotterdam">
                </div>
                <div class="field">
                    <label>Currency</label>
                    <select id="pCurr">
                        <option value="USD">USD ($)</option>
                        <option value="EUR">EUR (€)</option>
                        <option value="BRL">BRL (R$)</option>
                    </select>
                </div>
                <div class="field">
                    <label>Unit Price</label>
                    <input type="number" id="pPrice" placeholder="0.00">
                </div>
                <div class="field">
                    <label>Quantity</label>
                    <input type="number" id="pQty" placeholder="Value">
                </div>
                <button id="regBtn">Register Cargo</button>
            </div>
        </aside>

        <main class="table-area">
            <h2>Active Cargo Inventory</h2>
            <div class="data-container">
                <table>
                    <thead>
                        <tr>
                            <th>Product</th>
                            <th>Destination</th>
                            <th>Value</th>
                            <th>Quantity</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="inventoryList"></tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        const regBtn = document.getElementById('regBtn');
        const inventoryList = document.getElementById('inventoryList');

        regBtn.addEventListener('click', function() {
            const name = document.getElementById('pName').value;
            const dest = document.getElementById('pDest').value;
            const curr = document.getElementById('pCurr').value;
            const price = document.getElementById('pPrice').value;
            const qty = document.getElementById('pQty').value;

            if (!name || !price || !qty) return alert("Fill all fields.");

            let symbol = curr === "USD" ? "$" : (curr === "EUR" ? "€" : "R$");

            const row = inventoryList.insertRow();
            row.innerHTML = `
                <td style="font-weight: 700;">${name}</td>
                <td style="color: #64748b;">${dest}</td>
                <td style="color: #b39359; font-weight: 800;">${symbol} ${parseFloat(price).toFixed(2)}</td>
                <td><strong>${qty}</strong> units</td>
                <td><button onclick="this.parentElement.parentElement.remove()" style="color:red; border:none; background:none; cursor:pointer; font-weight:bold;">DEL</button></td>
            `;

            document.querySelectorAll('input').forEach(i => i.value = "");
        });
    </script>
</body>
</html>
