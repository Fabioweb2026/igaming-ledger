<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sollene Group | Inventory System</title>

    <!-- FONTS -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #fdfcf0;
            color: #1a1a1a;
        }

        /* =======================
           BANNER AJUSTADO
        ======================== */
        .banner-header {
            width: 100%;
            height: 85vh;
            background: #fdfcf0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border-bottom: 4px solid #b39359;
        }

        .banner-header img {
            width: 100%;
            height: 100%;
            object-fit: contain; /* NÃO corta o texto da imagem */
            object-position: center;
        }

        /* NAV */
        .nav-top {
            width: 100%;
            max-width: 1250px;
            margin: auto;
            padding: 25px 20px;
        }

        .btn-back {
            text-decoration: none;
            color: #b39359;
            border: 1px solid #b39359;
            padding: 10px 25px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 700;
            background: white;
            transition: 0.3s;
        }

        .btn-back:hover {
            background: #b39359;
            color: white;
        }

        /* MAIN */
        .main-content {
            display: flex;
            max-width: 1250px;
            margin: auto;
            gap: 30px;
            padding: 40px 20px;
        }

        /* SIDEBAR */
        .sidebar {
            width: 340px;
            background: #1a1a1a;
            color: #b39359;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        .sidebar h2 {
            margin-bottom: 20px;
            font-family: 'Playfair Display', serif;
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 10px;
            border: none;
            outline: none;
        }

        .btn-add {
            width: 100%;
            padding: 14px;
            background: #b39359;
            border: none;
            font-weight: bold;
            cursor: pointer;
            border-radius: 10px;
        }

        /* TABLE */
        .table-container {
            flex: 1;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: #1a1a1a;
            color: #b39359;
        }

        th, td {
            padding: 18px;
            text-align: center;
            border-bottom: 1px solid #eee;
        }

        .entry { color: green; font-weight: bold; }
        .exit { color: red; font-weight: bold; }
        .total { color: #b39359; font-weight: bold; }

        /* FOOTER */
        footer {
            text-align: center;
            padding: 30px;
            background: #1a1a1a;
            color: #777;
            margin-top: 40px;
        }

        /* RESPONSIVO */
        @media (max-width: 900px) {
            .main-content {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
            }
        }
    </style>
</head>

<body>

<!-- BANNER -->
<header class="banner-header">
    <img src="sollene-group.jpg" alt="Sollene Group Banner">
</header>

<!-- NAV -->
<nav class="nav-top">
    <a href="index.html" class="btn-back">← Back</a>
</nav>

<!-- MAIN -->
<main class="main-content">

    <!-- FORM -->
    <section class="sidebar">
        <h2>Register Product</h2>

        <input type="text" id="productName" placeholder="Product Name">

        <select id="unit">
            <option value="Case">Case</option>
            <option value="Unit">Unit</option>
        </select>

        <input type="number" id="entry" placeholder="Entry">
        <input type="number" id="exit" placeholder="Exit">

        <select id="currency">
            <option value="USD">$ USD</option>
            <option value="EUR">€ EUR</option>
            <option value="BRL">R$ BRL</option>
        </select>

        <input type="number" id="price" placeholder="Unit Price">

        <button class="btn-add" onclick="addProduct()">Add to Inventory</button>
    </section>

    <!-- TABLE -->
    <section class="table-container">
        <table>
            <thead>
                <tr>
                    <th>PRODUCT</th>
                    <th>UNIT</th>
                    <th>ENTRY</th>
                    <th>EXIT</th>
                    <th>STOCK</th>
                    <th>CURRENCY</th>
                    <th>PRICE</th>
                    <th>TOTAL VALUE</th>
                </tr>
            </thead>

            <tbody id="inventoryTable">
                <tr>
                    <td>Example Product</td>
                    <td>Case</td>
                    <td class="entry">120</td>
                    <td class="exit">45</td>
                    <td>75</td>
                    <td>USD</td>
                    <td>$10</td>
                    <td class="total">$750</td>
                </tr>
            </tbody>
        </table>
    </section>

</main>

<footer>
    © 2026 SOLLENE GROUP | INVENTORY SYSTEM
</footer>

<!-- JAVASCRIPT -->
<script>
function addProduct() {
    let name = document.getElementById("productName").value;
    let unit = document.getElementById("unit").value;
    let entry = parseInt(document.getElementById("entry").value) || 0;
    let exit = parseInt(document.getElementById("exit").value) || 0;
    let currency = document.getElementById("currency").value;
    let price = parseFloat(document.getElementById("price").value) || 0;

    let stock = entry - exit;
    let total = stock * price;

    let table = document.getElementById("inventoryTable");

    let row = table.insertRow();

    row.innerHTML = `
        <td>${name}</td>
        <td>${unit}</td>
        <td class="entry">+${entry}</td>
        <td class="exit">-${exit}</td>
        <td>${stock}</td>
        <td>${currency}</td>
        <td>${price}</td>
        <td class="total">${total.toFixed(2)}</td>
    `;
}
</script>

</body>
</html>
