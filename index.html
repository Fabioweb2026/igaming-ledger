<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sollene Group | Estoque</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family: Arial;
    background: #fdfaf6;
    display:flex;
    flex-direction:column;
    align-items:center;
}

.hero-banner {
    width:95%;
    max-width:1200px;
    height:450px;
    background:url('sollene-group.jpg') center/cover no-repeat;
    border-radius:20px;
}

.main-grid {
    display:grid;
    grid-template-columns: 300px 1fr;
    gap:20px;
    width:100%;
    max-width:1200px;
    margin-top:20px;
}

.sidebar-card {
    background:#1f2937;
    color:white;
    padding:20px;
    border-radius:15px;
}

.inventory-area {
    background:#fff;
    border-radius:15px;
    padding:10px;
}
</style>

</head>

<body>

<div class="hero-banner"></div>

<h1>Sollene Group</h1>

<div class="main-grid">

<aside class="sidebar-card">
<h3>Registro</h3>
<input placeholder="Produto">
<input placeholder="Valor">
<button>Registrar</button>
</aside>

<main class="inventory-area">
<table>
<tr><th>Produto</th><th>Valor</th></tr>
</table>
</main>

</div>

</body>
</html>
