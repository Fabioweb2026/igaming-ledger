<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sollene Group | Inventory System</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        /* RESET & BASE STYLE */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #fdfcf0; /* Cor creme que combina com o fundo da imagem */
            color: #1a1a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* BANNER AJUSTADO PARA NÃO CORTAR LETRAS */
        .banner-header {
            width: 100%;
            height: 9.5cm;
            margin-top: 0.5cm; /* Espaço abaixo do navegador */
            background-color: #fdfcf0; /* Cor idêntica ao fundo da imagem para fusão perfeita */
            overflow: hidden;
            display: flex;
            justify-content: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.05);
        }

        .banner-header img {
            width: 100%;
            height: 100%;
            /* 'contain' garante que NENHUMA letra ou detalhe seja cortado */
            object-fit: contain; 
            object-position: center; 
            display: block;
        }

        /* NAVEGAÇÃO */
        .nav-top {
            width: 100%;
            max-width: 1200px;
            padding: 30px 20px 20px;
            text-align: left;
        }

        .btn-back {
            text-decoration: none;
            color: #b39359;
            border: 1px solid #b39359;
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn-back:hover { background: #b39359; color: white; }

        /* CONTEÚDO PRINCIPAL */
        .main-content {
            display: flex;
            width: 100%;
            max-width: 1200px;
            gap: 25px;
            padding: 0 20px 60px;
            flex: 1;
        }

        .sidebar {
            width: 320px;
            background-color: #1a1a1a;
            color: #b39359;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            height: fit-content;
        }

        .sidebar h2 { font-family: 'Playfair Display', serif; margin-bottom: 20px; text-align: center; }

        input, select {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid #333;
            background: #fff;
        }

        .btn-add {
            width: 100%;
            padding: 14px;
            background-color: #b39359; /* Dourado combinando com o logo */
            color: #000;
            border: none;
            font-weight: 800;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
        }

        /* TABELA DE ESTOQUE */
        .table-container {
            flex: 1;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 1px solid rgba(179, 147, 89, 0.2);
        }

        table { width: 100%; border-collapse: collapse; }
        thead { background-color: #000; color: #b39359; }
        th, td { padding: 18px; text-align: center; font-size: 14px; border-bottom: 1px solid #f2f2f2; }
        .total-val { color: #b39359; font-weight: bold; }

        /* RODAPÉ */
        footer {
            width: 100%;
            padding: 40px 20px;
            background-color: #1a1a1a;
            text-align: center;
            border-top: 3px solid #b39359;
            margin-top: auto;
        }

        .footer-address { color: #b39359; font-size: 11px; text-transform: uppercase; }

        @media (max-width: 900px) {
            .main-content { flex-direction: column; }
            .sidebar { width: 100%; }
            .banner-header { height: auto; min-height: 180px; }
        }
    </style>
</head>
<body>

    <!-- HEADER: IMAGEM.SOLLENE GROUP.PNG SEM CORTES -->
    <header class="banner-header">
        <img src="imagem.Sollene Group.png" alt="Sollene Group New Premium Logo">
    </header>

    <nav class="nav-top">
        <a href="index.html" class="btn-back">← BACK TO PORTFOLIO</a>
    </nav>

    <main class="main-content">
        <section class="sidebar">
            <h2>Register Product</h2>
            <input type="text" placeholder="Product Name">
            <select><option>Box</option><option>Unit</option></select>
            <input type="number" placeholder="Entry">
            <input type="number" placeholder="Exit">
            <select><option>USD ($)</option></select>
            <input type="number" placeholder="Unit Price">
            <button class="btn-add">Add Product</button>
        </section>

        <section class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>PRODUCT</th>
                        <th>UNIT</th>
                        <th>ENTRY</th>
                        <th>EXIT</th>
                        <th>STOCK</th>
                        <th>PRICE</th>
                        <th>REVENUE</th>
                        <th>CASH</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Coffee</td>
                        <td>Box</td>
                        <td>123</td>
                        <td>56</td>
                        <td>67</td>
                        <td>$ 6.78</td>
                        <td>$ 379.68</td>
                        <td class="total-val">$ -454.26</td>
                    </tr>
                </tbody>
            </table>
        </section>
    </main>

    <footer>
        <div class="footer-address">
            <p>SOLLENE GROUP ENTERPRISE • VALLETTA, MALTA</p>
        </div>
    </footer>

</body>
</html>
