<!-- Procure a tag <style> e atualize estes pontos -->
<style>
    /* Ajuste para a tabela ficar mais compacta */
    th, td { padding: 15px 10px !important; font-size: 13px !important; }
    
    .profit-positive { color: #16a34a; font-weight: 800; }
    .profit-negative { color: #dc2626; font-weight: 800; }
</style>

<!-- Na parte da Tabela (dentro do main), substitua o <thead> -->
<thead>
    <tr>
        <th>Status</th>
        <th>Product</th>
        <th>Purchase</th>
        <th>Sale</th>
        <th>Qty</th>
        <th>Profit</th> <!-- Nova Coluna -->
        <th>Action</th>
    </tr>
</thead>

<!-- Substitua o <script> completo para incluir a lógica do lucro -->
<script>
    const inventoryList = document.getElementById('list');

    function saveData() {
        const items = [];
        document.querySelectorAll('#list tr').forEach(row => {
            items.push({
                status: row.cells[0].innerHTML,
                name: row.cells[1].innerHTML,
                purchase: row.cells[2].innerHTML,
                sale: row.cells[3].innerHTML,
                qty: row.cells[4].innerHTML,
                profit: row.cells[5].innerHTML
            });
        });
        localStorage.setItem('sollene_profit_db', JSON.stringify(items));
    }

    function renderRow(status, name, purchase, sale, qty, profit) {
        const row = inventoryList.insertRow();
        const badgeClass = status.includes('In') ? 'badge-in' : 'badge-out';
        
        // Verifica se o lucro é positivo ou negativo para colorir
        const profitClass = parseFloat(profit.replace(/[^0-9.-]+/g,"")) >= 0 ? 'profit-positive' : 'profit-negative';

        row.innerHTML = `
            <td>${status}</td>
            <td><strong>${name}</strong></td>
            <td style="color:#64748b">${purchase}</td>
            <td style="color:#b39359; font-weight:800">${sale}</td>
            <td>${qty}</td>
            <td class="${profitClass}">${profit}</td>
            <td><button class="btn-delete" onclick="this.closest('tr').remove(); saveData();">DELETE</button></td>
        `;
    }

    document.getElementById('regBtn').addEventListener('click', function() {
        const name = document.getElementById('pName').value;
        const type = document.getElementById('pType').value;
        const cost = parseFloat(document.getElementById('pCost').value);
        const sale = parseFloat(document.getElementById('pSale').value);
        const qty = parseFloat(document.getElementById('pQty').value);
        const unit = document.getElementById('pUnit').value;
        const symSale = document.getElementById('pCurrSale').value;
        const symBuy = document.getElementById('pCurrBuy').value;

        if(!name || isNaN(cost) || isNaN(sale) || isNaN(qty)) return alert("Preencha os valores.");

        // CÁLCULO DO LUCRO: (Venda - Custo) * Quantidade
        const totalProfit = (sale - cost) * qty;
        const formattedProfit = `${symSale} ${totalProfit.toFixed(2)}`;
        
        const purchaseVal = `${symBuy} ${cost.toFixed(2)}`;
        const saleVal = `${symSale} ${sale.toFixed(2)}`;
        const volumeVal = `${qty} ${unit}`;
        const statusHtml = `<span class="badge ${type === 'In' ? 'badge-in' : 'badge-out'}">${type}</span>`;

        renderRow(statusHtml, name, purchaseVal, saleVal, volumeVal, formattedProfit);
        saveData();

        // Limpa campos
        document.getElementById('pName').value = "";
        document.getElementById('pCost').value = "";
        document.getElementById('pSale').value = "";
        document.getElementById('pQty').value = "";
    });

    window.onload = () => {
        const saved = localStorage.getItem('sollene_profit_db');
        if (saved) JSON.parse(saved).forEach(i => renderRow(i.status, i.name, i.purchase, i.sale, i.qty, i.profit));
    };
</script>
