<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malta iGaming Platform - MGA Gateway</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #121212; color: #ffffff; margin: 20px; }
        section { background-color: #1e1e1e; padding: 20px; margin-bottom: 20px; border-radius: 8px; border: 1px solid #333; }
        h1, h2 { color: #ff9900; }
        label { display: block; margin-top: 15px; font-weight: bold; color: #ccc; }
        select, input { width: 100%; padding: 12px; margin-top: 5px; background-color: #2a2a2a; color: #fff; border: 1px solid #444; border-radius: 4px; box-sizing: border-box; }
        button { background-color: #ff9900; color: #000; border: none; padding: 14px; width: 100%; margin-top: 20px; border-radius: 4px; font-weight: bold; cursor: pointer; }
        .status-unverified { color: #ff3333; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #444; padding: 10px; text-align: left; }
    </style>
</head>
<body>
    <section id="registration">
        <h1>🆔 Operator Corporate Registration</h1>
        <form id="kycForm" onsubmit="event.preventDefault(); alert('Gateway Authenticated');">
            <label for="country">Jurisdiction:</label>
            <select id="country" required>
                <option value="" disabled selected>Select...</option>
                <option value="BR">Brazil</option>
                <option value="PT">Portugal</option>
            </select>
            <!-- CORREÇÃO: ID único para manipulação JS -->
            <label id="docLabel" for="docInput">Required Document:</label>
            <input type="text" id="docInput" placeholder="Select a country..." disabled required>
            <button type="submit">Authenticate</button>
        </form>
    </section>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const countrySelect = document.getElementById('country');
            const docLabel = document.getElementById('docLabel');
            const docInput = document.getElementById('docInput');
            const rules = {
                'BR': { label: 'CPF:', placeholder: '000.000.000-00' },
                'PT': { label: 'Cartão de Cidadão:', placeholder: '00000000' }
            };

            countrySelect.addEventListener('change', function() {
                const rule = rules[this.value];
                if (rule) {
                    docLabel.textContent = "Required Document: " + rule.label;
                    docInput.placeholder = rule.placeholder;
                    docInput.disabled = false;
                }
            });
        });
    </script>
</body>
</html>
