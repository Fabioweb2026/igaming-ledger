<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Solutions | Global Inventory</title>
    <style>
        /* Importando uma fonte mais moderna */
        @import url('https://googleapis.com');

        *{ margin:0; padding:0; box-sizing:border-box; }

        body { 
            font-family: 'Inter', sans-serif; 
            padding: 40px; 
            background: #f8fafc; /* Cinza muito claro de fundo */
            color: #1e293b; 
        }

        /* Nome da Empresa */
        .company-header {
            margin-bottom: 40px;
            border-left: 5px solid #2563eb;
            padding-left: 20px;
        }

        .company-header h1 { font-size: 28px; font-weight: 800; color: #0f172a; }
        .company-header p { color: #64748b; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
        
        /* Formulário de Registro */
        #registration-form { 
            background: white; 
            padding: 30px; 
            border-radius: 16px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.03);
            margin-bottom: 40px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
            border: 1px solid #e2e8f0;
        }

        input { 
            padding: 14px; 
            border: 1px solid #cbd5e1; 
            border-radius: 8px; 
            flex: 1;
            min-width: 180px;
            font-size: 14px;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37, 99, 236, 0.1); }

        #saveBtn { 
            padding: 14px 30px; 
            background: #2563eb; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: 700;
            transition: 0.3s;
            box-shadow: 0 4px 12px rgba(37, 99, 236, 0.2);
        }

        #saveBtn:hover { background: #1d4ed8; transform: translateY(-2px); }

        /* Tabela de Inventário */
        h2 { font-size: 20px; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        
        .table-container {
            background: white; 
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.03);
            border: 1px solid #e2e8f0;
        }

        table { width: 100%; border-collapse: collapse; }

        th { 
            background: #f1f5f9; 
            padding: 18px; 
            color: #475569; 
            text-align: left; 
            font-size: 11px; 
            text-transform: uppercase; 
            letter-spacing: 1.5px;
            font-weight: 700;
        }

        td { padding: 18px; border-bottom: 1px solid #f1f5f9; font-size: 14px; }
        
        /* Botão de Deletar */
        .del-btn {
            background: #fee2e2;
            color: #dc2626;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            font-size: 12px;
            transition: 0.2s;
        }

        .del-btn:hover { background: #dc2626; color: white; }

    </style>
</head>
<body>

    <div class="company-header">
        <p>Supply Chain Division</p>
        <h1>Apex Solutions | Inventory Management</h1>
    </div>

    <!-- Registration Section -->
    <div id="registration-form">
        <input type="text" id="productName" placeholder="Product Name">
        <input type="text" id="supplier" placeholder="Supplier">
        <input type="number" id="price" placeholder="Price (USD)">
        <input type="number" id="stock" placeholder="Stock Qty">
        <button id="saveBtn">SAVE PRODUCT</button>
    </div>

    <h2>Current Inventory Status</h2>
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Product</th>
                    <th>Supplier</th>
                    <th>Price</th>
                    <th>Stock Qty</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <!-- Data will appear here -->
            </tbody>
        </table>
    </div>

    <script>
        const saveBtn = document.getElementById('saveBtn');
        const tableBody = document.getElementById('tableBody');

        saveBtn.addEventListener('click', function() {
            const productName = document.getElementById('productName').value;
            const supplier = document.getElementById('supplier').value;
            const price = document.getElementById('price').value;
            const stock = document.getElementById('stock').value;

            if (productName === "" || price === "" || stock === "") {
                alert("Please fill in all required fields!");
                return;
            }

            const newRow = tableBody.insertRow();
            newRow.innerHTML = `
                <td style="font-weight: 600;">${productName}</td>
                <td>${supplier}</td>
                <td>$ ${parseFloat(price).toLocaleString('en-US', {minimumFractionDigits: 2})}</td>
                <td>${stock} Units</td>
                <td><button class="del-btn" onclick="this.parentElement.parentElement.remove()">DELETE</button></td>
            `;

            // Clear inputs
            document.querySelectorAll('input').forEach(input => input.value = "");
        });
    </script>

</body>
</html>
