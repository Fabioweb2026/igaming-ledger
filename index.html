<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sollene Group | Professional Inventory System</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

/* =========================
   RESET
========================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Plus Jakarta Sans',sans-serif;
    background:#f6f4ea;
    overflow-x:hidden;
}

/* =========================
   BANNER
========================= */

.banner-header{
    width:100%;
    height:130px;
    margin-top:15px;
    overflow:hidden;
    border-bottom:3px solid #b39359;
}

.banner-header img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* =========================
   MAIN
========================= */

.main-content{
    max-width:1450px;
    margin:auto;
    display:grid;
    grid-template-columns:330px 1fr;
    gap:18px;
    padding:20px;
}

/* =========================
   SIDEBAR
========================= */

.sidebar{
    background:#1a1a1a;
    padding:20px;
    border-radius:16px;
    color:#b39359;
}

.sidebar h2{
    margin-bottom:18px;
    font-size:22px;
}

/* =========================
   FORM GRID
========================= */

.form-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}

/* =========================
   INPUTS
========================= */

.form-grid input,
.form-grid select{
    width:100%;
    height:42px;
    border:none;
    border-radius:8px;
    padding:0 10px;
    outline:none;
    font-size:13px;
    font-family:'Plus Jakarta Sans',sans-serif;
}

.full{
    grid-column:1 / -1;
}

/* =========================
   LABELS
========================= */

label{
    display:block;
    margin-bottom:5px;
    font-size:12px;
    color:#fff;
}

/* =========================
   BUTTONS
========================= */

button{
    width:100%;
    height:42px;
    border:none;
    border-radius:8px;
    font-weight:700;
    cursor:pointer;
    transition:0.3s;
    font-size:13px;
}

button:hover{
    transform:scale(1.02);
}

.add-btn{
    background:#b39359;
    color:#000;
}

.save-btn{
    background:#27ae60;
    color:#fff;
}

/* =========================
   TABLE CONTAINER
========================= */

.table-container{
    background:#fff;
    border-radius:16px;
    overflow:auto;
    box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

/* =========================
   TABLE
========================= */

table{
    width:100%;
    border-collapse:collapse;
    min-width:1200px;
}

thead{
    background:#1a1a1a;
    color:#b39359;
}

th,
td{
    padding:8px;
    text-align:center;
    border-bottom:1px solid #eee;
    font-size:11px;
    white-space:nowrap;
}

th{
    font-size:10px;
    letter-spacing:0.5px;
}

.entry{
    color:#27ae60;
    font-weight:bold;
}

.exit{
    color:#e74c3c;
    font-weight:bold;
}

.stock{
    color:#b39359;
    font-weight:bold;
}

.profit{
    color:#2980b9;
    font-weight:bold;
}

.cash{
    color:#27ae60;
    font-weight:bold;
}

/* =========================
   FOOTER
========================= */

footer{
    margin-top:25px;
    background:#1a1a1a;
    color:#777;
    text-align:center;
    padding:20px;
    font-size:11px;
}

/* =========================
   RESPONSIVE
========================= */

@media(max-width:900px){

.main-content{
    grid-template-columns:1fr;
}

.form-grid{
    grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<!-- =========================
     BANNER
========================= -->

<header class="banner-header">

    <img src="sollene-group.jpg" alt="Sollene Group">

</header>

<!-- =========================
     MAIN
========================= -->

<div class="main-content">

    <!-- SIDEBAR -->

    <div class="sidebar">

        <h2>Register Product</h2>

        <div class="form-grid">

            <!-- PRODUCT -->

            <div class="full">

                <label>Product Name</label>

                <input
                    type="text"
                    id="product"
                    placeholder="Coffee"
                >

            </div>

            <!-- UNIT -->

            <div>

                <label>Unit</label>

                <select id="unit">
                    <option value="Kg">Kg</option>
                    <option value="Ton">Ton</option>
                    <option value="Box">Box</option>
                </select>

            </div>

            <!-- ENTRY -->

            <div>

                <label>Entry</label>

                <input
                    type="number"
                    id="entry"
                    value="0"
                >

            </div>

            <!-- EXIT -->

            <div>

                <label>Exit</label>

                <input
                    type="number"
                    id="exit"
                    value="0"
                >

            </div>

            <!-- BUY PRICE -->

            <div>

                <label>Buy Price</label>

                <input
                    type="number"
                    id="buyPrice"
                    placeholder="6.50"
                >

            </div>

            <!-- BUY CURRENCY -->

            <div>

                <label>Buy Currency</label>

                <select id="buyCurrency">
                    <option value="USD">USD</option>
                    <option value="EUR">EUR</option>
                    <option value="BRL">BRL</option>
                </select>

            </div>

            <!-- SELL PRICE -->

            <div>

                <label>Sell Price</label>

                <input
                    type="number"
                    id="sellPrice"
                    placeholder="9.00"
                >

            </div>

            <!-- SELL CURRENCY -->

            <div>

                <label>Sell Currency</label>

                <select id="sellCurrency">
                    <option value="USD">USD</option>
                    <option value="EUR">EUR</option>
                    <option value="BRL">BRL</option>
                </select>

            </div>

            <!-- ADD BUTTON -->

            <button
                type="button"
                class="add-btn full"
                id="addButton"
            >
                Add Product
            </button>

            <!-- SAVE BUTTON -->

            <button
                type="button"
                class="save-btn full"
                id="saveButton"
            >
                Save Inventory
            </button>

        </div>

    </div>

    <!-- TABLE -->

    <div class="table-container">

        <table>

            <thead>

                <tr>

                    <th>Product</th>
                    <th>Unit</th>
                    <th>Entry</th>
                    <th>Exit</th>
                    <th>Stock</th>
                    <th>Buy Price</th>
                    <th>Buy Currency</th>
                    <th>Sell Price</th>
                    <th>Sell Currency</th>
                    <th>Profit</th>
                    <th>Cash</th>
                    <th>Stock Value</th>
                    <th>Total Value</th>

                </tr>

            </thead>

            <tbody id="table-body"></tbody>

        </table>

    </div>

</div>

<!-- =========================
     FOOTER
========================= -->

<footer>

© 2026 SOLLENE GROUP | PROFESSIONAL INVENTORY SYSTEM

</footer>

<!-- =========================
     JAVASCRIPT
========================= -->

<script>

/* =========================
   INVENTORY
========================= */

let inventory = JSON.parse(
localStorage.getItem("inventory")
) || [];

/* =========================
   TABLE
========================= */

const tableBody =
document.getElementById("table-body");

/* =========================
   RENDER TABLE
========================= */

function renderTable(){

    tableBody.innerHTML = "";

    inventory.forEach(function(item){

        tableBody.innerHTML += `

        <tr>

            <td>${item.product}</td>

            <td>${item.unit}</td>

            <td class="entry">
            +${item.entry}
            </td>

            <td class="exit">
            -${item.exit}
            </td>

            <td class="stock">
            ${item.stock}
            </td>

            <td>
            ${item.buyPrice}
            </td>

            <td>
            ${item.buyCurrency}
            </td>

            <td>
            ${item.sellPrice}
            </td>

            <td>
            ${item.sellCurrency}
            </td>

            <td class="profit">
            ${item.profit}
            </td>

            <td class="cash">
            ${item.cash}
            ${item.sellCurrency}
            </td>

            <td class="stock">
            ${item.remaining}
            ${item.buyCurrency}
            </td>

            <td class="cash">
            ${item.totalValue || "0.00"}
            ${item.sellCurrency}
            </td>

        </tr>

        `;

    });

}

/* =========================
   ADD PRODUCT
========================= */

document
.getElementById("addButton")
.addEventListener("click", function(){

    const product =
    document.getElementById("product")
    .value
    .trim();

    const unit =
    document.getElementById("unit")
    .value;

    const entry =
    parseFloat(
        document.getElementById("entry").value
    ) || 0;

    const exit =
    parseFloat(
        document.getElementById("exit").value
    ) || 0;

    let buyPrice =
    parseFloat(
        document.getElementById("buyPrice").value
    ) || 1;

    let sellPrice =
    parseFloat(
        document.getElementById("sellPrice").value
    ) || 1;

    const buyCurrency =
    document.getElementById("buyCurrency")
    .value;

    const sellCurrency =
    document.getElementById("sellCurrency")
    .value;

    /* VALIDATION */

    if(product === ""){

        alert("Enter product name");
        return;

    }

    if(exit > entry){

        alert(
        "Exit cannot be greater than Entry"
        );

        return;

    }

    /* CALCULATIONS */

    const stock =
    entry - exit;

    const profit =
    (
        (sellPrice - buyPrice) * exit
    ).toFixed(2);

    const cash =
    (
        sellPrice * exit
    ).toFixed(2);

    const remaining =
    (
        stock * buyPrice
    ).toFixed(2);

    const totalValue =
    Number(
        stock * sellPrice
    ).toFixed(2);

    /* OBJECT */

    const item = {

        product: product,

        unit: unit,

        entry: entry,

        exit: exit,

        stock: stock,

        buyPrice: buyPrice.toFixed(2),

        buyCurrency: buyCurrency,

        sellPrice: sellPrice.toFixed(2),

        sellCurrency: sellCurrency,

        profit: profit,

        cash: cash,

        remaining: remaining,

        totalValue: totalValue

    };

    /* PUSH */

    inventory.push(item);

    /* SAVE */

    localStorage.setItem(
        "inventory",
        JSON.stringify(inventory)
    );

    /* RENDER */

    renderTable();

    /* CLEAR */

    document.getElementById("product").value = "";

    document.getElementById("entry").value = "0";

    document.getElementById("exit").value = "0";

    document.getElementById("buyPrice").value = "";

    document.getElementById("sellPrice").value = "";

});

/* =========================
   SAVE
========================= */

document
.getElementById("saveButton")
.addEventListener("click", function(){

    localStorage.setItem(
        "inventory",
        JSON.stringify(inventory)
    );

    alert(
    "Inventory saved successfully!"
    );

});

/* =========================
   INITIAL
========================= */

renderTable();

</script>

</body>
</html>
