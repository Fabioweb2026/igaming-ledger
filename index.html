<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sollene Group | Inventory System</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

html, body {
    margin: 0;
    padding: 0;
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: #f6f4ea;
    overflow-x: hidden;
}

/* BANNER */
.banner-header {
    width: 100%;
    height: 140px;
    margin-top: 20px;
    overflow: hidden;
    border-bottom: 3px solid #b39359;
}

.banner-header img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* LAYOUT */
.main-content {
    max-width: 1200px;
    margin: auto;
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: 25px;
    padding: 25px;
}

/* SIDEBAR */
.sidebar {
    background: #1a1a1a;
    color: #b39359;
    padding: 25px;
    border-radius: 18px;
}

.sidebar h2 {
    margin-bottom: 20px;
}

/* CAMPOS IGUAIS */
.sidebar input,
.sidebar select {
    width: 100%;
    height: 44px;
    margin-bottom: 12px;
    border-radius: 10px;
    border: none;
    padding: 0 10px;
}

/* BOTÕES */
button {
    width: 100%;
    height: 46px;
    margin-bottom: 10px;
    border-radius: 10px;
    border: none;
    font-weight: bold;
    cursor: pointer;
}

.add-btn {
    background: #b39359;
}

.save-btn {
    background: #27ae60;
    color: white;
}

/* TABLE */
.table-container {
    background: white;
    border-radius: 18px;
    overflow: hidden;
}

table {
    width: 100%;
    border-collapse: collapse;
}

thead {
    background: #1a1a1a;
    color: #b39359;
}

th, td {
    padding: 15px;
    text-align: center;
    border-bottom: 1px solid #eee;
}

.entry { color: green; font-weight: bold; }
.exit { color: red; font-weight: bold; }
.total { color: #b39359; font-weight: bold; }

/* FOOTER */
footer {
    text-align: center;
    padding: 25px;
    background: #1a1a1a;
    color: #777;
    margin-top: 40px;
}

@media (max-width: 900px) {
    .main-content {
        grid-template-columns: 1fr;
    }
}

</style>
</head>

<body>

<!-- BANNER -->
<header class="banner-header">
    <img src="sollene-group.jpg">
</header>

<!-- MAIN -->
<div class="main-content">

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>Register Product</h2>

    <input id="name" placeholder="Product">

    <select id="unit">
        <option>Case</option>
        <option>Unit</option>
    </select>

    <input id="entry" type="number" placeholder="Entry">
    <input id="exit" type="number" placeholder="Exit">

    <select id="currency">
        <option>USD</option>
        <option>EUR</option>
        <option>BRL</option>
    </select>

    <input id="price" type="number" placeholder="Price">

    <button class="add-btn" onclick="add()">Add Product</button>
    <button class="save-btn" onclick="save()">Save Inventory</button>
</div>

<!-- TABLE -->
<div class="table-container">
<table>
<thead>
<tr>
<th>Product</th>
<th>Unit</th>
<th>Entry</th>
<th>Exit</th>
<th>Stock</th>
<th>Currency</th>
<th>Price</th>
<th>Total</th>
</tr>
</thead>

<tbody id="table"></tbody>

</table>
</div>

</div>

<footer>
© 2026 SOLLENE GROUP
</footer>

<script>

let inventory = JSON.parse(localStorage.getItem("inventory")) || [];

/* CARREGAR AO ABRIR */
window.onload = function () {
    render();
}

/* ADICIONAR PRODUTO */
function add(){
    let item = {
        name: document.getElementById('name').value,
        unit: document.getElementById('unit').value,
        entry: +document.getElementById('entry').value,
        exit: +document.getElementById('exit').value,
        currency: document.getElementById('currency').value,
        price: +document.getElementById('price').value
    };

    inventory.push(item);
    render();
}

/* SALVAR NO NAVEGADOR */
function save(){
    localStorage.setItem("inventory", JSON.stringify(inventory));
    alert("Inventory saved successfully!");
}

/* RENDERIZAR TABELA */
function render(){
    let table = document.getElementById('table');
    table.innerHTML = "";

    inventory.forEach(item => {
        let stock = item.entry - item.exit;
        let total = stock * item.price;

        table.innerHTML += `
        <tr>
            <td>${item.name}</td>
            <td>${item.unit}</td>
            <td class="entry">+${item.entry}</td>
            <td class="exit">-${item.exit}</td>
            <td>${stock}</td>
            <td>${item.currency}</td>
            <td>${item.price}</td>
            <td class="total">${total}</td>
        </tr>`;
    });
}

</script>

</body>
</html>
