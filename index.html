<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sollene Group | Premium Trade</title>
    <link href="https://googleapis.com" rel="stylesheet">
    
    <style>
        /* RESET TOTAL PARA O BANNER OCUPAR A TELA CORRETAMENTE */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #fdfcf0; /* Cor creme igual ao fundo do banner */
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* BOTÃO DE VOLTAR DISCRETO NO TOPO */
        nav {
            width: 100%;
            padding: 20px;
            text-align: left;
            max-width: 1200px;
        }

        .btn-back {
            text-decoration: none;
            color: #b39359;
            border: 1px solid #b39359;
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn-back:hover {
            background: #b39359;
            color: white;
        }

        /* CONTAINER DO BANNER */
        .banner-container {
            width: 100%;
            max-width: 1200px;
            padding: 0 20px 40px;
        }

        .banner-img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 15px; /* Bordas arredondadas suaves */
            box-shadow: 0 20px 50px rgba(179, 147, 89, 0.2); /* Sombra elegante */
        }

        footer {
            margin-top: auto;
            padding-bottom: 30px;
            color: #b39359;
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="btn-back">← BACK TO PORTFOLIO</a>
    </nav>

    <main class="banner-container">
        <!-- O nome da imagem deve ser exatamente sollene-group.jpg no seu GitHub -->
        <img src="sollene-group.jpg" alt="Sollene Group Global Trade" class="banner-img">
    </main>

    <footer>
        © 2026 SOLLENE GROUP ENTERPRISE
    </footer>

</body>
</html>
