<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sollene Group | Inventory System</title>
    <link href="https://googleapis.com" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #fdfcf0; /* Creme suave para harmonizar com o banner */
            color: #1a1a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 1. BANNER HARMONIZADO */
        .banner-container {
            width: 100%;
            max-width: 1200px;
            margin-bottom: 30px;
            background-color: white;
            box-shadow: 0 10px 30px rgba(179, 147, 89, 0.1);
            border-bottom: 4px solid #b39359;
        }

        .banner-container img {
            width: 100%;
            display: block;
            /* Se a imagem for malta10.jpg em vez de sollene-group.jpg, ajuste abaixo */
            content: url('sollene-group.jpg'); 
        }

        /* 2. CONTEÚDO PRINCIPAL (SISTEMA) */
        .main-content {
            display: flex;
            width: 100%;
            max-width: 1200px;
            gap: 25px;
            padding: 0 20px 60px;
        }

        /* Lado esquerdo: Formulário Profissional */
        .sidebar {
            width: 320px;
            background-color: #1a1a1a;
            color: #b39359;
            padding: 30px 20px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            height: fit-content;
        }

        .sidebar h2 { 
            font-family: 'Playfair Display', serif;
            font-size: 20px; 
            margin-bottom: 25px; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            text-align: center;
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 10px;
            border: 1px solid #333;
            background: #fff;
            font-size: 14px;
        }

        .btn-add {
            width: 100%;
            padding: 14px;
            background-color: #b39359;
            color: #000;
            border: none;
            font-weight: 800;
            border-radius: 10px;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn-add:hover { background-color: #d4af37; transform: scale(1.02); }

        .btn-save {
            width: 100%;
            margin-top: 15px;
            padding: 12px;
            background-color: #27ae60;
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
        }

        /* Lado direito: Tabela de Luxo */
        .table-container {
            flex: 1;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(179, 147, 89, 0.1);
            border: 1px solid rgba(179, 147, 89, 0.2);
        }

        table { width: 100%; border-collapse: collapse; }

        thead { background-color: #1a1a1a; color: #b39359; }

        th { 
            padding: 18px; 
            text-transform: uppercase; 
            font-size: 11px; 
            letter-spacing: 1px; 
        }

        td { padding: 18px; text-align: center; font-size: 14px; border-bottom: 1px solid #f2f2f2; }

        tr:last-child td { border-bottom: none; }

        .entry { color: #27ae60; font-weight: 700; }
        .exit { color: #e74c3c; font-weight: 700; }
        .total-val { color: #b39359; font-weight: 800; }

        @media (max-width: 900px) {
            .main-content { flex-direction: column; }
            .sidebar { width: 100%; }
        }
    </style>
</head>
<body>

    <!-- BANNER INTEGRADO -->
    <div class="banner-container">
        <img alt="Sollene Group Premium Banner">
    </div>

    <!-- SISTEMA DE ESTOQUE HARMONIZADO -->
    <div class="main-content">
        <div class="sidebar">
            <h2>Register Product</h2>
            <input type="text" placeholder="Product Name">
            <select>
                <option>Caixa (Case)</option>
                <option>Unidade (Unit)</option>
            </select>
            <input type="number" placeholder="Entry (Entrada)">
            <input type="number" placeholder="Exit (Saída)">
            <select>
                <option>USD ($)</option>
                <option>EUR (€)</option>
            </select>
            <input type="number" placeholder="Unit Price">
            <button class="btn-add">Add to Inventory</button>
            <button class="btn-save">💾 Save Changes</button>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>PRODUCT</th>
                        <th>UNIT</th>
                        <th>ENTRY</th>
                        <th>EXIT</th>
                        <th>STOCK</th>
                        <th>CURRENCY</th>
                        <th>PRICE</th>
                        <th>TOTAL VALUE</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Coffee Beans (S)</td>
                        <td>Caixa</td>
                        <td class="entry">+ 100</td>
                        <td class="exit">- 23</td>
                        <td>77</td>
                        <td>USD</td>
                        <td>$ 6.67</td>
                        <td class="total-val">$ 513.59</td>
                    </tr>
                    <tr>
                        <td>Premium Red Wine</td>
                        <td>Caixa</td>
                        <td class="entry">+ 300</td>
                        <td class="exit">- 123</td>
                        <td>177</td>
                        <td>EUR</td>
                        <td>€ 4.58</td>
                        <td class="total-val">€ 810.66</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</body>
</html>
