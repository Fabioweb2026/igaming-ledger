<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sollene Group | Stock System</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial;
}

/* FUNDO CREME / DOURADO LEVE */
body {
    background: linear-gradient(135deg, #f7f1e1, #e9dcc2);
    color: #1a1a1a;
}

/* HEADER */
header {
    text-align: center;
    padding: 20px;
    border-bottom: 1px solid #d6c7a6;
}

header h1 {
    font-size: 28px;
    color: #8a6d2f;
    letter-spacing: 2px;
}

header p {
    font-size: 12px;
    color: #5c4a24;
}

/* LAYOUT */
.container {
    display: flex;
    height: 90vh;
}

/* FORMULÁRIO */
.form-box {
    width: 25%;
    background: #ffffffb3;
    padding: 20px;
    border-right: 1px solid #d6c7a6;
}

.form-box h2 {
    margin-bottom: 15px;
    color: #8a6d2f;
}

.form-box input {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border: 1px solid #cbb98d;
    background: #fff;
}

.form-box button {
    width: 100%;
    padding: 10px;
    background: #8a6d2f;
    border: none;
    color: white;
    cursor: pointer;
    font-weight: bold;
}

/* CENTRO */
.center {
    width: 30%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    border-right: 1px solid #d6c7a6;
}

.center img {
    width: 220px;
    height: 220px;
    object-fit: cover;
    border-radius: 50%;
    border: 4px solid #8a6d2f;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}

.center h2 {
    margin-top: 15px;
    color: #8a6d2f;
    letter-spacing: 2px;
}

.center p {
    font-size: 12px;
    color: #5c4a24;
    text-align: center;
    margin-top: 10px;
    padding: 0 20px;
}

/* TABELA */
.table-box {
    width: 45%;
    padding: 20px;
    overflow-y: auto;
}

table {
    width: 100%;
    border-collapse: collapse;
    background: white;
}

th, td {
    padding: 10px;
    border: 1px solid #e0d2b0;
    text-align: center;
}

th {
    background: #8a6d2f;
    color: white;
}
</style>
</head>

<body>

<header>
    <h1>SOLLENE GROUP</h1>
    <p>Av. Paulista, 1500 - São Paulo, SP - Brazil</p>
</header>

<div class="container">

<!-- FORM -->
<div class="form-box">
    <h2>Register Product</h2>

    <input type="text" id="name" placeholder="Product Name">
    <input type="number" id="entry" placeholder="Entry">
    <input type="number" id="exit" placeholder="Exit">
    <input type="number" id="price" placeholder="Price">

    <button onclick="addProduct()">ADD</button>
</div>

<!-- CENTRO EMPRESA -->
<div class="center">
    <img src="sollene-group.jpg" alt="Sollene Group">
    <h2>SOLLENE GROUP</h2>
    <p>
        Corporate Stock & Management System<br>
        Premium Business Intelligence Platform
    </p>
</div>

<!-- TABELA -->
<div class="table-box">
    <h2>Stock Control</h2>

    <table>
        <thead>
            <tr>
                <th>Product</th>
                <th>Entry</th>
                <th>Exit</th>
                <th>Price</th>
                <th>Stock</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

</div>

<script>
function addProduct() {
    let name = document.getElementById("name").value;
    let entry = Number(document.getElementById("entry").value);
    let exit = Number(document.getElementById("exit").value);
    let price = Number(document.getElementById("price").value);

    let stock = entry - exit;

    document.getElementById("tableBody").innerHTML += `
        <tr>
            <td>${name}</td>
            <td>${entry}</td>
            <td>${exit}</td>
            <td>R$ ${price.toFixed(2)}</td>
            <td>${stock}</td>
        </tr>
    `;
}
</script>

</body>
</html>
