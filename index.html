<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sollene Group ERP</title>

<style>

/* ================= BASE ================= */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial;
}

body {
    background: linear-gradient(135deg, #f7f1e1, #e9dcc2);
}

/* ================= LOGIN ================= */
.login-screen {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 999;
}

.login-box {
    background: black;
    padding: 20px;
    border: 2px solid #d4af37;
    border-radius: 10px;
    width: 280px;
    text-align: center;
    color: white;
}

.login-box input {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
}

.login-box button {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    background: #d4af37;
    border: none;
    cursor: pointer;
}

/* ================= HERO ================= */
.hero {
    position: relative;
    width: 100%;
    height: 360px;
    overflow: hidden;
    border-bottom: 4px solid black;
}

.hero img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 30%;
    filter: brightness(0.65) contrast(1.1);
}

.hero-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
        135deg,
        rgba(0,0,0,0.35),
        rgba(0,0,0,0.75)
    );
}

.hero-content {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    color: white;
    width: 90%;
}

.badge {
    display: inline-block;
    padding: 6px 12px;
    font-size: 11px;
    border: 1px solid #d4af37;
    color: #d4af37;
    border-radius: 20px;
    margin-bottom: 10px;
}

.hero-content h1 {
    font-size: 44px;
    letter-spacing: 5px;
    text-transform: uppercase;
}

.hero-content p {
    font-size: 13px;
    opacity: 0.85;
}

/* ================= DASHBOARD ================= */
.hero-stats {
    display: flex;
    justify-content: center;
    gap: 15px;
    margin-top: 15px;
    flex-wrap: wrap;
}

.stat-box {
    background: rgba(0,0,0,0.45);
    border: 1px solid rgba(212,175,55,0.4);
    padding: 10px 16px;
    border-radius: 10px;
    min-width: 120px;
}

.stat-box h3 {
    color: #d4af37;
}

/* ================= LAYOUT ================= */
.container {
    display: flex;
    padding: 15px;
}

.form-box {
    width: 30%;
}

.card {
    background: rgba(0,0,0,0.92);
    border: 2px solid #d4af37;
    border-radius: 12px;
    padding: 15px;
    color: white;
}

input, select {
    width: 100%;
    padding: 8px;
    margin: 5px 0;
}

button {
    width: 100%;
    padding: 10px;
    background: #d4af37;
    border: none;
    cursor: pointer;
}

/* ================= TABLE ================= */
.table-box {
    width: 70%;
    padding-left: 15px;
}

table {
    width: 100%;
    border-collapse: collapse;
    background: white;
}

th, td {
    border: 1px solid black;
    padding: 8px;
    text-align: center;
}

th {
    background: black;
    color: white;
}

</style>
</head>

<body>

<!-- ================= LOGIN ================= -->
<div class="login-screen" id="loginScreen">

<div class="login-box">
    <h3>LOGIN SYSTEM</h3>

    <input type="text" id="user" placeholder="User">
    <input type="password" id="pass" placeholder="Password">

    <button onclick="login()">LOGIN</button>
    <button onclick="registerUser()">REGISTER</button>
</div>

</div>

<!-- ================= HERO ================= -->
<div class="hero">

<img src="sollene-group.jpg">
<div class="hero-overlay"></div>

<div class="hero-content">

    <div class="badge">ENTERPRISE SYSTEM</div>

    <h1>SOLLENE GROUP</h1>
    <p>Stock Management Dashboard</p>

    <div class="hero-stats">

        <div class="stat-box">
            <h3 id="totalProducts">0</h3>
            <span>Products</span>
        </div>

        <div class="stat-box">
            <h3 id="totalStock">0</h3>
            <span>Stock</span>
        </div>

        <div class="stat-box">
            <h3 id="totalValue">R$ 0</h3>
            <span>Total Value</span>
        </div>

    </div>

</div>
</div>

<!-- ================= SYSTEM ================= -->
<div class="container">

<div class="form-box">
<div class="card">

<h3>REGISTER PRODUCT</h3>

<input type="text" id="name" placeholder="Product">

<input type="number" id="entry" placeholder="Entry">
<input type="number" id="exit" placeholder="Exit">

<select id="currency">
    <option value="BRL">BRL</option>
    <option value="USD">USD</option>
    <option value="EUR">EUR</option>
</select>

<input type="number" id="price" placeholder="Price">

<button onclick="addProduct()">ADD</button>

</div>
</div>

<div class="table-box">

<table>
<thead>
<tr>
<th>Name</th>
<th>Stock</th>
<th>BRL</th>
<th>USD</th>
<th>EUR</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

</div>

</div>

<!-- ================= JS ================= -->
<script>

let products = [];

/* TAXAS */
const USD = 5.15;
const EUR = 5.78;

/* ================= LOGIN ================= */
function registerUser() {

let user = document.getElementById("user").value;
let pass = document.getElementById("pass").value;

if(!user || !pass){
    alert("Fill all fields");
    return;
}

localStorage.setItem("user_" + user, pass);
alert("User created!");

}

function login() {

let user = document.getElementById("user").value;
let pass = document.getElementById("pass").value;

/* ADMIN FIXO */
if(user === "admin" && pass === "1234"){
    document.getElementById("loginScreen").style.display = "none";
    return;
}

/* USUÁRIO CADASTRADO */
let saved = localStorage.getItem("user_" + user);

if(saved && saved === pass){
    document.getElementById("loginScreen").style.display = "none";
} else {
    alert("Invalid login");
}

}

/* ================= PRODUTOS ================= */
function addProduct() {

let name = document.getElementById("name").value;
let entry = Number(document.getElementById("entry").value);
let exit = Number(document.getElementById("exit").value);
let price = Number(document.getElementById("price").value);
let currency = document.getElementById("currency").value;

let stock = entry - exit;

/* CONVERSÃO */
let priceBRL;

if(currency === "USD") priceBRL = price * USD;
else if(currency === "EUR") priceBRL = price * EUR;
else priceBRL = price;

products.push({ name, stock, priceBRL });

updateDashboard();
updateTable();

}

/* ================= DASHBOARD ================= */
function updateDashboard() {

let totalProducts = products.length;
let totalStock = 0;
let totalValue = 0;

products.forEach(p => {
    totalStock += p.stock;
    totalValue += p.stock * p.priceBRL;
});

document.getElementById("totalProducts").innerText = totalProducts;
document.getElementById("totalStock").innerText = totalStock;
document.getElementById("totalValue").innerText = "R$ " + totalValue.toFixed(2);

}

/* ================= TABLE ================= */
function updateTable() {

let html = "";

products.forEach(p => {

let usd = (p.priceBRL / USD).toFixed(2);
let eur = (p.priceBRL / EUR).toFixed(2);

html += `
<tr>
<td>${p.name}</td>
<td>${p.stock}</td>
<td>R$ ${p.priceBRL.toFixed(2)}</td>
<td>$ ${usd}</td>
<td>€ ${eur}</td>
</tr>
`;

});

document.getElementById("tableBody").innerHTML = html;

}

</script>

</body>
</html>
