<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iGaming Ledger - Plataforma de Jogos</title>
    <style>
        body {
            background: #070a13;
            color: #f8fafc;
            font-family: 'Inter', system-ui, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 900px;
            margin-top: 20px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 15px;
            margin-bottom: 30px;
        }
        .back-btn { color: #94a3b8; text-decoration: none; font-size: 14px; }
        .back-btn:hover { color: #10b981; }
        
        /* Dashboard Superior de Info */
        .info-bar {
            display: flex;
            justify-content: space-between;
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 15px 25px;
            border-radius: 12px;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .balance-display { font-weight: 700; color: #10b981; }

        /* Área de Execução do Jogo */
        .game-screen {
            background: linear-gradient(135deg, #111827 0%, #0f172a 100%);
            border: 2px solid #1e293b;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            position: relative;
        }
        .game-screen h2 { margin-top: 0; color: #fff; font-size: 22px; letter-spacing: 1px; }
        
        /* Simulador de Roleta/Slots Interno */
        .slots-display {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 40px 0;
            font-size: 64px;
            background: #070a13;
            padding: 20px;
            border-radius: 14px;
            border: 1px solid #334155;
            letter-spacing: 10px;
        }
        
        .control-panel {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        .bet-input {
            background: #070a13;
            border: 1px solid #334155;
            color: #fff;
            padding: 12px;
            border-radius: 8px;
            width: 100px;
            text-align: center;
            font-weight: 700;
            font-size: 16px;
        }
        .btn-spin {
            background: #10b981;
            color: white;
            border: none;
            padding: 14px 40px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.3);
        }
        .btn-spin:hover {
            background: #059669;
            transform: scale(1.03);
            box-shadow: 0 0 25px rgba(16, 185, 129, 0.5);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <a href="index.html" class="back-btn">⬅️ Voltar ao Portal</a>
            <h1 style="margin:0; font-size:24px;">🖥️ PLATAFORMA DE JOGOS</h1>
        </div>

        <!-- Barra de Informações síncronas do Jogador -->
        <div class="info-bar">
            <div id="playerNameDisplay">Player: Guest / Anonymous</div>
            <div>Ledger Balance: <span class="balance-display" id="platformBalance">€ 0.00</span></div>
        </div>

        <!-- Console do Cassino -->
        <div class="game-screen">
            <h2>MGA Certified Random Number Generator (RNG)</h2>
            <p style="color:#64748b; font-size:13px;">As rodadas geram registros criptográficos automáticos na trilha de auditoria.</p>

            <!-- Tela do Jogo -->
            <div class="slots-display" id="slotMachine">🎰 🎰 🎰</div>

            <!-- Controles do Jogador -->
            <div class="control-panel">
                <div>
                    <span style="font-size: 13px; color: #94a3b8; display: block; margin-bottom: 5px;">Aposta (€)</span>
                    <input type="number" id="betAmount" class="bet-input" value="10" min="1">
                </div>
                <button class="btn-spin" onclick="girarSlots()">SPIN / GIRAR</button>
            </div>
        </div>
    </div>

    <!-- Importa o script principal para garantir o controle centralizado de saldo -->
    <script src="script.js"></script>

    <script>
        // Sincroniza a tela local com os dados salvos no script principal
        document.addEventListener("DOMContentLoaded", () => {
            const jogadorSessao = localStorage.getItem("current_player");
            const saldoAtual = localStorage.getItem("igaming_balance") || "0.00";
            
            if (jogadorSessao) {
                const jogador = JSON.parse(jogadorSessao);
                document.getElementById("playerNameDisplay").innerText = `Player: ${jogador.nome} (${jogador.id})`;
            }
            document.getElementById("platformBalance").innerText = `€ ${parseFloat(saldoAtual).toFixed(2)}`;
        });

        // Lógica simulada de aposta real baseada no localStorage
        function girarSlots() {
            const jogadorSessao = localStorage.getItem("current_player");
            if (!jogadorSessao) {
                alert("❌ ACCESS DENIED: Você precisa realizar o Cadastro (KYC) no portal principal antes de apostar.");
                window.location.href = "cadastro.html";
                return;
            }

            let saldo = parseFloat(localStorage.getItem("igaming_balance") || "0.00");
            const aposta = parseFloat(document.getElementById("betAmount").value);

            if (isNaN(aposta) || aposta <= 0) {
                alert("❌ Digite um valor de aposta válido.");
                return;
            }

            if (aposta > saldo) {
                alert("❌ SALDO INSUFICIENTE: Realize um depósito na sua Carteira.");
                window.location.href = "wallet.html";
                return;
            }

            // Consome a aposta do saldo
            saldo -= aposta;
            
            // Sorteio de Ícones
            const icones = ["🍒", "🍋", "🔔", "💎", "🎰"];
            const r1 = icones[Math.floor(Math.random() * icones.length)];
            const r2 = icones[Math.floor(Math.random() * icones.length)];
            const r3 = icones[Math.floor(Math.random() * icones.length)];

            // Atualiza o painel visual
            document.getElementById("slotMachine").innerText = `${r1} ${r2} ${r3}`;

            // Validação de Prêmios
            let ganho = 0;
            if (r1 === r2 && r2 === r3) {
                ganho = aposta * 5; // Três iguais: ganha 5x
                alert(`🎉 JACKPOT! Três símbolos iguais. Você ganhou € ${ganho.toFixed(2)}!`);
            } else if (r1 === r2 || r2 === r3 || r1 === r3) {
                ganho = aposta * 2; // Dois iguais: ganha 2x
                alert(`💰 VITÓRIA! Dois símbolos iguais. Você ganhou € ${ganho.toFixed(2)}.`);
            } else {
                alert("😢 Não foi dessa vez! Tente novamente.");
            }

            // Atualiza o banco de dados local
            saldo += ganho;
            localStorage.setItem("igaming_balance", saldo.toString());
            
            // Sincroniza a tela
            document.getElementById("platformBalance").innerText = `€ ${saldo.toFixed(2)}`;
        }
    </script>
</body>
</html>
