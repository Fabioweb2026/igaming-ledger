<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>iGaming Compliance - Admin Panel</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body { background: #070a13; color: #fff; padding: 40px; font-family: sans-serif; }
        .admin-table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #1e293b; border-radius: 8px; overflow: hidden; }
        .admin-table th, .admin-table td { padding: 15px; text-align: left; border-bottom: 1px solid #334155; }
        .admin-table th { background: #111827; color: #38bdf8; }
        .btn-reveal { background: #2563eb; border: none; padding: 6px 12px; color: #fff; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <nav class="gaming-nav"><a href="index.html">🏠 Return to Portal</a></nav>
    <div class="card" style="max-width: 1100px;">
        <h1>🛡️ MGA Secure Operator Control Panel</h1>
        <p>Masked player registry database for compliance management.</p>
        <table class="admin-table">
            <thead>
                <tr>
                    <th>Player ID</th>
                    <th>Jurisdiction</th>
                    <th>Document Type</th>
                    <th>Data Masking Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="adminPlayerRows"></tbody>
        </table>
    </div>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const players = JSON.parse(localStorage.getItem("local_players_db") || "[]");
            const tbody = document.getElementById("adminPlayerRows");
            if(players.length === 0) {
                tbody.innerHTML = "<tr><td colspan='5' style='text-align:center;'>No registered players in ledger database.</td></tr>";
                return;
            }
            players.forEach(p => {
                const row = document.createElement("tr");
                row.innerHTML = `
                    <td><strong>${p.id}</strong></td>
                    <td>${p.country}</td>
                    <td>${p.document_type || 'N/A'}</td>
                    <td style="color:#10b981;">🔒 ENCRYPTED (GDPR Compliant)</td>
                    <td><button class="btn-reveal" onclick="revealSecureData('${p.id}')">Audit Integrity</button></td>
                `;
                tbody.appendChild(row);
            });
        });
        function revealSecureData(id) {
            const players = JSON.parse(localStorage.getItem("local_players_db") || "[]");
            const player = players.find(p => p.id === id);
            if(player) {
                alert(`⚠️ ADMINISTRATIVE SECURITY BYPASS\n\nFull Name: ${player.fullname}\nDoc Number: ${player.document_number}\nDOB: ${player.dob}\nLedger Hash: ${player.ledger_hash}`);
            }
        }
    </script>
</body>
</html>
