<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iGaming - KYC Verification</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #0f0f1a; color: #f1f1f6; padding-bottom: 50px; }
        .gaming-nav { background: #1a1a2e; padding: 15px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.5); border-bottom: 2px solid #232342; }
        .gaming-nav a { color: #fff; margin: 0 12px; text-decoration: none; font-size: 14px; transition: all 0.3s; }
        .gaming-nav a:hover, .gaming-nav a.active { color: #4ecca3; text-shadow: 0 0 8px rgba(78, 204, 163, 0.6); }
        .container { max-width: 600px; margin: 40px auto; padding: 0 20px; }
        .kyc-card { background: #16162a; border: 1px solid #232342; padding: 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        h1 { font-size: 24px; color: #fff; margin-bottom: 15px; border-bottom: 2px solid #4ecca3; padding-bottom: 8px; }
        p { color: #b5b5c6; margin-bottom: 20px; }
        .status-box { background: #1f1f38; border: 1px dashed #e2b659; padding: 20px; border-radius: 6px; text-align: center; margin-top: 15px; }
        .status-text { font-size: 18px; font-weight: bold; color: #e2b659; margin-bottom: 15px; }
        button { background: #4ecca3; color: #0f0f1a; border: none; padding: 12px 20px; font-size: 14px; font-weight: bold; border-radius: 6px; cursor: pointer; text-transform: uppercase; transition: all 0.2s; width: 100%; }
        button:hover { background-color: #3db892; box-shadow: 0 5px 15px rgba(78, 204, 163, 0.4); }
    </style>
</head>
<body>

    <nav class="gaming-nav">
        <a href="index.html">🏠 Home Portfólio</a>
        <a href="igaming-ledger.html">📊 Ledger</a>
        <a href="lobby.html">🎮 Lobby</a>
        <a href="wallet.html">💰 Wallet</a>
        <a href="kyc.html" class="active">🆔 KYC</a>
        <a href="games.html">🎰 Games</a>
        <a href="admin.html">⚙️ Admin</a>
    </nav>

    <div class="container">
        <div class="kyc-card">
            <h1>🆔 Conclusão de KYC (Identity)</h1>
            <p>Processo obrigatório pelas diretrizes de Malta (MGA) para prevenção de fraudes e lavagem de dinheiro (AML).</p>
            
            <div class="status-box">
                <div class="status-text" id="status-display">Aguardando Documentação</div>
                <button onclick="enviarDocumento()">Enviar Passaporte / ID</button>
            </div>
        </div>
    </div>

    <script>
        function enviarDocumento() {
            const display = document.getElementById('status-display');
            display.innerText = "Documentos em Análise";
            display.style.color = "#4ecca3";
            document.getElementById('status-display').parentElement.style.borderColor = "#4ecca3";
            alert("Documentos enviados com sucesso ao ecossistema de Malta!");
        }
    </script>
</body>
</html>
