<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iGaming Ledger - International KYC Register</title>
    
    <style>
        body {
            background: #070a13;
            color: #f8fafc;
            font-family: 'Inter', system-ui, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .register-container {
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.8) 0%, rgba(15, 23, 42, 0.95) 100%);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(56, 189, 248, 0.15);
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-size: 24px; color: #fff; margin: 0; letter-spacing: 1px; }
        .header p { color: #38bdf8; font-size: 11px; text-transform: uppercase; font-weight: 700; margin-top: 5px; }
        
        .form-group { margin-bottom: 20px; display: flex; flex-direction: column; }
        label { font-size: 13px; font-weight: 600; margin-bottom: 8px; color: #94a3b8; }
        
        input, select {
            background: #0f172a;
            border: 1px solid #334155;
            padding: 12px 16px;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            transition: border-color 0.2s;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #38bdf8;
            box-shadow: 0 0 8px rgba(56, 189, 248, 0.2);
        }
        
        .doc-section {
            background: rgba(0, 0, 0, 0.2);
            padding: 15px;
            border-radius: 8px;
            border-left: 3px solid #38bdf8;
            margin-top: 10px;
        }

        .btn-submit {
            background: #2563eb;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
            transition: background 0.2s;
        }
        .btn-submit:hover { background: #1d4ed8; }
        
        .footer-links { text-align: center; margin-top: 20px; font-size: 13px; }
        .footer-links a { color: #64748b; text-decoration: none; }
        .footer-links a:hover { color: #94a3b8; }
    </style>
</head>
<body>

    <div class="register-container">
        <div class="header">
            <h1>PLAYER REGISTRATION</h1>
            <p>MGA / International Compliance KYC</p>
        </div>

        <!-- Formulário com IDs perfeitamente mapeados para o seu script.js -->
        <form id="kycForm">
            <div class="form-group">
                <label for="fullName">Full Name (As written in official document)</label>
                <input type="text" id="fullName" required placeholder="John Doe">
            </div>

            <div class="form-group">
                <label for="dob">Date of Birth (Minimum 18+)</label>
                <input type="date" id="dob" required>
            </div>

            <div class="form-group">
                <label for="country">Country of Residence</label>
                <select id="country" onchange="adaptarDocumentosPorPais()" required>
                    <option value="">Select country...</option>
                    <option value="EU">European Union (Malta, Germany, etc.)</option>
                    <option value="US">United States of America (USA)</option>
                    <option value="AU">Australia</option>
                    <option value="CN">China</option>
                    <option value="BR">Brazil</option>
                    <option value="GLOBAL">Other Country / International</option>
                </select>
            </div>

            <div class="form-group doc-section">
                <label for="docType">Document Type Allowed</label>
                <select id="docType" required>
                    <option value="">Select a country first...</option>
                </select>
                
                <label for="docNumber" style="margin-top: 15px;">Document Identification Number</label>
                <input type="text" id="docNumber" required placeholder="Enter ID number">
            </div>

            <button type="submit" class="btn-submit">
                Verify & Register Account
            </button>
        </form>

        <div class="footer-links">
            <a href="index.html">⬅️ Cancel & Return to Portal</a>
        </div>
    </div>

    <script>
        function adaptarDocumentosPorPais() {
            const country = document.getElementById('country').value;
            const docTypeSelect = document.getElementById('docType');
            const docNumberInput = document.getElementById('docNumber');
            
            docTypeSelect.innerHTML = '';

            if (country === 'EU') {
                docTypeSelect.options.add(new Option('National ID Card (Identity Card)', 'EU_ID'));
                docTypeSelect.options.add(new Option('International Passport', 'PASSPORT'));
                docNumberInput.placeholder = "e.g. 12345678A";
            } else if (country === 'US') {
                docTypeSelect.options.add(new Option('US Driver\'s License', 'US_DL'));
                docTypeSelect.options.add(new Option('Social Security Number (SSN)', 'US_SSN'));
                docTypeSelect.options.add(new Option('US Passport', 'PASSPORT'));
                docNumberInput.placeholder = "e.g. 999-99-9999";
            } else if (country === 'AU') {
                docTypeSelect.options.add(new Option('Australian Driver\'s License', 'AU_DL'));
                docTypeSelect.options.add(new Option('Medicare Card', 'AU_MED'));
                docTypeSelect.options.add(new Option('Passport', 'PASSPORT'));
                docNumberInput.placeholder = "Enter card number";
            } else if (country === 'CN') {
                docTypeSelect.options.add(new Option('Resident Identity Card (居民身份证)', 'CN_ID'));
                docTypeSelect.options.add(new Option('Passport', 'PASSPORT'));
                docNumberInput.placeholder = "18-digit identity number";
            } else if (country === 'BR') {
                docTypeSelect.options.add(new Option('CPF (Cadastro de Pessoas Físicas)', 'BR_CPF'));
                docTypeSelect.options.add(new Option('RG / CNH', 'BR_RG'));
                docNumberInput.placeholder = "000.000.000-00";
            } else if (country === 'GLOBAL') {
                docTypeSelect.options.add(new Option('International Passport', 'PASSPORT'));
                docTypeSelect.options.add(new Option('Government Issued National ID', 'GOV_ID'));
                docNumberInput.placeholder = "Enter international ID";
            } else {
                docTypeSelect.options.add(new Option('Select a country first...', ''));
            }
        }
    </script>
         <!-- Apenas o script local limpo, sem CDN externo para evitar conflito de rede -->
    <script src="script.js"></script>

</body>
</html>
